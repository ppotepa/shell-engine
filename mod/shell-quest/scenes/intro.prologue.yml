        reveal_ms: 800
        appear_at_ms: 10200
        disappear_at_ms: 12800

      - type: text
        id: prologue-cmd-2
        content: "> tail -f /dev/origin"
        x: 2
        y: 1
        font: "generic:1"
        fg_colour: green
        reveal_ms: 900
        appear_at_ms: 11100

      - type: text
        id: prologue-log-3d
        content: "[ WAIT ] input required"
        x: 2
        y: 19
        font: "generic:1"
        fg_colour: white
        reveal_ms: 650
        appear_at_ms: 12000

      - type: text
        id: prologue-continue
        content: "[#808080]PRESS ANY KEY[/]"
        align_x: center
        align_y: bottom
        font: "generic:1"
        fg_colour: white
        appear_at_ms: 12900
        hide_on_leave: true
        animations:
          - name: float
            looping: true
            params:
              axis: y
              amplitude: 1
              period_ms: 1800
              easing: ease-in-out
next: mainmenu
