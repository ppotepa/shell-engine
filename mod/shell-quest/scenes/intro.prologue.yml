# yaml-language-server: $schema=../../../../../schemas/scene.schema.yaml
id: intro.prologue
title: Intro Prologue
cutscene: true
bg_colour: black
stages:
  on_enter:
    steps:
      - effects:
          - name: fade-in
            duration: 400
            params:
              easing: ease-in
  on_idle:
    trigger: any-key
    steps:
      - duration: 40000
        effects: []
  on_leave:
    steps:
      - effects:
          - name: shatter-glitch
            duration: 500
      - effects:
          - name: artifact-out
            duration: 900
layers:
  - name: storyteller
    z_index: 0
    visible: true
    sprites:
      - type: text
        id: prologue-cmd-1
        content: "Booting from hard disk..."
        x: 2
        y: 1
        font: "generic:1"
        fg_colour: white
        reveal_ms: 1000
        appear_at_ms: 200
        disappear_at_ms: 2200

      - type: text
        id: prologue-cmd-2
        content: "# ftp ftp.funet.fi"
        x: 2
        y: 1
        font: "generic:1"
        fg_colour: green
        reveal_ms: 800
        appear_at_ms: 2200
        disappear_at_ms: 6500

      - type: text
