# yaml-language-server: $schema=../../../../../schemas/scene.schema.yaml
id: intro
title: Intro
cutscene: true
bg_colour: black
stages:
  on_enter:
    steps:
      - duration: 3000
        effects: []
      - effects:
          - name: crt-on
            duration: 1200
            params:
              easing: ease-out
  on_idle:
    trigger: any-key
    looping: true
    steps:
      - duration: 1800
        effects: []
      - effects:
          - name: shine
            duration: 1000
            params:
              angle: 20
              width: 4
              falloff: 2.5
              intensity: 2.0
              colour: white
              easing: ease-in
  on_leave:
    steps:
      - duration: 500
        effects: []
      - effects:
          - name: brighten
            duration: 500
            params:
              intensity: 0.12
              easing: ease-out
      - effects:
          - name: glitch-out
            duration: 1400
layers:
  - name: title
    z_index: 0
    visible: true
    sprites:
      - type: text
        content: "SHELL QUEST I"
        align_x: center
        align_y: center
        font: "Abril Fatface:ascii"
        fg_colour: white
        appear_at_ms: 0
        disappear_at_ms: 3720
        stages:
          on_enter:
            steps:
              - effects:
                  - name: fade-in
                    duration: 3000
                    params:
                      easing: ease-in

      - type: text
        content: "SHELL QUEST I"
        align_x: center
        align_y: center
        font: "Abril Fatface"
        fg_colour: gray
        appear_at_ms: 3720
        stages:
          on_enter:
            steps: []
          on_idle:
            looping: true
            steps:
              - duration: 1800
                effects: []
              - effects:
                  - name: shine
                    duration: 1000
                    params:
                      angle: 20
                      width: 4
                      falloff: 2.5
                      intensity: 2.0
                      colour: white
                      easing: ease-in
          on_leave:
            steps:
              - effects:
                  - name: brighten
                    duration: 500
                    params:
                      intensity: 0.12
                      easing: ease-out

      - type: text
        content: "[#808080]PRESS[/] ANY [#808080]KEY[/]"
        align_x: center
        align_y: center
        y: 12
        font: "generic:1"
        fg_colour: white
        glow:
          radius: 1
        appear_at_ms: 8500
        stages:
          on_leave:
            steps:
              - effects:
                  - name: fade-out
                    duration: 300
        animations:
          - name: float
            looping: true
            params:
              axis: y
              amplitude: 1
              period_ms: 2000
              easing: ease-in-out
next: mainmenu
