# yaml-language-server: $schema=../../../../../schemas/scene.schema.yaml
id: intro.font-demo-2
title: Intro Font Demo (2/2)
cutscene: true
bg_colour: black
stages:
  on_enter:
    steps:
      - effects:
          - name: fade-in
            duration: 350
            params:
              easing: ease-in
  on_idle:
    trigger: any-key
    steps:
      - duration: 30000
        effects: []
  on_leave:
    steps:
      - effects:
          - name: artifact-out
            duration: 800
layers:
  - name: font-demo-2
    z_index: 0
    visible: true
    sprites:
      - type: text
        id: demo2-title
        content: "FONT DEMO 2/2 - DENSE MODES"
        align_x: center
        align_y: top
        y: 1
        fg_colour: white

      - type: text
        id: demo2-generic3-label
        content: "generic:3 (scaled x2)"
        x: 4
        y: 4
        fg_colour: gray
        appear_at_ms: 300
      - type: text
        id: demo2-generic3
        content: "SQ"
        x: 4
        y: 5
        font: "generic:3"
        fg_colour: white
        appear_at_ms: 300

      - type: text
        id: demo2-half-label
        content: "generic:half (half blocks)"
        x: 4
        y: 20
        fg_colour: gray
        appear_at_ms: 900
      - type: text
        id: demo2-half
        content: "SHELL QUEST 1991"
        x: 4
        y: 21
        font: "generic:half"
        fg_colour: white
        appear_at_ms: 900

      - type: text
        id: demo2-quad-label
        content: "generic:quad (quadrants)"
        x: 4
        y: 26
        fg_colour: gray
        appear_at_ms: 1500
      - type: text
        id: demo2-quad
        content: "SHELL QUEST 1991"
        x: 4
        y: 27
        font: "generic:quad"
        fg_colour: white
        appear_at_ms: 1500

      - type: text
        id: demo2-braille-label
        content: "generic:braille"
        x: 4
        y: 32
        fg_colour: gray
        appear_at_ms: 2100
      - type: text
        id: demo2-braille
        content: "SHELL QUEST 1991"
        x: 4
        y: 33
        font: "generic:braille"
        fg_colour: white
        appear_at_ms: 2100

      - type: text
        id: demo2-continue
        content: "[#808080]PRESS ANY KEY TO CONTINUE[/]"
        align_x: center
        align_y: bottom
        font: "generic:1"
        fg_colour: white
        appear_at_ms: 2800
        hide_on_leave: true
        animations:
          - name: float
            looping: true
            params:
              axis: y
              amplitude: 1
              period_ms: 1800
              easing: ease-in-out
next: intro.prologue
