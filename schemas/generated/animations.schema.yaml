$schema: https://json-schema.org/draft/2020-12/schema
$id: https://shell-quest.local/schemas/generated/animations.schema.yaml
title: Generated animation schemas from metadata
$defs:
  animation:
    oneOf:
    - type: object
      properties:
        name:
          const: float
        params:
          type: object
          properties:
            axis:
              type: string
              description: Axis along which animation moves
              default: y
              enum:
              - x
              - y
            amplitude:
              type: integer
              description: Peak displacement in terminal cells
              default: 1.0
              minimum: 0.0
              maximum: 100.0
              multipleOf: 1.0
            period_ms:
              type: integer
              description: Full cycle duration
              default: 2000.0
              minimum: 1.0
              multipleOf: 10.0
            easing:
              type: string
              description: Easing function applied to animation curve
              default: linear
              enum:
              - linear
              - ease-in
              - ease-out
              - ease-in-out
      required:
      - name
