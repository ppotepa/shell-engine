$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://shell-quest.local/schemas/scene-file.schema.yaml"
title: Scene File Schema
description: >
  Root scene orchestration file for folder-based scene packages.
  This schema intentionally excludes composition-heavy sections that can live in partial files.
type: object
additionalProperties: false
required:
  - id
  - title
properties:
  id:
    type: string
    minLength: 1
  title:
    type: string
    minLength: 1
  cutscene:
    type: boolean
    default: false
  target-fps:
    type: integer
    minimum: 1
    maximum: 240
  target_fps:
    type: integer
    minimum: 1
    maximum: 240
  rendered-mode:
    type: string
    enum: [cell, halfblock, quadblock, braille]
  virtual-size-override:
    type: string
    pattern: "^[1-9][0-9]*x[1-9][0-9]*$"
    description: >
      Optional scene-local render canvas override in WIDTHxHEIGHT form.
      Compatibility-only: prefer setting `terminal.render_size` once at the mod level.
  bg_colour:
    $ref: "./scene.schema.yaml#/$defs/colour"
  bg:
    $ref: "./scene.schema.yaml#/$defs/colour"
  stages:
    $ref: "./scene.schema.yaml#/$defs/scene_stages"
  behaviors:
    type: array
    default: []
    items:
      $ref: "./scene.schema.yaml#/$defs/behavior"
  audio:
    $ref: "./scene.schema.yaml#/$defs/scene_audio"
  next:
    type: [string, "null"]
  menu-options:
    type: array
    default: []
    items:
      $ref: "./scene.schema.yaml#/$defs/menu_option"
  menu_options:
    type: array
    default: []
    items:
      $ref: "./scene.schema.yaml#/$defs/menu_option"
  input:
    $ref: "./scene.schema.yaml#/$defs/scene_input"
  layers:
    type: array
    items:
      $ref: "./scene.schema.yaml#/$defs/layer"
  templates:
    type: object
    additionalProperties:
      $ref: "./scene.schema.yaml#/$defs/sprite"
  objects:
    type: array
    items:
      $ref: "./scene.schema.yaml#/properties/objects/items"
