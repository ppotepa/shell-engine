$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://shell-engine.local/schemas/scene-file.schema.yaml"
title: Scene File Schema
description: >
  Root scene orchestration file for folder-based scene packages.
  This schema intentionally excludes composition-heavy sections that can live in partial files.
type: object
additionalProperties: false
required:
  - id
  - title
properties:
  id:
    type: string
    minLength: 1
  title:
    type: string
    minLength: 1
  cutscene:
    type: boolean
    default: false
  target-fps:
    type: integer
    minimum: 1
    maximum: 240
  render-space:
    $ref: "./scene.schema.yaml#/$defs/scene_render_space"
    description: Canonical scene field for default render-space and shared scene camera selection.
  space:
    $ref: "./scene.schema.yaml#/$defs/scene_render_space"
    description: Deprecated compatibility alias of render-space.
  world-model:
    $ref: "./scene.schema.yaml#/$defs/scene_world_model"
  controller-defaults:
    $ref: "./scene.schema.yaml#/$defs/scene_controller_defaults"
    description: Canonical scene-level preset selection for camera/player/UI stacks.
  camera-rig:
    $ref: "./scene.schema.yaml#/$defs/scene_camera_rig"
    description: Canonical authored camera contract lowered into transitional `input.*` camera compatibility surfaces.
  target_fps:
    type: integer
    minimum: 1
    maximum: 240
  render_space:
    $ref: "./scene.schema.yaml#/$defs/scene_render_space"
  world_model:
    $ref: "./scene.schema.yaml#/$defs/scene_world_model"
  controller_defaults:
    $ref: "./scene.schema.yaml#/$defs/scene_controller_defaults"
  camera_rig:
    $ref: "./scene.schema.yaml#/$defs/scene_camera_rig"
  spatial:
    $ref: "./scene.schema.yaml#/$defs/scene_spatial"
  lighting:
    $ref: "./scene.schema.yaml#/$defs/scene_lighting"
  view:
    $ref: "./scene.schema.yaml#/$defs/scene_view"
  planet-spec:
    $ref: "./scene.schema.yaml#/$defs/planet_spec"
  planet-spec-ref:
    type: string
    minLength: 1
  planet_spec:
    $ref: "./scene.schema.yaml#/$defs/planet_spec"
  planet_spec_ref:
    type: string
    minLength: 1
  celestial:
    $ref: "./scene.schema.yaml#/$defs/scene_celestial"
  virtual-size-override:
    type: string
    pattern: "^[1-9][0-9]*x[1-9][0-9]*$"
    description: >
      Optional scene-local render canvas override in WIDTHxHEIGHT form.
      Compatibility-only: prefer setting `display.world_render_size` once at the mod level.
  bg_colour:
    $ref: "./scene.schema.yaml#/$defs/colour"
  bg:
    $ref: "./scene.schema.yaml#/$defs/colour"
  stages:
    $ref: "./scene.schema.yaml#/$defs/scene_stages"
  behaviors:
    type: array
    default: []
    items:
      $ref: "./scene.schema.yaml#/$defs/behavior"
  logic:
    $ref: "./scene.schema.yaml#/$defs/scene_logic"
  audio:
    $ref: "./scene.schema.yaml#/$defs/scene_audio"
  ui:
    $ref: "./scene.schema.yaml#/$defs/ui_config"
  next:
    type: [string, "null"]
  menu-options:
    type: array
    default: []
    items:
      $ref: "./scene.schema.yaml#/$defs/menu_option"
  menu_options:
    type: array
    default: []
    items:
      $ref: "./scene.schema.yaml#/$defs/menu_option"
  input:
    $ref: "./scene.schema.yaml#/$defs/scene_input"
  layers:
    type: array
    items:
      $ref: "./scene.schema.yaml#/$defs/layer"
  templates:
    type: object
    additionalProperties:
      $ref: "./scene.schema.yaml#/$defs/sprite"
  objects:
    type: array
    items:
      $ref: "./scene.schema.yaml#/properties/objects/items"
  prerender:
    type: boolean

allOf:
  - if:
      required: [celestial]
    then:
      properties:
        world-model:
          const: celestial-3d
  - if:
      properties:
        world-model:
          const: planar-2d
    then:
      properties:
        input:
          not:
            anyOf:
              - required: [free-look-camera]
              - required: [orbit-camera]
              - required: [free_look_camera]
              - required: [orbit_camera]
  - if:
      anyOf:
        - required: [controller-defaults]
          properties:
            controller-defaults:
              anyOf:
                - required: [camera-preset]
                  properties:
                    camera-preset:
                      const: surface-free-look
                - required: [camera_preset]
                  properties:
                    camera_preset:
                      const: surface-free-look
        - required: [controller_defaults]
          properties:
            controller_defaults:
              anyOf:
                - required: [camera-preset]
                  properties:
                    camera-preset:
                      const: surface-free-look
                - required: [camera_preset]
                  properties:
                    camera_preset:
                      const: surface-free-look
        - required: [camera-rig]
          properties:
            camera-rig:
              required: [preset]
              properties:
                preset:
                  const: surface-free-look
        - required: [camera_rig]
          properties:
            camera_rig:
              required: [preset]
              properties:
                preset:
                  const: surface-free-look
    then:
      anyOf:
        - required: [input]
          properties:
            input:
              type: object
              required: [free-look-camera]
              properties:
                free-look-camera:
                  anyOf:
                    - required: [surface-mode]
                      properties:
                        surface-mode:
                          const: true
                    - required: [surface_mode]
                      properties:
                        surface_mode:
                          const: true
        - required: [camera-rig]
          properties:
            camera-rig:
              anyOf:
                - required: [surface]
                  properties:
                    surface:
                      required: [mode]
                      properties:
                        mode:
                          const: locked
                - required: [free-look-camera]
                  properties:
                    free-look-camera:
                      anyOf:
                        - required: [surface-mode]
                          properties:
                            surface-mode:
                              const: true
                        - required: [surface_mode]
                          properties:
                            surface_mode:
                              const: true
        - required: [camera_rig]
          properties:
            camera_rig:
              anyOf:
                - required: [surface]
                  properties:
                    surface:
                      required: [mode]
                      properties:
                        mode:
                          const: locked
                - required: [free-look-camera]
                  properties:
                    free-look-camera:
                      anyOf:
                        - required: [surface-mode]
                          properties:
                            surface-mode:
                              const: true
                        - required: [surface_mode]
                          properties:
                            surface_mode:
                              const: true
                - required: [free_look_camera]
                  properties:
                    free_look_camera:
                      anyOf:
                        - required: [surface-mode]
                          properties:
                            surface-mode:
                              const: true
                        - required: [surface_mode]
                          properties:
                            surface_mode:
                              const: true
