$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://shell-quest.local/schemas/effect-params.schema.yaml"
title: Effect Params Schema
description: >
  Parameter overrides for a visual effect step.
  Not all parameters apply to every effect — see each property description for which effects use it.
  Omitted parameters fall back to per-effect defaults inside the engine.
type: object
additionalProperties: false
properties:
  colour:
    $ref: "#/$defs/colour"
    description: "Target colour. Used by: clear-to-colour, fade-in, fade-out."
  easing:
    type: string
    enum: [linear, ease-in, ease-out, ease-in-out]
    default: linear
    description: Easing function applied to the effect progress curve.
  angle:
    type: number
    description: >
      Beam angle in degrees. 0 = vertical beam sweeps left→right.
      90 = horizontal beam sweeps top→bottom. Negative = opposite diagonal.
      Used by: shine.
  width:
    type: number
    minimum: 0.1
    description: >
      Gaussian beam half-width in character cells.
      Larger = softer/wider beam. Used by: shine.
  falloff:
    type: number
    minimum: 0.1
    description: >
      Exponent applied to the gaussian kernel.
      >1 = sharper laser edges, <1 = soft diffuse halo.
      Used by: shine.
  intensity:
    type: number
    minimum: 0.0
    description: >
      Effect intensity multiplier. Meaning is effect-specific.
      Used by: shine, brighten, lightning-flash, tesla-orb, whiteout.
  amplitude_x:
    type: number
    minimum: 0.0
    description: "Horizontal shake amplitude in cells. Used by: screen-shake."
  amplitude_y:
    type: number
    minimum: 0.0
    description: "Vertical shake amplitude in cells. Used by: screen-shake."
  frequency:
    type: number
    minimum: 0.0
    description: "Oscillation frequency / cycles for shake-like effects. Used by: screen-shake."
  coverage:
    type: string
    description: 'Optional scope hint (e.g. "full-screen"). Used by: lightning-flash.'
  orientation:
    type: string
    enum: [vertical, horizontal]
    description: "Directional orientation. Used by: lightning-fbm, lightning-branch, lightning-growth, lightning-ambient, lightning-natural."
  target:
    type: string
    description: Optional target identifier hint for future targeted effects.
  strikes:
    type: integer
    minimum: 1
    description: "Number of primary lightning branches/arcs. Used by: lightning-branch, lightning-growth, lightning-ambient, lightning-natural, tesla-orb."
  thickness:
    type: number
    minimum: 0.1
    description: "Branch/core thickness multiplier. Used by: lightning-branch, lightning-growth, lightning-ambient, lightning-natural, tesla-orb."
  glow:
    type: boolean
    description: Whether lightning should add halo glow around branches/arcs.
  start_x:
    oneOf:
      - type: string
      - type: number
    description: Start X anchor for lightning branch (number or "random").
  end_x:
    oneOf:
      - type: string
      - type: number
    description: End X anchor for lightning branch (number or "random").
  octave_count:
    type: integer
    minimum: 1
    maximum: 20
    description: FBM octave count for shader-like procedural lightning effects.
  amp_start:
    type: number
    minimum: 0.0
    description: FBM start amplitude (default 0.5).
  amp_coeff:
    type: number
    minimum: 0.0
    description: FBM amplitude coefficient per octave (default 0.5).
  freq_coeff:
    type: number
    minimum: 1.0
    description: FBM frequency multiplier per octave (default 2.0).
  speed:
    type: number
    minimum: 0.0
    description: FBM animation speed multiplier (default 0.5).

$defs:
  colour:
    description: >
      A colour value. Either a named colour or a CSS-style hex string (#rrggbb).
      Named colours: black, white, gray (= grey), silver, red, green, blue,
      yellow, cyan, magenta.
      Hex example: "#C0C0C0"
    oneOf:
      - type: string
        pattern: "^#[0-9A-Fa-f]{6}$"
        description: "Hex colour: #rrggbb"
      - type: string
        enum:
          - black
          - white
          - gray
          - grey
          - silver
          - red
          - green
          - blue
          - yellow
          - cyan
          - magenta
        description: Named colour.
