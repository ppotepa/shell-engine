$schema: https://json-schema.org/draft/2020-12/schema
$id: https://shell-quest.local/schemas/effect-params.schema.yaml
title: Effect Params Schema
description: Parameter overrides for a visual effect step. Omitted parameters fall back to per-effect defaults.
type: object
additionalProperties: false
properties:
  amplitude_x:
    type: number
    minimum: 0.0
    maximum: 3.0
    multipleOf: 0.1
    description: 'Horizontal shake in cells. Used by: screen-shake.'
  amplitude_y:
    type: number
    minimum: 0.0
    maximum: 3.0
    multipleOf: 0.1
    description: 'Vertical shake in cells. Used by: screen-shake.'
  angle:
    type: number
    minimum: 0.0
    maximum: 90.0
    multipleOf: 2.0
    description: 'Beam angle in degrees (0=vertical sweep). Used by: shine.'
  blend_mode:
    type: string
    enum:
    - replace
    - overlay
    default: replace
    description: 'Whether to replace the source cell or overlay the processed result. Used by: cutout.'
  brightness:
    type: number
    minimum: 0.0
    maximum: 2.0
    multipleOf: 0.05
    description: 'Brightness multiplier applied to the reflected image. Used by: crt-reflection.'
  colour:
    $ref: '#/$defs/colour'
    default: black
    description: 'Target colour (name or #rrggbb). Used by: clear-to-colour.'
  coverage:
    type: string
    enum:
    - full-screen
    - region
    default: full-screen
    description: 'Scope hint for the flash. Used by: lightning-flash.'
  easing:
    type: string
    enum:
    - linear
    - ease-in
    - ease-out
    - ease-in-out
    default: linear
    description: 'Progress curve applied to the effect. Used by: artifact-out, blur, brighten, clear-to-colour, crt-on, crt-reflection, cutout, devour-out, fade-in, fade-out, fade-to-black, glitch-out, lightning-branch, lightning-fbm, lightning-flash, lightning-growth, lightning-natural, lightning-optical-80s, posterize, power-off, screen-shake, shatter-glitch, shine, tesla-orb, whiteout.'
  edge_fidelity:
    type: number
    minimum: 0.0
    maximum: 1.0
    description: 'Sensitivity threshold for detecting colour boundaries. Used by: cutout.'
  edge_strength:
    type: number
    minimum: 0.0
    maximum: 1.0
    description: 'How strongly detected edges are darkened. Used by: cutout.'
  edge_width:
    type: number
    minimum: 1.0
    maximum: 3.0
    multipleOf: 1.0
    description: 'How many cells around an edge receive the accent. Used by: cutout.'
  end_x:
    type: string
    default: random
    description: 'End anchor (number or "random"). Used by: lightning-branch.'
  falloff:
    type: number
    minimum: 0.0
    maximum: 5.0
    multipleOf: 0.2
    description: 'Edge sharpness exponent (>1 = sharper). Used by: shine.'
  frequency:
    type: number
    minimum: 0.0
    maximum: 20.0
    multipleOf: 0.5
    description: 'Oscillation cycles during effect. Used by: screen-shake.'
  glow:
    type: boolean
    default: true
    description: 'Draw halo glow around the bolt. Used by: lightning-ambient, lightning-branch, lightning-growth, lightning-natural.'
  intensity:
    type: number
    minimum: 0.0
    maximum: 2.0
    multipleOf: 0.05
    description: 'Overall strength multiplier. Used by: artifact-out, brighten, devour-out, glitch-out, lightning-ambient, lightning-fbm, lightning-flash, lightning-natural, lightning-optical-80s, scanlines, shatter-glitch, shine, tesla-orb, whiteout.'
  levels:
    type: number
    minimum: 1.0
    maximum: 100.0
    multipleOf: 1.0
    description: 'Number of colour quantization bands per RGB channel. Used by: cutout, posterize.'
  octave_count:
    type: number
    minimum: 1.0
    maximum: 8.0
    multipleOf: 1.0
    description: 'FBM complexity octaves. Used by: lightning-fbm, tesla-orb.'
  orientation:
    type: string
    enum:
    - horizontal
    - vertical
    default: horizontal
    description: 'Directional axis for the effect. Used by: lightning-ambient, lightning-branch, lightning-fbm, lightning-flash, lightning-growth, lightning-natural.'
  radius:
    type: number
    minimum: 1.0
    maximum: 6.0
    multipleOf: 0.5
    description: 'Blur kernel half-size in cells. 1 = 3×3 neighbourhood, 2 = 5×5, etc. Used by: blur.'
  saturation:
    type: number
    minimum: 0.5
    maximum: 1.5
    description: 'Per-cell saturation multiplier after edge shaping. Used by: cutout.'
  simplify:
    type: number
    minimum: 0.0
    maximum: 8.0
    multipleOf: 1.0
    description: 'Box-blur smoothing passes applied before quantization. Used by: cutout.'
  speed:
    type: number
    minimum: 0.0
    maximum: 2.0
    multipleOf: 0.1
    description: 'Animation speed multiplier. Used by: lightning-ambient, lightning-branch, lightning-fbm, lightning-growth, lightning-natural, lightning-optical-80s, shine, tesla-orb.'
  sphericality:
    type: number
    minimum: 0.0
    maximum: 1.0
    multipleOf: 0.05
    description: 'Curved-glass spherical distortion strength. Used by: crt-reflection.'
  start_x:
    type: string
    default: random
    description: 'Start anchor (number or "random"). Used by: lightning-branch.'
  strikes:
    type: number
    minimum: 1.0
    maximum: 10.0
    multipleOf: 1.0
    description: 'Number of primary arcs / branches. Used by: lightning-ambient, lightning-branch, lightning-growth, lightning-natural, tesla-orb.'
  thickness:
    type: number
    minimum: 0.1
    maximum: 3.0
    multipleOf: 0.1
    description: 'Branch / bolt thickness multiplier. Used by: lightning-ambient, lightning-branch, lightning-growth, lightning-natural.'
  transparency:
    type: number
    minimum: 0.0
    maximum: 1.0
    multipleOf: 0.05
    description: 'How strongly the reflected image remains visible. Used by: crt-reflection.'
  width:
    type: number
    minimum: 1.0
    maximum: 12.0
    multipleOf: 0.5
    description: 'Gaussian beam half-width in cells. Used by: shine.'
$defs:
  colour:
    description: A colour value. Either a named colour or a CSS-style hex string (#rrggbb).
    anyOf:
    - type: string
      pattern: ^#[0-9A-Fa-f]{6}$
      description: 'Hex colour: #rrggbb'
    - type: string
      enum:
      - black
      - white
      - gray
      - grey
      - silver
      - red
      - green
      - blue
      - yellow
      - cyan
      - magenta
      description: Named colour.
