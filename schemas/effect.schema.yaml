$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://shell-quest.local/schemas/effect.schema.yaml"
title: Effect Schema
description: >
  A single named visual effect step used inside scene/layer/sprite lifecycle stages.
  Specifies the effect name, duration, optional looping, and per-effect parameter overrides.
type: object
additionalProperties: false
required: [name, duration]
properties:
  name:
    type: string
    description: >
      Effect identifier. Built-in effects:
      crt-on        — CRT power-on scan with scanline flicker and flash.
      power-off      — CRT power-off collapse animation.
      fade-in        — Fade sprite/layer from black to full brightness.
      fade-out       — Fade sprite/layer from full brightness to black.
      fade-to-black  — Radial vignette fade to black over the whole buffer.
      clear-to-colour — Instantly fill buffer with params.colour.
      scanlines      — Overlay horizontal CRT scanlines.
      shine          — Metallic laser-scan highlight sweep (configurable angle/width/falloff).
      brighten       — Increase foreground brightness toward white.
      lightning-flash — High-energy multi-pulse flash simulating lightning illumination.
      lightning-branch — Draw jagged lightning branches with optional glow.
      lightning-growth — Progressive branching lightning that grows and forks before the bright return stroke.
      lightning-optical-80s — Cinematic 80s optical lightning (blue halation + white core).
      lightning-fbm — Shader-inspired procedural lightning warp (FBM/noise driven).
      lightning-ambient — Sparse lighter background lightning using the branch/fbm visual language over a long effect window.
      lightning-natural — More natural lightning with bright core, halo, and secondary filaments.
      tesla-orb      — Draw spherical electrical arcs (Tesla coil style) around scene center.
      screen-shake   — Camera-like jitter shifting the rendered frame.
      whiteout       — Overexposure pulse toward white.
      glitch-out     — Terminal glitch collapse + flash transition.
      devour-out     — Consume visible scene content, then spread corruption over full screen.
      artifact-out   — Digital GPU artifact transition (glyph corruption, tearing, channel split).
      shatter-glitch — Sprite-focused glitch: partial line loss, flicker, and displaced fragments.
    enum:
      - crt-on
      - power-off
      - fade-in
      - fade-out
      - fade-to-black
      - clear-to-colour
      - scanlines
      - shine
      - brighten
      - lightning-flash
      - lightning-branch
      - lightning-growth
      - lightning-optical-80s
      - lightning-fbm
      - lightning-ambient
      - lightning-natural
      - tesla-orb
      - screen-shake
      - whiteout
      - glitch-out
      - devour-out
      - artifact-out
      - shatter-glitch
  duration:
    type: integer
    minimum: 0
    description: Duration in milliseconds.
  looping:
    type: boolean
    default: false
    description: Whether the effect repeats indefinitely within its step.
  params:
    $ref: "./effect-params.schema.yaml"
