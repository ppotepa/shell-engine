$schema: https://json-schema.org/draft/2020-12/schema
$id: https://shell-quest.local/schemas/effect.schema.yaml
title: Effect Schema
description: A single named visual effect step used inside scene/layer/sprite lifecycle stages.
type: object
additionalProperties: false
required:
- name
- duration
properties:
  name:
    type: string
    description: |-
      Effect identifier. Built-in effects:
      - artifact-out: Digital compression artefacts fragmenting the image.
      - blur: Box blur: softens terminal cell colours by averaging a neighbourhood of pixels.
      - brighten: Brightens pixels toward white by intensity over duration.
      - clear-to-colour: Clears region to a target terminal colour.
      - crt-on: CRT startup sweep with phosphor-like reveal.
      - cutout: Post-raster cutout look with smoothing, posterization, edge accents, and saturation shaping.
      - crt-reflection: Curved CRT glass reflection warp for bitmap sprites.
      - devour-out: Pixel dropout and corruption spreading across the frame.
      - fade-in: Reveal from dark to full brightness.
      - fade-out: Fade from full brightness to dark.
      - fade-to-black: Colour-preserving fade converging to black.
      - glitch-out: Signal decay, dead pixels, and horizontal tear corruption.
      - lightning-ambient: Looping ambient electric atmosphere.
      - lightning-branch: Procedural forked bolt between start/end anchors.
      - lightning-fbm: Fractal Brownian Motion plasma bolt.
      - lightning-flash: Short global lightning flash with a glow peak.
      - lightning-growth: Slow-growing branched bolt spreading outward.
      - lightning-natural: Naturalistic bolt with secondary arcs.
      - lightning-optical-80s: Retro 80s neon-style optical lightning.
      - posterize: Reduces colour band count by quantizing RGB channels.
      - power-off: Old display shutdown collapse to center line.
      - scanlines: Classic CRT horizontal scanline overlay.
      - screen-shake: Camera-like shake offsetting rendered output.
      - shatter-glitch: Frame shatters and scatters across the buffer.
      - shine: Moving highlight beam crossing the whole frame.
      - tesla-orb: Orbital electric arcs around a plasma core.
      - terminal-crt: Subtle CRT post-process with safe curvature, scanlines, vignette and phosphor noise.
      - whiteout: Flash all pixels toward white.
    enum:
    - artifact-out
    - blur
    - brighten
    - clear-to-colour
    - crt-on
    - cutout
    - crt-reflection
    - devour-out
    - fade-in
    - fade-out
    - fade-to-black
    - glitch-out
    - lightning-ambient
    - lightning-branch
    - lightning-fbm
    - lightning-flash
    - lightning-growth
    - lightning-natural
    - lightning-optical-80s
    - posterize
    - power-off
    - scanlines
    - screen-shake
    - shatter-glitch
    - shine
    - tesla-orb
    - terminal-crt
    - whiteout
  duration:
    type: integer
    minimum: 0
    description: Duration in milliseconds.
  looping:
    type: boolean
    default: false
    description: Whether the effect repeats indefinitely within its step.
  params:
    $ref: ./effect-params.schema.yaml
