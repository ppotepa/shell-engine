$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://shell-engine.local/schemas/objects-file.schema.yaml"
title: Objects File Schema
description: >
  Partial file schema for legacy scene-local object instance declarations in folder-based scene packages.
  Each element follows the ref/as/with/state/tags object instance syntax: ref names the prefab path,
  as assigns a scene-local id, with overrides exported parameters, state seeds runtime state, and
  tags assigns role/group labels. The vNext runtime-object bridge uses
  `runtime-objects` and `runtime-object.schema.yaml` instead of this legacy file surface.
type: array
items:
  $ref: "./scene.schema.yaml#/properties/objects/items"
