$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://shell-quest.local/schemas/mod.schema.yaml"
title: Mod Manifest Schema
description: |
  Root manifest for a Shell Quest mod.
  Defines entrypoint scene and optional display/runtime presentation settings.
type: object
additionalProperties: true
required:
  - name
  - version
  - entrypoint
properties:
  name:
    type: string
    minLength: 1
    description: Human-readable mod name displayed in menus and diagnostics.
  version:
    type: string
    minLength: 1
    description: Mod version string (e.g. "1.0.0"). Informational only.
  entrypoint:
    type: string
    minLength: 1
    pattern: "^/.+\\.yml$"
    description: Absolute path (inside mod) to the first scene YAML file.
  splash:
    type: object
    description: |
      Optional splash startup override.
      When omitted, engine built-in splash scene is used.
    additionalProperties: false
    properties:
      enabled:
        type: boolean
        description: |
          Whether to show splash at startup.
          CLI `--skip-splash` still overrides this and disables splash.
      scene:
        type: string
        minLength: 1
        description: |
          Path to splash scene YAML.
          Absolute paths are resolved from mod root (for example `/scenes/splash/scene.yml`).
          Relative paths are resolved against mod root.
    patternProperties:
      "^scene-path$":
        $ref: "#/properties/splash/properties/scene"
      "^scene_path$":
        $ref: "#/properties/splash/properties/scene"
  display:
    type: object
    description: |
      Optional display requirements and render presentation settings.
      Rendering uses a single authored canvas that is presented by the SDL2 backend
      according to `presentation_policy`.
    additionalProperties: false
    properties:
      min_colours:
        type: integer
        minimum: 1
        description: Minimum colour depth the display stack should support (e.g. 8, 16, 256, 16777216).
      min_width:
        type: integer
        minimum: 1
        description: Minimum output width in logical cells/pixels.
      min_height:
        type: integer
        minimum: 1
        description: Minimum output height in logical cells/pixels.
      target_fps:
        type: integer
        minimum: 1
        maximum: 240
        description: Target engine framerate lock. Default 60 when omitted.
      render_size:
        anyOf:
          - type: string
            pattern: "^[1-9][0-9]*x[1-9][0-9]*$"
          - type: string
            enum: [match-output, max-available]
        description: |
          Preferred: a fixed authored render canvas in WIDTHxHEIGHT form
          (for example 180x30, 320x180, or 320x240).
          "match-output" tracks the current output size. `max-available`
          remains an alias for `match-output`.
      virtual_size:
        $ref: "#/properties/display/properties/render_size"
      presentation_policy:
        type: string
        enum: [strict, fit, stretch]
        description: |
          strict  - require output >= render size; no resampling.
          fit     - preserve aspect ratio with centered letterbox.
          stretch - scale authored render output to fill the current output area.
      virtual_policy:
        $ref: "#/properties/display/properties/presentation_policy"
      default_font:
        type: string
        minLength: 1
        description: |
          Optional mod-level text font alias used by sprite `font: default`.
          Can point to either a built-in generic spec (for example `generic:2`)
          or a named font (for example `Abril Fatface`).
    patternProperties:
      "^render-size$":
        $ref: "#/properties/display/properties/render_size"
      "^presentation-policy$":
        $ref: "#/properties/display/properties/presentation_policy"
      "^target-fps$":
        $ref: "#/properties/display/properties/target_fps"
      "^virtual-size$":
        $ref: "#/properties/display/properties/render_size"
      "^virtual-policy$":
        $ref: "#/properties/display/properties/presentation_policy"
      "^renderer-mode$":
        $ref: "#/properties/display/properties/renderer_mode"
      "^default-font$":
        $ref: "#/properties/display/properties/default_font"
patternProperties:
  "^display$":
    $ref: "#/properties/display"
