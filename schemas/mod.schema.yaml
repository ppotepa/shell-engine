$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://shell-quest.local/schemas/mod.schema.yaml"
title: Mod Manifest Schema
type: object
additionalProperties: true
required:
  - name
  - version
  - entrypoint
properties:
  name:
    type: string
    minLength: 1
  version:
    type: string
    minLength: 1
  entrypoint:
    type: string
    minLength: 1
    pattern: "^/.+\\.yml$"
  terminal:
    type: object
    description: Optional terminal capability requirements. Engine will refuse to start if not met.
    additionalProperties: false
    properties:
      min_colours:
        type: integer
        minimum: 1
        description: Minimum number of colours the terminal must support (e.g. 8, 16, 256, 16777216).
      min_width:
        type: integer
        minimum: 1
        description: Minimum terminal width in columns.
      min_height:
        type: integer
        minimum: 1
        description: Minimum terminal height in rows.
      target_fps:
        type: integer
        minimum: 1
        maximum: 240
        description: Target engine framerate lock. Default 60 when omitted.
      target-fps:
        type: integer
        minimum: 1
        maximum: 240
        description: Alias of target_fps.
      use_virtual_buffer:
        type: boolean
        description: Enable fixed virtual framebuffer rendering before terminal presentation.
      use-virtual-buffer:
        type: boolean
        description: Alias of use_virtual_buffer.
      virtual_size:
        type: string
        pattern: "^[1-9][0-9]*x[1-9][0-9]*$"
        description: Virtual framebuffer size in WIDTHxHEIGHT form (e.g. 320x240).
      virtual-size:
        type: string
        pattern: "^[1-9][0-9]*x[1-9][0-9]*$"
        description: Alias of virtual_size.
      virtual_policy:
        type: string
        enum: [strict, fit]
        description: |
          strict — require terminal >= virtual size in cells; no downscale.
          fit    — adaptively scale virtual frame to current terminal with letterbox.
      virtual-policy:
        type: string
        enum: [strict, fit]
        description: Alias of virtual_policy.
