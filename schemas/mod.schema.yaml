$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://shell-quest.local/schemas/mod.schema.yaml"
title: Mod Manifest Schema
type: object
additionalProperties: true
required:
  - name
  - version
  - entrypoint
properties:
  name:
    type: string
    minLength: 1
  version:
    type: string
    minLength: 1
  entrypoint:
    type: string
    minLength: 1
    pattern: "^/.+\\.yml$"
  terminal:
    type: object
    description: Optional terminal capability requirements. Engine will refuse to start if not met.
    additionalProperties: false
    properties:
      min_colours:
        type: integer
        minimum: 1
        description: Minimum number of colours the terminal must support (e.g. 8, 16, 256, 16777216).
      min_width:
        type: integer
        minimum: 1
        description: Minimum terminal width in columns.
      min_height:
        type: integer
        minimum: 1
        description: Minimum terminal height in rows.
      target_fps:
        type: integer
        minimum: 1
        maximum: 240
        description: Target engine framerate lock. Default 60 when omitted.
      target-fps:
        type: integer
        minimum: 1
        maximum: 240
        description: Alias of target_fps.
