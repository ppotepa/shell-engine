$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://shell-quest.local/schemas/mod.schema.yaml"
title: Mod Manifest Schema
description: |
  Root manifest for a Shell Quest mod.
  Defines entrypoint scene and optional terminal/runtime presentation settings.
type: object
additionalProperties: true
required:
  - name
  - version
  - entrypoint
properties:
  name:
    type: string
    minLength: 1
    description: Human-readable mod name displayed in menus and diagnostics.
  version:
    type: string
    minLength: 1
    description: Mod version string (e.g. "1.0.0"). Informational only.
  entrypoint:
    type: string
    minLength: 1
    pattern: "^/.+\\.yml$"
    description: Absolute path (inside mod) to the first scene YAML file.
  terminal:
    type: object
    description: |
      Optional terminal requirements and render presentation settings.
      Capability checks run at startup. Rendering may use a virtual buffer when enabled.
    additionalProperties: false
    properties:
      min_colours:
        type: integer
        minimum: 1
        description: Minimum number of colours the terminal must support (e.g. 8, 16, 256, 16777216).
      min_width:
        type: integer
        minimum: 1
        description: Minimum terminal width in columns.
      min_height:
        type: integer
        minimum: 1
        description: Minimum terminal height in rows.
      target_fps:
        type: integer
        minimum: 1
        maximum: 240
        description: Target engine framerate lock. Default 60 when omitted.
      target-fps:
        type: integer
        minimum: 1
        maximum: 240
        description: Alias of target_fps.
      use_virtual_buffer:
        type: boolean
        description: |
          Enable virtual-buffer rendering.
          true  = compose into virtual_size first, then present to terminal.
          false = compose directly into terminal-size output buffer.
      use-virtual-buffer:
        type: boolean
        description: Alias of use_virtual_buffer.
      virtual_size:
        oneOf:
          - type: string
            pattern: "^[1-9][0-9]*x[1-9][0-9]*$"
          - type: string
            enum: [max-available]
        description: |
          Virtual framebuffer size in WIDTHxHEIGHT form (for example 320x240 or 220x55),
          or "max-available" to use current terminal size.
          Used only when use_virtual_buffer/use-virtual-buffer is true.
      virtual-size:
        oneOf:
          - type: string
            pattern: "^[1-9][0-9]*x[1-9][0-9]*$"
          - type: string
            enum: [max-available]
        description: Alias of virtual_size.
      virtual_policy:
        type: string
        enum: [strict, fit]
        description: |
          strict - require terminal >= virtual size in cells; no downscale.
          fit    - adaptively scale virtual frame to current terminal with centered letterbox.
          Policy is meaningful when virtual buffer is enabled.
      virtual-policy:
        type: string
        enum: [strict, fit]
        description: Alias of virtual_policy.
      renderer_mode:
        type: string
        enum: [cell, halfblock, quadblock, braille]
        description: Optional global renderer mode override for all scenes.
      renderer-mode:
        type: string
        enum: [cell, halfblock, quadblock, braille]
        description: Alias of renderer_mode.
