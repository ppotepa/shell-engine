$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://shell-quest.local/schemas/mod.schema.yaml"
title: Mod Manifest Schema
description: |
  Root manifest for a Shell Quest mod.
  Defines entrypoint scene and optional terminal/runtime presentation settings.
type: object
additionalProperties: true
required:
  - name
  - version
  - entrypoint
properties:
  name:
    type: string
    minLength: 1
    description: Human-readable mod name displayed in menus and diagnostics.
  version:
    type: string
    minLength: 1
    description: Mod version string (e.g. "1.0.0"). Informational only.
  entrypoint:
    type: string
    minLength: 1
    pattern: "^/.+\\.yml$"
    description: Absolute path (inside mod) to the first scene YAML file.
  output_backend:
    type: string
    enum: [terminal, sdl2, prompt]
    description: |
      Startup output selection policy.
      terminal - always launch in the terminal backend.
      sdl2     - always launch in the SDL2 window backend.
      prompt   - ask the player which backend to use before engine startup.
  terminal:
    type: object
    description: |
      Optional terminal requirements and render presentation settings.
      Capability checks run at startup. Rendering uses a single render canvas that is
      presented to the active backend according to `presentation_policy`.
    additionalProperties: false
    properties:
      min_colours:
        type: integer
        minimum: 1
        description: Minimum number of colours the terminal must support (e.g. 8, 16, 256, 16777216).
      min_width:
        type: integer
        minimum: 1
        description: Minimum terminal width in columns.
      min_height:
        type: integer
        minimum: 1
        description: Minimum terminal height in rows.
      target_fps:
        type: integer
        minimum: 1
        maximum: 240
        description: Target engine framerate lock. Default 60 when omitted.
      render_size:
        anyOf:
          - type: string
            pattern: "^[1-9][0-9]*x[1-9][0-9]*$"
          - type: string
            enum: [match-output, max-available]
        description: |
          Preferred: a fixed authored render canvas in WIDTHxHEIGHT form
          (for example 180x30, 320x180, or 320x240).
          "match-output" tracks the current output size and is kept for
          backward compatibility. `max-available` remains an alias for `match-output`.
      virtual_size:
        $ref: "#/properties/terminal/properties/render_size"
      presentation_policy:
        type: string
        enum: [strict, fit, stretch]
        description: |
          strict  - require output >= render size in cells; no resampling.
          fit     - preserve aspect ratio with centered letterbox.
          stretch - scale authored render output to fill the current terminal/output buffer.
      virtual_policy:
        $ref: "#/properties/terminal/properties/presentation_policy"
      renderer_mode:
        type: string
        enum: [cell, halfblock, quadblock, braille]
        description: Optional global renderer mode override for all scenes.
    patternProperties:
      "^render-size$":
        $ref: "#/properties/terminal/properties/render_size"
      "^presentation-policy$":
        $ref: "#/properties/terminal/properties/presentation_policy"
      "^target-fps$":
        $ref: "#/properties/terminal/properties/target_fps"
      "^virtual-size$":
        $ref: "#/properties/terminal/properties/render_size"
      "^virtual-policy$":
        $ref: "#/properties/terminal/properties/presentation_policy"
      "^renderer-mode$":
        $ref: "#/properties/terminal/properties/renderer_mode"
patternProperties:
  "^output-backend$":
    $ref: "#/properties/output_backend"
  "^output_backend$":
    $ref: "#/properties/output_backend"
