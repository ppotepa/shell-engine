$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://shell-engine.local/schemas/object.schema.yaml"
title: Object Schema
description: >
  Defines a reusable object/prefab blueprint that scenes can still lower through
  the legacy `objects[]` path. Instances reference this file by path using `ref`,
  override exported parameters via `with`, assign a scene-local id via `as`,
  seed runtime state via `state`, and attach role tags via `tags`.
  Runtime-object vNext graphs use `runtime-object.schema.yaml` instead of this
  legacy object surface.
type: object
additionalProperties: false
required:
  - name
properties:
  kind:
    type: string
    const: object
    description: Optional explicit document kind marker.
  name:
    type: string
    minLength: 1
    description: Unique object name used by scene `objects[].ref`/`use`.
  exports:
    type: object
    default: {}
    description: Named parameters that scene instances can override via `with`.
    additionalProperties: true
  state:
    type: object
    default: {}
    description: Initial object-local state values.
    additionalProperties: true
  logic:
    type: object
    additionalProperties: false
    description: Optional behavior/script binding preserved on the legacy object surface.
    properties:
      type:
        type: string
        enum: [native, graph, script]
        default: native
        description: Logic implementation kind.
      behavior:
        type: string
        minLength: 1
        description: Native behavior/controller identifier.
      params:
        type: object
        default: {}
        additionalProperties: true
        description: Optional logic parameters.
