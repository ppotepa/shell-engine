$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://shell-quest.local/schemas/sprites-file.schema.yaml"
title: Sprites File Schema
description: >
  Partial file schema for a flat list of sprite definitions in folder-based scene packages.
  Each element is a sprite (drawable object with position, content, and optional effects/lifecycle stages).
  Used as the sprites.yml partial in a scene folder.
type: array
items:
  $ref: "./scene.schema.yaml#/$defs/sprite"
