$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://shell-engine.local/schemas/scene.schema.yaml"
title: Scene Schema
description: >
  Defines a scene in a Shell Engine mod.
  Scenes have a lifecycle managed through stages (on_enter, on_idle, on_leave),
  each containing sequential steps of parallel effects.
type: object
additionalProperties: false
required:
  - id
  - title
properties:
  id:
    type: string
    minLength: 1
    description: Unique identifier for the scene. Used for scene transitions.
  title:
    type: string
    minLength: 1
    description: Human-readable title.
  cutscene:
    type: boolean
    default: false
    description: Whether this scene is a non-interactive cutscene.
  cutscene-ref:
    type: string
    minLength: 1
    description: >
      Optional cutscene manifest reference.
      Compiler resolves it (default /cutscenes/<name>.yml) into timed image sprites.
  target-fps:
    type: integer
    minimum: 1
    maximum: 240
    description: Optional scene-level FPS cap override (applies regardless of renderer/scene type).
  render-space:
    $ref: "#/$defs/scene_render_space"
    description: Canonical scene field for default render-space and shared scene camera selection.
  space:
    $ref: "#/$defs/scene_render_space"
    description: Deprecated compatibility alias of render-space.
  world-model:
    $ref: "#/$defs/scene_world_model"
    description: Simulation/world contract resolved for this scene.
  controller-defaults:
    $ref: "#/$defs/scene_controller_defaults"
    description: >
      Canonical scene-level preset selection for camera/player/UI stacks.
      Prefer this plus `camera-rig` over direct `input.*` camera blocks.
  camera-rig:
    $ref: "#/$defs/scene_camera_rig"
    description: >
      Canonical authored camera contract. Scene normalization lowers this into
      `controller-defaults.camera-preset` plus the current `input.*` camera
      compatibility profiles so runtime behavior stays on the existing path
      during rollout.
  spatial:
    $ref: "#/$defs/scene_spatial"
    description: Optional scene-level spatial unit and axis overrides.
  lighting:
    $ref: "#/$defs/scene_lighting"
    description: Optional scene-level lighting floor configuration.
  view:
    $ref: "#/$defs/scene_view"
    description: >
      Optional scene-level 3D view profile selection. Prefer a top-level
      `view.profile`; direct lower-level profile refs are composition inputs.
  planet-spec:
    $ref: "#/$defs/planet_spec"
    description: Optional scene-level planet contract (generator/render/atmosphere/body).
  planet-spec-ref:
    type: string
    minLength: 1
    description: Optional scene-level reference path for a reusable planet spec document.
  celestial:
    $ref: "#/$defs/scene_celestial"
    description: Optional binding to the persistent celestial scope resolved by this scene.
  virtual-size-override:
    type: string
    pattern: "^[1-9][0-9]*x[1-9][0-9]*$"
    description: >
      Optional scene-local render canvas override in WIDTHxHEIGHT form (e.g. 320x240).
      Compatibility-only: prefer a single mod-level `display.world_render_size` so the whole mod
      shares one authored canvas and presentation remains a backend concern.
  bg_colour:
    $ref: "#/$defs/colour"
    description: >
      Terminal background colour filling the entire buffer on scene load.
      Defaults to true black (RGB 0,0,0) when absent.
  bg:
    $ref: "#/$defs/colour"
    description: Alias of bg_colour.
  stages:
    $ref: "#/$defs/scene_stages"
    description: Lifecycle stage definitions (on_enter, on_idle, on_leave) containing sequential effect steps.
  behaviors:
    type: array
    default: []
    description: Optional runtime behaviors attached to the root scene GameObject.
    items:
      $ref: "#/$defs/behavior"
  logic:
    $ref: "#/$defs/scene_logic"
    description: Optional scene-level controller binding (native or script).
  audio:
    $ref: "#/$defs/scene_audio"
    description: >
      Optional audio cue hooks bound to scene lifecycle stages.
      Design hook only — runtime emits AudioCue events, playback is handled externally.
  ui:
    $ref: "#/$defs/ui_config"
    description: Scene-level UI toggles and lifecycle hints.
  gui:
    $ref: "#/$defs/scene_gui"
    description: Optional interactive GUI control declarations for HUD/UI widgets.
  layers:
    type: array
    description: Compositing layers rendered onto the scene buffer, each containing sprites.
    items:
      $ref: "#/$defs/layer_entry"
  next:
    type: [string, "null"]
    description: Scene id to transition to when on_leave completes.
  menu-options:
    type: array
    default: []
    description: Optional key-driven routes from menu-like scenes.
    items:
      $ref: "#/$defs/menu_option"
  input:
    $ref: "#/$defs/scene_input"
    description: Optional scene-level input control profiles.
  templates:
    type: object
    default: {}
    description: Optional local sprite templates referenced by `use`.
    additionalProperties:
      $ref: "#/$defs/sprite"
  objects:
    type: array
    default: []
    description: >
      Legacy object instances placed in the scene using the ref/as/with/state/tags syntax.
      Each entry references an object prefab by path (ref), optionally assigns a scene-local
      id (as), overrides exports (with), seeds runtime state (state), and attaches role tags (tags).
    items:
      $ref: "#/$defs/object_instance_entry"
  runtime-objects:
    type: array
    default: []
    description: >
      vNext authored runtime-object bridge tree. Each node carries a mandatory typed
      transform plus optional prefab/preset refs, typed components, children,
      and override bags. Legacy `objects` stays on the compile-time expansion
      and lowering path.
    items:
      $ref: "./runtime-object.schema.yaml"

patternProperties:
  "^cutscene_ref$":
    $ref: "#/properties/cutscene-ref"
  "^target_fps$":
    $ref: "#/properties/target-fps"
  "^render_space$":
    $ref: "#/properties/render-space"
  "^world_model$":
    $ref: "#/properties/world-model"
  "^controller_defaults$":
    $ref: "#/properties/controller-defaults"
  "^camera_rig$":
    $ref: "#/properties/camera-rig"
  "^meters_per_world_unit$":
    $ref: "#/$defs/scene_spatial/properties/meters-per-world-unit"
  "^virtual_pixels_per_world_unit$":
    $ref: "#/$defs/scene_spatial/properties/virtual-pixels-per-world-unit"
  "^lighting$":
    $ref: "#/properties/lighting"
  "^view$":
    $ref: "#/properties/view"
  "^planet_spec$":
    $ref: "#/properties/planet-spec"
  "^planet_spec_ref$":
    $ref: "#/properties/planet-spec-ref"
  "^menu_options$":
    $ref: "#/properties/menu-options"
  "^runtime_objects$":
    $ref: "#/properties/runtime-objects"

allOf:
  - if:
      required: [celestial]
    then:
      properties:
        world-model:
          const: celestial-3d
  - if:
      properties:
        world-model:
          const: planar-2d
    then:
      properties:
        input:
          not:
            anyOf:
              - required: [free-look-camera]
              - required: [orbit-camera]
              - required: [free_look_camera]
              - required: [orbit_camera]
  - if:
      anyOf:
        - required: [controller-defaults]
          properties:
            controller-defaults:
              anyOf:
                - required: [camera-preset]
                  properties:
                    camera-preset:
                      const: surface-free-look
                - required: [camera_preset]
                  properties:
                    camera_preset:
                      const: surface-free-look
        - required: [controller_defaults]
          properties:
            controller_defaults:
              anyOf:
                - required: [camera-preset]
                  properties:
                    camera-preset:
                      const: surface-free-look
                - required: [camera_preset]
                  properties:
                    camera_preset:
                      const: surface-free-look
        - required: [camera-rig]
          properties:
            camera-rig:
              required: [preset]
              properties:
                preset:
                  const: surface-free-look
        - required: [camera_rig]
          properties:
            camera_rig:
              required: [preset]
              properties:
                preset:
                  const: surface-free-look
    then:
      anyOf:
        - required: [input]
          properties:
            input:
              type: object
              required: [free-look-camera]
              properties:
                free-look-camera:
                  anyOf:
                    - required: [surface-mode]
                      properties:
                        surface-mode:
                          const: true
                    - required: [surface_mode]
                      properties:
                        surface_mode:
                          const: true
        - required: [camera-rig]
          properties:
            camera-rig:
              anyOf:
                - required: [surface]
                  properties:
                    surface:
                      required: [mode]
                      properties:
                        mode:
                          const: locked
                - required: [free-look-camera]
                  properties:
                    free-look-camera:
                      anyOf:
                        - required: [surface-mode]
                          properties:
                            surface-mode:
                              const: true
                        - required: [surface_mode]
                          properties:
                            surface_mode:
                              const: true
        - required: [camera_rig]
          properties:
            camera_rig:
              anyOf:
                - required: [surface]
                  properties:
                    surface:
                      required: [mode]
                      properties:
                        mode:
                          const: locked
                - required: [free-look-camera]
                  properties:
                    free-look-camera:
                      anyOf:
                        - required: [surface-mode]
                          properties:
                            surface-mode:
                              const: true
                        - required: [surface_mode]
                          properties:
                            surface_mode:
                              const: true
                - required: [free_look_camera]
                  properties:
                    free_look_camera:
                      anyOf:
                        - required: [surface-mode]
                          properties:
                            surface-mode:
                              const: true
                        - required: [surface_mode]
                          properties:
                            surface_mode:
                              const: true

$defs:

  scene_render_space:
    type: string
    enum: [2d, 3d]
    default: 2d
    description: Presentation/render-space mode for the scene.

  scene_world_model:
    type: string
    enum: [planar-2d, euclidean-3d, celestial-3d]
    default: planar-2d
    description: Simulation/world law set used by this scene.

  scene_controller_defaults:
    type: object
    additionalProperties: false
    properties:
      camera-preset:
        type: string
        minLength: 1
      player-preset:
        type: string
        minLength: 1
      ui-preset:
        type: string
        minLength: 1
      spawn-preset:
        type: string
        minLength: 1
      gravity-preset:
        type: string
        minLength: 1
      surface-preset:
        type: string
        minLength: 1
    patternProperties:
      "^camera_preset$":
        $ref: "#/$defs/scene_controller_defaults/properties/camera-preset"
      "^player_preset$":
        $ref: "#/$defs/scene_controller_defaults/properties/player-preset"
      "^ui_preset$":
        $ref: "#/$defs/scene_controller_defaults/properties/ui-preset"
      "^spawn_preset$":
        $ref: "#/$defs/scene_controller_defaults/properties/spawn-preset"
      "^gravity_preset$":
        $ref: "#/$defs/scene_controller_defaults/properties/gravity-preset"
      "^surface_preset$":
        $ref: "#/$defs/scene_controller_defaults/properties/surface-preset"

  scene_camera_surface_mode:
    type: string
    enum: [free, locked]
    default: free
    description: Explicit authored camera-surface contract for scene camera rigs.

  scene_camera_surface:
    type: object
    additionalProperties: false
    properties:
      mode:
        $ref: "#/$defs/scene_camera_surface_mode"

  scene_camera_rig:
    type: object
    additionalProperties: false
    properties:
      preset:
        $ref: "#/$defs/scene_controller_defaults/properties/camera-preset"
      surface:
        $ref: "#/$defs/scene_camera_surface"
      obj-viewer:
        $ref: "#/$defs/obj_viewer_controls"
      free-look-camera:
        $ref: "#/$defs/free_look_camera_controls"
      orbit-camera:
        $ref: "#/$defs/orbit_camera_controls"
    patternProperties:
      "^obj_viewer$":
        $ref: "#/$defs/obj_viewer_controls"
      "^free_look_camera$":
        $ref: "#/$defs/free_look_camera_controls"
      "^orbit_camera$":
        $ref: "#/$defs/orbit_camera_controls"

  # ── Colour ─────────────────────────────────────────────────────────────────
  colour:
    description: >
      A colour value. Either a named colour or a CSS-style hex string (#rrggbb).
      Named colours: black, white, gray (= grey), silver, red, green, blue,
      yellow, cyan, magenta.
      Hex example: "#C0C0C0"
    anyOf:
      - type: string
        pattern: "^#[0-9A-Fa-f]{6}$"
        description: "Hex colour: #rrggbb"
      - type: string
        enum:
          - black
          - white
          - gray
          - grey
          - silver
          - red
          - green
          - blue
          - yellow
          - cyan
          - magenta
        description: Named colour.

  # ── Effect params ───────────────────────────────────────────────────────────
  effect_params:
    $ref: "./effect-params.schema.yaml"

  scene_logic:
    type: object
    additionalProperties: false
    properties:
      type:
        type: string
        enum: [native, graph, script]
        default: native
      behavior:
        type: string
        minLength: 1
      src:
        type: string
        minLength: 1
        description: Optional script/controller path.
      params:
        type: object
        default: {}
        additionalProperties: true

  scene_gui:
    type: object
    additionalProperties: false
    properties:
      widgets:
        type: array
        default: []
        items:
          $ref: "#/$defs/scene_gui_widget"

  scene_gui_choice:
    type: object
    additionalProperties: false
    required: [value]
    properties:
      value:
        type: string
        minLength: 1
      label:
        type: string
        minLength: 1

  scene_gui_widget:
    type: object
    additionalProperties: false
    required: [type, id]
    properties:
      type:
        type: string
        enum: [slider, button, toggle, panel, radio-group, segmented-control, tabs, dropdown, text-input, number-input]
      id:
        type: string
        minLength: 1
      sprite:
        type: string
      x:
        type: integer
        default: 0
      y:
        type: integer
        default: 0
      w:
        type: integer
        minimum: 1
      h:
        type: integer
        minimum: 1
      min:
        type: number
      max:
        type: number
      value:
        type: number
      on:
        type: boolean
      visible:
        type: boolean
      handle:
        type: string
      hit-padding:
        type: integer
      follow-layout:
        type: boolean
      options:
        type: array
        items:
          $ref: "#/$defs/scene_gui_choice"
      selected:
        type: integer
        minimum: 0
      selected-sprites:
        type: array
        items:
          type: string
      popup-sprite:
        type: string
      label-sprite:
        type: string
      option-sprites:
        type: array
        items:
          type: string
      popup-above:
        type: boolean
      text-sprite:
        type: string
      placeholder:
        type: string
      max-length:
        type: integer
        minimum: 1
      step:
        type: number

  spatial_handedness:
    type: string
    enum: [left, right]
    default: right
    description: Coordinate-system handedness for world-space math.

  spatial_up_axis:
    type: string
    enum: [y, z]
    default: y
    description: World up-axis convention for scene/gameplay/render integration.

  scene_spatial:
    type: object
    additionalProperties: false
    properties:
      meters-per-world-unit:
        type: number
        minimum: 0.000001
        description: Physical meters represented by one world unit.
      virtual-pixels-per-world-unit:
        type: number
        minimum: 0.0
        description: Optional projection helper for world units to virtual pixels.
      handedness:
        $ref: "#/$defs/spatial_handedness"
      up-axis:
        $ref: "#/$defs/spatial_up_axis"
    patternProperties:
      "^meters_per_world_unit$":
        $ref: "#/$defs/scene_spatial/properties/meters-per-world-unit"
      "^virtual_pixels_per_world_unit$":
        $ref: "#/$defs/scene_spatial/properties/virtual-pixels-per-world-unit"
      "^up_axis$":
        $ref: "#/$defs/scene_spatial/properties/up-axis"

  scene_lighting:
    type: object
    additionalProperties: false
    properties:
      ambient-floor:
        type: number
        minimum: 0.0
        maximum: 1.0
        default: 0.06
        description: >
          Minimum base light level applied after shading before night-side rendering.
          Value `0.0` keeps full occlusion; higher values create a non-zero black floor.
    patternProperties:
      "^ambient_floor$":
        $ref: "#/$defs/scene_lighting/properties/ambient-floor"

  scene_view:
    type: object
    additionalProperties: false
    properties:
      profile:
        type: string
        minLength: 1
        description: >
          Top-level resolved 3D view profile. This is the preferred scene entry-point
          for reusable space/view presets.
      lighting-profile:
        type: string
        minLength: 1
        description: >
          Optional lower-level lighting profile reference used as an explicit composition
          input for the scene's resolved 3D view.
      space-environment-profile:
        type: string
        minLength: 1
        description: >
          Optional lower-level space environment profile reference used by the scene's
          resolved 3D view. This defines observation environment, not object metadata.
    patternProperties:
      "^view_profile$":
        $ref: "#/$defs/scene_view/properties/profile"
      "^lighting_profile$":
        $ref: "#/$defs/scene_view/properties/lighting-profile"
      "^space_environment_profile$":
        $ref: "#/$defs/scene_view/properties/space-environment-profile"

  planet_spec:
    type: object
    additionalProperties: false
    properties:
      generator:
        $ref: "#/$defs/planet_spec_generator"
      render:
        $ref: "#/$defs/planet_spec_render"
      atmosphere:
        $ref: "#/$defs/planet_spec_atmosphere"
      body:
        $ref: "#/$defs/planet_spec_body"

  planet_spec_generator:
    type: object
    additionalProperties: false
    properties:
      preset:
        type: string
        minLength: 1
      seed:
        type: integer
        minimum: 0
      detail:
        type: integer
        minimum: 0
        maximum: 255

  planet_spec_render:
    type: object
    additionalProperties: false
    properties:
      mesh-source:
        type: string
        minLength: 1
      surface-mode:
        type: string
        minLength: 1
      stretch-to-area:
        type: boolean
    patternProperties:
      "^mesh_source$":
        $ref: "#/$defs/planet_spec_render/properties/mesh-source"
      "^surface_mode$":
        $ref: "#/$defs/planet_spec_render/properties/surface-mode"
      "^stretch_to_area$":
        $ref: "#/$defs/planet_spec_render/properties/stretch-to-area"

  planet_spec_atmosphere:
    type: object
    additionalProperties: false
    properties:
      enabled:
        type: boolean
      density:
        type: number
      thickness-km:
        type: number
        minimum: 0
    patternProperties:
      "^thickness_km$":
        $ref: "#/$defs/planet_spec_atmosphere/properties/thickness-km"

  planet_spec_body:
    type: object
    additionalProperties: false
    properties:
      id:
        type: string
        minLength: 1
      radius-km:
        type: number
        minimum: 0
      gravity-m-s2:
        type: number
        minimum: 0
    patternProperties:
      "^radius_km$":
        $ref: "#/$defs/planet_spec_body/properties/radius-km"
      "^gravity_m_s2$":
        $ref: "#/$defs/planet_spec_body/properties/gravity-m-s2"

  celestial_scope:
    type: string
    enum: [local, system, region]
    default: local
    description: Which slice of the celestial hierarchy the scene intends to resolve.

  celestial_frame:
    type: string
    enum: [focus-relative, barycentric, surface-local]
    default: focus-relative
    description: Coordinate frame used for celestial rendering and gameplay in this scene.

  celestial_clock_source:
    type: string
    enum: [scene, campaign, fixed]
    default: scene
    description: Time source used when resolving celestial poses for this scene.

  scene_celestial:
    type: object
    additionalProperties: false
    properties:
      scope:
        $ref: "#/$defs/celestial_scope"
      region:
        type: string
        minLength: 1
        description: Optional region/sector/cluster id bound to this scene.
      system:
        type: string
        minLength: 1
        description: Optional star-system id bound to this scene.
      focus-body:
        type: string
        minLength: 1
        description: Optional body id used as the scene focus.
      focus-site:
        type: string
        minLength: 1
        description: Optional site/POI id used as the scene focus.
      frame:
        $ref: "#/$defs/celestial_frame"
      clock-source:
        $ref: "#/$defs/celestial_clock_source"
    patternProperties:
      "^focus_body$":
        $ref: "#/$defs/scene_celestial/properties/focus-body"
      "^focus_site$":
        $ref: "#/$defs/scene_celestial/properties/focus-site"
      "^clock_source$":
        $ref: "#/$defs/scene_celestial/properties/clock-source"

  # ── Scene input profiles ────────────────────────────────────────────────────
  scene_input:
    type: object
    additionalProperties: false
    properties:
      obj-viewer:
        $ref: "#/$defs/obj_viewer_controls"
      free-look-camera:
        $ref: "#/$defs/free_look_camera_controls"
      orbit-camera:
        $ref: "#/$defs/orbit_camera_controls"
    patternProperties:
      "^obj_viewer$":
        $ref: "#/$defs/obj_viewer_controls"
      "^free_look_camera$":
        $ref: "#/$defs/free_look_camera_controls"
      "^orbit_camera$":
        $ref: "#/$defs/orbit_camera_controls"

  ui_persist_mode:
    type: string
    enum: [scene, global]
    default: scene
    description: Whether UI state resets with scene transitions or persists globally.

  ui_config:
    type: object
    additionalProperties: false
    properties:
      enabled:
        type: boolean
        default: true
        description: Enables or disables rendering of layers marked with ui=true.
      persist:
        $ref: "#/$defs/ui_persist_mode"
      theme:
        type: string
        minLength: 1
        description: Optional UI theme id resolved by the runtime/theme registry.
      scale:
        type: number
        minimum: 0.01
        default: 1.0
        description: Multiplier applied to GUI widget geometry for UI controls.
      ui_scale:
        $ref: "#/$defs/ui_config/properties/scale"
      font-scale:
        type: number
        minimum: 0.01
        default: 1.0
        description: Multiplier applied to rasterized text scale for UI layers.
      font_scale:
        $ref: "#/$defs/ui_config/properties/font-scale"
      focus-order:
        type: array
        description: Ordered list of focusable UI target ids cycled by Tab/Shift+Tab.
        items:
          type: string
          minLength: 1
      focus_order:
        $ref: "#/$defs/ui_config/properties/focus-order"

  obj_viewer_controls:
    type: object
    additionalProperties: false
    required: [sprite_id]
    properties:
      sprite_id:
        type: string
        minLength: 1
        description: Target OBJ sprite id for 3D viewer controls.

  free_look_camera_controls:
    type: object
    additionalProperties: false
    properties:
      move-speed:
        type: number
        exclusiveMinimum: 0
        default: 1.5
        description: Camera translation speed in scene-world units per second.
      mouse-sensitivity:
        type: number
        exclusiveMinimum: 0
        default: 1.0
        description: Mouse-look sensitivity multiplier.
      surface-mode:
        type: boolean
        default: false
        description: Constrain free-look motion to a spherical surface shell.
      surface-center-x:
        type: number
        default: 0.0
        description: Surface sphere center X in world units.
      surface-center-y:
        type: number
        default: 0.0
        description: Surface sphere center Y in world units.
      surface-center-z:
        type: number
        default: 0.0
        description: Surface sphere center Z in world units.
      surface-radius:
        type: number
        exclusiveMinimum: 0
        default: 1.0
        description: Surface sphere radius in world units.
      surface-altitude:
        type: number
        minimum: 0
        default: 0.03
        description: Initial altitude above surface when free-look activates.
      surface-min-altitude:
        type: number
        minimum: 0
        default: 0.01
        description: Minimum altitude clamp above surface.
      surface-max-altitude:
        type: number
        minimum: 0
        default: 0.5
        description: Maximum altitude clamp above surface.
      surface-vertical-speed:
        type: number
        exclusiveMinimum: 0
        default: 0.8
        description: Vertical climb/descent speed for Q/E in world units per second.
    patternProperties:
      "^move_speed$":
        $ref: "#/$defs/free_look_camera_controls/properties/move-speed"
      "^mouse_sensitivity$":
        $ref: "#/$defs/free_look_camera_controls/properties/mouse-sensitivity"
      "^surface_mode$":
        $ref: "#/$defs/free_look_camera_controls/properties/surface-mode"
      "^surface_center_x$":
        $ref: "#/$defs/free_look_camera_controls/properties/surface-center-x"
      "^surface_center_y$":
        $ref: "#/$defs/free_look_camera_controls/properties/surface-center-y"
      "^surface_center_z$":
        $ref: "#/$defs/free_look_camera_controls/properties/surface-center-z"
      "^surface_radius$":
        $ref: "#/$defs/free_look_camera_controls/properties/surface-radius"
      "^surface_altitude$":
        $ref: "#/$defs/free_look_camera_controls/properties/surface-altitude"
      "^surface_min_altitude$":
        $ref: "#/$defs/free_look_camera_controls/properties/surface-min-altitude"
      "^surface_max_altitude$":
        $ref: "#/$defs/free_look_camera_controls/properties/surface-max-altitude"
      "^surface_vertical_speed$":
        $ref: "#/$defs/free_look_camera_controls/properties/surface-vertical-speed"

  orbit_camera_controls:
    type: object
    additionalProperties: false
    required: [target]
    properties:
      target:
        type: string
        minLength: 1
        description: Target OBJ sprite id for orbit controls.
      yaw:
        type: number
        default: 0.0
      pitch:
        type: number
        default: -30.0
      distance:
        type: number
        exclusiveMinimum: 0
        default: 3.0
      pitch-min:
        type: number
        default: -85.0
      pitch-max:
        type: number
        default: -5.0
      distance-min:
        type: number
        exclusiveMinimum: 0
        default: 0.5
      distance-max:
        type: number
        exclusiveMinimum: 0
        default: 8.0
      distance-step:
        type: number
        exclusiveMinimum: 0
        default: 0.25
      drag-sensitivity:
        type: number
        exclusiveMinimum: 0
        default: 0.5
    patternProperties:
      "^pitch_min$":
        $ref: "#/$defs/orbit_camera_controls/properties/pitch-min"
      "^pitch_max$":
        $ref: "#/$defs/orbit_camera_controls/properties/pitch-max"
      "^distance_min$":
        $ref: "#/$defs/orbit_camera_controls/properties/distance-min"
      "^distance_max$":
        $ref: "#/$defs/orbit_camera_controls/properties/distance-max"
      "^distance_step$":
        $ref: "#/$defs/orbit_camera_controls/properties/distance-step"
      "^drag_sensitivity$":
        $ref: "#/$defs/orbit_camera_controls/properties/drag-sensitivity"

  # ── Effect ─────────────────────────────────────────────────────────────────
  effect:
    $ref: "./effect.schema.yaml"

  # ── Step ───────────────────────────────────────────────────────────────────
  step:
    description: >
      A single step in a stage. All effects within a step run in parallel.
      Steps execute sequentially. Use the `pause` shorthand for a timed
      delay with no effects; it is expanded by the compiler into
      `{duration, effects: []}`.
    oneOf:
      - type: object
        description: Pause shorthand — a timed delay with no effects.
        additionalProperties: false
        required: [pause]
        properties:
          pause:
            type: string
            pattern: "^[0-9]+(ms|s)$"
            description: >
              Duration string for a timed pause step.
              Examples: "500ms", "2s".
      - type: object
        description: Full step with optional effects and optional minimum duration.
        additionalProperties: false
        properties:
          duration:
            type: integer
            minimum: 0
            description: >
              Minimum step duration in milliseconds regardless of effects.
              When effects are present, the step lasts max(duration, longest effect).
              Use without effects for a timed pause.
          effects:
            type: array
            description: Effects that run in parallel for the duration of this step. May be empty.
            items:
              $ref: "#/$defs/effect"

  # ── Stage ──────────────────────────────────────────────────────────────────
  stage:
    type: object
    description: A lifecycle phase of a scene, layer, or sprite.
    additionalProperties: false
    properties:
      looping:
        type: boolean
        default: false
        description: >
          When true, the stage wraps back to its first step after the last step completes.
          Primarily used on on_idle to create repeating ambient effects (e.g. looping shine).
      trigger:
        type: string
        description: What causes transition out of this stage to the next. Only valid on on_idle.
        enum: [any-key, timeout, none]
      steps:
        type: array
        description: Ordered list of steps. Steps execute sequentially; effects within each step run in parallel.
        items:
          $ref: "#/$defs/step"

  # ── Menu option ─────────────────────────────────────────────────────────────
  menu_option:
    type: object
    additionalProperties: false
    required: [key]
    anyOf:
      - required: [next]
      - required: [to]
    properties:
      key:
        type: string
        minLength: 1
        description: >
          Key binding used in on_idle with trigger any-key.
          Examples: "1", "2", "enter", "esc", "f1", "up", "down".
      label:
        type: string
        minLength: 1
        description: Optional UI label for editors/tooling.
      selected-effect:
        type: string
        enum: [arrows]
        description: Visual selection marker style for this option.
      selected_effect:
        type: string
        enum: [arrows]
        description: Alias of selected-effect.
      action:
        type: string
        enum: [goto.scene]
        description: Optional scripted action for menu option.
      scene:
        type: string
        minLength: 1
        description: Target scene id/path used by action goto.scene.
      next:
        type: string
        minLength: 1
        description: Default target scene id/path (backward-compatible routing).
      to:
        type: string
        minLength: 1
        description: Alias target scene id/path. Compiler normalizes to scene+next.

  # ── Scene stages ───────────────────────────────────────────────────────────
  scene_stages:
    type: object
    description: Lifecycle stages for a scene.
    additionalProperties: false
    properties:
      on_enter:
        allOf:
          - $ref: "#/$defs/stage"
          - description: Plays once when scene loads. Transitions automatically to on_idle when complete.
      on_idle:
        allOf:
          - $ref: "#/$defs/stage"
          - description: Active while scene is running. Transitions to on_leave when trigger fires.
      on_leave:
        allOf:
          - $ref: "#/$defs/stage"
          - description: Plays once when leaving the scene. Transitions to next scene when complete.

  # ── Layer stages (also used by sprites) ────────────────────────────────────
  layer_stages:
    type: object
    description: Lifecycle stages for a layer or sprite.
    additionalProperties: false
    properties:
      on_enter:
        $ref: "#/$defs/stage"
      on_idle:
        $ref: "#/$defs/stage"
      on_leave:
        $ref: "#/$defs/stage"

  object_instance_entry:
    anyOf:
      - $ref: "#/$defs/object_instance"
      - $ref: "#/$defs/object_repeat_instance"

  # ── Object instance ─────────────────────────────────────────────────────────
  object_instance:
    type: object
    additionalProperties: false
    oneOf:
      - required: [ref]
      - required: [use]
    description: Transitional legacy object instance used by compile-time lowering.
    properties:
      ref:
        type: string
        minLength: 1
        description: Object prefab/blueprint reference path. Preferred over deprecated 'use'.
      use:
        type: string
        minLength: 1
        description: "Deprecated: use 'ref' instead. Object template/prefab reference."
      as:
        type: string
        minLength: 1
        description: Scene- or layer-local instance id. Preferred over deprecated 'id'.
      id:
        type: string
        minLength: 1
        description: "Deprecated: use 'as' instead. Scene- or layer-local object instance id."
      with:
        type: object
        default: {}
        description: Optional parameter overrides for object exports.
      state:
        type: object
        default: {}
        description: Optional initial runtime state for the instance.
      tags:
        type: array
        default: []
        items:
          type: string
        description: Optional role/group tags for the instance.

  object_repeat_instance:
    type: object
    additionalProperties: false
    required: [repeat]
    properties:
      repeat:
        type: object
        additionalProperties: false
        required: [count]
        oneOf:
          - required: [ref]
          - required: [use]
        properties:
          count:
            type: integer
            minimum: 1
            description: Number of object instances to generate.
          ref:
            type: string
            minLength: 1
            description: Object prefab/blueprint reference path.
          use:
            type: string
            minLength: 1
            description: "Deprecated: use 'ref' instead. Object template/prefab reference."
          as:
            type: string
            minLength: 1
            description: Instance alias template. Supports `{i}` token.
          id:
            type: string
            minLength: 1
            description: "Deprecated: use 'as' instead. Supports `{i}` token."
          with:
            type: object
            default: {}
            description: Optional parameter overrides template. String values support `{i}` token.

  # ── Layer reference instance ───────────────────────────────────────────────
  layer_ref_instance:
    type: object
    description: >
      Reference to a reusable layer partial with optional per-instance overrides.
    additionalProperties: false
    oneOf:
      - required: [ref]
      - required: [use]
    properties:
      ref:
        type: string
        minLength: 1
        description: Layer partial reference path. Preferred over deprecated 'use'.
      use:
        type: string
        minLength: 1
        description: "Deprecated: use 'ref' instead. Layer partial reference path."
      as:
        type: string
        minLength: 1
        description: Optional instance name override. Preferred over deprecated 'id'.
      id:
        type: string
        minLength: 1
        description: "Deprecated: use 'as' instead. Optional instance name override."
      with:
        type: object
        default: {}
        description: Optional parameter overrides applied during layer reference expansion.
      z_index:
        type: integer
        description: Optional z-index override for the referenced layer instance.
      visible:
        type: boolean
        description: Optional visibility override for the referenced layer instance.
      ui:
        type: boolean
        description: Optional UI-layer flag override for the referenced layer instance.
      stages:
        $ref: "#/$defs/layer_stages"
      behaviors:
        type: array
        default: []
        items:
          $ref: "#/$defs/behavior"

  # ── Layer entry ────────────────────────────────────────────────────────────
  layer_entry:
    anyOf:
      - $ref: "#/$defs/layer"
      - $ref: "#/$defs/layer_ref_instance"

  # ── Layer ──────────────────────────────────────────────────────────────────
  layer:
    type: object
    description: A compositing layer — a named group of sprites sharing z_index and lifecycle effects.
    additionalProperties: false
    properties:
      name:
        type: string
        description: Human-readable identifier for the layer.
      z_index:
        type: integer
        default: 0
        description: Render order. Higher z_index renders on top.
      visible:
        type: boolean
        default: true
        description: Whether this layer is composited onto the scene framebuffer.
      ui:
        type: boolean
        default: false
        description: Marks this layer as UI; scene.ui.enabled controls its visibility.
      stages:
        $ref: "#/$defs/layer_stages"
      behaviors:
        type: array
        default: []
        description: >
          Optional runtime behaviors attached to this layer/GameObject.
          Useful for steering whole sprite groups together.
        items:
          $ref: "#/$defs/behavior"
      objects:
        type: array
        default: []
        description: >
          Optional object instances local to this layer.
          Uses the same ref/as/with/state/tags contract as scene-level `objects`,
          including the `repeat` shorthand.
        items:
          $ref: "#/$defs/object_instance_entry"
      sprites:
        type: array
        description: Drawable objects within this layer.
        items:
          $ref: "#/$defs/sprite"

  # ── Sprite ─────────────────────────────────────────────────────────────────
  sprite:
    type: object
    description: A drawable object within a layer. Has its own local position and lifecycle.
    additionalProperties: false
    anyOf:
      - required: [type]
      - required: [use]
    properties:
      type:
        type: string
        enum: [text, image, obj, planet, vector, grid, flex, window, scroll-list, scene3_d]
        description: >
          Sprite type. Runtime-native: text, image, obj, planet, vector, grid, flex, scene3_d.
          Authoring sugar: window, scroll-list (expanded to grid/text by compiler).
          scene3_d: blits a pre-rendered frame from a .scene3d.yml atlas.
      use:
        type: string
        minLength: 1
        description: >
          Scene-local sprite template name to expand before typed deserialization.
          The compiler resolves it from the current scene `templates:` map.
      args:
        type: object
        default: {}
        additionalProperties: true
        description: Optional template arguments substituted into a sprite declared with `use`.
      content:
        type: string
        minLength: 1
        description: Text content to render (required for type=text).
      source:
        type: string
        minLength: 1
        description: Asset path (required for type=image/obj), e.g. /assets/images/tux.png or /scenes/3d/model.obj.
      body-id:
        type: string
        minLength: 1
        description: Body catalog id for type=planet. Resolves against catalogs/celestial/bodies.yaml.
      preset:
        type: string
        minLength: 1
        description: Optional planet preset override for type=planet. Defaults to the body's planet_type.
      mesh-source:
        type: string
        minLength: 1
        description: Optional sphere mesh asset override for type=planet. Defaults to /assets/3d/sphere.obj.
      src:
        type: string
        minLength: 1
        description: >
          Path to a .scene3d.yml file relative to mod root (required for type=scene3_d).
          All 3D setup (camera, lights, materials, meshes, frames) lives in that file.
          Example: /assets/3d/difficulty-portraits.scene3d.yml
      frame:
        type: string
        default: ""
        description: >
          Named frame from the Scene3D atlas to display (type=scene3_d only).
          Switched at runtime via scene.set(id, "scene3d.frame", frame_name).
      spritesheet-columns:
        type: integer
        minimum: 1
        description: Image sprite only. Number of columns in a spritesheet.
      spritesheet-rows:
        type: integer
        minimum: 1
        description: Image sprite only. Number of rows in a spritesheet.
      frame-index:
        type: integer
        minimum: 0
        description: Image sprite only. 0-based selected frame index in spritesheet cells (row-major).
      id:
        type: string
        minLength: 1
        description: >
          Optional stable sprite identifier for script-side hooks/custom handlers.
          Example: "press-any-key" or "intro-logo".
      x:
        oneOf:
          - type: integer
          - type: string
        default: 0
        description: >
          Signed horizontal offset within the scene buffer.
          Negative values are allowed (e.g. to shift centered text left/up).
          String expressions are supported, e.g. oscillate(-2,2,1800ms).
      y:
        oneOf:
          - type: integer
          - type: string
        default: 0
        description: >
          Signed vertical offset within the scene buffer.
          Negative values are allowed (e.g. title above center line).
          String expressions are supported, e.g. oscillate(-2,2,1800ms).
      z_index:
        type: integer
        default: 0
        description: Render order within the layer. Higher z_index renders on top.
      grid-row:
        type: integer
        minimum: 1
        default: 1
        description: Grid row index (1-based) when this sprite is a child of a grid container.
      grid-col:
        type: integer
        minimum: 1
        default: 1
        description: Grid column index (1-based) when this sprite is a child of a grid container.
      row-span:
        type: integer
        minimum: 1
        default: 1
        description: Number of grid rows this sprite spans.
      col-span:
        type: integer
        minimum: 1
        default: 1
        description: Number of grid columns this sprite spans.
      font:
        type: [string, "null"]
        description: >
          Font for rasterized rendering. Three forms are supported:

          Mod/engine default alias:
            "default"    — resolve to `display.default_font` from mod.yaml.
                           If unset, engine fallback font is used.

          Built-in generic pixel font (no asset files required):
            "generic:1"  — compact 4×5 tiny bitmaps (minimum readable, 4 cells wide × 5 tall per glyph).
            "generic:2"  — 5×7 standard bitmaps (5 cells wide × 7 tall per glyph). Default.
            "generic:3"  — 5×7 bitmaps × 2 cell scale (10×14 cells — large pixel art).
            "generic"    — equivalent to generic:2.

          Named bitmap fonts loaded from mod assets:
            "Abril Fatface"        — raster/terminal-pixel mode (default).
            "Abril Fatface:raster" — explicit raster mode.
            "Abril Fatface:ascii"  — ASCII-art glyph mode.

          Omit or set null for native terminal text (no rasterization).
      max-width:
        type: integer
        minimum: 1
        description: Optional maximum wrapped line width in cells for text sprites.
      overflow-mode:
        type: string
        enum: [clip, ellipsis]
        default: clip
        description: Overflow behaviour for width-constrained text.
      wrap-mode:
        type: string
        enum: [none, word, char]
        default: none
        description: Wrap policy used when text is width-constrained.
      line-clamp:
        type: integer
        minimum: 1
        description: Optional maximum number of lines after wrapping.
      reserve-width-ch:
        type: integer
        minimum: 1
        description: Optional reserved width in monospace character cells for value-like HUD text.
      line-height:
        type: integer
        minimum: 1
        default: 1
        description: Per-line advance multiplier for wrapped/rasterized text.
      width:
        type: integer
        minimum: 1
        maximum: 65535
        description: >
          Target sprite width in pixels.
          For image sprites, when only width is set, height is derived from source aspect ratio.
      size:
        type: integer
        minimum: 1
        maximum: 3
        description: >
          Sprite size preset shortcut.
          `1` = small, `2` = medium, `3` = large.
          For text sprites it maps to the built-in generic font sizes.
          For image/obj sprites it uses per-type default dimensions.
          Explicit `width`/`height` still take priority when provided.
      height:
        type: integer
        minimum: 1
        maximum: 65535
        description: >
          Target sprite height in pixels.
          For image sprites, when only height is set, width is derived from source aspect ratio.
          For grid sprites, sets container height.
      scale:
        type: number
        minimum: 0.0001
        description: Uniform mesh scale multiplier for type=obj.
      yaw-deg:
        type: number
        description: Static yaw (Y-axis) rotation in degrees for type=obj.
      pitch-deg:
        type: number
        description: Static pitch (X-axis) rotation in degrees for type=obj.
      roll-deg:
        type: number
        description: Static roll (Z-axis) rotation in degrees for type=obj.
      rotation-x:
        type: number
        description: Static initial X-axis rotation in degrees for type=obj.
      rotation-y:
        oneOf:
          - type: number
          - type: string
        description: >
          Static initial Y-axis rotation in degrees for type=obj.
          String expressions are supported, e.g. animate(180deg,540deg,12s,loop).
      rotation-z:
        type: number
        description: Static initial Z-axis rotation in degrees for type=obj.
      rotate-y-deg-per-sec:
        type: number
        description: Continuous Y-axis rotation speed in degrees per second for type=obj.
      camera-distance:
        type: number
        minimum: 0.01
        description: Camera distance from mesh center for perspective projection (type=obj).
      world-x:
        type: number
        description: Object world-space X translation for type=obj (applied before camera/view projection).
      world-y:
        type: number
        description: Object world-space Y translation for type=obj (applied before camera/view projection).
      world-z:
        type: number
        description: Object world-space Z translation for type=obj (applied before camera/view projection).
      fov-degrees:
        type: number
        minimum: 1
        maximum: 179
        description: Perspective camera FOV in degrees for type=obj.
      near-clip:
        type: number
        minimum: 0.000001
        description: Near clipping plane distance in camera space for type=obj (smaller renders closer geometry).
      spin-deg:
        type: number
        description: Surface spin angle in degrees for type=planet.
      cloud-spin-deg:
        type: number
        description: Primary cloud deck spin angle in degrees for type=planet.
      cloud2-spin-deg:
        type: number
        description: Secondary cloud breakup spin angle in degrees for type=planet.
      observer-altitude-km:
        type: number
        minimum: 0
        description: Observer altitude hint in kilometers for type=planet.
      sun-dir-x:
        type: number
        description: Planet sun direction X override for type=planet.
      sun-dir-y:
        type: number
        description: Planet sun direction Y override for type=planet.
      sun-dir-z:
        type: number
        description: Planet sun direction Z override for type=planet.
      light-direction-x:
        type: number
        description: Directional light X component for type=obj shading vector.
      light-direction-y:
        type: number
        description: Directional light Y component for type=obj shading vector.
      light-direction-z:
        type: number
        description: Directional light Z component for type=obj shading vector.
      light-2-direction-x:
        type: number
        description: Secondary directional light X component for type=obj shading vector.
      light-2-direction-y:
        type: number
        description: Secondary directional light Y component for type=obj shading vector.
      light-2-direction-z:
        type: number
        description: Secondary directional light Z component for type=obj shading vector.
      light-2-intensity:
        type: number
        minimum: 0
        maximum: 2
        description: Secondary directional light intensity for type=obj shading mix.
      light-point-x:
        type: number
        description: Point light X position in object view space for type=obj shading.
      light-point-y:
        type: number
        description: Point light Y position in object view space for type=obj shading.
      light-point-z:
        type: number
        description: Point light Z position in object view space for type=obj shading.
      light-point-intensity:
        type: number
        minimum: 0
        maximum: 4
        description: Point light intensity for type=obj shading mix.
      light-point-colour:
        $ref: "#/$defs/colour"
        description: Point light tint colour for type=obj shading.
      light-point-flicker-depth:
        type: number
        minimum: 0
        maximum: 1
        description: Point light 1 flicker depth (0=steady, 1=full flicker) for type=obj.
      light-point-flicker-hz:
        type: number
        minimum: 0
        maximum: 40
        description: Point light 1 flicker rate in Hz for type=obj.
      light-point-orbit-hz:
        type: number
        minimum: 0
        maximum: 2
        description: Point light 1 smooth orbit speed around Y axis in Hz for type=obj (0=static).
      light-point-snap-hz:
        type: number
        minimum: 0
        maximum: 2
        description: Point light 1 teleport snap rate in Hz for type=obj — instant jump to pseudo-random position, overrides orbit-hz.
      light-point-2-x:
        type: number
        description: Point light 2 X position in object view space for type=obj shading.
      light-point-2-y:
        type: number
        description: Point light 2 Y position in object view space for type=obj shading.
      light-point-2-z:
        type: number
        description: Point light 2 Z position in object view space for type=obj shading.
      light-point-2-intensity:
        type: number
        minimum: 0
        maximum: 4
        description: Point light 2 intensity for type=obj shading mix.
      light-point-2-colour:
        $ref: "#/$defs/colour"
        description: Point light 2 tint colour for type=obj shading.
      light-point-2-flicker-depth:
        type: number
        minimum: 0
        maximum: 1
        description: Point light 2 flicker depth (0=steady, 1=full flicker) for type=obj.
      light-point-2-flicker-hz:
        type: number
        minimum: 0
        maximum: 40
        description: Point light 2 flicker rate in Hz for type=obj.
      light-point-2-orbit-hz:
        type: number
        minimum: 0
        maximum: 2
        description: Point light 2 smooth orbit speed around Y axis in Hz for type=obj (0=static).
      light-point-2-snap-hz:
        type: number
        minimum: 0
        maximum: 2
        description: Point light 2 teleport snap rate in Hz for type=obj — instant jump to pseudo-random position, overrides orbit-hz.
      cel-levels:
        type: integer
        minimum: 0
        maximum: 8
        description: Cel-shading band count for type=obj material mode (0-1 disables quantization).
      shadow-colour:
        $ref: "#/$defs/colour"
        description: Shadow tint for type=obj cel-shading (dark band).
      midtone-colour:
        $ref: "#/$defs/colour"
        description: Midtone tint for type=obj cel-shading (middle band).
      highlight-colour:
        $ref: "#/$defs/colour"
        description: Highlight tint for type=obj cel-shading (bright band).
      tone-mix:
        type: number
        minimum: 0
        maximum: 1
        description: Blend amount between material color and toon tint palette for type=obj.
      draw-char:
        type: string
        minLength: 1
        description: Single glyph used to draw wireframe edges for type=obj.
      surface-mode:
        type: string
        enum: [material, wireframe]
        description: Surface rendering style for type=obj. `material` fills faces with MTL colours, `wireframe` draws edges only.
      columns:
        type: array
        description: >
          Grid column track definitions for type=grid.
          Supported track values:
          - "auto" (fit content),
          - "<n>fr" (fractional),
          - "<n>" (fixed cells).
        items:
          type: string
      rows:
        type: array
        description: >
          Grid row track definitions for type=grid.
          Supported track values:
          - "auto" (fit content),
          - "<n>fr" (fractional),
          - "<n>" (fixed cells).
        items:
          type: string
      gap-x:
        type: integer
        minimum: 0
        default: 0
        description: Horizontal gap between grid columns in cells.
      gap-y:
        type: integer
        minimum: 0
        default: 0
        description: Vertical gap between grid rows in cells.
      gap:
        type: integer
        minimum: 0
        default: 0
        description: Gap between flex children on the main axis in cells (type=flex).
      direction:
        type: string
        enum: [column, row]
        default: column
        description: Flex direction for type=flex. `column` stacks children vertically, `row` stacks horizontally.
      children:
        type: array
        default: []
        description: Child renderable sprites for type=grid or type=flex.
        items:
          $ref: "#/$defs/sprite"
      force-font-mode:
        type: string
        enum:
          - ascii
          - raster
          - 1
          - 2
          - 3
          - tiny
          - standard
          - large
        description: >
          Optional per-sprite font mode override.
          For named bitmap fonts: ascii/raster.
          For generic fonts: 1/2/3 or tiny/standard/large.
          Priority: force-font-mode > sprite font declaration.
      stretch-to-area:
        type: boolean
        default: false
        description: Stretch sprite output to fill resolved draw area (image/obj/planet/scene3_d).
      align_x:
        type: string
        enum: [left, center, right]
        description: Horizontal alignment anchor in scene space. x acts as extra offset.
      align_y:
        type: string
        enum: [top, center, bottom]
        description: Vertical alignment anchor in scene space. y acts as extra offset.
      at:
        type: string
        enum: [cc, ct, cb, lc, rc, lt, lb, rt, rb]
        description: Alignment shorthand alias for align_x+align_y.
      fg_colour:
        $ref: "#/$defs/colour"
        description: >
          Base foreground (text / glyph pixel) colour.
          Can be overridden per-run using inline markup in content:
          [red]text[/] or [#ff8800]text[/].
      bg_colour:
        $ref: "#/$defs/colour"
        description: Background colour behind the sprite. Omit for transparent background.
      fg:
        $ref: "#/$defs/colour"
        description: Alias of fg_colour.
      bg:
        $ref: "#/$defs/colour"
        description: Alias of bg_colour.
      glow:
        $ref: "#/$defs/glow"
        description: Optional glow halo rendered behind the sprite at neighbouring cell offsets.
      visible:
        type: boolean
        default: true
        description: >
          Initial visibility.
          Can be toggled at runtime via scene.set(id, "visible", bool).
      appear_at_ms:
        type: integer
        minimum: 0
        description: Delay from scene start (ms) before this sprite becomes visible.
      disappear_at_ms:
        type: integer
        minimum: 0
        description: Absolute scene time (ms) after which this sprite is hidden.
      reveal_ms:
        type: integer
        minimum: 0
        description: >
          Optional reveal duration (ms).
          When set, the sprite content appears character by character left→right
          over this duration starting from appear_at_ms.
      hide_on_leave:
        type: boolean
        default: false
        description: >
          When true, the sprite is not rendered at all once the scene enters on_leave.
          Useful for prompts like PRESS ANY KEY that should disappear instantly on trigger.
      stages:
        $ref: "#/$defs/layer_stages"
      animations:
        type: array
        default: []
        description: >
          Position animations applied to this sprite before rendering.
          Animations modify the sprite's transform (dx, dy offset) rather than its pixels.
          Multiple animations combine additively.
        items:
          $ref: "#/$defs/animation"
      behaviors:
        type: array
        default: []
        description: >
          Optional runtime behaviors attached to this sprite/GameObject.
          Behaviors can toggle visibility or apply extra runtime x/y offsets.
        items:
          $ref: "#/$defs/behavior"
    allOf:
      - if:
          properties:
            type:
              const: text
        then:
          required: [content]
      - if:
          properties:
            type:
              const: image
        then:
          required: [source]
      - if:
          properties:
            type:
              const: planet
        then:
          required: [body-id]
      - if:
          properties:
            type:
              const: grid
        then:
          required: [columns, rows, children]

  # ── Animation ──────────────────────────────────────────────────────────────
  # Auto-generated from engine metadata - see generated/animations.schema.yaml
  animation:
    $ref: "./generated/animations.schema.yaml#/$defs/animation"

  # ── Behavior ───────────────────────────────────────────────────────────────
  # Auto-generated from engine metadata - see generated/behaviors.schema.yaml
  behavior:
    $ref: "./generated/behaviors.schema.yaml#/$defs/behavior"

  # ── Audio hooks (design/runtime bridge) ──────────────────────────────────────
  scene_audio:
    type: object
    additionalProperties: false
    description: >
      Declarative audio cue hooks for scene lifecycle stages.
      Cues fire once when scene_elapsed_ms reaches at_ms while the stage is active.
    properties:
      on_enter:
        type: array
        default: []
        items:
          $ref: "#/$defs/audio_cue"
      on_idle:
        type: array
        default: []
        items:
          $ref: "#/$defs/audio_cue"
      on_leave:
        type: array
        default: []
        items:
          $ref: "#/$defs/audio_cue"

  audio_cue:
    type: object
    additionalProperties: false
    required: [cue]
    properties:
      at_ms:
        type: integer
        minimum: 0
        default: 0
        description: Trigger time in milliseconds from scene start.
      cue:
        type: string
        minLength: 1
        description: Audio cue identifier (for external audio backend routing).
      volume:
        type: number
        minimum: 0.0
        maximum: 1.0
        description: Optional playback gain hint.

  # ── Glow ───────────────────────────────────────────────────────────────────
  glow:
    type: object
    additionalProperties: false
    description: >
      Soft halo rendered behind a sprite by drawing shifted copies at neighbouring
      cell offsets in a dimmed colour. Applied before the main sprite render pass.
    properties:
      colour:
        $ref: "#/$defs/colour"
        description: >
          Explicit glow colour.
          If omitted, the engine auto-derives a dimmed version of the sprite's fg_colour
          (approximately 25% brightness).
      radius:
        type: integer
        minimum: 1
        maximum: 4
        default: 1
        description: >
          Halo radius in cells.
          1 = 8 immediate neighbours (3×3 ring, excluding centre).
          2 = up to 24 neighbours (5×5 ring) — denser, more diffuse halo.

  # ── Colour markup (inline, within content strings) ─────────────────────────
  # NOTE: this is documentation only — JSON Schema cannot validate inline string markup.
  # Format: [colour]text[/] or [/colour] where colour is a named colour or #rrggbb hex.
  # Examples:
  #   "[red]PRESS[/] ANY [red]KEY[/]"
  #   "[#808080]PRESS[/] ANY [#808080]KEY[/]"
  # Rules:
  #   - [name]   or [#rrggbb]  opens a colour span
  #   - [/]      or [/name]    closes it (reverts to sprite fg_colour)
  #   - Nesting is not supported (last opened tag wins)
  #   - Invalid/unknown tags are treated as literal text
  #   - Supported named colours: black white gray grey silver red green blue yellow cyan magenta
