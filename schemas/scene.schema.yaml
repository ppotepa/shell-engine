      light-point-2-x:
        type: number
        description: Point light 2 X position in object view space for type=obj shading.
      light-point-2-y:
        type: number
        description: Point light 2 Y position in object view space for type=obj shading.
      light-point-2-z:
        type: number
        description: Point light 2 Z position in object view space for type=obj shading.
      light-point-2-intensity:
        type: number
        minimum: 0
        maximum: 4
        description: Point light 2 intensity for type=obj shading mix.
      light-point-2-colour:
        $ref: "#/$defs/colour"
        description: Point light 2 tint colour for type=obj shading.
      light-point-2-flicker-depth:
        type: number
        minimum: 0
        maximum: 1
        description: Point light 2 flicker depth (0=steady, 1=full flicker) for type=obj.
      light-point-2-flicker-hz:
        type: number
