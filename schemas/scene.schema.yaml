      light-point-colour:
        $ref: "#/$defs/colour"
        description: Point light tint colour for type=obj shading.
      light-point-flicker-depth:
        type: number
        minimum: 0
        maximum: 1
        description: Point light 1 flicker depth (0=steady, 1=full flicker) for type=obj.
      light-point-flicker-hz:
        type: number
        minimum: 0
