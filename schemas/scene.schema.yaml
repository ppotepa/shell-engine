$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://shell-quest.local/schemas/scene.schema.yaml"
title: Scene Schema
description: >
  Defines a scene in a Shell Quest mod.
  Scenes have a lifecycle managed through stages (on_enter, on_idle, on_leave),
  each containing sequential steps of parallel effects.
type: object
additionalProperties: false
required:
  - id
  - title
properties:
  id:
    type: string
    minLength: 1
    description: Unique identifier for the scene. Used for scene transitions.
  title:
    type: string
    minLength: 1
    description: Human-readable title.
  cutscene:
    type: boolean
    default: false
    description: Whether this scene is a non-interactive cutscene.
  cutscene-ref:
    type: string
    minLength: 1
    description: >
      Optional cutscene manifest reference.
      Compiler resolves it (default /cutscenes/<name>.yml) into timed image sprites.
  target-fps:
    type: integer
    minimum: 1
    maximum: 240
    description: Optional scene-level FPS cap override (applies regardless of renderer/scene type).
  rendered-mode:
    type: string
    enum: [cell, halfblock, quadblock, braille]
    description: >
      Optional scene-level renderer packing mode override.
      Runtime currently supports `halfblock` for 2x vertical virtual resolution.
      Other modes are reserved for upcoming packed renderers.
  virtual-size-override:
    type: string
    pattern: "^[1-9][0-9]*x[1-9][0-9]*$"
    description: >
      Optional virtual canvas override in WIDTHxHEIGHT form (e.g. 320x240).
      Declared for future renderer scaling flow; currently informational.
  bg_colour:
    $ref: "#/$defs/colour"
    description: >
      Terminal background colour filling the entire buffer on scene load.
      Defaults to true black (RGB 0,0,0) when absent.
  bg:
    $ref: "#/$defs/colour"
    description: Alias of bg_colour.
  stages:
    $ref: "#/$defs/scene_stages"
    description: Lifecycle stage definitions (on_enter, on_idle, on_leave) containing sequential effect steps.
  behaviors:
    type: array
    default: []
    description: Optional runtime behaviors attached to the root scene GameObject.
    items:
      $ref: "#/$defs/behavior"
  logic:
    $ref: "#/$defs/scene_logic"
    description: Optional scene-level controller binding (native or script).
  audio:
    $ref: "#/$defs/scene_audio"
    description: >
      Optional audio cue hooks bound to scene lifecycle stages.
      Design hook only — runtime emits AudioCue events, playback is handled externally.
  ui:
    $ref: "#/$defs/ui_config"
    description: Scene-level UI toggles and lifecycle hints.
  layers:
    type: array
    description: Compositing layers rendered onto the scene buffer, each containing sprites.
    items:
      $ref: "#/$defs/layer_entry"
  next:
    type: [string, "null"]
    description: Scene id to transition to when on_leave completes.
  menu-options:
    type: array
    default: []
    description: Optional key-driven routes from menu-like scenes.
    items:
      $ref: "#/$defs/menu_option"
  input:
    $ref: "#/$defs/scene_input"
    description: Optional scene-level input control profiles.
  templates:
    type: object
    default: {}
    description: Optional local sprite templates referenced by `use`.
    additionalProperties:
      $ref: "#/$defs/sprite"
  objects:
    type: array
    default: []
    description: >
      Object instances placed in the scene using the ref/as/with/state/tags syntax.
      Each entry references an object prefab by path (ref), optionally assigns a scene-local
      id (as), overrides exports (with), seeds runtime state (state), and attaches role tags (tags).
    items:
      $ref: "#/$defs/object_instance"

patternProperties:
  "^cutscene_ref$":
    $ref: "#/properties/cutscene-ref"
  "^target_fps$":
    $ref: "#/properties/target-fps"
  "^menu_options$":
    $ref: "#/properties/menu-options"

$defs:

  # ── Colour ─────────────────────────────────────────────────────────────────
  colour:
    description: >
      A colour value. Either a named colour or a CSS-style hex string (#rrggbb).
      Named colours: black, white, gray (= grey), silver, red, green, blue,
      yellow, cyan, magenta.
      Hex example: "#C0C0C0"
    anyOf:
      - type: string
        pattern: "^#[0-9A-Fa-f]{6}$"
        description: "Hex colour: #rrggbb"
      - type: string
        enum:
          - black
          - white
          - gray
          - grey
          - silver
          - red
          - green
          - blue
          - yellow
          - cyan
          - magenta
        description: Named colour.

  # ── Effect params ───────────────────────────────────────────────────────────
  effect_params:
    $ref: "./effect-params.schema.yaml"

  scene_logic:
    type: object
    additionalProperties: false
    properties:
      type:
        type: string
        enum: [native, graph, script]
        default: native
      behavior:
        type: string
        minLength: 1
      src:
        type: string
        minLength: 1
        description: Optional script/controller path.
      params:
        type: object
        default: {}
        additionalProperties: true

  # ── Scene input profiles ────────────────────────────────────────────────────
  scene_input:
    type: object
    additionalProperties: false
    properties:
      obj-viewer:
        $ref: "#/$defs/obj_viewer_controls"
      terminal-size-tester:
        $ref: "#/$defs/terminal_size_tester_controls"
      terminal-shell:
        $ref: "#/$defs/terminal_shell_controls"
    patternProperties:
      "^obj_viewer$":
        $ref: "#/$defs/obj_viewer_controls"
      "^terminal_size_tester$":
        $ref: "#/$defs/terminal_size_tester_controls"
      "^terminal_shell$":
        $ref: "#/$defs/terminal_shell_controls"

  ui_persist_mode:
    type: string
    enum: [scene, global]
    default: scene
    description: Whether UI state resets with scene transitions or persists globally.

  ui_config:
    type: object
    additionalProperties: false
    properties:
      enabled:
        type: boolean
        default: true
        description: Enables or disables rendering of layers marked with ui=true.
      persist:
        $ref: "#/$defs/ui_persist_mode"
      theme:
        type: string
        minLength: 1
        description: Optional UI theme id resolved by the runtime/theme registry.
      focus-order:
        type: array
        description: Ordered list of focusable UI target ids cycled by Tab/Shift+Tab.
        items:
          type: string
          minLength: 1
      focus_order:
        $ref: "#/$defs/ui_config/properties/focus-order"

  obj_viewer_controls:
    type: object
    additionalProperties: false
    required: [sprite_id]
    properties:
      sprite_id:
        type: string
        minLength: 1
        description: Target OBJ sprite id for 3D viewer controls.

  terminal_size_tester_controls:
    type: object
    additionalProperties: false
    properties:
      presets:
        type: array
        description: Optional terminal size presets in WIDTHxHEIGHT format.
        items:
          type: string
          pattern: "^[1-9][0-9]*x[1-9][0-9]*$"

  terminal_shell_controls:
    type: object
    additionalProperties: false
    anyOf:
      - required: [prompt-sprite-id, output-sprite-id]
      - required: [prompt_sprite_id, output_sprite_id]
    properties:
      prompt-sprite-id:
        type: string
        minLength: 1
        description: Text sprite id used for the editable command prompt.
      output-sprite-id:
        type: string
        minLength: 1
        description: Text sprite id used for command transcript/output.
      prompt-prefix:
        type: string
        default: "> "
        description: Prefix rendered before the current command line.
      max-lines:
        type: integer
        minimum: 1
        maximum: 1000
        default: 120
        description: Maximum transcript line count retained in the output sprite.
      banner:
        type: array
        default: []
        description: Initial output transcript lines shown when scene starts.
        items:
          type: string
      unknown_message:
        type: string
        minLength: 1
        description: Optional fallback line used for unknown commands.
      commands:
        type: array
        default: []
        description: Optional command table handled by the terminal-shell input profile.
        items:
          $ref: "#/$defs/terminal_shell_command"
      mode:
        type: string
        enum: [builtin, scripted, sidecar]
        default: builtin
        description: >
          Terminal shell interaction mode.
          `builtin`: Engine executes built-in commands (help, clear, ls, pwd, echo, whoami).
          `scripted`: Commands are not executed; only UI submit/change events are emitted for script handling.
          `sidecar`: Commands are forwarded to an external process configured in `sidecar`; engine does not execute built-ins.
      sidecar:
        type: object
        additionalProperties: false
        required: [command]
        description: 'External sidecar process configuration used when `mode: sidecar`.'
        properties:
          command:
            type: string
            minLength: 1
            description: Executable name/path to spawn (e.g. `dotnet`).
          args:
            type: array
            default: []
            items:
              type: string
            description: Arguments passed to the sidecar process.
    patternProperties:
      "^prompt_sprite_id$":
        $ref: "#/$defs/terminal_shell_controls/properties/prompt-sprite-id"
      "^output_sprite_id$":
        $ref: "#/$defs/terminal_shell_controls/properties/output-sprite-id"
      "^prompt_prefix$":
        $ref: "#/$defs/terminal_shell_controls/properties/prompt-prefix"
      "^max_lines$":
        $ref: "#/$defs/terminal_shell_controls/properties/max-lines"
      "^unknown-message$":
        $ref: "#/$defs/terminal_shell_controls/properties/unknown_message"
      "^unknown_message$":
        $ref: "#/$defs/terminal_shell_controls/properties/unknown_message"

  terminal_shell_command:
    type: object
    additionalProperties: false
    required: [name]
    properties:
      name:
        type: string
        minLength: 1
        description: Command name without arguments, for example `ls` or `status`.
      description:
        type: string
        minLength: 1
        description: Optional description shown in `help`.
      output:
        oneOf:
          - type: string
          - type: array
            items:
              type: string
        description: Output line(s) emitted when this command runs.

  # ── Effect ─────────────────────────────────────────────────────────────────
  effect:
    $ref: "./effect.schema.yaml"

  # ── Step ───────────────────────────────────────────────────────────────────
  step:
    description: >
      A single step in a stage. All effects within a step run in parallel.
      Steps execute sequentially. Use the `pause` shorthand for a timed
      delay with no effects; it is expanded by the compiler into
      `{duration, effects: []}`.
    oneOf:
      - type: object
        description: Pause shorthand — a timed delay with no effects.
        additionalProperties: false
        required: [pause]
        properties:
          pause:
            type: string
            pattern: "^[0-9]+(ms|s)$"
            description: >
              Duration string for a timed pause step.
              Examples: "500ms", "2s".
      - type: object
        description: Full step with optional effects and optional minimum duration.
        additionalProperties: false
        properties:
          duration:
            type: integer
            minimum: 0
            description: >
              Minimum step duration in milliseconds regardless of effects.
              When effects are present, the step lasts max(duration, longest effect).
              Use without effects for a timed pause.
          effects:
            type: array
            description: Effects that run in parallel for the duration of this step. May be empty.
            items:
              $ref: "#/$defs/effect"

  # ── Stage ──────────────────────────────────────────────────────────────────
  stage:
    type: object
    description: A lifecycle phase of a scene, layer, or sprite.
    additionalProperties: false
    properties:
      looping:
        type: boolean
        default: false
        description: >
          When true, the stage wraps back to its first step after the last step completes.
          Primarily used on on_idle to create repeating ambient effects (e.g. looping shine).
      trigger:
        type: string
        description: What causes transition out of this stage to the next. Only valid on on_idle.
        enum: [any-key, timeout, none]
      steps:
        type: array
        description: Ordered list of steps. Steps execute sequentially; effects within each step run in parallel.
        items:
          $ref: "#/$defs/step"

  # ── Menu option ─────────────────────────────────────────────────────────────
  menu_option:
    type: object
    additionalProperties: false
    required: [key]
    anyOf:
      - required: [next]
      - required: [to]
    properties:
      key:
        type: string
        minLength: 1
        description: >
          Key binding used in on_idle with trigger any-key.
          Examples: "1", "2", "enter", "esc", "f1", "up", "down".
      label:
        type: string
        minLength: 1
        description: Optional UI label for editors/tooling.
      selected-effect:
        type: string
        enum: [arrows]
        description: Visual selection marker style for this option.
      selected_effect:
        type: string
        enum: [arrows]
        description: Alias of selected-effect.
      action:
        type: string
        enum: [goto.scene]
        description: Optional scripted action for menu option.
      scene:
        type: string
        minLength: 1
        description: Target scene id/path used by action goto.scene.
      next:
        type: string
        minLength: 1
        description: Default target scene id/path (backward-compatible routing).
      to:
        type: string
        minLength: 1
        description: Alias target scene id/path. Compiler normalizes to scene+next.

  # ── Scene stages ───────────────────────────────────────────────────────────
  scene_stages:
    type: object
    description: Lifecycle stages for a scene.
    additionalProperties: false
    properties:
      on_enter:
        allOf:
          - $ref: "#/$defs/stage"
          - description: Plays once when scene loads. Transitions automatically to on_idle when complete.
      on_idle:
        allOf:
          - $ref: "#/$defs/stage"
          - description: Active while scene is running. Transitions to on_leave when trigger fires.
      on_leave:
        allOf:
          - $ref: "#/$defs/stage"
          - description: Plays once when leaving the scene. Transitions to next scene when complete.

  # ── Layer stages (also used by sprites) ────────────────────────────────────
  layer_stages:
    type: object
    description: Lifecycle stages for a layer or sprite.
    additionalProperties: false
    properties:
      on_enter:
        $ref: "#/$defs/stage"
      on_idle:
        $ref: "#/$defs/stage"
      on_leave:
        $ref: "#/$defs/stage"

  # ── Object instance ─────────────────────────────────────────────────────────
  object_instance:
    type: object
    additionalProperties: false
    oneOf:
      - required: [ref]
      - required: [use]
    properties:
      ref:
        type: string
        minLength: 1
        description: Object prefab/blueprint reference path. Preferred over deprecated 'use'.
      use:
        type: string
        minLength: 1
        description: "Deprecated: use 'ref' instead. Object template/prefab reference."
      as:
        type: string
        minLength: 1
        description: Scene- or layer-local instance id. Preferred over deprecated 'id'.
      id:
        type: string
        minLength: 1
        description: "Deprecated: use 'as' instead. Scene- or layer-local object instance id."
      with:
        type: object
        default: {}
        description: Optional parameter overrides for object exports.
      state:
        type: object
        default: {}
        description: Optional initial runtime state for the instance.
      tags:
        type: array
        default: []
        items:
          type: string
        description: Optional role/group tags for the instance.

  # ── Layer reference instance ───────────────────────────────────────────────
  layer_ref_instance:
    type: object
    description: >
      Reference to a reusable layer partial with optional per-instance overrides.
    additionalProperties: false
    oneOf:
      - required: [ref]
      - required: [use]
    properties:
      ref:
        type: string
        minLength: 1
        description: Layer partial reference path. Preferred over deprecated 'use'.
      use:
        type: string
        minLength: 1
        description: "Deprecated: use 'ref' instead. Layer partial reference path."
      as:
        type: string
        minLength: 1
        description: Optional instance name override. Preferred over deprecated 'id'.
      id:
        type: string
        minLength: 1
        description: "Deprecated: use 'as' instead. Optional instance name override."
      with:
        type: object
        default: {}
        description: Optional parameter overrides applied during layer reference expansion.
      z_index:
        type: integer
        description: Optional z-index override for the referenced layer instance.
      visible:
        type: boolean
        description: Optional visibility override for the referenced layer instance.
      ui:
        type: boolean
        description: Optional UI-layer flag override for the referenced layer instance.
      stages:
        $ref: "#/$defs/layer_stages"
      behaviors:
        type: array
        default: []
        items:
          $ref: "#/$defs/behavior"

  # ── Layer entry ────────────────────────────────────────────────────────────
  layer_entry:
    anyOf:
      - $ref: "#/$defs/layer"
      - $ref: "#/$defs/layer_ref_instance"

  # ── Layer ──────────────────────────────────────────────────────────────────
  layer:
    type: object
    description: A compositing layer — a named group of sprites sharing z_index and lifecycle effects.
    additionalProperties: false
    properties:
      name:
        type: string
        description: Human-readable identifier for the layer.
      z_index:
        type: integer
        default: 0
        description: Render order. Higher z_index renders on top.
      visible:
        type: boolean
        default: true
        description: Whether this layer is composited onto the scene framebuffer.
      ui:
        type: boolean
        default: false
        description: Marks this layer as UI; scene.ui.enabled controls its visibility.
      stages:
        $ref: "#/$defs/layer_stages"
      behaviors:
        type: array
        default: []
        description: >
          Optional runtime behaviors attached to this layer/GameObject.
          Useful for steering whole sprite groups together.
        items:
          $ref: "#/$defs/behavior"
      objects:
        type: array
        default: []
        description: >
          Optional object instances local to this layer.
          Uses the same ref/as/with/state/tags contract as scene-level `objects`.
        items:
          $ref: "#/$defs/object_instance"
      sprites:
        type: array
        description: Drawable objects within this layer.
        items:
          $ref: "#/$defs/sprite"

  # ── Sprite ─────────────────────────────────────────────────────────────────
  sprite:
    type: object
    description: A drawable object within a layer. Has its own local position and lifecycle.
    additionalProperties: false
    anyOf:
      - required: [type]
      - required: [use]
    properties:
      type:
        type: string
        enum: [text, image, obj, grid, flex, window, scroll-list, scene3_d]
        description: >
          Sprite type. Runtime-native: text, image, obj, grid, flex, scene3_d.
          Authoring sugar: window, scroll-list (expanded to grid/text by compiler).
          scene3_d: blits a pre-rendered frame from a .scene3d.yml atlas.
      use:
        type: string
        minLength: 1
        description: >
          Scene-local sprite template name to expand before typed deserialization.
          The compiler resolves it from the current scene `templates:` map.
      args:
        type: object
        default: {}
        additionalProperties: true
        description: Optional template arguments substituted into a sprite declared with `use`.
      content:
        type: string
        minLength: 1
        description: Text content to render (required for type=text).
      source:
        type: string
        minLength: 1
        description: Asset path (required for type=image/obj), e.g. /assets/images/tux.png or /scenes/3d/model.obj.
      src:
        type: string
        minLength: 1
        description: >
          Path to a .scene3d.yml file relative to mod root (required for type=scene3_d).
          All 3D setup (camera, lights, materials, meshes, frames) lives in that file.
          Example: /assets/3d/difficulty-portraits.scene3d.yml
      frame:
        type: string
        default: ""
        description: >
          Named frame from the Scene3D atlas to display (type=scene3_d only).
          Switched at runtime via scene.set(id, "scene3d.frame", frame_name).
      spritesheet-columns:
        type: integer
        minimum: 1
        description: Image sprite only. Number of columns in a spritesheet.
      spritesheet-rows:
        type: integer
        minimum: 1
        description: Image sprite only. Number of rows in a spritesheet.
      frame-index:
        type: integer
        minimum: 0
        description: Image sprite only. 0-based selected frame index in spritesheet cells (row-major).
      id:
        type: string
        minLength: 1
        description: >
          Optional stable sprite identifier for script-side hooks/custom handlers.
          Example: "press-any-key" or "intro-logo".
      x:
        oneOf:
          - type: integer
          - type: string
        default: 0
        description: >
          Signed horizontal offset within the scene buffer.
          Negative values are allowed (e.g. to shift centered text left/up).
          String expressions are supported, e.g. oscillate(-2,2,1800ms).
      y:
        oneOf:
          - type: integer
          - type: string
        default: 0
        description: >
          Signed vertical offset within the scene buffer.
          Negative values are allowed (e.g. title above center line).
          String expressions are supported, e.g. oscillate(-2,2,1800ms).
      z_index:
        type: integer
        default: 0
        description: Render order within the layer. Higher z_index renders on top.
      grid-row:
        type: integer
        minimum: 1
        default: 1
        description: Grid row index (1-based) when this sprite is a child of a grid container.
      grid-col:
        type: integer
        minimum: 1
        default: 1
        description: Grid column index (1-based) when this sprite is a child of a grid container.
      row-span:
        type: integer
        minimum: 1
        default: 1
        description: Number of grid rows this sprite spans.
      col-span:
        type: integer
        minimum: 1
        default: 1
        description: Number of grid columns this sprite spans.
      font:
        type: [string, "null"]
        description: >
          Font for rasterized rendering. Three forms are supported:

          Built-in generic pixel font (no asset files required):
            "generic:1"  — 3×5 tiny bitmaps (minimum readable, 3 cells wide × 5 tall per glyph).
            "generic:2"  — 5×7 standard bitmaps (5 cells wide × 7 tall per glyph). Default.
            "generic:3"  — 5×7 bitmaps × 2 cell scale (10×14 cells — large pixel art).
            "generic:half"    — 5×7 compressed with upper/lower half blocks (6×4 cells per glyph).
            "generic:quad"    — 5×7 compressed with quadrant blocks (3×4 cells per glyph).
            "generic:braille" — 5×7 compressed with braille dots (3×2 cells per glyph).
            "generic"    — equivalent to generic:2.

          Named bitmap fonts loaded from mod assets:
            "Abril Fatface"        — raster/terminal-pixel mode (default).
            "Abril Fatface:raster" — explicit raster mode.
            "Abril Fatface:ascii"  — ASCII-art glyph mode.

          Omit or set null for native terminal text (no rasterization).
      width:
        type: integer
        minimum: 1
        maximum: 65535
        description: >
          Target sprite width in terminal cells.
          For image sprites, when only width is set, height is derived from source aspect ratio.
      size:
        type: integer
        minimum: 1
        maximum: 3
        description: >
          Sprite size preset shortcut.
          `1` = small, `2` = medium, `3` = large.
          For text sprites it maps to the built-in generic font sizes.
          For image/obj sprites it uses per-type default dimensions.
          Explicit `width`/`height` still take priority when provided.
      height:
        type: integer
        minimum: 1
        maximum: 65535
        description: >
          Target sprite height in terminal cells.
          For image sprites, when only height is set, width is derived from source aspect ratio.
          For grid sprites, sets container height.
      scale:
        type: number
        minimum: 0.0001
        description: Uniform mesh scale multiplier for type=obj.
      yaw-deg:
        type: number
        description: Static yaw (Y-axis) rotation in degrees for type=obj.
      pitch-deg:
        type: number
        description: Static pitch (X-axis) rotation in degrees for type=obj.
      roll-deg:
        type: number
        description: Static roll (Z-axis) rotation in degrees for type=obj.
      rotation-x:
        type: number
        description: Static initial X-axis rotation in degrees for type=obj.
      rotation-y:
        oneOf:
          - type: number
          - type: string
        description: >
          Static initial Y-axis rotation in degrees for type=obj.
          String expressions are supported, e.g. animate(180deg,540deg,12s,loop).
      rotation-z:
        type: number
        description: Static initial Z-axis rotation in degrees for type=obj.
      rotate-y-deg-per-sec:
        type: number
        description: Continuous Y-axis rotation speed in degrees per second for type=obj.
      camera-distance:
        type: number
        minimum: 0.01
        description: Camera distance from mesh center for perspective projection (type=obj).
      fov-degrees:
        type: number
        minimum: 1
        maximum: 179
        description: Perspective camera FOV in degrees for type=obj.
      near-clip:
        type: number
        minimum: 0.000001
        description: Near clipping plane distance in camera space for type=obj (smaller renders closer geometry).
      light-direction-x:
        type: number
        description: Directional light X component for type=obj shading vector.
      light-direction-y:
        type: number
        description: Directional light Y component for type=obj shading vector.
      light-direction-z:
        type: number
        description: Directional light Z component for type=obj shading vector.
      light-2-direction-x:
        type: number
        description: Secondary directional light X component for type=obj shading vector.
      light-2-direction-y:
        type: number
        description: Secondary directional light Y component for type=obj shading vector.
      light-2-direction-z:
        type: number
        description: Secondary directional light Z component for type=obj shading vector.
      light-2-intensity:
