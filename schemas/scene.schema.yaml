$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://shell-quest.local/schemas/scene.schema.yaml"
title: Scene Schema
description: >
  Defines a scene in a Shell Quest mod.
  Scenes have a lifecycle managed through stages (on_enter, on_idle, on_leave),
  each containing sequential steps of parallel effects.
type: object
additionalProperties: false
required:
  - id
  - title
properties:
  id:
    type: string
    minLength: 1
    description: Unique identifier for the scene. Used for scene transitions.
  title:
    type: string
    minLength: 1
    description: Human-readable title.
  cutscene:
    type: boolean
    default: false
    description: Whether this scene is a non-interactive cutscene.
  target-fps:
    type: integer
    minimum: 1
    maximum: 240
    description: Optional scene-level FPS cap override (applies regardless of renderer/scene type).
  target_fps:
    type: integer
    minimum: 1
    maximum: 240
    description: Alias of target-fps.
  rendered-mode:
    type: string
    enum: [cell, halfblock, quadblock, braille]
    description: >
      Optional scene-level renderer packing mode override.
      Runtime currently supports `halfblock` for 2x vertical virtual resolution.
      Other modes are reserved for upcoming packed renderers.
  virtual-size-override:
    type: string
    pattern: "^[1-9][0-9]*x[1-9][0-9]*$"
    description: >
      Optional virtual canvas override in WIDTHxHEIGHT form (e.g. 320x240).
      Declared for future renderer scaling flow; currently informational.
  bg_colour:
    $ref: "#/$defs/colour"
    description: >
      Terminal background colour filling the entire buffer on scene load.
      Defaults to true black (RGB 0,0,0) when absent.
  stages:
    $ref: "#/$defs/scene_stages"
  behaviors:
    type: array
    default: []
    description: Optional runtime behaviors attached to the root scene GameObject.
    items:
      $ref: "#/$defs/behavior"
  audio:
    $ref: "#/$defs/scene_audio"
    description: >
      Optional audio cue hooks bound to scene lifecycle stages.
      Design hook only — runtime emits AudioCue events, playback is handled externally.
  layers:
    type: array
    description: Compositing layers rendered onto the scene buffer, each containing sprites.
    items:
      $ref: "#/$defs/layer"
  next:
    type: [string, "null"]
    description: Scene id to transition to when on_leave completes.
  menu-options:
    type: array
    default: []
    description: Optional key-driven routes from menu-like scenes.
    items:
      $ref: "#/$defs/menu_option"
  menu_options:
    type: array
    default: []
    description: Alias of menu-options.
    items:
      $ref: "#/$defs/menu_option"
  input:
    $ref: "#/$defs/scene_input"
    description: Optional scene-level input control profiles.

$defs:

  # ── Colour ─────────────────────────────────────────────────────────────────
  colour:
    description: >
      A colour value. Either a named colour or a CSS-style hex string (#rrggbb).
      Named colours: black, white, gray (= grey), silver, red, green, blue,
      yellow, cyan, magenta.
      Hex example: "#C0C0C0"
    oneOf:
      - type: string
        pattern: "^#[0-9A-Fa-f]{6}$"
        description: "Hex colour: #rrggbb"
      - type: string
        enum:
          - black
          - white
          - gray
          - grey
          - silver
          - red
          - green
          - blue
          - yellow
          - cyan
          - magenta
        description: Named colour.

  # ── Effect params ───────────────────────────────────────────────────────────
  effect_params:
    type: object
    additionalProperties: false
    description: Parameters passed to an effect implementation. Not all params apply to every effect.
    properties:
      colour:
        $ref: "#/$defs/colour"
        description: "Target colour. Used by: clear-to-colour, fade-in, fade-out."
      easing:
        type: string
        enum: [linear, ease-in, ease-out, ease-in-out]
        default: linear
        description: Easing function applied to the effect progress curve.
      angle:
        type: number
        description: >
          Beam angle in degrees. 0 = vertical beam sweeps left→right.
          90 = horizontal beam sweeps top→bottom. Negative = opposite diagonal.
          Used by: shine.
      width:
        type: number
        minimum: 0.1
        description: >
          Gaussian beam half-width in character cells.
          Larger = softer/wider beam. Used by: shine.
      falloff:
        type: number
        minimum: 0.1
        description: >
          Exponent applied to the gaussian kernel.
          >1 = sharper laser edges, <1 = soft diffuse halo.
          Used by: shine.
      intensity:
        type: number
        minimum: 0.0
        description: >
          Effect intensity multiplier. Meaning is effect-specific.
          Used by: shine, brighten, lightning-flash, tesla-orb, whiteout.
      amplitude_x:
        type: number
        minimum: 0.0
        description: Horizontal shake amplitude in cells. Used by: screen-shake.
      amplitude_y:
        type: number
        minimum: 0.0
        description: Vertical shake amplitude in cells. Used by: screen-shake.
      frequency:
        type: number
        minimum: 0.0
        description: Oscillation frequency / cycles for shake-like effects. Used by: screen-shake.
      coverage:
        type: string
        description: Optional scope hint (e.g. "full-screen"). Used by: lightning-flash.
      orientation:
        type: string
        enum: [vertical, horizontal]
        description: Directional orientation. Used by: lightning-fbm, lightning-branch, lightning-growth, lightning-ambient, lightning-natural.
      target:
        type: string
        description: Optional target identifier hint for future targeted effects.
      strikes:
        type: integer
        minimum: 1
        description: Number of primary lightning branches/arcs. Used by: lightning-branch, lightning-growth, lightning-ambient, lightning-natural, tesla-orb.
      thickness:
        type: number
        minimum: 0.1
        description: Branch/core thickness multiplier. Used by: lightning-branch, lightning-growth, lightning-ambient, lightning-natural, tesla-orb.
      glow:
        type: boolean
        description: Whether lightning should add halo glow around branches/arcs.
      start_x:
        oneOf:
          - type: string
          - type: number
        description: Start X anchor for lightning branch (number or "random").
      end_x:
        oneOf:
          - type: string
          - type: number
        description: End X anchor for lightning branch (number or "random").
      octave_count:
        type: integer
        minimum: 1
        maximum: 20
        description: FBM octave count for shader-like procedural lightning effects.
      amp_start:
        type: number
        minimum: 0.0
        description: FBM start amplitude (default 0.5).
      amp_coeff:
        type: number
        minimum: 0.0
        description: FBM amplitude coefficient per octave (default 0.5).
      freq_coeff:
        type: number
        minimum: 1.0
        description: FBM frequency multiplier per octave (default 2.0).
      speed:
        type: number
        minimum: 0.0
        description: FBM animation speed multiplier (default 0.5).

  # ── Scene input profiles ────────────────────────────────────────────────────
  scene_input:
    type: object
    additionalProperties: false
    properties:
      obj-viewer:
        $ref: "#/$defs/obj_viewer_controls"
      terminal-size-tester:
        $ref: "#/$defs/terminal_size_tester_controls"

  obj_viewer_controls:
    type: object
    additionalProperties: false
    required: [sprite_id]
    properties:
      sprite_id:
        type: string
        minLength: 1
        description: Target OBJ sprite id for 3D viewer controls.

  terminal_size_tester_controls:
    type: object
    additionalProperties: false
    properties:
      presets:
        type: array
        description: Optional terminal size presets in WIDTHxHEIGHT format.
        items:
          type: string
          pattern: "^[1-9][0-9]*x[1-9][0-9]*$"

  # ── Effect ─────────────────────────────────────────────────────────────────
  effect:
    type: object
    description: A named visual effect applied to a buffer region over a duration.
    additionalProperties: false
    required: [name, duration]
    properties:
      name:
        type: string
        description: >
          Effect identifier. Built-in effects:
          crt-on        — CRT power-on scan with scanline flicker and flash.
          power-off      — CRT power-off collapse animation.
          fade-in        — Fade sprite/layer from black to full brightness.
          fade-out       — Fade sprite/layer from full brightness to black.
          fade-to-black  — Radial vignette fade to black over the whole buffer.
          clear-to-colour — Instantly fill buffer with params.colour.
          scanlines      — Overlay horizontal CRT scanlines.
          shine          — Metallic laser-scan highlight sweep (configurable angle/width/falloff).
          brighten       — Increase foreground brightness toward white.
          lightning-flash — High-energy multi-pulse flash simulating lightning illumination.
          lightning-branch — Draw jagged lightning branches with optional glow.
          lightning-growth — Progressive branching lightning that grows and forks before the bright return stroke.
          lightning-optical-80s — Cinematic 80s optical lightning (blue halation + white core).
          lightning-fbm — Shader-inspired procedural lightning warp (FBM/noise driven).
          lightning-ambient — Sparse lighter background lightning using the branch/fbm visual language over a long effect window.
          lightning-natural — More natural lightning with bright core, halo, and secondary filaments.
          tesla-orb      — Draw spherical electrical arcs (Tesla coil style) around scene center.
          screen-shake   — Camera-like jitter shifting the rendered frame.
          whiteout       — Overexposure pulse toward white.
          glitch-out     — Terminal glitch collapse + flash transition.
          devour-out     — Consume visible scene content, then spread corruption over full screen.
          artifact-out   — Digital GPU artifact transition (glyph corruption, tearing, channel split).
          shatter-glitch — Sprite-focused glitch: partial line loss, flicker, and displaced fragments.
        enum:
          - crt-on
          - power-off
          - fade-in
          - fade-out
          - fade-to-black
          - clear-to-colour
          - scanlines
          - shine
          - brighten
          - lightning-flash
          - lightning-branch
          - lightning-growth
          - lightning-optical-80s
          - lightning-fbm
          - lightning-ambient
          - lightning-natural
          - tesla-orb
          - screen-shake
          - whiteout
          - glitch-out
          - devour-out
          - artifact-out
          - shatter-glitch
      duration:
        type: integer
        minimum: 0
        description: Duration in milliseconds.
      looping:
        type: boolean
        default: false
        description: Whether the effect repeats indefinitely within its step.
      params:
        $ref: "#/$defs/effect_params"

  # ── Step ───────────────────────────────────────────────────────────────────
  step:
    type: object
    description: >
      A single step in a stage. All effects within a step run in parallel.
      Steps execute sequentially.
      A step with no effects and only `duration` acts as a timed pause.
    additionalProperties: false
    properties:
      duration:
        type: integer
        minimum: 0
        description: >
          Minimum step duration in milliseconds regardless of effects.
          When effects are present, the step lasts max(duration, longest effect).
          Use without effects for a timed pause.
      effects:
        type: array
        description: Effects that run in parallel for the duration of this step. May be empty.
        items:
          $ref: "#/$defs/effect"

  # ── Stage ──────────────────────────────────────────────────────────────────
  stage:
    type: object
    description: A lifecycle phase of a scene, layer, or sprite.
    additionalProperties: false
    properties:
      looping:
        type: boolean
        default: false
        description: >
          When true, the stage wraps back to its first step after the last step completes.
          Primarily used on on_idle to create repeating ambient effects (e.g. looping shine).
      trigger:
        type: string
        description: What causes transition out of this stage to the next. Only valid on on_idle.
        enum: [any-key, timeout, none]
      steps:
        type: array
        description: Ordered list of steps. Steps execute sequentially; effects within each step run in parallel.
        items:
          $ref: "#/$defs/step"

  # ── Menu option ─────────────────────────────────────────────────────────────
  menu_option:
    type: object
    additionalProperties: false
    required: [key, next]
    properties:
      key:
        type: string
        minLength: 1
        description: >
          Key binding used in on_idle with trigger any-key.
          Examples: "1", "2", "enter", "esc", "f1", "up", "down".
      label:
        type: string
        minLength: 1
        description: Optional UI label for editors/tooling.
      selected-effect:
        type: string
        enum: [arrows]
        description: Visual selection marker style for this option.
      selected_effect:
        type: string
        enum: [arrows]
        description: Alias of selected-effect.
      action:
        type: string
        enum: [goto.scene]
        description: Optional scripted action for menu option.
      scene:
        type: string
        minLength: 1
        description: Target scene id/path used by action goto.scene.
      next:
        type: string
        minLength: 1
        description: Default target scene id/path (backward-compatible routing).

  # ── Scene stages ───────────────────────────────────────────────────────────
  scene_stages:
    type: object
    description: Lifecycle stages for a scene.
    additionalProperties: false
    properties:
      on_enter:
        allOf:
          - $ref: "#/$defs/stage"
          - description: Plays once when scene loads. Transitions automatically to on_idle when complete.
      on_idle:
        allOf:
          - $ref: "#/$defs/stage"
          - description: Active while scene is running. Transitions to on_leave when trigger fires.
      on_leave:
        allOf:
          - $ref: "#/$defs/stage"
          - description: Plays once when leaving the scene. Transitions to next scene when complete.

  # ── Layer stages (also used by sprites) ────────────────────────────────────
  layer_stages:
    type: object
    description: Lifecycle stages for a layer or sprite.
    additionalProperties: false
    properties:
      on_enter:
        $ref: "#/$defs/stage"
      on_idle:
        $ref: "#/$defs/stage"
      on_leave:
        $ref: "#/$defs/stage"

  # ── Layer ──────────────────────────────────────────────────────────────────
  layer:
    type: object
    description: A compositing layer — a named group of sprites sharing z_index and lifecycle effects.
    additionalProperties: false
    properties:
      name:
        type: string
        description: Human-readable identifier for the layer.
      z_index:
        type: integer
        default: 0
        description: Render order. Higher z_index renders on top.
      visible:
        type: boolean
        default: true
        description: Whether this layer is composited onto the scene framebuffer.
      stages:
        $ref: "#/$defs/layer_stages"
      behaviors:
        type: array
        default: []
        description: >
          Optional runtime behaviors attached to this layer/GameObject.
          Useful for steering whole sprite groups together.
        items:
          $ref: "#/$defs/behavior"
      sprites:
        type: array
        description: Drawable objects within this layer.
        items:
          $ref: "#/$defs/sprite"

  # ── Sprite ─────────────────────────────────────────────────────────────────
  sprite:
    type: object
    description: A drawable object within a layer. Has its own local position and lifecycle.
    additionalProperties: false
    required: [type]
    properties:
      type:
        type: string
        enum: [text, image, obj, grid]
        description: Sprite type. Supported: text, image, obj, grid.
      content:
        type: string
        minLength: 1
        description: Text content to render (required for type=text).
      source:
        type: string
        minLength: 1
        description: Asset path (required for type=image/obj), e.g. /assets/images/tux.png or /scenes/3d/model.obj.
      id:
        type: string
        minLength: 1
        description: >
          Optional stable sprite identifier for script-side hooks/custom handlers.
          Example: "press-any-key" or "intro-logo".
      x:
        type: integer
        default: 0
        description: >
          Signed horizontal offset within the scene buffer.
          Negative values are allowed (e.g. to shift centered text left/up).
      y:
        type: integer
        default: 0
        description: >
          Signed vertical offset within the scene buffer.
          Negative values are allowed (e.g. title above center line).
      z_index:
        type: integer
        default: 0
        description: Render order within the layer. Higher z_index renders on top.
      grid-row:
        type: integer
        minimum: 1
        default: 1
        description: Grid row index (1-based) when this sprite is a child of a grid container.
      grid-col:
        type: integer
        minimum: 1
        default: 1
        description: Grid column index (1-based) when this sprite is a child of a grid container.
      row-span:
        type: integer
        minimum: 1
        default: 1
        description: Number of grid rows this sprite spans.
      col-span:
        type: integer
        minimum: 1
        default: 1
        description: Number of grid columns this sprite spans.
      font:
        type: [string, "null"]
        description: >
          Font for rasterized rendering. Three forms are supported:

          Built-in generic pixel font (no asset files required):
            "generic:1"  — 3×5 tiny bitmaps (minimum readable, 3 cells wide × 5 tall per glyph).
            "generic:2"  — 5×7 standard bitmaps (5 cells wide × 7 tall per glyph). Default.
            "generic:3"  — 5×7 bitmaps × 2 cell scale (10×14 cells — large pixel art).
            "generic:half"    — 5×7 compressed with upper/lower half blocks (6×4 cells per glyph).
            "generic:quad"    — 5×7 compressed with quadrant blocks (3×4 cells per glyph).
            "generic:braille" — 5×7 compressed with braille dots (3×2 cells per glyph).
            "generic"    — equivalent to generic:2.

          Named bitmap fonts loaded from mod assets:
            "Abril Fatface"        — raster/terminal-pixel mode (default).
            "Abril Fatface:raster" — explicit raster mode.
            "Abril Fatface:ascii"  — ASCII-art glyph mode.

          Omit or set null for native terminal text (no rasterization).
      width:
        type: integer
        minimum: 1
        maximum: 65535
        description: >
          Target sprite width in terminal cells.
          For image sprites, when only width is set, height is derived from source aspect ratio.
      height:
        type: integer
        minimum: 1
        maximum: 65535
        description: >
          Target sprite height in terminal cells.
          For image sprites, when only height is set, width is derived from source aspect ratio.
          For grid sprites, sets container height.
      scale:
        type: number
        minimum: 0.0001
        description: Uniform mesh scale multiplier for type=obj.
      yaw-deg:
        type: number
        description: Static yaw (Y-axis) rotation in degrees for type=obj.
      pitch-deg:
        type: number
        description: Static pitch (X-axis) rotation in degrees for type=obj.
      roll-deg:
        type: number
        description: Static roll (Z-axis) rotation in degrees for type=obj.
      rotate-y-deg-per-sec:
        type: number
        description: Continuous Y-axis rotation speed in degrees per second for type=obj.
      camera-distance:
        type: number
        minimum: 0.01
        description: Camera distance from mesh center for perspective projection (type=obj).
      fov-degrees:
        type: number
        minimum: 1
        maximum: 179
        description: Perspective camera FOV in degrees for type=obj.
      near-clip:
        type: number
        minimum: 0.000001
        description: Near clipping plane distance in camera space for type=obj (smaller renders closer geometry).
      draw-char:
        type: string
        minLength: 1
        description: Single glyph used to draw wireframe edges for type=obj.
      surface-mode:
        type: string
        enum: [material, wireframe]
        description: Surface rendering style for type=obj. `material` fills faces with MTL colours, `wireframe` draws edges only.
      columns:
        type: array
        description: >
          Grid column track definitions for type=grid.
          Supported track values:
          - "auto" (fit content),
          - "<n>fr" (fractional),
          - "<n>" (fixed cells).
        items:
          type: string
      rows:
        type: array
        description: >
          Grid row track definitions for type=grid.
          Supported track values:
          - "auto" (fit content),
          - "<n>fr" (fractional),
          - "<n>" (fixed cells).
        items:
          type: string
      gap-x:
        type: integer
        minimum: 0
        default: 0
        description: Horizontal gap between grid columns in cells.
      gap-y:
        type: integer
        minimum: 0
        default: 0
        description: Vertical gap between grid rows in cells.
      children:
        type: array
        default: []
        description: Child renderable sprites for type=grid.
        items:
          $ref: "#/$defs/sprite"
      force-renderer-mode:
        type: string
        enum: [cell, halfblock, quadblock, braille]
        description: >
          Optional per-sprite renderer mode override.
          Priority: sprite.force-renderer-mode > scene.rendered-mode > engine default.
          Applies only to renderable sprites.
      force-font-mode:
        type: string
        enum:
          - ascii
          - raster
          - terminal-pixels
          - 1
          - 2
          - 3
          - tiny
          - standard
          - large
          - half
          - quad
          - braille
        description: >
          Optional per-sprite font mode override.
          For named bitmap fonts: ascii/raster/terminal-pixels.
          For generic fonts: 1/2/3 or tiny/standard/large/half/quad/braille.
          Priority: force-font-mode > renderer-derived generic mode > sprite font declaration.
      align_x:
        type: string
        enum: [left, center, right]
        description: Horizontal alignment anchor in scene space. x acts as extra offset.
      align_y:
        type: string
        enum: [top, center, bottom]
        description: Vertical alignment anchor in scene space. y acts as extra offset.
      fg_colour:
        $ref: "#/$defs/colour"
        description: >
          Base foreground (text / glyph pixel) colour.
          Can be overridden per-run using inline markup in content:
          [red]text[/] or [#ff8800]text[/].
      bg_colour:
        $ref: "#/$defs/colour"
        description: Background colour behind the sprite. Omit for transparent background.
      glow:
        $ref: "#/$defs/glow"
        description: Optional glow halo rendered behind the sprite at neighbouring cell offsets.
      appear_at_ms:
        type: integer
        minimum: 0
        description: Delay from scene start (ms) before this sprite becomes visible.
      disappear_at_ms:
        type: integer
        minimum: 0
        description: Absolute scene time (ms) after which this sprite is hidden.
      reveal_ms:
        type: integer
        minimum: 0
        description: >
          Optional reveal duration (ms).
          When set, the sprite content appears character by character left→right
          over this duration starting from appear_at_ms.
      hide_on_leave:
        type: boolean
        default: false
        description: >
          When true, the sprite is not rendered at all once the scene enters on_leave.
          Useful for prompts like PRESS ANY KEY that should disappear instantly on trigger.
      stages:
        $ref: "#/$defs/layer_stages"
      animations:
        type: array
        default: []
        description: >
          Position animations applied to this sprite before rendering.
          Animations modify the sprite's transform (dx, dy offset) rather than its pixels.
          Multiple animations combine additively.
        items:
          $ref: "#/$defs/animation"
      behaviors:
        type: array
        default: []
        description: >
          Optional runtime behaviors attached to this sprite/GameObject.
          Behaviors can toggle visibility or apply extra runtime x/y offsets.
        items:
          $ref: "#/$defs/behavior"
    allOf:
      - if:
          properties:
            type:
              const: text
        then:
          required: [content]
      - if:
          properties:
            type:
              const: image
        then:
          required: [source]
      - if:
          properties:
            type:
              const: grid
        then:
          required: [columns, rows, children]

  # ── Animation ──────────────────────────────────────────────────────────────
  animation:
    type: object
    description: >
      A sprite position animation (tween).
      Modifies where the sprite is drawn (transform), not pixel colours.
      Contrast with effects which modify pixels after rasterization.
    additionalProperties: false
    required: [name]
    properties:
      name:
        type: string
        description: >
          Animation identifier. Built-in animations:
          float — smooth sinusoidal bob along x or y axis.
        enum:
          - float
      looping:
        type: boolean
        default: true
        description: Whether the animation repeats indefinitely.
      params:
        $ref: "#/$defs/animation_params"

  # ── Animation params ────────────────────────────────────────────────────────
  animation_params:
    type: object
    additionalProperties: false
    description: Parameters for a sprite animation.
    properties:
      axis:
        type: string
        enum: [x, y]
        default: y
        description: >
          Axis along which the animation operates.
          "y" = vertical bob (up/down). "x" = horizontal sway (left/right).
      amplitude:
        type: integer
        minimum: 1
        default: 1
        description: Maximum offset in terminal cells from the sprite's resting position (±amplitude).
      period_ms:
        type: integer
        minimum: 1
        default: 2000
        description: Duration of one full animation cycle in milliseconds.
      easing:
        type: string
        enum: [linear, ease-in, ease-out, ease-in-out]
        default: ease-in-out
        description: Easing applied within each animation cycle.

  # ── Behavior ───────────────────────────────────────────────────────────────
  behavior:
    type: object
    description: >
      A runtime behavior attached to a sprite/GameObject.
      Behaviors modify object state before rendering rather than applying pixel post-process.
    additionalProperties: false
    required: [name]
    properties:
      name:
        type: string
        description: >
          Behavior identifier. Built-in behaviors:
          blink — toggles object visibility on a timed cycle.
          bob   — applies sinusoidal x/y offsets to the object.
          follow — mirrors target object visibility/offset with optional extra x/y offsets.
          menu-selected — shows object only when menu selected index equals params.index.
          selected-arrows — anchors arrow marker to target sprite bounds using params.target + side.
          stage-visibility — shows the object only during selected scene stages.
          timed-visibility — shows the object only within an elapsed-time window using scene or stage time.
        enum:
          - blink
          - bob
          - follow
          - menu-selected
          - selected-arrows
          - stage-visibility
          - timed-visibility
      params:
        $ref: "#/$defs/behavior_params"

  behavior_params:
    type: object
    additionalProperties: false
    description: Parameters for a runtime behavior.
    properties:
      target:
        type: string
        description: Optional target object alias/id. Defaults to the object that owns the behavior.
      stages:
        type: array
        description: >
          Scene stages used by stage-visibility.
          Supported values: on-enter, on-idle, on-leave, done.
        items:
          type: string
          enum: [on-enter, on-idle, on-leave, done, enter, idle, leave]
      time_scope:
        type: string
        enum: [scene, stage]
        description: >
          Clock used by timed-visibility.
          `scene` measures from scene start, `stage` measures from entering the current stage.
      start_ms:
        type: integer
        minimum: 0
        description: Inclusive elapsed time when timed-visibility starts showing the target.
      end_ms:
        type: integer
        minimum: 0
        description: Exclusive elapsed time when timed-visibility stops showing the target.
      visible_ms:
        type: integer
        minimum: 0
        description: Visible duration for blink behavior in milliseconds.
      hidden_ms:
        type: integer
        minimum: 0
        description: Hidden duration for blink behavior in milliseconds.
      period_ms:
        type: integer
        minimum: 1
        description: Period of one full bob cycle in milliseconds.
      phase_ms:
        type: integer
        minimum: 0
        description: Initial time offset for blink/bob in milliseconds.
      amplitude_x:
        type: integer
        description: Horizontal bob amplitude in cells.
      amplitude_y:
        type: integer
        description: Vertical bob amplitude in cells.
      index:
        type: integer
        minimum: 0
        description: Selected menu index used by menu-selected behavior.
      side:
        type: string
        enum: [left, right]
        description: Side anchor for selected-arrows behavior.
      padding:
        type: integer
        description: Horizontal distance from target edge for selected-arrows behavior.
      autoscale_height:
        type: boolean
        description: >
          For selected-arrows behavior, expands horizontal anchor distance by target item height.

  # ── Audio hooks (design/runtime bridge) ──────────────────────────────────────
  scene_audio:
    type: object
    additionalProperties: false
    description: >
      Declarative audio cue hooks for scene lifecycle stages.
      Cues fire once when scene_elapsed_ms reaches at_ms while the stage is active.
    properties:
      on_enter:
        type: array
        default: []
        items:
          $ref: "#/$defs/audio_cue"
      on_idle:
        type: array
        default: []
        items:
          $ref: "#/$defs/audio_cue"
      on_leave:
        type: array
        default: []
        items:
          $ref: "#/$defs/audio_cue"

  audio_cue:
    type: object
    additionalProperties: false
    required: [cue]
    properties:
      at_ms:
        type: integer
        minimum: 0
        default: 0
        description: Trigger time in milliseconds from scene start.
      cue:
        type: string
        minLength: 1
        description: Audio cue identifier (for external audio backend routing).
      volume:
        type: number
        minimum: 0.0
        maximum: 1.0
        description: Optional playback gain hint.

  # ── Glow ───────────────────────────────────────────────────────────────────
  glow:
    type: object
    additionalProperties: false
    description: >
      Soft halo rendered behind a sprite by drawing shifted copies at neighbouring
      cell offsets in a dimmed colour. Applied before the main sprite render pass.
    properties:
      colour:
        $ref: "#/$defs/colour"
        description: >
          Explicit glow colour.
          If omitted, the engine auto-derives a dimmed version of the sprite's fg_colour
          (approximately 25% brightness).
      radius:
        type: integer
        minimum: 1
        maximum: 4
        default: 1
        description: >
          Halo radius in cells.
          1 = 8 immediate neighbours (3×3 ring, excluding centre).
          2 = up to 24 neighbours (5×5 ring) — denser, more diffuse halo.

  # ── Colour markup (inline, within content strings) ─────────────────────────
  # NOTE: this is documentation only — JSON Schema cannot validate inline string markup.
  # Format: [colour]text[/] or [/colour] where colour is a named colour or #rrggbb hex.
  # Examples:
  #   "[red]PRESS[/] ANY [red]KEY[/]"
  #   "[#808080]PRESS[/] ANY [#808080]KEY[/]"
  # Rules:
  #   - [name]   or [#rrggbb]  opens a colour span
  #   - [/]      or [/name]    closes it (reverts to sprite fg_colour)
  #   - Nesting is not supported (last opened tag wins)
  #   - Invalid/unknown tags are treated as literal text
  #   - Supported named colours: black white gray grey silver red green blue yellow cyan magenta
