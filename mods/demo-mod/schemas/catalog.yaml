$schema: https://json-schema.org/draft/2020-12/schema
$id: https://shell-quest.local/mods/demo-mod/schemas/catalog.yaml
title: schema demo-mod catalog
$defs:
  scene_ids:
    type: string
    enum:
    - demo-mod.intro
    - demo-mod.second
  scene_paths:
    type: string
    enum:
    - /scenes/intro/scene.yml
    - /scenes/second/scene.yml
  scene_refs:
    type: string
    enum:
    - /scenes/intro/scene.yml
    - /scenes/second/scene.yml
    - demo-mod.intro
    - demo-mod.second
  object_names:
    type: string
    enum: []
  effect_names:
    type: string
    enum: []
  layer_refs:
    type: string
    enum:
    - intro/layers/main.yml
    - second/layers/main.yml
    - second/layers/overlay.yml
  sprite_refs:
    type: string
    enum: []
  template_refs:
    type: string
    enum: []
  object_refs:
    type: string
    enum: []
  effect_refs:
    type: string
    enum: []
  font_names:
    type: string
    enum: []
  font_specs:
    type: string
    enum:
    - default
    - generic
    - generic:1
    - generic:2
    - generic:3
    - generic:braille
    - generic:half
    - generic:large
    - generic:quad
    - generic:standard
    - generic:tiny
  image_paths:
    type: string
    enum: []
  model_paths:
    type: string
    enum: []
  scene3d_paths:
    type: string
    enum: []
  cutscene_refs:
    type: string
    enum: []
  sprite_ids:
    type: string
    enum:
    - title
  template_names:
    type: string
    enum: []
