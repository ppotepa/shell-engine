id: saturn-test-clean

viewport:
  width: 640
  height: 360
  rendered_mode: halfblock

# Camera positioned above and behind; orbit tween swings it 360° around planet
camera:
  distance: 50.0
  fov_degrees: 44.0
  near_clip: 0.01
  position: [0.0, 18.0, 48.0]
  look_at: [0.0, 0.0, 0.0]

lights:
  - id: key
    type: directional
    direction: [-0.58, 0.34, -0.74]
    intensity: 1.0
  - id: sky-ambient
    type: ambient
    intensity: 0.06
  - id: warm_fill
    type: point
    position: [-30.0, 18.0, -10.0]
    intensity: 0.85
    colour: "#f2c97a"
    snap_hz: 0.0
    falloff_constant: 0.001
  - id: cool_rim
    type: point
    position: [40.0, 8.0, 10.0]
    intensity: 0.20
    colour: "#8ea9de"
    snap_hz: 0.0
    falloff_constant: 0.001

materials:
  planet_body:
    surface_mode: material
    fg_colour: "#cf944a"
    cel_levels: 5
    tone_mix: 0.78
    shadow_colour: "#4f3118"
    midtone_colour: "#a96e34"
    highlight_colour: "#f2cd8f"
    backface_cull: true
  atmosphere_haze:
    surface_mode: material
    fg_colour: "#d08030"
    cel_levels: 2
    tone_mix: 0.12
    shadow_colour: "#3d1800"
    midtone_colour: "#904820"
    highlight_colour: "#f0a050"
    opacity: 0.22
    backface_cull: false
  ring_c_back:
    surface_mode: material
    fg_colour: "#b8b0a0"
    cel_levels: 3
    tone_mix: 0.55
    shadow_colour: "#2a2620"
    midtone_colour: "#8a8475"
    highlight_colour: "#d2cabb"
    opacity: 0.28
    backface_cull: false
  ring_c_front:
    surface_mode: material
    fg_colour: "#c8c0b0"
    cel_levels: 3
    tone_mix: 0.60
    shadow_colour: "#2a2620"
    midtone_colour: "#8a8475"
    highlight_colour: "#dcd4c8"
    opacity: 0.35
    backface_cull: false
  ring_b_back:
    surface_mode: material
    fg_colour: "#d8ceba"
    cel_levels: 4
    tone_mix: 0.70
    shadow_colour: "#3c3020"
    midtone_colour: "#a09070"
    highlight_colour: "#f0e4cc"
    opacity: 0.82
    backface_cull: false
  ring_b_front:
    surface_mode: material
    fg_colour: "#e0d6c0"
    cel_levels: 4
    tone_mix: 0.75
    shadow_colour: "#3c3020"
    midtone_colour: "#a09070"
    highlight_colour: "#f8eccf"
    opacity: 0.90
    backface_cull: false
  ring_cassini_back:
    surface_mode: material
    fg_colour: "#181410"
    cel_levels: 2
    tone_mix: 0.15
    shadow_colour: "#080604"
    midtone_colour: "#101008"
    highlight_colour: "#201c18"
    opacity: 0.20
    backface_cull: false
  ring_cassini_front:
    surface_mode: material
    fg_colour: "#181410"
    cel_levels: 2
    tone_mix: 0.15
    shadow_colour: "#080604"
    midtone_colour: "#101008"
    highlight_colour: "#201c18"
    opacity: 0.20
    backface_cull: false
  ring_a_back:
    surface_mode: material
    fg_colour: "#c4bfae"
    cel_levels: 3
    tone_mix: 0.60
    shadow_colour: "#30281c"
    midtone_colour: "#908878"
    highlight_colour: "#dcd6c4"
    opacity: 0.62
    backface_cull: false
  ring_a_front:
    surface_mode: material
    fg_colour: "#ccc8b8"
    cel_levels: 3
    tone_mix: 0.65
    shadow_colour: "#30281c"
    midtone_colour: "#908878"
    highlight_colour: "#e4e0d0"
    opacity: 0.72
    backface_cull: false

objects:
  # ── Planet body (oblate spheroid, equatorial radius 5.8) ─────────────────
  - id: planet
    mesh: /assets/3d/planet_oblate.obj
    material: planet_body
    transform: { scale: 5.8, translation: [0.0, 0.0, 0.0] }

  - id: atmosphere
    mesh: /assets/3d/planet_oblate.obj
    material: atmosphere_haze
    transform: { scale: 6.1, translation: [0.0, 0.0, 0.0] }

  # ── Ring system — back halves first (behind planet) ─────────────────────
  # C ring:  inner=7.17, outer=8.86 → scale 8.9
  - id: rings-c-back
    mesh: /assets/3d/ring_c_back.obj
    material: ring_c_back
    transform: { scale: 8.9, pitch: -26.7, translation: [0.0, 0.0, 0.0] }

  # B ring:  inner=8.86, outer=11.32 → scale 11.3
  - id: rings-b-back
    mesh: /assets/3d/ring_b_back.obj
    material: ring_b_back
    transform: { scale: 11.3, pitch: -26.7, translation: [0.0, 0.0, 0.0] }

  # Cassini Division: inner=11.32, outer=11.76 → scale 11.8
  - id: rings-cassini-back
    mesh: /assets/3d/ring_cassini_back.obj
    material: ring_cassini_back
    transform: { scale: 11.8, pitch: -26.7, translation: [0.0, 0.0, 0.0] }

  # A ring:  inner=11.76, outer=13.17 → scale 13.2
  - id: rings-a-back
    mesh: /assets/3d/ring_a_back.obj
    material: ring_a_back
    transform: { scale: 13.2, pitch: -26.7, translation: [0.0, 0.0, 0.0] }

  # ── Ring halves in front of planet ──────────────────────────────────────
  - id: rings-a-front
    mesh: /assets/3d/ring_a_front.obj
    material: ring_a_front
    transform: { scale: 13.2, pitch: -26.7, translation: [0.0, 0.0, 0.0] }

  - id: rings-cassini-front
    mesh: /assets/3d/ring_cassini_front.obj
    material: ring_cassini_front
    transform: { scale: 11.8, pitch: -26.7, translation: [0.0, 0.0, 0.0] }

  - id: rings-b-front
    mesh: /assets/3d/ring_b_front.obj
    material: ring_b_front
    transform: { scale: 11.3, pitch: -26.7, translation: [0.0, 0.0, 0.0] }

  - id: rings-c-front
    mesh: /assets/3d/ring_c_front.obj
    material: ring_c_front
    transform: { scale: 8.9, pitch: -26.7, translation: [0.0, 0.0, 0.0] }

frames:
  saturn-static:
    show: &show_all
      - rings-c-back
      - rings-b-back
      - rings-cassini-back
      - rings-a-back
      - planet
      - atmosphere
      - rings-a-front
      - rings-cassini-front
      - rings-b-front
      - rings-c-front

  saturn-orbit:
    show: *show_all
    clip:
      duration_ms: 60000
      keyframes: 1
      tweens:
        # Camera orbits 360° around the planet in 60 s
        - { object: camera, property: orbit_angle_deg, from: 0.0, to: 360.0, easing: linear }
        # Planet slow self-rotation
        - { object: planet, property: yaw_offset, from: 0.0, to: 180.0, easing: linear }
        - { object: atmosphere, property: yaw_offset, from: 0.0, to: 90.0, easing: linear }
        # Ring planes stay fixed (no yaw on rings)
