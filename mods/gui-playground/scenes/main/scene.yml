# yaml-language-server: $schema=../../../schemas/scene.yaml
id: gui-playground-main
title: GUI Playground
bg: "#080810"
render-size: 640x360
ui:
  scale: 1.08
  font-scale: 1.22
layers:
  - ref: bg
  - ref: controls
  - ref: output
logic:
  kind: script
  behavior: rhai-script
  src: ./main.rhai
gui:
  widgets:
    # ── Sliders ──────────────────────────────────────────────────────────────
    - type: slider
      id: color-red-slider
      sprite: color-red-slider-track
      handle: color-red-slider-handle
      x: 52
      y: 80
      w: 164
      h: 14
      hit-padding: 4
      min: 0
      max: 255
      value: 128
    - type: slider
      id: color-green-slider
      sprite: color-green-slider-track
      handle: color-green-slider-handle
      x: 52
      y: 98
      w: 164
      h: 14
      hit-padding: 4
      min: 0
      max: 255
      value: 128
    - type: slider
      id: color-blue-slider
      sprite: color-blue-slider-track
      handle: color-blue-slider-handle
      x: 52
      y: 116
      w: 164
      h: 14
      hit-padding: 4
      min: 0
      max: 255
      value: 128
    # ── Toggles ──────────────────────────────────────────────────────────────
    - type: toggle
      id: display-hex-toggle
      sprite: display-hex-toggle-label
      x: 28
      y: 174
      w: 108
      h: 16
      on: true
    - type: toggle
      id: display-swatch-toggle
      sprite: display-swatch-toggle-label
      x: 28
      y: 190
      w: 120
      h: 16
      on: true
    - type: toggle
      id: display-invert-toggle
      sprite: display-invert-toggle-label
      x: 28
      y: 206
      w: 126
      h: 16
    # ── Buttons ──────────────────────────────────────────────────────────────
    - type: button
      id: playground-reset-button
      sprite: playground-reset-button-label
      x: 156
      y: 174
      w: 84
      h: 16
    - type: button
      id: playground-randomize-button
      sprite: playground-randomize-button-label
      x: 156
      y: 190
      w: 96
      h: 16
    # ── Inputs ───────────────────────────────────────────────────────────────
    - type: text-input
      id: planet-name-input
      sprite: planet-name-input-box
      text-sprite: planet-name-input-text
      x: 78
      y: 270
      w: 172
      h: 16
      placeholder: "Planet label"
      value: "Kepler-442b"
      max-length: 24
    - type: number-input
      id: planet-density-input
      sprite: planet-density-input-box
      text-sprite: planet-density-input-text
      x: 78
      y: 292
      w: 172
      h: 16
      placeholder: "1.0"
      value: "1.5"
      min: 0.0
      max: 10.0
      step: 0.5
      max-length: 8
    - type: dropdown
      id: view-mode-dropdown
      sprite: view-mode-dropdown-box
      label-sprite: view-mode-dropdown-label
      popup-sprite: view-mode-dropdown-popup
      popup-above: true
      x: 78
      y: 314
      w: 172
      h: 16
      selected: 0
      options:
        - { value: surface, label: Surface }
        - { value: orbit, label: Orbit }
        - { value: debug, label: Debug }
stages:
  on_enter:
    steps:
      - { effects: [{ name: fade-in, duration: 400 }] }
  on_idle:
    looping: true
    steps:
      - pause: 60ms
