# yaml-language-server: $schema=../../../schemas/scene.yaml
id: gui-playground-main
title: GUI Playground
bg: "#080810"
render-size: 640x360
layers:
  - ref: bg
  - ref: controls
  - ref: output
logic:
  kind: script
  behavior: rhai-script
  src: ./main.rhai
gui:
  widgets:
    # ── Sliders ──────────────────────────────────────────────────────────────
    - type: slider
      id: slider-r
      sprite: slider-r-track
      handle: slider-r-handle
      x: 50
      y: 48
      w: 190
      h: 16
      hit-padding: 4
      min: 0
      max: 255
      value: 128
    - type: slider
      id: slider-g
      sprite: slider-g-track
      handle: slider-g-handle
      x: 50
      y: 72
      w: 190
      h: 16
      hit-padding: 4
      min: 0
      max: 255
      value: 128
    - type: slider
      id: slider-b
      sprite: slider-b-track
      handle: slider-b-handle
      x: 50
      y: 96
      w: 190
      h: 16
      hit-padding: 4
      min: 0
      max: 255
      value: 128
    # ── Toggles ──────────────────────────────────────────────────────────────
    - type: toggle
      id: toggle-hex
      sprite: toggle-hex-label
      x: 16
      y: 140
      w: 254
      h: 16
      on: true
    - type: toggle
      id: toggle-swatch
      sprite: toggle-swatch-label
      x: 16
      y: 160
      w: 254
      h: 16
      on: true
    - type: toggle
      id: toggle-invert
      sprite: toggle-invert-label
      x: 16
      y: 180
      w: 254
      h: 16
    # ── Buttons ──────────────────────────────────────────────────────────────
    - type: button
      id: btn-reset
      sprite: btn-reset-label
      x: 16
      y: 216
      w: 125
      h: 20
    - type: button
      id: btn-randomize
      sprite: btn-randomize-label
      x: 146
      y: 216
      w: 125
      h: 20
stages:
  on_enter:
    steps:
      - { effects: [{ name: fade-in, duration: 400 }] }
  on_idle:
    looping: true
    steps:
      - pause: 60ms
