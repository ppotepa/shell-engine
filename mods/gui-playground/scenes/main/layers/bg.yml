# yaml-language-server: $schema=../../../schemas/layers.yaml
# ── Background panels ────────────────────────────────────────────────────────
- name: bg
  z_index: 0
  ui: true
  space: screen
  sprites:
    # Left column background
    - type: panel
      id: bg-left
      x: 6
      y: 6
      width: 274
      height: 348
      padding: 0
      border-width: 1
      corner-radius: 4
      fg: "#24324a"
      bg: "#0b111d"
      border-colour: "#24324a"
      shadow-x: 3
      shadow-y: 3
      shadow-colour: "#02040a"

    # Right column background
    - type: panel
      id: bg-right
      x: 286
      y: 6
      width: 348
      height: 348
      padding: 0
      border-width: 1
      corner-radius: 4
      fg: "#24324a"
      bg: "#0b111d"
      border-colour: "#24324a"
      shadow-x: 3
      shadow-y: 3
      shadow-colour: "#02040a"
