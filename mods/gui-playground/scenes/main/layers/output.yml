# yaml-language-server: $schema=../../../schemas/layers.yaml
# ── Output / feedback (right column) ─────────────────────────────────────────
- name: output
  z_index: 2
  ui: true
  space: screen
  sprites:
    # ── Color output ─────────────────────────────────────────────────────────
    - { type: text, content: "─── OUTPUT ─────────────────────────", x: 292, y: 10, font: "generic:1", fg: "#505070" }

    # Color swatch (text block chars — panels don't support dynamic color)
    - { type: text, id: swatch-0, content: "██████████████████████", x: 300, y: 28, font: "generic:1", fg: "#808080" }
    - { type: text, id: swatch-1, content: "██████████████████████", x: 300, y: 38, font: "generic:1", fg: "#808080" }
    - { type: text, id: swatch-2, content: "██████████████████████", x: 300, y: 48, font: "generic:1", fg: "#808080" }
    - { type: text, id: swatch-3, content: "██████████████████████", x: 300, y: 58, font: "generic:1", fg: "#808080" }
    - { type: text, id: swatch-4, content: "██████████████████████", x: 300, y: 68, font: "generic:1", fg: "#808080" }

    - { type: text, id: hex-readout, content: "HEX: #808080", x: 430, y: 34, font: "generic:1", fg: "#c0c0e0" }
    - { type: text, id: rgb-readout, content: "RGB: 128, 128, 128", x: 430, y: 52, font: "generic:1", fg: "#c0c0e0" }

    # ── State readout ────────────────────────────────────────────────────────
    - { type: text, content: "─── STATE ──────────────────────────", x: 292, y: 88, font: "generic:1", fg: "#505070" }

    - { type: text, id: state-hover,   content: "Hover:   ---",   x: 300, y: 106, font: "generic:1", fg: "#808090" }
    - { type: text, id: state-pressed, content: "Pressed: ---",   x: 300, y: 122, font: "generic:1", fg: "#808090" }
    - { type: text, id: state-mouse,   content: "Mouse:   0, 0",  x: 300, y: 138, font: "generic:1", fg: "#808090" }
    - { type: text, id: state-changed, content: "Changed: ---",   x: 300, y: 154, font: "generic:1", fg: "#808090" }
    - { type: text, id: state-lmb,     content: "LMB:     up",    x: 300, y: 170, font: "generic:1", fg: "#808090" }

    # ── Event log ────────────────────────────────────────────────────────────
    - { type: text, content: "─── EVENT LOG ──────────────────────", x: 292, y: 192, font: "generic:1", fg: "#505070" }

    - { type: text, id: log-0, content: "---", x: 300, y: 210, font: "generic:1", fg: "#505060" }
    - { type: text, id: log-1, content: "---", x: 300, y: 224, font: "generic:1", fg: "#505060" }
    - { type: text, id: log-2, content: "---", x: 300, y: 238, font: "generic:1", fg: "#505060" }
    - { type: text, id: log-3, content: "---", x: 300, y: 252, font: "generic:1", fg: "#505060" }
    - { type: text, id: log-4, content: "---", x: 300, y: 266, font: "generic:1", fg: "#505060" }
    - { type: text, id: log-5, content: "---", x: 300, y: 280, font: "generic:1", fg: "#505060" }
    - { type: text, id: log-6, content: "---", x: 300, y: 294, font: "generic:1", fg: "#505060" }
    - { type: text, id: log-7, content: "---", x: 300, y: 308, font: "generic:1", fg: "#505060" }
