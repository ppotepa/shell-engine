# yaml-language-server: $schema=../../../../schemas/layers.yaml
- name: controls
  z_index: 40
  ui: true
  space: screen
  sprites:
    - type: panel
      id: control-panel
      x: 680
      y: 8
      width: 264
      height: 532
      fg: "#0b1020"
      border-colour: "#1f2940"
      border-width: 1
      corner-radius: 5
      shadow-x: 3
      shadow-y: 3
      shadow-colour: "#03050a"
    - { type: text, id: panel-title, content: "LIGHTING LAB", x: 694, y: 18, font: "generic:2", fg: "#d7e7ff" }
    - { type: text, id: panel-subtitle, content: "Profile selectors + live grading + directional sun", x: 694, y: 36, font: "generic:2", fg: "#7d8eaa" }

    - { type: text, content: "MODEL", x: 694, y: 52, font: "generic:2", fg: "#55627e" }
    - type: panel
      id: lighting-model-selector-box
      x: 694
      y: 64
      width: 238
      height: 24
      padding: 2
      border-width: 1
      corner-radius: 3
      fg: "#0d1625"
      bg: "#0d1625"
      border-colour: "#48617f"
      children:
        - type: grid
          columns: ["1fr", "1fr", "1fr", "1fr"]
          rows: ["1fr"]
          gap-x: 2
          children:
            - { type: text, id: model-label-planet,  content: "PLANET",  grid-col: 1, grid-row: 1, at: cc, font: "generic:2", fg: "#dbe4f6" }
            - { type: text, id: model-label-sphere,  content: "SPHERE",  grid-col: 2, grid-row: 1, at: cc, font: "generic:2", fg: "#71819a" }
            - { type: text, id: model-label-cube,    content: "CUBE",    grid-col: 3, grid-row: 1, at: cc, font: "generic:2", fg: "#71819a" }
            - { type: text, id: model-label-suzanne, content: "SUZANNE", grid-col: 4, grid-row: 1, at: cc, font: "generic:2", fg: "#71819a" }

    - { type: text, content: "VIEW PROFILE", x: 694, y: 112, font: "generic:2", fg: "#55627e" }
    - { type: panel, id: lighting-view-dropdown-box, x: 694, y: 124, width: 238, height: 22, padding: 0, border-width: 1, corner-radius: 3, fg: "#0d1625", bg: "#0d1625", border-colour: "#48617f" }
    - { type: text, id: lighting-view-dropdown-label, content: "", x: 706, y: 129, font: "generic:2", fg: "#dbe4f6" }
    - { type: text, id: lighting-view-dropdown-arrow, content: "v", x: 918, y: 129, font: "generic:2", fg: "#8aa2c4" }
    - { type: panel, id: lighting-view-dropdown-popup, x: 694, y: 146, width: 238, height: 66, visible: false, padding: 0, border-width: 1, corner-radius: 3, fg: "#0d1625", bg: "#121c2b", border-colour: "#5a78a0", shadow-x: 3, shadow-y: 3, shadow-colour: "#02040a" }
    - { type: text, id: lighting-view-dropdown-option-0, content: "", x: 706, y: 151, visible: false, font: "generic:2", fg: "#eef5ff" }
    - { type: text, id: lighting-view-dropdown-option-1, content: "", x: 706, y: 173, visible: false, font: "generic:2", fg: "#9fb1cc" }
    - { type: text, id: lighting-view-dropdown-option-2, content: "", x: 706, y: 195, visible: false, font: "generic:2", fg: "#9fb1cc" }

    - { type: text, content: "LIGHTING PROFILE", x: 694, y: 182, font: "generic:2", fg: "#55627e" }
