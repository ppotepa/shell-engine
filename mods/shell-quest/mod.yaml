# yaml-language-server: $schema=./schemas/mod.yaml
name: Shell Quest
version: 0.1.0
entrypoint: /scenes/00-intro-logo/scene.yml
# Ask the player whether to stay in the terminal or open the SDL2 window backend.
# CLI `--output` still wins when explicitly provided.
output_backend: prompt
terminal:
  # Minimum terminal capabilities required before startup (cell units).
  # With fit/stretch policy size checks are skipped; only min_colours is enforced.
  min_colours: 256
  min_width: 320
  min_height: 180

  # Fixed authored canvas for the whole mod. Resizing/fullscreen only changes
  # presentation scale; the engine keeps rendering into this same buffer.
  # render_size: 180x30

  # Preserve aspect ratio when projecting the authored canvas to terminal/SDL.
  presentation_policy: stretch
