# yaml-language-server: $schema=../../schemas/mod.schema.yaml
name: Shell Quest
version: 0.1.0
entrypoint: /scenes/intro-logo/scene.yml
terminal:
  # Hard minimum terminal capabilities required before startup.
  # These values gate startup only; they do not scale or stretch the scene.
  min_colours: 256
  min_width: 237
  min_height: 65

  # Active runtime profile (STANDARD):
  # - scenes run in default rendered-mode "cell"
  # - intro ASCII -> raster transition is authored for this profile
  use_virtual_buffer: true

  # `max-available` makes the virtual render target follow the real terminal size.
  # With no scene override, shell-quest now fills the available terminal area while
  # still requiring at least the authored minimum size above.
  virtual_size: max-available

  # `fit` keeps aspect ratio when a scene opts into a fixed virtual size override.
  # When virtual_size resolves to the full terminal size, the viewport fills it.
  virtual_policy: fit
