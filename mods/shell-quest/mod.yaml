# yaml-language-server: $schema=./schemas/mod.yaml
name: Shell Quest
version: 0.1.0
entrypoint: /scenes/00-intro-logo/scene.yml
display:
  # Minimum display capabilities required before startup.
  # With fit/stretch policy size checks are skipped; only min_colours is enforced.
  min_colours: 256
  min_width: 320
  min_height: 180
  # Canonical font for in-world terminal text. Sprites can use
  # `font: default` to inherit this and stay centrally configurable.
  default_font: "generic:2"

  # Fixed authored virtual canvas for SDL runtime.
  # Window/fullscreen size only changes presentation scale;
  # game rendering stays in this virtual resolution.
  render_size: 320x180

  # Preserve aspect ratio when projecting the authored canvas to the SDL window.
  presentation_policy: stretch
