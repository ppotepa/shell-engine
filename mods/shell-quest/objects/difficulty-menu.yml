          - type: obj
            id: difficulty-face-4-wire
            source: "/assets/3d/sculpts/su-wire.obj"
            at: lt
            grid-col: 1
            grid-row: 1
            x: -90
            y: -5
            width: 150
            height: 100
            scale: 4.65
            backface-cull: true
            force-renderer-mode: halfblock
            pitch-deg: -8
            rotate-y-deg-per-sec: 0
            camera-distance: 6.15
            fov-degrees: 58
            near-clip: 0.0005
            light-direction-x: 0.0
            light-direction-y: 0.4
            light-direction-z: -0.9
            light-2-direction-x: 0.0
            light-2-direction-y: 0.0
            light-2-direction-z: 0.0
