# yaml-language-server: $schema=../schemas/object.yaml
kind: object
name: difficulty-menu
sprites:
  - type: grid
    id: difficulty-layout
    at: cc
    width: 180
    height: 92
    columns: ["1fr", "1fr"]
    rows: ["1fr"]
    gap-x: 4
    children:
      - type: grid
        id: difficulty-portrait-panel
        grid-col: 1
        grid-row: 1
        columns: ["1fr"]
        rows: ["1fr"]
        children:
          - type: obj
            id: difficulty-face-0-wire
            source: "/assets/3d/sculpts/mouse-enjoyer-wire.obj"
            at: 0
            grid-col: 1
            grid-row: 1
            x: -90
            y: -5
            width: 150
            height: 100
            scale: 4.65
            backface-cull: true
            force-renderer-mode: halfblock
            pitch-deg: -8
            rotate-y-deg-per-sec: 0
            camera-distance: 6.15
            fov-degrees: 58
            near-clip: 0.0005
            light-direction-x: 0.0
            light-direction-y: 0.4
            light-direction-z: -0.9
            light-2-direction-x: 0.0
            light-2-direction-y: 0.0
            light-2-direction-z: 0.0
            light-2-intensity: 0.0
            light-point-x: 0.0
            light-point-y: 0.0
            light-point-z: 0.0
            light-point-intensity: 0.0
            light-point-colour: "#224487"
            light-point-flicker-depth: 0.0
            light-point-flicker-hz: 0.0
            light-point-snap-hz: 0.0
            light-point-2-x: 0.0
            light-point-2-y: 0.0
            light-point-2-z: 0.0
            light-point-2-intensity: 0.0
            light-point-2-colour: "#224487"
            light-point-2-flicker-depth: 0.0
            light-point-2-flicker-hz: 0.0
            light-point-2-snap-hz: 0.0
            cel-levels: 3
            tone-mix: 1.0
            shadow-colour: "#000000"
            midtone-colour: "#224487"
            highlight-colour: "#ffffff"
            fg: "#224487"
            surface-mode: wireframe
            rotation-y: 270
            behaviors:
              - name: menu-selected
                params:
                  index: 0
              - name: rhai-script
                params:
                  index: 0
                  script: |
                    let idx = params.index;
                    let wire_id = `difficulty-face-${idx}-wire`;
                    let solid_id = `difficulty-face-${idx}`;
                    let sel = menu.selected_index;
                    let now = time.scene_elapsed_ms;
                    let is_first = state.type_of() != "map";
                    let was_active = if is_first { false } else { state.active };
                    let t0 = if is_first { 0 } else { state.t0 };
                    let is_active = sel == idx;
                    if is_active && was_active != true { t0 = now; }
                    if is_active {
                      let elapsed = now - t0;
                      let dur = 1200;
                      let glitch_dur = 180;
                      let frame_ms = 33;
                      if elapsed < dur {
                        // 30 FPS stop-motion feel, full 360 over 1.2s
                        let frame = elapsed / frame_ms;
                        let yaw = (frame * 10) % 360;
                        scene.set(wire_id, "obj.yaw", yaw);
                        scene.set(solid_id, "obj.yaw", yaw);

                        // Keep face towards camera at animation start, then run scanline reveal.
                        let scan = if elapsed < glitch_dur {
                          0.0
                        } else {
                          ((elapsed - glitch_dur) * 1.0) / ((dur - glitch_dur) * 1.0)
                        };
                        scene.set(wire_id, "obj.clip_y_max", 1.0 - scan);
                        scene.set(solid_id, "obj.clip_y_max", scan);

                        // Retro CRT-like blink/glow jitter during the first frames.
                        if elapsed < glitch_dur {
                          let blink = (frame % 2) == 0;
                          scene.set(wire_id, "obj.surface_mode", "wireframe");
                          scene.set(solid_id, "obj.surface_mode", if blink { "wireframe" } else { "material" });
                          scene.set(wire_id, "obj.clip_y_min", if blink { 0.0 } else { 0.02 });
                          scene.set(solid_id, "obj.clip_y_min", if blink { 0.0 } else { 0.01 });
                        } else {
                          scene.set(wire_id, "obj.surface_mode", "wireframe");
                          scene.set(solid_id, "obj.surface_mode", "material");
                          scene.set(wire_id, "obj.clip_y_min", 0.0);
                          scene.set(solid_id, "obj.clip_y_min", 0.0);
                        }
                      } else {
                        scene.set(wire_id, "obj.yaw", 0);
                        scene.set(solid_id, "obj.yaw", 0);
                        scene.set(wire_id, "obj.surface_mode", "wireframe");
                        scene.set(solid_id, "obj.surface_mode", "material");
                        scene.set(wire_id, "obj.clip_y_min", 0.0);
                        scene.set(solid_id, "obj.clip_y_min", 0.0);
                        scene.set(wire_id, "obj.clip_y_max", 0.0);
                        scene.set(solid_id, "obj.clip_y_max", 1.0);
                      }
                    }
                    #{ state: #{ active: is_active, t0: t0 } }
