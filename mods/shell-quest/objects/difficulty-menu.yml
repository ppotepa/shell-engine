# yaml-language-server: $schema=../schemas/object.yaml
#
# Difficulty menu object — 5 prerendered 3D portraits.
# All 3D scene properties (camera, lights, materials, meshes, animation clips)
# live in difficulty-portraits.scene3d.yml.  Scene3DPrerenderStep renders every
# named frame into the atlas at scene load; at runtime we just blit buffers.
#
kind: object
name: difficulty-menu
sprites:
  - type: grid
    id: difficulty-layout
    at: cc
    width: 180
    height: 92
    columns: ["1fr", "1fr"]
    rows: ["1fr"]
    gap-x: 4
    children:
      - type: grid
        id: difficulty-portrait-panel
        grid-col: 1
        grid-row: 1
        columns: ["1fr"]
        rows: ["1fr"]
        children:
          # ── face 0 (mouse-enjoyer) ──
          - type: scene3_d
            id: difficulty-portrait-0
            src: "/assets/3d/difficulty-portraits.scene3d.yml"
            frame: face-0-idle
            grid-col: 1
            grid-row: 1
            x: -90
            y: -5
            behaviors:
              - name: menu-selected
                params: { index: 0 }
              - name: portrait-materialize-s3d
                params: { index: 0, dur: 250 }

          # ── face 1 (script-kiddie) ──
          - type: scene3_d
            id: difficulty-portrait-1
            src: "/assets/3d/difficulty-portraits.scene3d.yml"
            frame: face-1-idle
            grid-col: 1
            grid-row: 1
            x: -90
            y: -5
            behaviors:
              - name: menu-selected
                params: { index: 1 }
              - name: portrait-materialize-s3d
                params: { index: 1, dur: 250 }

          # ── face 2 (can-exit-vim) ──
          - type: scene3_d
            id: difficulty-portrait-2
            src: "/assets/3d/difficulty-portraits.scene3d.yml"
            frame: face-2-idle
            grid-col: 1
            grid-row: 1
            x: -90
            y: -5
            behaviors:
              - name: menu-selected
                params: { index: 2 }
              - name: portrait-materialize-s3d
                params: { index: 2, dur: 250 }

          # ── face 3 (dvorak) ──
          - type: scene3_d
            id: difficulty-portrait-3
            src: "/assets/3d/difficulty-portraits.scene3d.yml"
            frame: face-3-idle
            grid-col: 1
            grid-row: 1
            x: -90
            y: -5
            behaviors:
              - name: menu-selected
                params: { index: 3 }
              - name: portrait-materialize-s3d
                params: { index: 3, dur: 250 }

          # ── face 4 (su) ──
          - type: scene3_d
            id: difficulty-portrait-4
            src: "/assets/3d/difficulty-portraits.scene3d.yml"
            frame: face-4-idle
            grid-col: 1
            grid-row: 1
            x: -90
            y: -5
            behaviors:
              - name: menu-selected
                params: { index: 4 }
              - name: portrait-materialize-s3d
                params: { index: 4, dur: 250 }

      - type: grid
        id: difficulty-right-panel
        grid-col: 2
        grid-row: 1
        at: cc
        width: 48
        height: 30
        columns: ["1fr"]
        rows: ["auto", "auto"]
        gap-y: 2
        children:
          - type: text
            id: difficulty-title
            content: "DIFFICULTY"
            grid-col: 1
            grid-row: 1
            at: cc
            font: "dejavusans-boldoblique:raster"
            fg: "#4488ff"

          - type: grid
            id: difficulty-grid
            grid-col: 1
            grid-row: 2
            at: cc
            width: 44
            height: 22
            columns: ["1fr"]
            rows: ["auto", "auto", "auto", "auto", "auto"]
            gap-y: 1
            children:
              - { type: text, id: menu-item-0, content: "[1] MOUSE ENJOYER", grid-col: 1, grid-row: 1, at: cc, font: "dejavusans-boldoblique-small:raster", fg: white, behaviors: [{ name: menu-highlight, params: { index: 0 } }] }
              - { type: text, id: menu-item-1, content: "[2] SCRIPT KIDDIE", grid-col: 1, grid-row: 2, at: cc, font: "dejavusans-boldoblique-small:raster", fg: silver, behaviors: [{ name: menu-highlight, params: { index: 1 } }] }
              - { type: text, id: menu-item-2, content: "[3] I CAN EXIT VIM", grid-col: 1, grid-row: 3, at: cc, font: "dejavusans-boldoblique-small:raster", fg: gray, behaviors: [{ name: menu-highlight, params: { index: 2 } }] }
              - { type: text, id: menu-item-3, content: "[4] DVORAK", grid-col: 1, grid-row: 4, at: cc, font: "dejavusans-boldoblique-small:raster", fg: silver, behaviors: [{ name: menu-highlight, params: { index: 3 } }] }
              - { type: text, id: menu-item-4, content: "[5] SU", grid-col: 1, grid-row: 5, at: cc, font: "dejavusans-boldoblique-small:raster", fg: gray, behaviors: [{ name: menu-highlight, params: { index: 4 } }] }

  - { type: text, id: sel0-left, content: ">", at: cc, font: "generic:2", fg: "#6699ff", behaviors: [{ name: selected-arrows, params: { target: menu-item-0, index: 0, side: left, padding: 1, amplitude_x: 1, period_ms: 900, autoscale_height: true } }] }
  - { type: text, id: sel0-right, content: "<", at: cc, font: "generic:2", fg: "#6699ff", behaviors: [{ name: selected-arrows, params: { target: menu-item-0, index: 0, side: right, padding: 1, amplitude_x: 1, period_ms: 900, autoscale_height: true } }] }
  - { type: text, id: sel1-left, content: ">", at: cc, font: "generic:2", fg: "#6699ff", behaviors: [{ name: selected-arrows, params: { target: menu-item-1, index: 1, side: left, padding: 1, amplitude_x: 1, period_ms: 900, autoscale_height: true } }] }
  - { type: text, id: sel1-right, content: "<", at: cc, font: "generic:2", fg: "#6699ff", behaviors: [{ name: selected-arrows, params: { target: menu-item-1, index: 1, side: right, padding: 1, amplitude_x: 1, period_ms: 900, autoscale_height: true } }] }
  - { type: text, id: sel2-left, content: ">", at: cc, font: "generic:2", fg: "#6699ff", behaviors: [{ name: selected-arrows, params: { target: menu-item-2, index: 2, side: left, padding: 1, amplitude_x: 1, period_ms: 900, autoscale_height: true } }] }
  - { type: text, id: sel2-right, content: "<", at: cc, font: "generic:2", fg: "#6699ff", behaviors: [{ name: selected-arrows, params: { target: menu-item-2, index: 2, side: right, padding: 1, amplitude_x: 1, period_ms: 900, autoscale_height: true } }] }
  - { type: text, id: sel3-left, content: ">", at: cc, font: "generic:2", fg: "#6699ff", behaviors: [{ name: selected-arrows, params: { target: menu-item-3, index: 3, side: left, padding: 1, amplitude_x: 1, period_ms: 900, autoscale_height: true } }] }
  - { type: text, id: sel3-right, content: "<", at: cc, font: "generic:2", fg: "#6699ff", behaviors: [{ name: selected-arrows, params: { target: menu-item-3, index: 3, side: right, padding: 1, amplitude_x: 1, period_ms: 900, autoscale_height: true } }] }
  - { type: text, id: sel4-left, content: ">", at: cc, font: "generic:2", fg: "#6699ff", behaviors: [{ name: selected-arrows, params: { target: menu-item-4, index: 4, side: left, padding: 1, amplitude_x: 1, period_ms: 900, autoscale_height: true } }] }
  - { type: text, id: sel4-right, content: "<", at: cc, font: "generic:2", fg: "#6699ff", behaviors: [{ name: selected-arrows, params: { target: menu-item-4, index: 4, side: right, padding: 1, amplitude_x: 1, period_ms: 900, autoscale_height: true } }] }
