# yaml-language-server: $schema=../schemas/object.yaml
kind: object
name: prologue-monitor
exports:
  base: boot-monitor
  y: -1
  width: 48
  height: 18
layers:
  - name: "$base-screen"
    z_index: 0
    visible: true
    sprites:
      - type: image
        id: "$base-screen"
        source: /assets/images/prologue/monitor-screen-off.png
        at: cc
        y: "$y"
        width: "$width"
        height: "$height"
  - name: "$base-frame"
    z_index: 2
    visible: true
    sprites:
      - type: image
        id: "$base-frame"
        source: /assets/images/prologue/monitor-frame.png
        at: cc
        y: "$y"
        width: "$width"
        height: "$height"
