kind: behavior
name: portrait-materialize-s3d
# Scene3D variant of portrait-materialize.
# Drives a Sprite::Scene3D by setting scene3d.frame to prerendered keyframe names.
# Expected sprite id: difficulty-portrait-{index}
# Expected frames in atlas: face-{N}-idle, face-{N}-materialize-{0..7}, face-{N}-done
script: |
  let idx = params.index;
  let portrait_id = `difficulty-portrait-${idx}`;
  let sel = menu.selected_index;
  let now = time.scene_elapsed_ms;
  let is_first = state.type_of() != "map";
  let was_active = if is_first { false } else { state.active };
  let t0 = if is_first { now } else { state.t0 };
  let is_active = sel == idx;
  if is_active && !was_active { t0 = now; }

  let dur = if params.type_of() == "map" && params.keys().contains("dur") { params.dur } else { 250 };
  let n_kf = 8;

  // ── on_leave: hold done frame (camera-face pose happens on the on_leave
  //   clip entry in the scene3d.yml if desired; otherwise hold done). ──────
  if time.stage == "on_leave" {
    if is_active {
      scene.set(portrait_id, "scene3d.frame", `face-${idx}-done`);
    }
    return #{ state: #{ active: is_active, t0: t0 } };
  }

  // ── on_idle ───────────────────────────────────────────────────────────────
  if is_active {
    let elapsed = now - t0;
    if elapsed < dur {
      let kf = (elapsed * n_kf) / dur;
      if kf >= n_kf { kf = n_kf - 1; }
      scene.set(portrait_id, "scene3d.frame", `face-${idx}-materialize-${kf}`);
    } else {
      scene.set(portrait_id, "scene3d.frame", `face-${idx}-done`);
    }
  } else {
    scene.set(portrait_id, "scene3d.frame", `face-${idx}-idle`);
    if !is_active { t0 = now; }
  }

  #{ state: #{ active: is_active, t0: t0 } }
