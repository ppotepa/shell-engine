# yaml-language-server: $schema=../../../../../schemas/scene.schema.yaml
id: intro.font-demo
title: Intro Font Demo (1/2)
cutscene: true
bg_colour: black
stages:
  on_enter:
    steps:
      - effects:
          - name: fade-in
            duration: 400
            params:
              easing: ease-in
  on_idle:
    trigger: any-key
    steps:
      - duration: 30000
        effects: []
  on_leave:
    steps:
      - effects:
          - name: artifact-out
            duration: 800
layers:
  - name: font-demo
    z_index: 0
    visible: true
    sprites:
      - type: text
        id: demo-title
        content: "FONT DEMO 1/2 - CORE FONTS"
        align_x: center
        align_y: top
        y: 1
        fg_colour: white

      - type: text
        id: demo-native-label
        content: "native terminal (font: null)"
        x: 4
        y: 4
        fg_colour: gray
        appear_at_ms: 300
      - type: text
        id: demo-native
        content: "SHELL QUEST 1991 > ftp ftp.funet.fi"
        x: 4
        y: 5
        fg_colour: white
        appear_at_ms: 300

      - type: text
        id: demo-generic1-label
        content: "generic:1 (tiny 3x5)"
        x: 4
        y: 9
        fg_colour: gray
        appear_at_ms: 900
      - type: text
        id: demo-generic1
        content: "SHELL QUEST 1991"
        x: 4
        y: 10
        font: "generic:1"
        fg_colour: white
        appear_at_ms: 900

      - type: text
        id: demo-generic2-label
        content: "generic:2 (standard 5x7)"
        x: 4
        y: 16
        fg_colour: gray
        appear_at_ms: 1500
      - type: text
        id: demo-generic2
        content: "SHELL QUEST"
        x: 4
        y: 17
        font: "generic:2"
        fg_colour: white
        appear_at_ms: 1500

      - type: text
        id: demo-abril-raster-label
        content: "Abril Fatface (raster)"
        x: 4
        y: 25
        fg_colour: gray
        appear_at_ms: 2100
      - type: text
        id: demo-abril-raster
        content: "SHELL QUEST"
        x: 4
        y: 26
        font: "Abril Fatface"
        fg_colour: white
        appear_at_ms: 2100

      - type: text
        id: demo-abril-ascii-label
        content: "Abril Fatface:ascii"
        x: 4
        y: 33
        fg_colour: gray
        appear_at_ms: 2700
      - type: text
        id: demo-abril-ascii
        content: "SHELL QUEST"
        x: 4
        y: 34
        font: "Abril Fatface:ascii"
        fg_colour: white
        appear_at_ms: 2700

      - type: text
        id: demo-continue
        content: "[#808080]PRESS ANY KEY - PAGE 2[/]"
        align_x: center
        align_y: bottom
        font: "generic:1"
        fg_colour: white
        appear_at_ms: 3400
        hide_on_leave: true
        animations:
          - name: float
            looping: true
            params:
              axis: y
              amplitude: 1
              period_ms: 1800
              easing: ease-in-out
next: intro.font-demo-2
