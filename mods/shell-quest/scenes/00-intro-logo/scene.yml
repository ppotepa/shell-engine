# yaml-language-server: $schema=../../schemas/scenes.yaml
# Authored YAML v2 example: package root keeps scene orchestration only.
# Opening scene of the main mod.
# Flow:
# - on_enter keeps the screen dark, powers the CRT on, then adds staged lightning beats
# - on_idle loops a gentle title shine until the player presses any key
# - on_leave fires a flash + whiteout and hands control to `01.intro.date`
id: 00.intro.logo
title: 00 Intro Logo
cutscene: true
# The mod owns a fixed intro canvas globally, so this scene no longer overrides
# render size locally.
bg: black
layers:
  - ref: main
stages:
  on_enter:
    steps:
      - pause: 200ms
      - {
          duration: 400,
          effects:
            [{ name: crt-on, duration: 400, params: { easing: ease-out } }],
        }
      # Keep enter duration slightly longer than prompt appear_at_ms=2000
      # so the prompt is actually visible before on_idle begins.
      - pause: 1450ms

  on_idle:
    trigger: any-key
    looping: true
    steps:
      - pause: 1800ms
      - {
          effects:
            [
              {
                name: shine,
                duration: 1000,
                params:
                  {
                    angle: 20,
                    width: 4,
                    falloff: 2.5,
                    intensity: 2.0,
                    colour: white,
                    easing: ease-in,
                  },
              },
            ],
        }
  on_leave:
    steps:
      - pause: 900ms
      - {
          effects:
            [
              {
                name: lightning-flash,
                duration: 180,
                params: { intensity: 1.9 },
              },
              { name: whiteout, duration: 180 },
            ],
        }
      - { effects: [{ name: fade-to-black, duration: 420 }] }
next: 01.intro.date
