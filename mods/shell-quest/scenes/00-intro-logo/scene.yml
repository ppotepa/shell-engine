# yaml-language-server: $schema=../../schemas/scenes.yaml
# Authored YAML v2 example: package root keeps scene orchestration only.
# Opening scene of the main mod.
# Flow:
# - on_enter keeps the screen dark, powers the CRT on, then adds staged lightning beats
# - on_idle loops a gentle title shine until the player presses any key
# - on_leave fires a flash + whiteout and hands control to `01.intro.date`
id: 00.intro.logo
title: 00 Intro Logo
cutscene: true
bg: black
layers:
  - ref: main
# Inherit mod-level `virtual_size: max-available` so the intro fills the terminal.
stages:
  on_enter:
    steps:
      - pause: 200ms
      - {
          duration: 400,
          effects:
            [{ name: crt-on, duration: 400, params: { easing: ease-out } }],
        }
      # Align enter duration with prompt visibility (appear_at_ms: 2000) so the first key press works immediately.
      - pause: 1400ms

  on_idle:
    trigger: any-key
    looping: true
    steps:
      - pause: 1800ms
      - {
          effects:
            [
              {
                name: shine,
                duration: 1000,
                params:
                  {
                    angle: 20,
                    width: 4,
                    falloff: 2.5,
                    intensity: 2.0,
                    colour: white,
                    easing: ease-in,
                  },
              },
            ],
        }
  on_leave:
    steps:
      - pause: 900ms
      - {
          effects:
            [
              {
                name: lightning-flash,
                duration: 180,
                params: { intensity: 1.9 },
              },
              { name: whiteout, duration: 180 },
            ],
        }
      - { effects: [{ name: fade-to-black, duration: 420 }] }
next: 01.intro.date
