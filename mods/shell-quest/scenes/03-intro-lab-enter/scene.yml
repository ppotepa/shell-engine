# yaml-language-server: $schema=../../schemas/scenes.yaml
id: intro-lab-enter
title: Intro Lab Enter
cutscene: true
bg: black
layers:
  - ref: main
stages:
  on_enter:
    steps:
      - { effects: [{ name: fade-in, duration: 220, params: { easing: ease-out } }] }
      - { pause: 1600ms }
      - { effects: [{ name: fade-out, duration: 260, params: { easing: ease-in } }] }
  on_idle:
    trigger: timeout
    steps: [{ pause: 1ms }]
  on_leave:
    steps: [{ pause: 80ms }]
next: intro-cpu-on
