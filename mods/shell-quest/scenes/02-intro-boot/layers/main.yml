# yaml-language-server: $schema=../../../schemas/layers.yaml
- name: boot-layout
  z_index: 0
  visible: true
  # For now this beat is driven as an engine-native GIF player rendered through the normal image pixel buffer path.
  sprites:
    - type: image
      id: intro-linus-cutscene
      source: /assets/images/intro/cutscene.gif
      at: cc
      stretch-to-area: true
      disappear_at_ms: 10750
      force-renderer-mode: cell
