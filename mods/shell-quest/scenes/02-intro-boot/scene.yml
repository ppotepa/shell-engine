# yaml-language-server: $schema=../../schemas/scenes.yaml
# Authored YAML v2 package root keeps scene orchestration only.
# Intro beat 02: the Linus cutscene arrives through the monitor buffer.
# Flow:
# - on_enter fades the composition in, keeps scanlines alive while the GIF playback runs,
#   then fades the whole scene back down
# - on_idle uses timeout so the cutscene can keep moving into the main menu
id: 02.intro.boot
title: 02 Intro Boot
cutscene: true
bg: black
layers:
  - ref: main
# Inherit mod-level `virtual_size: max-available` so the boot frame uses the full terminal.
stages:
  on_enter:
    steps:
      - { duration: 220, effects: [{ name: fade-in, duration: 220, params: { easing: ease-out } }] }
      - { duration: 10110, effects: [{ name: scanlines, duration: 10110 }] }
      - { duration: 420, effects: [{ name: fade-out, duration: 420, params: { easing: ease-in } }] }
  on_idle:
    trigger: timeout
    steps: [{ pause: 1ms }]
  on_leave:
    steps: [{ pause: 120ms }]
next: mainmenu
