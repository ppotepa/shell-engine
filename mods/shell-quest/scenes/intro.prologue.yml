# yaml-language-server: $schema=../../../../../schemas/scene.schema.yaml
# Authored YAML v2 example: prefer `bg`, `fg`, `at`, and `pause` shorthands where the current compiler supports them.
id: intro.prologue
title: Intro Prologue - Date Reveal
cutscene: true
bg: black
virtual-size-override: "320x240"

stages:
  on_enter:
    steps:
      - pause: 3000ms

      - duration: 900
        effects:
          - name: fade-in
            duration: 900
            params:
              easing: ease-out

      - duration: 2200
        effects:
          - name: scanlines
            duration: 2200

      - duration: 900
        effects:
          - name: fade-out
            duration: 900
            params:
              easing: ease-in

  on_idle:
    trigger: none
    steps:
      - pause: 1ms

  on_leave:
    steps:
      - pause: 300ms

layers:
  - name: date
    z_index: 2
    visible: true
    sprites:
      - type: text
        id: date-text
        content: "September 17, 1991"
        at: cc
        siz
        e: 20
        font: "Abril Fatface:raster"
        fg: white
        bg: black
        glow:
          colour: "#5f7cff"
          radius: 1
        appear_at_ms: 3000
        disappear_at_ms: 7300
        stages:
          on_enter:
            steps:
              - pause: 900ms
              - effects:
                  - name: brighten
                    duration: 260
                    params:
                      intensity: 0.22
              - effects:
                  - name: shine
                    duration: 720
                    params:
                      angle: 0
                      width: 2
                      falloff: 2.2
                      intensity: 0.7
          on_idle:
            looping: true
            steps:
              - pause: 220ms
              - effects:
                  - name: brighten
                    duration: 100
                    params:
                      intensity: 0.12
              - pause: 260ms

next: mainmenu
