# yaml-language-server: $schema=../../../../../schemas/scene.schema.yaml
id: intro.prologue
title: Intro Prologue - Date Reveal
cutscene: true
bg_colour: black
virtual-size-override: "320x240"

stages:
  on_enter:
    steps:
      - duration: 900
        effects:
          - name: fade-in
            duration: 900
            params:
              easing: ease-out

      - duration: 2200
        effects:
          - name: scanlines
            duration: 2200

      - duration: 900
        effects:
          - name: fade-out
            duration: 900
            params:
              easing: ease-in

  on_idle:
    trigger: none
    steps:
      - duration: 1
        effects: []

  on_leave:
    steps:
      - duration: 300
        effects: []

layers:
  - name: date
    z_index: 2
    visible: true
    sprites:
      - type: text
        id: date-text
        content: "September 17, 1991"
        align_x: center
        align_y: center
        font: "Abril Fatface:raster"
        fg_colour: white
        bg_colour: black
        glow:
          colour: "#5f7cff"
          radius: 1
        appear_at_ms: 0
        disappear_at_ms: 4300
        stages:
          on_enter:
            steps:
              - duration: 900
                effects: []
              - effects:
                  - name: brighten
                    duration: 260
                    params:
                      intensity: 0.22
              - effects:
                  - name: shine
                    duration: 720
                    params:
                      angle: 0
                      width: 2
                      falloff: 2.2
                      intensity: 0.7
          on_idle:
            looping: true
            steps:
              - duration: 220
                effects: []
              - effects:
                  - name: brighten
                    duration: 100
                    params:
                      intensity: 0.12
              - duration: 260
                effects: []

next: mainmenu
