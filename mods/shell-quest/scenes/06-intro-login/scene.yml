# yaml-language-server: $schema=../../schemas/scenes.yaml
id: 06.intro.login
title: 06 Intro Login
cutscene: false
bg: black
ui:
  enabled: true
  persist: scene
  focus-order:
    - login-prompt
layers:
  - ref: main
postfx:
  - name: crt-underlay
    params:
      intensity: 1.15
      alpha: 0.30
      sphericality: 0.18
      transparency: 0.52
      brightness: 1.18
      speed: 0.45
  - name: crt-distort
    params:
      intensity: 0.18
      distortion: 0.10
      sphericality: 0.18
      transparency: 0.18
      brightness: 1.00
      speed: 0.30
  - name: crt-scan-glitch
    params:
      intensity: 0.22
      transparency: 0.24
      brightness: 1.00
      speed: 0.75
  - name: crt-ruby
    params:
      intensity: 0.20
      transparency: 0.20
      brightness: 0.98
      speed: 0.55
input:
  terminal-shell:
    mode: sidecar
    boot-scene: true
    sidecar:
      command: dotnet
      args:
        - run
        - -c
        - Release
        - --project
        - os/cognitos-os
    prompt_sprite_id: login-prompt
    output_sprite_id: login-output
    prompt_prefix: ""
    prompt_wrap: false
    prompt_auto_grow: false
    prompt_min_lines: 1
    prompt_max_lines: 1
    max_lines: 24
    unknown_message: ""
stages:
  on_enter:
    steps:
      - { pause: 80ms }
  on_idle:
    trigger: timeout
    steps: [{ pause: 3600000ms }]
  on_leave:
    steps: [{ pause: 80ms }]
next: mainmenu
