# yaml-language-server: $schema=../../../../../schemas/scene.schema.yaml
id: intro.logo
title: Intro Logo
cutscene: true
bg_colour: black
virtual-size-override: "320x240"
stages:
  on_enter:
    steps:
      - duration: 3000
        effects: []
      - duration: 720
        effects:
          - name: crt-on
            duration: 720
            params:
              easing: ease-out
      - duration: 420
        effects: []
      - duration: 280
        effects: []
      - duration: 60
        effects: []
      - duration: 70
        effects: []
      - duration: 50
        effects: []
      - duration: 70
        effects: []
      - duration: 50
        effects: []
  on_idle:
    trigger: any-key
    looping: true
    steps:
      - duration: 1800
        effects: []
      - effects:
          - name: shine
            duration: 1000
            params:
              angle: 20
              width: 4
              falloff: 2.5
              intensity: 2.0
              colour: white
              easing: ease-in
  on_leave:
    steps:
      - duration: 500
        effects: []
      - duration: 2800
        effects: []
      - effects:
          - name: artifact-out
            duration: 1400
layers:
  - name: lightning-bg
    z_index: -1
    visible: true
    stages:
      on_enter:
        steps:
          - duration: 3000
            effects: []
          - duration: 720
            effects: []
          - duration: 420
            effects:
              - name: lightning-branch
                duration: 420
                params:
                  orientation: horizontal
                  strikes: 2
                  thickness: 1.5
                  glow: true
              - name: lightning-fbm
                duration: 420
                params:
                  orientation: horizontal
                  colour: "#84a7ff"
                  intensity: 0.95
                  octave_count: 10
                  amp_start: 0.5
                  amp_coeff: 0.5
                  freq_coeff: 2.0
                  speed: 0.6
              - name: brighten
                duration: 420
                params:
                  intensity: 0.24
          - duration: 280
            effects:
              - name: lightning-branch
                duration: 280
                params:
                  orientation: horizontal
                  strikes: 1
                  thickness: 1.1
                  glow: true
              - name: lightning-fbm
                duration: 280
                params:
                  orientation: horizontal
                  colour: "#6289ff"
                  intensity: 0.42
                  octave_count: 8
                  amp_start: 0.46
                  amp_coeff: 0.5
                  freq_coeff: 2.0
                  speed: 0.55
          - duration: 60
            effects:
              - name: lightning-branch
                duration: 60
                params:
                  orientation: horizontal
                  strikes: 1
                  thickness: 1.0
                  glow: false
          - duration: 70
            effects: []
          - duration: 50
            effects:
              - name: lightning-branch
                duration: 50
                params:
                  orientation: horizontal
                  strikes: 1
                  thickness: 1.0
                  glow: false
          - duration: 70
            effects: []
          - duration: 50
            effects:
              - name: lightning-branch
                duration: 50
                params:
                  orientation: horizontal
                  strikes: 1
                  thickness: 1.0
                  glow: false
      on_idle:
        looping: true
        steps:
          - duration: 7200
            effects:
              - name: lightning-ambient
                duration: 7200
                params:
                  orientation: horizontal
                  colour: "#84a7ff"
                  intensity: 0.48
                  thickness: 0.9
                  glow: true
                  octave_count: 6
                  amp_start: 0.40
                  amp_coeff: 0.5
                  freq_coeff: 2.0
                  speed: 0.52
    sprites: []
  - name: title
    z_index: 1
    visible: true
    sprites:
      - type: text
        id: intro-logo-ascii
        content: "SHELL QUEST I"
        align_x: center
        align_y: center
        font: "Abril Fatface:ascii"
        fg_colour: white
        appear_at_ms: 0
        disappear_at_ms: 3720
        stages:
          on_enter:
            steps:
              - effects:
                  - name: fade-in
                    duration: 3000
                    params:
                      easing: ease-in

      - type: text
        id: intro-logo-raster
        content: "SHELL QUEST I"
        align_x: center
        align_y: center
        font: "Abril Fatface:raster"
        fg_colour: gray
        appear_at_ms: 3720
        stages:
          on_enter:
            steps:
              - duration: 180
                effects:
                  - name: brighten
                    duration: 180
                    params:
                      intensity: 0.28
              - effects:
                  - name: shine
                    duration: 520
                    params:
                      angle: 0
                      width: 3
                      falloff: 2.4
                      intensity: 0.8
                      colour: white
                      easing: ease-out
          on_idle:
            looping: true
            steps:
              - duration: 1800
                effects: []
              - effects:
                  - name: shine
                    duration: 1000
                    params:
                      angle: 20
                      width: 4
                      falloff: 2.5
                      intensity: 2.0
                      colour: white
                      easing: ease-in
          on_leave:
            steps:
              - effects:
                  - name: brighten
                    duration: 500
                    params:
                      intensity: 0.10
                      easing: ease-out
                  - name: shine
                    duration: 500
                    params:
                      angle: 20
                      width: 2
                      falloff: 3.0
                      intensity: 1.0
                      colour: white
                      easing: ease-in
              - effects:
                  - name: shatter-glitch
                    duration: 2800

      - type: text
        id: press-any-key
        content: "[#808080]PRESS[/] ANY [#808080]KEY[/]"
        align_x: center
        align_y: center
        y: 12
        font: "generic:1"
        fg_colour: white
        glow:
          radius: 1
        hide_on_leave: true
        appear_at_ms: 8500
        animations:
          - name: float
            looping: true
            params:
              axis: y
              amplitude: 1
              period_ms: 2000
              easing: ease-in-out
next: intro.prologue
