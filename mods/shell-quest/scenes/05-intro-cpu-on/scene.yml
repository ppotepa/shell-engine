# yaml-language-server: $schema=../../schemas/scenes.yaml
id: intro-cpu-on
title: Intro CPU On
cutscene: true
bg: black
layers:
  - ref: main
postfx:
  - name: crt-underlay
    params:
      intensity: 2.30
      alpha: 0.30
      sphericality: 0.22
      transparency: 0.58
      brightness: 1.25
      speed: 0.48
  - name: crt-distort
    params:
      intensity: 0.20
      distortion: 0.10
      sphericality: 0.20
      transparency: 0.20
      brightness: 1.00
      speed: 0.32
  - name: crt-scan-glitch
    params:
      intensity: 0.28
      transparency: 0.28
      brightness: 1.00
      speed: 0.85
  - name: crt-ruby
    params:
      intensity: 0.24
      transparency: 0.22
      brightness: 0.98
      speed: 0.60
logic:
  kind: script
  behavior: rhai-script
  src: ./scene.rhai
input:
  terminal-shell:
    mode: sidecar
    sidecar:
      command: dotnet
      args:
        - run
        - -c
        - Release
        - --project
        - os/cognitos-os
    prompt_sprite_id: boot-hidden-prompt
    output_sprite_id: boot-output
    prompt_prefix: ""
    prompt_wrap: false
    prompt_auto_grow: false
    prompt_min_lines: 1
    prompt_max_lines: 1
    max_lines: 14
    unknown_message: ""
audio:
  on_enter:
    - { at_ms: 4300, cue: beep, volume: 0.9 }
stages:
  on_enter:
    steps:
      - { pause: 9500ms }
  on_idle:
    trigger: timeout
    steps: [{ pause: 1ms }]
  on_leave:
    steps: [{ pause: 80ms }]
next: intro-login
