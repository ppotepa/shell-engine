# yaml-language-server: $schema=../../../schemas/layers.yaml
- name: boot-sequence
  z_index: 0
  visible: true
  sprites:
    - type: image
      id: vga-logo
      source: /assets/images/vga.png
      at: cc
      stretch-to-area: true
      force-renderer-mode: cell
      appear_at_ms: 400
      disappear_at_ms: 2900

    - type: text
      id: vga-screen
      content: |-
        VGA BIOS Version 2.40
        Copyright 1987-1991 VGA Technologies
      at: lt
      x: 2
      y: 1
      font: "generic:half"
      fg: gray
      appear_at_ms: 400
      disappear_at_ms: 2900

    - type: image
      id: tuxbios-screen
      source: /assets/images/tuxbios_2.png
      at: rt
      x: -30
      y: 0
      width: 100
      height: 92
      force-renderer-mode: cell
      appear_at_ms: 3000
      disappear_at_ms: 6200

    - type: text
      id: bios-block
      content: " "
      at: lt
      x: 2
      y: 1
      font: "generic:half"
      fg: "#A3A3A3"
      appear_at_ms: 3000
      disappear_at_ms: 17000

    - type: text
      id: bios-footer
      content: "[gray]Press [white]DEL[/] [gray]to enter SETUP  |  Press [white]F1[/] [gray]to continue[/]"
      at: cb
      x: 0
      y: -1
      font: "generic:half"
      fg: gray
      appear_at_ms: 3000
      disappear_at_ms: 6200
  objects:
    - ref: terminal-monitor
      with:
        output_id: boot-output
        prompt_id: boot-hidden-prompt
        x: 2
        output_y: 1
        prompt_y: 2
        fg: "#A3A3A3"
        output_appear_at_ms: 8200
        prompt_appear_at_ms: 0
