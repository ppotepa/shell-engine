# yaml-language-server: $schema=../../schemas/scenes.yaml
id: 04.intro.difficulty-select
title: 04 Intro Difficulty Select
bg: black
prerender: true
layers:
  - ref: main
stages:
  on_enter:
    steps:
      - { effects: [{ name: fade-in, duration: 280, params: { easing: ease-out } }] }
  on_idle:
    trigger: any-key
    looping: true
    steps:
      - pause: 1800ms
        effects:
          - name: neon-edge-glow
            duration: 1800
            params:
              colour: "#00ccff"
              intensity: 0.5
              alpha: 0.35
              speed: 1.0
      - effects:
          - name: neon-edge-glow
            duration: 800
            params:
              colour: "#00ccff"
              intensity: 0.6
              alpha: 0.4
              speed: 1.5
          - name: shine
            duration: 800
            params:
              angle: 20
              width: 6
              falloff: 1.5
              intensity: 1.0
              colour: "#ccddff"
              easing: ease-in
  on_leave:
    steps:
      - effects:
          - name: neon-edge-glow
            duration: 500
            params:
              colour: "#00ccff"
              intensity: 1.4
              alpha: 0.7
              speed: 3.0
      - { effects: [{ name: fade-out, duration: 220, params: { easing: ease-in } }] }
next: 05.intro.cpu-on
menu-options:
  - { key: "1", label: "MOUSE ENJOYER", to: 05.intro.cpu-on }
  - { key: "2", label: "SCRIPT KIDDIE", to: 05.intro.cpu-on }
  - { key: "3", label: "I CAN EXIT VIM", to: 05.intro.cpu-on }
  - { key: "4", label: "DVORAK", to: 05.intro.cpu-on }
  - { key: "5", label: "SU", to: 05.intro.cpu-on }
