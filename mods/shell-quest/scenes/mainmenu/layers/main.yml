# yaml-language-server: $schema=../../../schemas/layers.yaml
- name: penguin-menu
  z_index: 0
  # Main menu placeholder with three penguins.
  sprites:
    - { type: text, content: "SHELL QUEST I - MAIN MENU", at: ct, y: 1, font: "generic:1", fg: white }
    - { type: text, content: "THREE PENGUINS PLACEHOLDER", at: ct, y: 7, font: "generic:half", fg: gray }

    - type: grid
      id: penguin-grid
      at: cc
      y: 2
      width: 96
      height: 30
      columns: ["1fr", "1fr", "1fr"]
      rows: ["auto", "1fr"]
      gap-x: 2
      gap-y: 1
      children:
        - { type: text, content: "penguin-1", grid-col: 1, grid-row: 1, at: cc, font: "generic:half", fg: gray }
        - { type: image, source: "/assets/images/tux.png", grid-col: 1, grid-row: 2, at: cc, width: 22, height: 22, force-renderer-mode: cell }
        - { type: text, content: "penguin-2", grid-col: 2, grid-row: 1, at: cc, font: "generic:half", fg: gray }
        - { type: image, source: "/assets/images/tux.png", grid-col: 2, grid-row: 2, at: cc, width: 22, height: 22, force-renderer-mode: halfblock }
        - { type: text, content: "penguin-3", grid-col: 3, grid-row: 1, at: cc, font: "generic:half", fg: gray }
        - { type: image, source: "/assets/images/tux.png", grid-col: 3, grid-row: 2, at: cc, width: 22, height: 22, force-renderer-mode: braille }

    - { type: text, content: "[#808080]PRESS ANY KEY TO EXIT[/]", at: cb, y: -1, font: "generic:half", fg: white, hide_on_leave: true, animations: [{ name: float, looping: true, params: { axis: y, amplitude: 1, period_ms: 1800, easing: ease-in-out } }] }
