# yaml-language-server: $schema=../../../schemas/layers.yaml
- name: penguin-menu
  z_index: 0
  # Main menu text-only variant: three cards shown one after another.
  sprites:
    - type: text
      id: menu-status-no-money
      content: "NO MONEY"
      at: cc
      font: "Abril Fatface:raster"
      fg: gray
      appear_at_ms: 0
      disappear_at_ms: 2400
      stages:
        on_enter:
          steps:
            - { effects: [{ name: fade-in, duration: 350, params: { easing: ease-out } }] }
            - pause: 1600ms
            - { effects: [{ name: fade-out, duration: 450, params: { easing: ease-in } }] }

    - type: text
      id: menu-status-broke
      content: "BROKE"
      at: cc
      font: "Abril Fatface:raster"
      fg: gray
      appear_at_ms: 2500
      disappear_at_ms: 4900
      stages:
        on_enter:
          steps:
            - { effects: [{ name: fade-in, duration: 350, params: { easing: ease-out } }] }
            - pause: 1600ms
            - { effects: [{ name: fade-out, duration: 450, params: { easing: ease-in } }] }

    - type: text
      id: menu-status-indebt
      content: "INDEBT"
      at: cc
      font: "Abril Fatface:raster"
      fg: gray
      appear_at_ms: 5000
      disappear_at_ms: 7400
      stages:
        on_enter:
          steps:
            - { effects: [{ name: fade-in, duration: 350, params: { easing: ease-out } }] }
            - pause: 1600ms
            - { effects: [{ name: fade-out, duration: 450, params: { easing: ease-in } }] }
