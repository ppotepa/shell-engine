# yaml-language-server: $schema=../../schemas/scenes.yaml
# Authored YAML v2 example: package root keeps scene orchestration only.
# Main mod landing scene after the intro.
# This package is the compact reference for:
# - a simple scene-level fade in/out
# - grid-based layout
# - image sprites rendered with different terminal packing modes
id: mainmenu
title: Main Menu
bg: black
effect-presets-ref: /effects/crt.yml
postfx:
  - { use: fx.sq.burn }
  - { use: fx.sq.glow }
  - { use: fx.sq.curve }
  - { use: fx.sq.scan }
  - { use: fx.sq.tone }
layers:
  - ref: main
# Inherit mod-level `virtual_size: max-available` so the menu fills the terminal.
stages:
  on_enter:
    steps:
      - { effects: [{ name: fade-in, duration: 800, params: { easing: ease-in } }] }
  on_idle:
    trigger: any-key
    steps: []
  on_leave:
    steps:
      - { effects: [{ name: fade-out, duration: 400 }] }
next: null
