# yaml-language-server: $schema=../../schemas/scenes.yaml
# Authored YAML v2 package root keeps scene orchestration only.
# Intro beat 01: history strikes first.
# Flow:
# - on_enter waits, reveals the date card, adds scanlines, then fades it back out
# - on_idle uses timeout so the scene can continue automatically into the boot beat
# - after the short leave pause, the flow continues into `02.intro.boot`
id: 01.intro.date
title: 01 Intro Date
cutscene: true
bg: black
# Inherit mod-level `virtual_size: max-available` so the date card fills the terminal.
stages:
  on_enter:
    steps:
      - pause: 3000ms
      - duration: 900
        effects:
          - name: fade-in
            duration: 900
            params:
              easing: ease-out
      - duration: 2200
        effects:
          - name: scanlines
            duration: 2200
      - duration: 900
        effects:
          - name: fade-out
            duration: 900
            params:
              easing: ease-in
  on_idle:
    trigger: timeout
    steps:
      - pause: 1ms
  on_leave:
    steps:
      - pause: 300ms
next: 02.intro.boot
