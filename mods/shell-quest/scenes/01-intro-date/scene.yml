# yaml-language-server: $schema=../../schemas/scenes.yaml
# Authored YAML v2 package root keeps scene orchestration only.
# Intro beat 01: history strikes first.
# Flow:
# - on_enter keeps a subtle scanline pass while sprite-local timing runs:
#   date fades in/out first, then Helsinki fades in/out
# - on_idle/on_leave keep the frame black while transitioning into the boot beat
id: 01.intro.date
title: 01 Intro Date
cutscene: true
bg: black
layers:
  - ref: main
# Inherit mod-level `virtual_size: max-available` so the date card fills the terminal.
stages:
  on_enter:
    steps:
      - { duration: 8600, effects: [{ name: scanlines, duration: 8600 }] }
  on_idle:
    trigger: timeout
    steps:
      - { duration: 1, effects: [{ name: clear-to-colour, duration: 1, params: { colour: black } }] }
  on_leave:
    steps:
      - { duration: 180, effects: [{ name: clear-to-colour, duration: 180, params: { colour: black } }] }
next: 02.intro.boot
