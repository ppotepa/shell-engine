# yaml-language-server: $schema=../../../schemas/layers.yaml
- name: date
  z_index: 2
  visible: true
  # Date/location cards crossfade before the intro transitions into the boot beat.
  sprites:
    - type: text
      id: date-text
      content: "September 17, 1991"
      at: cc
      font: "Abril Fatface:raster"
      fg: white
      bg: black
      glow: { colour: "#5f7cff", radius: 1 }
      appear_at_ms: 3000
      disappear_at_ms: 6600
      stages:
        on_enter:
          steps:
            - pause: 900ms
            - { effects: [{ name: brighten, duration: 260, params: { intensity: 0.22 } }] }
            - { effects: [{ name: shine, duration: 720, params: { angle: 0, width: 2, falloff: 2.2, intensity: 0.7 } }] }
            - pause: 1160ms
            - { effects: [{ name: fade-out, duration: 520, params: { easing: ease-in } }] }

    - type: text
      id: location-text
      content: "HELSINKI, FINLAND"
      at: cc
      font: "Abril Fatface:raster"
      fg: white
      bg: black
      glow: { colour: "#5f7cff", radius: 1 }
      appear_at_ms: 5840
      stages:
        on_enter:
          steps:
            - { effects: [{ name: fade-in, duration: 520, params: { easing: ease-out } }, { name: brighten, duration: 220, params: { intensity: 0.18 } }] }
            - { effects: [{ name: shine, duration: 620, params: { angle: 0, width: 2, falloff: 2.2, intensity: 0.72 } }] }
