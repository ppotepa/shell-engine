# yaml-language-server: $schema=../../../schemas/layers.yaml
- name: boot-sequence
  z_index: 0
  visible: true
  sprites:
    - type: text
      id: vga-screen
      content: |-
        VGA BIOS Version 2.40
        Copyright 1987-1991 VGA Technologies
      at: lt
      x: 2
      y: 1
      font: "generic:half"
      fg: gray
      appear_at_ms: 400
      disappear_at_ms: 1100

    - type: grid
      id: bios-layout
      at: lt
      x: 0
      y: 0
      columns: ["1fr", "58"]
      rows: ["1fr", "auto", "auto"]
      gap-x: 2
      gap-y: 0
      appear_at_ms: 1800
      disappear_at_ms: 18800
      children:
        - type: grid
          id: bios-main
          grid-col: 1
          grid-row: 1
          x: 2
          y: 1
          columns: ["1fr"]
          rows:
            [
              "auto",
              "auto",
              "auto",
              "auto",
              "auto",
              "auto",
              "auto",
              "auto",
              "auto",
              "auto",
              "auto",
              "auto",
            ]
          gap-y: 0
          children:
            - {
                type: text,
                id: bios-line-1,
                content: " ",
                grid-col: 1,
                grid-row: 1,
                at: lt,
                font: "generic:half",
                fg: gray,
              }
            - {
                type: text,
                id: bios-line-2,
                content: " ",
                grid-col: 1,
                grid-row: 2,
                at: lt,
                font: "generic:half",
                fg: gray,
              }
            - {
                type: text,
                id: bios-line-3,
                content: " ",
                grid-col: 1,
                grid-row: 3,
                at: lt,
                font: "generic:half",
                fg: gray,
              }
            - {
                type: text,
                id: bios-line-4,
                content: " ",
                grid-col: 1,
                grid-row: 4,
                at: lt,
                font: "generic:half",
                fg: gray,
              }
            - {
                type: text,
                id: bios-line-5,
                content: " ",
                grid-col: 1,
                grid-row: 5,
                at: lt,
                font: "generic:half",
                fg: gray,
              }
            - {
                type: text,
                id: bios-line-6,
                content: " ",
                grid-col: 1,
                grid-row: 6,
                at: lt,
                font: "generic:half",
                fg: gray,
              }
            - {
                type: text,
                id: bios-line-7,
                content: " ",
                grid-col: 1,
                grid-row: 7,
                at: lt,
                font: "generic:half",
                fg: gray,
              }
            - {
                type: text,
                id: bios-line-8,
                content: " ",
                grid-col: 1,
                grid-row: 8,
                at: lt,
                font: "generic:half",
                fg: gray,
              }
            - {
                type: text,
                id: bios-line-9,
                content: " ",
                grid-col: 1,
                grid-row: 9,
                at: lt,
                font: "generic:half",
                fg: gray,
              }
            - {
                type: text,
                id: bios-line-10,
                content: " ",
                grid-col: 1,
                grid-row: 10,
                at: lt,
                font: "generic:half",
                fg: gray,
              }
            - {
                type: text,
                id: bios-line-11,
                content: " ",
                grid-col: 1,
                grid-row: 11,
                at: lt,
                font: "generic:half",
                fg: gray,
              }
            - type: text
              id: bios-cursor
              content: "_"
              grid-col: 1
              grid-row: 12
              at: lt
              font: "generic:half"
              fg: gray
              behaviors:
                - name: blink
                  params: { visible_ms: 220, hidden_ms: 220 }
                - name: timed-visibility
                  params: { start_ms: 16600, end_ms: 18800, time_scope: scene }

        - type: image
          id: tuxbios-screen
          source: /assets/images/tuxbios_2.png
          grid-col: 2
          grid-row: 1
          at: lt
          x: 0
          y: 0
          width: 112
          height: 44
          force-renderer-mode: cell

        - {
            type: text,
            id: bios-footer-1,
            content: " ",
            grid-col: 1,
            grid-row: 2,
            col-span: 2,
            at: lc,
            x: 2,
            font: "generic:half",
            fg: gray,
          }
        - {
            type: text,
            id: bios-footer-2,
            content: " ",
            grid-col: 1,
            grid-row: 3,
            col-span: 2,
            at: lc,
            x: 2,
            font: "generic:half",
            fg: gray,
          }
