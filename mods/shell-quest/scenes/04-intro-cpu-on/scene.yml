# yaml-language-server: $schema=../../schemas/scenes.yaml
id: intro-cpu-on
title: Intro CPU On
cutscene: true
bg: black
layers:
  - ref: main
logic:
  kind: script
  behavior: rhai-script
  src: ./scene.rhai
audio:
  on_enter:
    - { at_ms: 3100, cue: beep, volume: 0.9 }
stages:
  on_enter:
    steps:
      - { pause: 17000ms }
