id: intro-cpu-on
title: Intro CPU On
cutscene: true
bg: black
layers:
  - ref: main
stages:
  on_enter:
    steps:
      - { effects: [{ name: fade-in, duration: 180, params: { easing: ease-out } }] }
      - { pause: 1200ms }
