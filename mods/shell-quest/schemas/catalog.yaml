$schema: https://json-schema.org/draft/2020-12/schema
$id: https://shell-quest.local/mods/shell-quest/schemas/catalog.yaml
title: schema shell-quest catalog
$defs:
  scene_ids:
    type: string
    enum:
    - intro.logo
    - intro.prologue
    - mainmenu
  scene_paths:
    type: string
    enum:
    - /scenes/intro-logo/scene.yml
    - /scenes/intro-prologue/scene.yml
    - /scenes/mainmenu/scene.yml
  scene_refs:
    type: string
    enum:
    - /scenes/intro-logo/scene.yml
    - /scenes/intro-prologue/scene.yml
    - /scenes/mainmenu/scene.yml
    - intro.logo
    - intro.prologue
    - mainmenu
  object_names:
    type: string
    enum: []
  effect_names:
    type: string
    enum:
    - artifact-out
    - brighten
    - clear-to-colour
    - crt-on
    - devour-out
    - fade-in
    - fade-out
    - fade-to-black
    - glitch-out
    - lightning-ambient
    - lightning-branch
    - lightning-fbm
    - lightning-flash
    - lightning-growth
    - lightning-natural
    - lightning-optical-80s
    - power-off
    - scanlines
    - screen-shake
    - shatter-glitch
    - shine
    - tesla-orb
    - whiteout
  layer_refs:
    type: string
    enum:
    - intro-logo/layers/main.yml
    - intro-prologue/layers/main.yml
    - mainmenu/layers/main.yml
  sprite_refs:
    type: string
    enum: []
  template_refs:
    type: string
    enum: []
  object_refs:
    type: string
    enum: []
  effect_refs:
    type: string
    enum: []
  font_names:
    type: string
    enum: []
  font_specs:
    type: string
    enum:
    - generic
    - generic:1
    - generic:2
    - generic:3
    - generic:braille
    - generic:half
    - generic:large
    - generic:quad
    - generic:standard
    - generic:tiny
  image_paths:
    type: string
    enum:
    - /assets/images/campaign/legacy-shell-quest/logos/arch.png
    - /assets/images/campaign/legacy-shell-quest/logos/debian.png
    - /assets/images/campaign/legacy-shell-quest/logos/fedora.png
    - /assets/images/campaign/legacy-shell-quest/screenshots/shell-quest-terminal.png
    - /assets/images/campaign/legacy-shell-quest/screenshots/shell-quest.png
    - /assets/images/linux-1.png
    - /assets/images/tux.png
  model_paths:
    type: string
    enum:
    - /scenes/3d/helsinki-university/city_scene_horizontal_front_yup.obj
  sprite_ids:
    type: string
    enum:
    - date-text
    - intro-logo-ascii
    - intro-logo-raster
    - linux-grid
    - press-any-key
  template_names:
    type: string
    enum: []
