$schema: https://json-schema.org/draft/2020-12/schema
$id: https://shell-quest.local/mods/shell-quest/schemas/catalog.yaml
title: schema shell-quest catalog
$defs:
  scene_ids:
    type: string
    enum:
    - intro.logo
    - intro.prologue
    - mainmenu
  object_names:
    type: string
    enum: []
  effect_names:
    type: string
    enum:
    - artifact-out
    - brighten
    - clear-to-colour
    - crt-on
    - devour-out
    - fade-in
    - fade-out
    - fade-to-black
    - glitch-out
    - lightning-ambient
    - lightning-branch
    - lightning-fbm
    - lightning-flash
    - lightning-growth
    - lightning-natural
    - lightning-optical-80s
    - power-off
    - scanlines
    - screen-shake
    - shatter-glitch
    - shine
    - tesla-orb
    - whiteout
  layer_refs:
    type: string
    enum:
    - intro-logo/layers/main.yml
    - intro-prologue/layers/main.yml
    - mainmenu/layers/main.yml
  sprite_refs:
    type: string
    enum: []
  template_refs:
    type: string
    enum: []
  object_refs:
    type: string
    enum: []
  effect_refs:
    type: string
    enum: []
  font_names:
    type: string
    enum: []
  image_paths:
    type: string
    enum:
    - campaign/legacy-shell-quest/logos/arch.png
    - campaign/legacy-shell-quest/logos/debian.png
    - campaign/legacy-shell-quest/logos/fedora.png
    - campaign/legacy-shell-quest/screenshots/shell-quest-terminal.png
    - campaign/legacy-shell-quest/screenshots/shell-quest.png
    - linux-1.png
    - tux.png
  model_paths:
    type: string
    enum:
    - scenes/3d/helsinki-university/city_scene_horizontal_front_yup.obj
  sprite_ids:
    type: string
    enum:
    - date-text
    - intro-logo-ascii
    - intro-logo-raster
    - linux-grid
    - press-any-key
  template_names:
    type: string
    enum: []
