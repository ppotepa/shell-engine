$schema: https://json-schema.org/draft/2020-12/schema
$id: https://shell-quest.local/mods/shell-quest/schemas/object.yaml
title: schema shell-quest object
$defs:
  object_logic_overlay:
    allOf:
    - $ref: ../../../schemas/object.schema.yaml#/properties/logic
    - type: object
      properties:
        behavior:
          anyOf:
          - type: string
            enum:
            - blink
            - bob
            - follow
            - menu-carousel
            - menu-selected
            - menu-carousel-object
            - selected-arrows
            - stage-visibility
            - timed-visibility
          - type: string
            minLength: 1
      allOf:
      - if:
          properties:
            behavior:
              const: blink
        then:
          properties:
            params:
              type: object
              additionalProperties: false
              properties:
                target:
                  type: string
                  description: Sprite ID to blink
                visible_ms:
                  type: integer
                  description: Milliseconds visible per cycle
                  default: 250.0
                  minimum: 0.0
                  multipleOf: 10.0
                hidden_ms:
                  type: integer
                  description: Milliseconds hidden per cycle
                  default: 250.0
                  minimum: 0.0
                  multipleOf: 10.0
                phase_ms:
                  type: integer
                  description: Time offset for the blink cycle
                  default: 0.0
                  minimum: 0.0
                  multipleOf: 10.0
                stages:
                  type: array
                  description: Scene stages when behavior is active
                  items:
                    type: string
                    enum:
                    - on-enter
                    - enter
                    - on-idle
                    - idle
                    - on-leave
                    - leave
                    - done
      - if:
          properties:
            behavior:
              const: bob
        then:
          properties:
            params:
              type: object
              additionalProperties: false
              properties:
                target:
                  type: string
                  description: Sprite ID to bob
                amplitude_x:
                  type: integer
                  description: Horizontal oscillation amplitude
                  default: 0.0
                  multipleOf: 1.0
                amplitude_y:
                  type: integer
                  description: Vertical oscillation amplitude
                  default: 1.0
                  multipleOf: 1.0
                period_ms:
                  type: integer
                  description: Full oscillation cycle duration
                  default: 2000.0
                  minimum: 1.0
                  multipleOf: 10.0
                phase_ms:
                  type: integer
                  description: Time offset for wave phase
                  default: 0.0
                  minimum: 0.0
                  multipleOf: 10.0
                stages:
                  type: array
                  description: Scene stages when behavior is active
                  items:
                    type: string
                    enum:
                    - on-enter
                    - enter
                    - on-idle
                    - idle
                    - on-leave
                    - leave
                    - done
      - if:
          properties:
            behavior:
              const: follow
        then:
          properties:
            params:
              type: object
              additionalProperties: false
              properties:
                target:
                  type: string
                  description: Sprite ID to follow
                amplitude_x:
                  type: integer
                  description: Horizontal offset from the followed sprite
                  default: 0.0
                  multipleOf: 1.0
                amplitude_y:
                  type: integer
                  description: Vertical offset from the followed sprite
                  default: 0.0
                  multipleOf: 1.0
                stages:
                  type: array
                  description: Scene stages when behavior is active
                  items:
                    type: string
                    enum:
                    - on-enter
                    - enter
                    - on-idle
                    - idle
                    - on-leave
                    - leave
                    - done
              required:
              - target
      - if:
          properties:
            behavior:
              const: menu-carousel
        then:
          properties:
            params:
              type: object
              additionalProperties: false
              properties:
                target:
                  type: string
                  description: Container or sprite ID used as the center anchor
                index:
                  type: integer
                  description: Menu option index represented by this sprite
                  minimum: 0.0
                  multipleOf: 1.0
                count:
                  type: integer
                  description: Total option count override (defaults to scene menu options)
                  minimum: 1.0
                  multipleOf: 1.0
                window:
                  type: integer
                  description: Visible option window size around selected item
                  default: 5.0
                  minimum: 1.0
                  multipleOf: 1.0
                step_y:
                  type: integer
                  description: Vertical spacing between neighboring options
                  default: 2.0
                  minimum: 1.0
                  multipleOf: 1.0
                endless:
                  type: boolean
                  description: Wrap list when navigating past first/last option
                  default: 'true'
                  enum:
                  - 'true'
                  - 'false'
              required:
              - target
              - index
      - if:
          properties:
            behavior:
              const: menu-selected
        then:
          properties:
            params:
              type: object
              additionalProperties: false
              properties:
                index:
                  type: integer
                  description: Menu option index this behavior tracks
                  minimum: 0.0
                  multipleOf: 1.0
                stages:
                  type: array
                  description: Scene stages when behavior is active
                  items:
                    type: string
                    enum:
                    - on-enter
                    - enter
                    - on-idle
                    - idle
                    - on-leave
                    - leave
                    - done
              required:
              - index
      - if:
          properties:
            behavior:
              const: menu-carousel-object
        then:
          properties:
            params:
              type: object
              additionalProperties: false
              properties:
                target:
                  type: string
                  description: Container ID used as the center anchor
                item_prefix:
                  type: string
                  description: Prefix for menu item aliases (supports {} placeholder)
                  default: menu-item-
                count:
                  type: integer
                  description: Total option count override (defaults to scene menu options)
                  minimum: 1.0
                  multipleOf: 1.0
                window:
                  type: integer
                  description: Visible option window size around selected item
                  default: 5.0
                  minimum: 1.0
                  multipleOf: 1.0
                step_y:
                  type: integer
                  description: Minimum vertical spacing between neighboring options
                  default: 2.0
                  minimum: 1.0
                  multipleOf: 1.0
                endless:
                  type: boolean
                  description: Wrap list when navigating past first/last option
                  default: 'true'
                  enum:
                  - 'true'
                  - 'false'
              required:
              - target
      - if:
          properties:
            behavior:
              const: selected-arrows
        then:
          properties:
            params:
              type: object
              additionalProperties: false
              properties:
                target:
                  type: string
                  description: Sprite ID that the arrow should flank
                index:
                  type: integer
                  description: Menu option index this arrow tracks
                  minimum: 0.0
                  multipleOf: 1.0
                side:
                  type: string
                  description: Which side the arrow appears on
                  default: left
                  enum:
                  - left
                  - right
                padding:
                  type: integer
                  description: Cell padding from target sprite edge
                  default: 1.0
                  multipleOf: 1.0
                amplitude_x:
                  type: integer
                  description: Horizontal sway amplitude of the arrow
                  default: 1.0
                  multipleOf: 1.0
                period_ms:
                  type: integer
                  description: Full sway cycle duration
                  default: 900.0
                  minimum: 1.0
                  multipleOf: 10.0
                phase_ms:
                  type: integer
                  description: Time offset for sway phase
                  default: 0.0
                  minimum: 0.0
                  multipleOf: 10.0
                autoscale_height:
                  type: boolean
                  description: Expand horizontal anchor distance by target item height
                stages:
                  type: array
                  description: Scene stages when behavior is active
                  items:
                    type: string
                    enum:
                    - on-enter
                    - enter
                    - on-idle
                    - idle
                    - on-leave
                    - leave
                    - done
              required:
              - target
              - index
      - if:
          properties:
            behavior:
              const: stage-visibility
        then:
          properties:
            params:
              type: object
              additionalProperties: false
              properties:
                target:
                  type: string
                  description: Sprite ID to control visibility
                stages:
                  type: array
                  description: Scene stages when sprite is visible
                  items:
                    type: string
                    enum:
                    - on-enter
                    - enter
                    - on-idle
                    - idle
                    - on-leave
                    - leave
                    - done
              required:
              - stages
      - if:
          properties:
            behavior:
              const: timed-visibility
        then:
          properties:
            params:
              type: object
              additionalProperties: false
              properties:
                target:
                  type: string
                  description: Sprite ID to control visibility
                time_scope:
                  type: string
                  description: Whether times are scene-relative or stage-relative
                  default: scene
                  enum:
                  - scene
                  - stage
                start_ms:
                  type: integer
                  description: When sprite becomes visible
                  default: 0.0
                  minimum: 0.0
                  multipleOf: 10.0
                end_ms:
                  type: integer
                  description: When sprite becomes hidden
                  minimum: 0.0
                  multipleOf: 10.0
                stages:
                  type: array
                  description: Scene stages when behavior is active
                  items:
                    type: string
                    enum:
                    - on-enter
                    - enter
                    - on-idle
                    - idle
                    - on-leave
                    - leave
                    - done
allOf:
- $ref: ../../../schemas/object.schema.yaml
- properties:
    logic:
      $ref: '#/$defs/object_logic_overlay'
