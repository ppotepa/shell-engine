<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1216" height="676" viewBox="0 0 1216 676">
  <defs>
    <style>
      .bios {
        font-family: "Courier New", Consolas, monospace;
        font-size: 26px;
        fill: #d8d8d8;
        letter-spacing: 0.2px;
      }
      .logo-script {
        fill: none;
        stroke: #d6d06a;
        stroke-width: 7;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .logo-outline {
        fill: none;
        stroke: #d6d06a;
        stroke-width: 6;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .logo-small {
        font-family: "Arial Narrow", Arial, sans-serif;
        font-weight: 700;
        font-size: 18px;
        letter-spacing: 1.2px;
        fill: #6d9d62;
      }
    </style>
  </defs>

  <rect width="1216" height="676" fill="#000000"/>

  <!-- blue BIOS glyph -->
  <g transform="translate(22,38)" fill="#2338ff">
