# yaml-language-server: $schema=../../../schemas/scene.yaml
id: qwack-3d-hooks
title: Qwack 3D Arena Contract
bg: black
render-size: 640x360
render-space: 3d
world-model: euclidean-3d
controller-defaults:
  camera-preset: qwack-fps
  player-preset: qwack-walker
  ui-preset: qwack-hud
camera-rig:
  preset: qwack-fps
layers:
  - ref: hooks/layers/main.yml
stages:
  on_enter:
    steps:
      - { effects: [{ name: fade-in, duration: 250 }] }
  on_idle:
    trigger: any-key
    looping: true
    steps:
      - pause: 1200ms
next: qwack-3d-combat
