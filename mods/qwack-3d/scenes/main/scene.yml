id: qwack-3d-main
title: Qwack 3D Terrain
bg: "#070b11"
render-space: 3d
world-model: euclidean-3d
controller-defaults:
  camera-preset: free-look-camera
camera-rig:
  preset: free-look-camera
  free-look-camera: {}
layers:
  - ref: main
logic:
  kind: script
  behavior: rhai-script
  src: ./player.rhai
stages:
  on_enter:
    steps:
      - { duration: 1 }
  on_idle:
    looping: true
    steps:
      - pause: 16ms
