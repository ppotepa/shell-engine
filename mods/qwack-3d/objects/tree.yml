kind: object
name: tree
exports:
  id: tree-template
  source: /assets/3d/tree.obj
  scale: 6.0
  yaw: 0.0
  world_x: 0.0
  world_y: 0.0
  world_z: 0.0
  fg: "#5f8a47"
sprites:
  - type: obj
    id: "$id"
    source: "$source"
    at: cc
    camera-source: scene
    scale: "$scale"
    yaw-deg: "$yaw"
    ambient: 0.1
    smooth-shading: true
    light-direction-x: -0.6
    light-direction-y: 0.8
    light-direction-z: -0.3
    light-2-direction-x: 0.4
    light-2-direction-y: 0.55
    light-2-direction-z: 0.5
    light-2-intensity: 0.22
    rotate-y-deg-per-sec: 0.0
    world-x: "$world_x"
    world-y: "$world_y"
    world-z: "$world_z"
    fg: "$fg"
