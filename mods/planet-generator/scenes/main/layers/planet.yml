# yaml-language-server: $schema=../../../schemas/layers.yaml
- name: planet
  z_index: 0
  sprites:
    - type: obj
      id: planet-mesh
      source: "world://32"
      at: cc
      width: 420
      height: 420
      scale: 1.0
      rotate-y-deg-per-sec: 3.0
      ambient: 0.12
      light-direction-x: -0.55
      light-direction-y: 0.65
      light-direction-z: -0.80
      smooth-shading: true
      prerender: false
      camera-distance: 3.0
      fov-degrees: 50
      near-clip: 0.01
      world-shape: sphere
      world-coloring: biome
      world-seed: 0
      world-ocean-fraction: 0.55
      world-continent-scale: 2.5
      world-continent-warp: 0.65
      world-continent-octaves: 5
      world-mountain-scale: 6.0
      world-mountain-strength: 0.45
      world-moisture-scale: 3.0
      world-displacement-scale: 0.22
      atmo-color: "#7cc8ff"
      atmo-strength: 0.55
      atmo-rim-power: 3.2
      atmo-haze-strength: 0.38
      atmo-haze-power: 1.5
      atmo-shell-scale: 1.07
