# yaml-language-server: $schema=../../../schemas/layers.yaml
# ── Planet Generator Parameter Panel background ───────────────────────────────
- name: hud-panel
  z_index: 11
  ui: true
  space: screen
  sprites:
    - type: panel
      id: hud-panel-box
      align-x: right
      align-y: top
      x: -8
      y: 32
      width: 224
      height: 264
      padding: 8
      border-width: 1
      corner-radius: 2
      fg: "#2a9440"
      bg: "#020810"
      border-colour: "#1a5c28"
      shadow-x: 2
      shadow-y: 2
      shadow-colour: "#000000"
      visible: true
