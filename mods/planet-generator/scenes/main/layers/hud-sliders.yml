# yaml-language-server: $schema=../../../schemas/layers.yaml
# ── Planet Generator Slider Controls (native 1280x720 UI layout) ─────────────
# Panel content area: x=[874..1236], y=[116..576]. Track: x=[874..1208], width=334.
- name: hud-sliders
  z_index: 12
  ui: true
  space: screen
  sprites:
    - { type: text, id: param-kicker, content: "ACTIVE TAB", x: 874, y: 118, font: "generic:2", fg: "#487860" }
    - { type: text, id: param-title, content: "CONTINENTS", x: 874, y: 132, font: "generic:2", fg: "#aaffcc" }
    - type: text
      id: param-summary
      content: "Tune the current world profile and lighting mix."
      x: 874
      y: 148
      font: "generic:2"
      fg: "#3e6a56"
      max-width: 42
      overflow-mode: ellipsis
      wrap-mode: none
      reserve-width-ch: 42
    - { type: vector, id: param-divider, x: 874, y: 164, points: [[0,0],[334,0]], stroke-width: 1, fg: "#143224" }

    # ── Slot 0 ────────────────────────────────────────────────────────────────
    - { type: text,   id: param-label-0,  content: "SEED",    x: 874,  y: 180, font: "generic:2", fg: "#9ed0ba" }
    - { type: text,   id: param-value-0,  content: "0",       x: 1236, y: 180, at: cr, font: "generic:2", fg: "#d6f4e6" }
    - { type: vector, id: param-track-0,  x: 874,  y: 194, points: [[0,0],[334,0]], stroke-width: 4, fg: "#1a5c28" }
    - { type: vector, id: param-handle-0, x: 874,  y: 188, points: [[0,0],[0,12]], stroke-width: 4, fg: "#3aaa50" }

    # ── Slot 1 ────────────────────────────────────────────────────────────────
    - { type: text,   id: param-label-1,  content: "OCEAN",   x: 874,  y: 226, font: "generic:2", fg: "#9ed0ba" }
    - { type: text,   id: param-value-1,  content: "55%",     x: 1236, y: 226, at: cr, font: "generic:2", fg: "#d6f4e6" }
    - { type: vector, id: param-track-1,  x: 874,  y: 240, points: [[0,0],[334,0]], stroke-width: 4, fg: "#1a5c28" }
    - { type: vector, id: param-handle-1, x: 874,  y: 234, points: [[0,0],[0,12]], stroke-width: 4, fg: "#3aaa50" }

    # ── Slot 2 ────────────────────────────────────────────────────────────────
    - { type: text,   id: param-label-2,  content: "CONTINENT SZ", x: 874,  y: 272, font: "generic:2", fg: "#9ed0ba" }
    - { type: text,   id: param-value-2,  content: "2.5",          x: 1236, y: 272, at: cr, font: "generic:2", fg: "#d6f4e6" }
    - { type: vector, id: param-track-2,  x: 874,  y: 286, points: [[0,0],[334,0]], stroke-width: 4, fg: "#1a5c28" }
    - { type: vector, id: param-handle-2, x: 874,  y: 280, points: [[0,0],[0,12]], stroke-width: 4, fg: "#3aaa50" }

    # ── Slot 3 ────────────────────────────────────────────────────────────────
    - { type: text,   id: param-label-3,  content: "COAST CHAOS", x: 874,  y: 318, font: "generic:2", fg: "#9ed0ba" }
    - { type: text,   id: param-value-3,  content: "0.6",         x: 1236, y: 318, at: cr, font: "generic:2", fg: "#d6f4e6" }
    - { type: vector, id: param-track-3,  x: 874,  y: 332, points: [[0,0],[334,0]], stroke-width: 4, fg: "#1a5c28" }
    - { type: vector, id: param-handle-3, x: 874,  y: 326, points: [[0,0],[0,12]], stroke-width: 4, fg: "#3aaa50" }

    # ── Slot 4 ────────────────────────────────────────────────────────────────
    - { type: text,   id: param-label-4,  content: "OCTAVES",  x: 874,  y: 364, font: "generic:2", fg: "#9ed0ba" }
    - { type: text,   id: param-value-4,  content: "5",        x: 1236, y: 364, at: cr, font: "generic:2", fg: "#d6f4e6" }
    - { type: vector, id: param-track-4,  x: 874,  y: 378, points: [[0,0],[334,0]], stroke-width: 4, fg: "#1a5c28" }
    - { type: vector, id: param-handle-4, x: 874,  y: 372, points: [[0,0],[0,12]], stroke-width: 4, fg: "#3aaa50" }

    # ── Slot 5 (Climate row 4 / Visual rows 5+6) ──────────────────────────────
    - { type: text,   id: param-label-5,  content: "--",       x: 874,  y: 410, font: "generic:2", fg: "#9ed0ba" }
    - { type: text,   id: param-value-5,  content: "--",       x: 1236, y: 410, at: cr, font: "generic:2", fg: "#d6f4e6" }
    - { type: vector, id: param-track-5,  x: 874,  y: 424, points: [[0,0],[334,0]], stroke-width: 4, fg: "#1a5c28" }
    - { type: vector, id: param-handle-5, x: 874,  y: 418, points: [[0,0],[0,12]], stroke-width: 4, fg: "#3aaa50" }

    # ── Slot 6 (Visual only) ──────────────────────────────────────────────────
    - { type: text,   id: param-label-6,  content: "--",       x: 874,  y: 456, font: "generic:2", fg: "#9ed0ba" }
    - { type: text,   id: param-value-6,  content: "--",       x: 1236, y: 456, at: cr, font: "generic:2", fg: "#d6f4e6" }
    - { type: vector, id: param-track-6,  x: 874,  y: 470, points: [[0,0],[334,0]], stroke-width: 4, fg: "#1a5c28" }
    - { type: vector, id: param-handle-6, x: 874,  y: 464, points: [[0,0],[0,12]], stroke-width: 4, fg: "#3aaa50" }

    # ── Slot 7 (Visual only) ──────────────────────────────────────────────────
    - { type: text,   id: param-label-7,  content: "--",       x: 874,  y: 502, font: "generic:2", fg: "#9ed0ba" }
    - { type: text,   id: param-value-7,  content: "--",       x: 1236, y: 502, at: cr, font: "generic:2", fg: "#d6f4e6" }
    - { type: vector, id: param-track-7,  x: 874,  y: 516, points: [[0,0],[334,0]], stroke-width: 4, fg: "#1a5c28" }
    - { type: vector, id: param-handle-7, x: 874,  y: 510, points: [[0,0],[0,12]], stroke-width: 4, fg: "#3aaa50" }

    # ── Keyboard/mouse hint ───────────────────────────────────────────────────
    - type: text
      id: param-hint
      content: "drag slider | tabs Q/W/E/Y/U | presets 1-7 | model via top selector"
      x: 1058
      y: 576
      at: cc
      font: "generic:2"
      fg: "#2e5c46"
      max-width: 44
      overflow-mode: ellipsis
      wrap-mode: none
      reserve-width-ch: 44
