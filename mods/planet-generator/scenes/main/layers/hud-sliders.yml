    - { type: text,   id: param-label-7,  content: "--",       x: 421, y: 266, font: "generic:2", fg: "#9ed0ba" }
    - { type: text,   id: param-value-7,  content: "--",       x: 602, y: 266, at: cr, font: "generic:2", fg: "#d6f4e6" }
    - { type: vector, id: param-track-7,  x: 421, y: 273, points: [[0,0],[170,0]], stroke-width: 3, fg: "#1a5c28" }
    - { type: vector, id: param-handle-7, x: 421, y: 269, points: [[0,0],[0,8]],  stroke-width: 3, fg: "#3aaa50" }

    # ── Keyboard/mouse hint ───────────────────────────────────────────────────
    - { type: text, id: param-hint, content: "drag sliders | Q/W/E/Y/U tabs | 1-4 models | F1-F7 presets", x: 520, y: 291, at: cc, font: "generic:2", fg: "#2e5c46" }
