    - { type: text,   id: param-value-6,  content: "--",       x: 602, y: 240, at: cr, font: "generic:2", fg: "#d6f4e6" }
    - { type: vector, id: param-track-6,  x: 421, y: 247, points: [[0,0],[170,0]], stroke-width: 3, fg: "#1a5c28" }
