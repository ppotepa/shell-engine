# yaml-language-server: $schema=../../../schemas/layers.yaml
# ── Planet Generator Slider Controls (flat absolute-positioned sprites) ───────
# All coordinates are absolute screen-space (render-size: 640x360).
# Panel content area: x=[417..623], y=[41..273]. Track: x=[421..601], width=180.
# Slot N layout: label_y=60+N*28, track_y=73+N*28, handle_top=69+N*28
- name: hud-sliders
  z_index: 12
  ui: true
  space: screen
  sprites:
    - { type: text, id: param-kicker, content: "ACTIVE TAB", x: 421, y: 46, font: "generic:2", fg: "#487860" }
    - { type: text, id: param-title, content: "CONTINENTS", x: 421, y: 58, font: "generic:2", fg: "#aaffcc" }
    - { type: text, id: param-summary, content: "Tune the current world profile and lighting mix.", x: 421, y: 68, font: "generic:2", fg: "#3e6a56" }
    - { type: vector, id: param-divider, x: 421, y: 78, points: [[0,0],[181,0]], stroke-width: 1, fg: "#143224" }

    # ── Slot 0 ────────────────────────────────────────────────────────────────
    - { type: text,   id: param-label-0,  content: "SEED",    x: 421, y: 84,  font: "generic:2", fg: "#9ed0ba" }
    - { type: text,   id: param-value-0,  content: "0",       x: 602, y: 84,  at: cr, font: "generic:2", fg: "#d6f4e6" }
    - { type: vector, id: param-track-0,  x: 421, y: 91,  points: [[0,0],[170,0]], stroke-width: 3, fg: "#1a5c28" }
    - { type: vector, id: param-handle-0, x: 421, y: 87,  points: [[0,0],[0,8]],  stroke-width: 3, fg: "#3aaa50" }

    # ── Slot 1 ────────────────────────────────────────────────────────────────
    - { type: text,   id: param-label-1,  content: "OCEAN",   x: 421, y: 110,  font: "generic:2", fg: "#9ed0ba" }
    - { type: text,   id: param-value-1,  content: "55%",     x: 602, y: 110,  at: cr, font: "generic:2", fg: "#d6f4e6" }
    - { type: vector, id: param-track-1,  x: 421, y: 117, points: [[0,0],[170,0]], stroke-width: 3, fg: "#1a5c28" }
    - { type: vector, id: param-handle-1, x: 421, y: 113, points: [[0,0],[0,8]],  stroke-width: 3, fg: "#3aaa50" }

    # ── Slot 2 ────────────────────────────────────────────────────────────────
    - { type: text,   id: param-label-2,  content: "CONTINENT SZ", x: 421, y: 136, font: "generic:2", fg: "#9ed0ba" }
    - { type: text,   id: param-value-2,  content: "2.5",         x: 602, y: 136, at: cr, font: "generic:2", fg: "#d6f4e6" }
    - { type: vector, id: param-track-2,  x: 421, y: 143, points: [[0,0],[170,0]], stroke-width: 3, fg: "#1a5c28" }
    - { type: vector, id: param-handle-2, x: 421, y: 139, points: [[0,0],[0,8]],  stroke-width: 3, fg: "#3aaa50" }

    # ── Slot 3 ────────────────────────────────────────────────────────────────
    - { type: text,   id: param-label-3,  content: "COAST CHAOS", x: 421, y: 162, font: "generic:2", fg: "#9ed0ba" }
    - { type: text,   id: param-value-3,  content: "0.6",        x: 602, y: 162, at: cr, font: "generic:2", fg: "#d6f4e6" }
