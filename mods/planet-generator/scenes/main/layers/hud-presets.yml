# yaml-language-server: $schema=../../../schemas/layers.yaml
- name: hud-presets
  z_index: 13
  ui: true
  space: screen
  sprites:
    - type: panel
      id: preset-trigger-box
      align-x: right
      align-y: top
      x: -16
      y: 664
      width: 412
      height: 36
      padding: 4
      border-width: 1
      corner-radius: 6
      fg: "#507050"
      bg: "#041018"
      border-colour: "#1a5c28"
      shadow-x: 4
      shadow-y: 4
      shadow-colour: "#000000"
      children:
        - { type: text, id: preset-prefix-label, content: "PRESET", x: 16,  y: 12, font: "generic:2", fg: "#507050" }
        - { type: text, id: preset-current-label, content: "EARTH",  x: 206, y: 12, at: cc, font: "generic:2", fg: "#8cc08c" }
        - { type: text, id: preset-arrow-label, content: "v",        x: 386, y: 12, font: "generic:2", fg: "#507050" }
    - type: panel
      id: preset-popup
      align-x: right
      align-y: top
      x: -16
      y: 424
      width: 412
      height: 232
      padding: 8
      border-width: 1
      corner-radius: 6
      fg: "#507050"
      bg: "#041018"
      border-colour: "#1a5c28"
      shadow-x: 4
      shadow-y: 4
      shadow-colour: "#000000"
      visible: false
      children:
        - type: grid
          columns: ["1fr"]
          rows: ["1fr","1fr","1fr","1fr","1fr","1fr","1fr"]
          gap-y: 4
          children:
            - { type: text, content: "1/F1  EARTH",       grid-col: 1, grid-row: 1, at: cl, font: "generic:2", fg: "#8cc08c" }
            - { type: text, content: "2/F2  MARS",        grid-col: 1, grid-row: 2, at: cl, font: "generic:2", fg: "#8cc08c" }
            - { type: text, content: "3/F3  OCEAN",       grid-col: 1, grid-row: 3, at: cl, font: "generic:2", fg: "#8cc08c" }
            - { type: text, content: "4/F4  DESERT",      grid-col: 1, grid-row: 4, at: cl, font: "generic:2", fg: "#8cc08c" }
            - { type: text, content: "5/F5  ICE",         grid-col: 1, grid-row: 5, at: cl, font: "generic:2", fg: "#8cc08c" }
            - { type: text, content: "6/F6  VOLCANIC",    grid-col: 1, grid-row: 6, at: cl, font: "generic:2", fg: "#8cc08c" }
            - { type: text, content: "7/F7  ARCHIPELAGO", grid-col: 1, grid-row: 7, at: cl, font: "generic:2", fg: "#8cc08c" }

