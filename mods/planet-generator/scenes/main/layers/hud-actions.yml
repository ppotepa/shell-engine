# yaml-language-server: $schema=../../../schemas/layers.yaml
- name: hud-actions
  z_index: 12
  ui: true
  space: screen
  sprites:
    - type: panel
      id: hud-actions-box
      align-x: right
      align-y: top
      x: -16
      y: 602
      width: 430
      height: 54
      padding: 6
      border-width: 1
      corner-radius: 6
      fg: "#2a9440"
      bg: "#041018"
      border-colour: "#1a5c28"
      shadow-x: 4
      shadow-y: 4
      shadow-colour: "#000000"
      children:
        - type: grid
          columns: ["1fr", "1fr", "1fr"]
          rows: ["1fr", "1fr"]
          gap-x: 10
          gap-y: 2
          children:
            - { type: text, id: planet-randomize-button-label, content: "[R] RANDOM",       grid-col: 1, grid-row: 1, at: cc, font: "generic:2", fg: "#ffc030" }
            - { type: text, id: planet-vehicle-button-label,   content: "[F10] VEHICLE",    grid-col: 2, grid-row: 1, at: cc, font: "generic:2", fg: "#5bc0be" }
            - { type: text, id: planet-reset-button-label,     content: "[DEL] RESET",       grid-col: 3, grid-row: 1, at: cc, font: "generic:2", fg: "#4080ff" }
            - { type: text, id: stats-vehicle-producer-hint,   content: "LINK:OK",           grid-col: 1, grid-row: 2, at: cc, font: "generic:2", fg: "#4f8e7e" }
            - { type: text, id: stats-vehicle-profile-hint,    content: "PROF:ARC",          grid-col: 2, grid-row: 2, at: cc, font: "generic:2", fg: "#4f8e7e" }
            - { type: text, id: stats-vehicle-assist-hint,     content: "A:OFF H:OFF",       grid-col: 3, grid-row: 2, at: cc, font: "generic:2", fg: "#4f8e7e" }

