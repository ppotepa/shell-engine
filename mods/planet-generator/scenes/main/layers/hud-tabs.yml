# yaml-language-server: $schema=../../../schemas/layers.yaml
- name: hud-tabs
  z_index: 10
  ui: true
  space: screen
  sprites:
    - type: panel
      id: hud-tabs-box
      align-x: right
      align-y: top
      x: -8
      y: 8
      width: 224
      height: 22
      padding: 2
      border-width: 1
      corner-radius: 2
      fg: "#2a9440"
      bg: "#020810"
      border-colour: "#1a5c28"
      shadow-x: 2
      shadow-y: 2
      shadow-colour: "#000000"
      children:
        - type: grid
          columns: ["1fr", "1fr", "1fr", "1fr", "1fr"]
          rows: ["1fr"]
          gap-x: 2
          children:
            - { type: text, id: tab-btn-continents, content: "LAND",       grid-col: 1, grid-row: 1, at: cc, font: "generic:1", fg: "#2a9440", bg: "#020810" }
            - { type: text, id: tab-btn-mountains,  content: "MOUNTS",     grid-col: 2, grid-row: 1, at: cc, font: "generic:1", fg: "#2a9440", bg: "#020810" }
            - { type: text, id: tab-btn-climate,    content: "CLIMATE",    grid-col: 3, grid-row: 1, at: cc, font: "generic:1", fg: "#2a9440", bg: "#020810" }
            - { type: text, id: tab-btn-visual,     content: "VISUAL",      grid-col: 4, grid-row: 1, at: cc, font: "generic:1", fg: "#2a9440", bg: "#020810" }
            - { type: text, id: tab-btn-atmo,       content: "ATMO",        grid-col: 5, grid-row: 1, at: cc, font: "generic:1", fg: "#2a9440", bg: "#020810" }
