# yaml-language-server: $schema=../../../schemas/layers.yaml
- name: hud-tabs
  z_index: 10
  ui: true
  space: screen
  sprites:
    - type: panel
      id: hud-tabs-box
      align-x: right
      align-y: top
      x: -16
      y: 16
      width: 412
      height: 32
      padding: 4
      border-width: 1
      corner-radius: 6
      fg: "#2a9440"
      bg: "#041018"
      border-colour: "#1a5c28"
      shadow-x: 3
      shadow-y: 3
      shadow-colour: "#000000"
      children:
        - type: grid
          columns: ["1fr", "1fr", "1fr", "1fr", "1fr"]
          rows: ["1fr"]
          gap-x: 4
          children:
            - { type: text, id: tab-label-continents, content: "LAND",       grid-col: 1, grid-row: 1, at: cc, font: "generic:2", fg: "#2a9440", bg: "#020810" }
            - { type: text, id: tab-label-mountains,  content: "MOUNTS",     grid-col: 2, grid-row: 1, at: cc, font: "generic:2", fg: "#2a9440", bg: "#020810" }
            - { type: text, id: tab-label-climate,    content: "CLIMATE",    grid-col: 3, grid-row: 1, at: cc, font: "generic:2", fg: "#2a9440", bg: "#020810" }
            - { type: text, id: tab-label-visual,     content: "VISUAL",     grid-col: 4, grid-row: 1, at: cc, font: "generic:2", fg: "#2a9440", bg: "#020810" }
            - { type: text, id: tab-label-atmo,       content: "ATMO",       grid-col: 5, grid-row: 1, at: cc, font: "generic:2", fg: "#2a9440", bg: "#020810" }

