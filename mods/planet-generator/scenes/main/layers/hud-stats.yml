# yaml-language-server: $schema=../../../schemas/layers.yaml
- name: hud-stats
  z_index: 14
  ui: true
  space: screen
  sprites:
    - type: panel
      id: hud-stats-box
      align-x: left
      align-y: top
      x: 16
      y: 664
      width: 620
      height: 36
      padding: 6
      border-width: 1
      corner-radius: 6
      fg: "#1a5c28"
      bg: "#041018"
      border-colour: "#102018"
      shadow-x: 3
      shadow-y: 3
      shadow-colour: "#000000"
      children:
        - type: grid
          columns: ["1fr", "auto"]
          rows: ["1fr"]
          gap-x: 12
          children:
            - { type: text, id: stats-biomes, content: "OCEAN 55%  FOREST 12%  DESERT 8%  SNOW 7%", grid-col: 1, grid-row: 1, at: cl, font: "generic:2", fg: "#507060" }
            - { type: text, id: stats-seed,   content: "SEED: 0",                                   grid-col: 2, grid-row: 1, at: cr, font: "generic:2", fg: "#304040" }
