# yaml-language-server: $schema=../../../schemas/layers.yaml
- name: hud-stats
  z_index: 14
  ui: true
  space: screen
  sprites:
    - type: panel
      id: hud-stats-box
      align-x: left
      align-y: top
      x: 16
      y: 660
      width: 740
      height: 72
      padding: 6
      border-width: 1
      corner-radius: 6
      fg: "#1a5c28"
      bg: "#041018"
      border-colour: "#102018"
      shadow-x: 3
      shadow-y: 3
      shadow-colour: "#000000"
      children:
        - type: grid
          columns: ["1fr", "1fr", "1fr", "1fr"]
          rows: ["1fr", "1fr", "1fr"]
          gap-x: 10
          gap-y: 4
          children:
            - { type: text, id: stats-biome-ocean,  content: "OCEAN:--%",      grid-col: 1, grid-row: 1, at: cl, font: "generic:2", fg: "#507060" }
            - { type: text, id: stats-biome-forest, content: "FOREST:--%",     grid-col: 2, grid-row: 1, at: cl, font: "generic:2", fg: "#507060" }
            - { type: text, id: stats-biome-desert, content: "DESERT:--%",     grid-col: 3, grid-row: 1, at: cl, font: "generic:2", fg: "#507060" }
            - { type: text, id: stats-biome-snow,   content: "SNOW:--%",       grid-col: 4, grid-row: 1, at: cl, font: "generic:2", fg: "#507060" }
            - { type: text, id: stats-seed,         content: "SEED:0",          grid-col: 1, grid-row: 2, at: cl, font: "generic:2", fg: "#304040" }
            - { type: text, id: stats-radius-real,  content: "REAL:--km",       grid-col: 2, grid-row: 2, at: cl, font: "generic:2", fg: "#4a6b60" }
            - { type: text, id: stats-radius-sim,   content: "SIM:--wu",        grid-col: 3, grid-row: 2, at: cl, font: "generic:2", fg: "#4a6b60" }
            - { type: text, id: stats-gravity,      content: "G:--m/s2",        grid-col: 4, grid-row: 2, at: cl, font: "generic:2", fg: "#4a6b60" }
            - { type: text, id: stats-alt,          content: "ALT:--km",        grid-col: 1, grid-row: 3, at: cl, font: "generic:2", fg: "#4a6b60" }
            - { type: text, id: stats-spd,          content: "SPD:--km/s",      grid-col: 2, grid-row: 3, at: cl, font: "generic:2", fg: "#4a6b60" }
            - { type: text, id: stats-vrad,         content: "VR:--km/s",       grid-col: 3, grid-row: 3, at: cl, font: "generic:2", fg: "#4a6b60" }
            - { type: text, id: stats-atmo-top,     content: "ATM:--km",        grid-col: 4, grid-row: 3, at: cl, font: "generic:2", fg: "#4a6b60" }
