# yaml-language-server: $schema=../../../schemas/scene.yaml
id: planet-generator-main
title: Planet Generator
bg: "#000008"
render-size: 640x360
spatial:
  meters-per-world-unit: 1000.0
celestial:
  scope: local
  region: planet-generator-local
  system: generated-system
  focus-body: generated-planet
  focus-site: generated-orbit
  frame: focus-relative
  clock-source: scene
layers:
  - ref: planet
  - ref: hud-tabs
  - ref: hud-models
  - ref: hud-panel
  - ref: hud-sliders
  - ref: hud-actions # action shortcuts + game-message toast anchor
  - ref: hud-presets
  - ref: hud-stats
logic:
  kind: script
  behavior: rhai-script
  src: ./main.rhai
ui:
  scale: 1.0
  font-scale: 1.12
input:
  orbit-camera:
    target: planet-mesh
    yaw: 30.0
    pitch: 20.0
    distance: 3.0
    pitch-min: -85.0
    pitch-max: 85.0
    distance-min: 2.6
    distance-max: 6.0
    distance-step: 0.2
    drag-sensitivity: 0.14
  free-look-camera:
    move-speed: 0.45
    mouse-sensitivity: 0.45
    surface-mode: true
    surface-center-x: 0.0
    surface-center-y: 0.0
    surface-center-z: 0.0
    # Bootstrap fallback only: runtime free-look surface mode now follows the
    # focus-body render shell (`radius_px`) after body_sync patches the body.
    surface-radius: 1.0
    surface-altitude: 0.03
    surface-min-altitude: 0.01
    surface-max-altitude: 0.35
    surface-vertical-speed: 0.22
gui:
  widgets:
    # ── Top HUD selectors ─────────────────────────────────────────────────────
    - type: tabs
      id: planet-parameter-tabs
      sprite: hud-tabs-box
      x: 852
      y: 16
      w: 412
      h: 32
      selected: 0
      options:
        - { value: continents, label: LAND }
        - { value: mountains,  label: MOUNTS }
        - { value: climate,    label: CLIMATE }
        - { value: visual,     label: VISUAL }
        - { value: atmo,       label: ATMO }
    - type: segmented-control
      id: planet-model-selector
      sprite: hud-models-box
      x: 852
      y: 56
      w: 412
      h: 32
      selected: 0
      options:
        - { value: planet,  label: PLANET }
        - { value: sphere,  label: SPHERE }
        - { value: cube,    label: CUBE }
        - { value: suzanne, label: SUZANNE }
    # ── Action buttons (bottom-right) ────────────────────────────────────────
    - type: button
      id: planet-randomize-button
      sprite: planet-randomize-button-label
      x: 852
      y: 616
      w: 132
      h: 40
      follow-layout: false
    - type: button
      id: planet-reset-button
      sprite: planet-reset-button-label
      x: 1132
      y: 616
      w: 132
      h: 40
      follow-layout: false
    # ── Preset selector (compact dropdown) ───────────────────────────────────
    - type: dropdown
      id: planet-preset-dropdown
      sprite: preset-trigger-box
      x: 852
      y: 664
      w: 412
      h: 36
      selected: 0
      label-sprite: preset-current-label
      popup-sprite: preset-popup
      popup-above: true
      options:
        - { value: earth,       label: EARTH }
        - { value: mars,        label: MARS }
        - { value: ocean,       label: OCEAN }
        - { value: desert,      label: DESERT }
        - { value: ice,         label: ICE }
        - { value: volcanic,    label: VOLCANIC }
        - { value: archipelago, label: ARCHIPELAGO }
    # ── 8 multiplexed sliders — authored in native 1280x720 UI space.
    # Track starts at x=874, width=334. Handle base at the same x.
    - type: slider
      id: param-0
      sprite: param-track-0
      handle: param-handle-0
      x: 874
      y: 188
      w: 334
      h: 12
      hit-padding: 8
      min: 0
      max: 1
      value: 0
    - type: slider
      id: param-1
      sprite: param-track-1
      handle: param-handle-1
      x: 874
      y: 234
      w: 334
      h: 12
      hit-padding: 8
      min: 0
      max: 1
      value: 0
    - type: slider
      id: param-2
      sprite: param-track-2
      handle: param-handle-2
      x: 874
      y: 280
      w: 334
      h: 12
      hit-padding: 8
      min: 0
      max: 1
      value: 0
    - type: slider
      id: param-3
      sprite: param-track-3
