# yaml-language-server: $schema=../../../schemas/scene.yaml
id: planet-generator-main
title: Planet Generator
bg: "#000008"
render-size: 640x360
layers:
  - ref: planet
  - ref: hud-tabs
  - ref: hud-panel
  - ref: hud-sliders
  - ref: hud-actions
  - ref: hud-presets
  - ref: hud-stats
logic:
  kind: script
  behavior: rhai-script
  src: ./main.rhai
input:
  orbit-camera:
    target: planet-mesh
    yaw: 30.0
    pitch: 20.0
    distance: 2.5
    pitch-min: -85.0
    pitch-max: 85.0
    distance-min: 1.5
    distance-max: 6.0
    distance-step: 0.2
    drag-sensitivity: 0.3
  free-look-camera: {}
gui:
  widgets:
    # ── Tab bar buttons (4 buttons spanning the full tab panel width) ──────────
    # Panel outer: x=408..632, y=8..30. Buttons divide the full width.
    - type: button
      id: tab-btn-continents
      sprite: tab-btn-continents
      x: 408
      y: 8
      w: 57
      h: 22
    - type: button
      id: tab-btn-mountains
      sprite: tab-btn-mountains
      x: 465
      y: 8
      w: 55
      h: 22
    - type: button
      id: tab-btn-climate
      sprite: tab-btn-climate
      x: 520
      y: 8
      w: 55
      h: 22
    - type: button
      id: tab-btn-visual
      sprite: tab-btn-visual
      x: 575
      y: 8
      w: 57
      h: 22
    # ── 7 multiplexed sliders — content/mapping changes per active tab in Rhai.
    # Coords: track starts at x=421, width=180. Handle base at same x=421.
    # hit-padding=6 gives ~20px tall click zone around each 8px handle.
    - type: slider
      id: param-0
      sprite: param-track-0
      handle: param-handle-0
      x: 421
      y: 69
      w: 180
      h: 8
      hit-padding: 6
      min: 0
      max: 1
      value: 0
    - type: slider
      id: param-1
      sprite: param-track-1
      handle: param-handle-1
      x: 421
      y: 97
      w: 180
      h: 8
      hit-padding: 6
      min: 0
      max: 1
      value: 0
    - type: slider
      id: param-2
      sprite: param-track-2
      handle: param-handle-2
      x: 421
      y: 125
      w: 180
      h: 8
      hit-padding: 6
      min: 0
      max: 1
      value: 0
    - type: slider
      id: param-3
      sprite: param-track-3
      handle: param-handle-3
      x: 421
      y: 153
      w: 180
      h: 8
      hit-padding: 6
      min: 0
      max: 1
      value: 0
    - type: slider
      id: param-4
      sprite: param-track-4
      handle: param-handle-4
      x: 421
      y: 181
      w: 180
      h: 8
      hit-padding: 6
      min: 0
      max: 1
      value: 0
    - type: slider
      id: param-5
      sprite: param-track-5
      handle: param-handle-5
      x: 421
      y: 209
      w: 180
      h: 8
      hit-padding: 6
      min: 0
      max: 1
      value: 0
    - type: slider
      id: param-6
      sprite: param-track-6
      handle: param-handle-6
      x: 421
      y: 237
      w: 180
      h: 8
      hit-padding: 6
      min: 0
      max: 1
      value: 0
postfx:
  - name: crt-scan-glitch
    params:
      intensity: 0.015
      transparency: 0.03
      brightness: 1.08
      speed: 0.12
stages:
  on_enter:
    steps:
      - { effects: [{ name: fade-in, duration: 400 }] }
  on_idle:
    looping: true
    steps:
      - pause: 60ms
