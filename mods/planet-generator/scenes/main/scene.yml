      h: 12
      hit-padding: 8
      min: 0
      max: 1
      value: 0
    - type: slider
      id: param-5
      sprite: param-track-5
      handle: param-handle-5
      x: 874
      y: 418
      w: 334
      h: 12
      hit-padding: 8
      min: 0
