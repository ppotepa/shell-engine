# yaml-language-server: $schema=../../../schemas/scene.yaml
id: planet-generator-main
title: Planet Generator
bg: "#000008"
render-size: 640x360
layers:
  - ref: planet
  - ref: hud-tabs
  - ref: hud-models
  - ref: hud-panel
  - ref: hud-sliders
  - ref: hud-actions
  - ref: hud-presets
  - ref: hud-stats
logic:
  kind: script
  behavior: rhai-script
  src: ./main.rhai
input:
  orbit-camera:
    target: planet-mesh
    yaw: 30.0
    pitch: 20.0
    distance: 2.5
    pitch-min: -85.0
    pitch-max: 85.0
    distance-min: 1.5
    distance-max: 6.0
    distance-step: 0.2
    drag-sensitivity: 0.14
  free-look-camera:
    move-speed: 0.45
    mouse-sensitivity: 0.45
    surface-mode: true
    surface-center-x: 0.0
    surface-center-y: 0.0
    surface-center-z: 0.0
    surface-radius: 1.0
    surface-altitude: 0.03
    surface-min-altitude: 0.01
    surface-max-altitude: 0.35
    surface-vertical-speed: 0.22
gui:
  widgets:
    # ── Tab bar buttons (5 buttons spanning the full tab panel width) ──────────
    # Panel outer: x=408..632, y=8..30. Buttons divide the full width.
    - type: button
      id: tab-btn-continents
      sprite: tab-label-continents
      x: 408
      y: 8
      w: 45
      h: 22
    - type: button
      id: tab-btn-mountains
      sprite: tab-label-mountains
      x: 453
      y: 8
      w: 45
      h: 22
    - type: button
      id: tab-btn-climate
      sprite: tab-label-climate
      x: 498
      y: 8
      w: 45
      h: 22
    - type: button
      id: tab-btn-visual
      sprite: tab-label-visual
      x: 543
      y: 8
      w: 45
      h: 22
    - type: button
      id: tab-btn-atmo
      sprite: tab-label-atmo
      x: 588
      y: 8
      w: 44
      h: 22
    # ── Model selection buttons (bottom row of top HUD) ──────────────────────
    - type: button
      id: model-btn-planet
      sprite: model-label-planet
      x: 410
      y: 34
      w: 54
      h: 22
    - type: button
      id: model-btn-sphere
      sprite: model-label-sphere
      x: 466
      y: 34
      w: 54
      h: 22
    - type: button
      id: model-btn-cube
      sprite: model-label-cube
      x: 522
      y: 34
      w: 54
      h: 22
    - type: button
      id: model-btn-suzanne
      sprite: model-label-suzanne
      x: 578
      y: 34
      w: 54
      h: 22
    # ── Action buttons (bottom-right) ────────────────────────────────────────
    - type: button
      id: btn-randomize
      sprite: btn-label-randomize
      x: 410
      y: 304
      w: 108
      h: 22
    - type: button
      id: btn-reset
      sprite: btn-label-reset
      x: 522
      y: 304
      w: 108
      h: 22
    # ── Preset strip buttons (bottom-right) ──────────────────────────────────
    - type: button
      id: preset-btn-earth
      sprite: preset-label-earth
      x: 410
      y: 328
      w: 30
      h: 22
    - type: button
      id: preset-btn-mars
      sprite: preset-label-mars
      x: 442
      y: 328
      w: 30
      h: 22
    - type: button
      id: preset-btn-ocean
      sprite: preset-label-ocean
      x: 474
      y: 328
      w: 30
      h: 22
    - type: button
      id: preset-btn-desert
      sprite: preset-label-desert
      x: 506
      y: 328
      w: 30
      h: 22
    - type: button
      id: preset-btn-ice
      sprite: preset-label-ice
      x: 538
      y: 328
      w: 30
      h: 22
    - type: button
      id: preset-btn-volcanic
      sprite: preset-label-volcanic
      x: 570
      y: 328
      w: 30
      h: 22
    - type: button
      id: preset-btn-archipelago
      sprite: preset-label-archipelago
      x: 602
      y: 328
      w: 28
      h: 22
    # ── 8 multiplexed sliders — content/mapping changes per active tab in Rhai.
    # Coords: track starts at x=421, width=180. Handle base at same x=421.
    # hit-padding=6 gives ~20px tall click zone around each 8px handle.
    - type: slider
      id: param-0
      sprite: param-track-0
      handle: param-handle-0
      x: 421
      y: 69
      w: 180
      h: 8
      hit-padding: 6
      min: 0
      max: 1
      value: 0
    - type: slider
      id: param-1
      sprite: param-track-1
