    - type: slider
      id: param-7
      sprite: param-track-7
      handle: param-handle-7
      x: 874
      y: 510
      w: 334
      h: 12
      hit-padding: 8
      min: 0
      max: 1
      value: 0
stages:
  on_enter:
    steps:
      - { effects: [{ name: fade-in, duration: 400 }] }
  on_idle:
    looping: true
    steps:
      - pause: 60ms

