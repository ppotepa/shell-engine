      h: 8
      hit-padding: 6
      min: 0
      max: 1
      value: 0
    - type: slider
      id: param-6
      sprite: param-track-6
      handle: param-handle-6
      x: 421
      y: 237
      w: 180
      h: 8
      hit-padding: 6
      min: 0
      max: 1
