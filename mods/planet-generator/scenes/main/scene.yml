# yaml-language-server: $schema=../../../schemas/scene.yaml
id: planet-generator-main
title: Planet Generator
bg: "#000008"
render-size: 640x360
layers:
  - ref: planet
  - ref: hud-tabs
  - ref: hud-models
  - ref: hud-panel
  - ref: hud-sliders
  - ref: hud-actions
  - ref: hud-presets
  - ref: hud-stats
logic:
  kind: script
  behavior: rhai-script
  src: ./main.rhai
ui:
  scale: 1.1
  font-scale: 1.15
input:
  orbit-camera:
    target: planet-mesh
    yaw: 30.0
    pitch: 20.0
    distance: 2.5
    pitch-min: -85.0
    pitch-max: 85.0
    distance-min: 1.5
    distance-max: 6.0
    distance-step: 0.2
    drag-sensitivity: 0.14
  free-look-camera:
    move-speed: 0.45
    mouse-sensitivity: 0.45
    surface-mode: true
    surface-center-x: 0.0
    surface-center-y: 0.0
    surface-center-z: 0.0
    surface-radius: 1.0
    surface-altitude: 0.03
    surface-min-altitude: 0.01
    surface-max-altitude: 0.35
    surface-vertical-speed: 0.22
gui:
  widgets:
    # ── Top HUD selectors ─────────────────────────────────────────────────────
    - type: tabs
      id: planet-parameter-tabs
      sprite: hud-tabs-box
      x: 408
      y: 8
      w: 224
      h: 22
      selected: 0
      options:
        - { value: continents, label: LAND }
        - { value: mountains,  label: MOUNTS }
        - { value: climate,    label: CLIMATE }
        - { value: visual,     label: VISUAL }
        - { value: atmo,       label: ATMO }
    - type: segmented-control
      id: planet-model-selector
      sprite: hud-models-box
      x: 408
      y: 34
      w: 224
      h: 22
      selected: 0
      options:
        - { value: planet,  label: PLANET }
        - { value: sphere,  label: SPHERE }
        - { value: cube,    label: CUBE }
        - { value: suzanne, label: SUZANNE }
    # ── Action buttons (bottom-right) ────────────────────────────────────────
    - type: button
      id: planet-randomize-button
      sprite: planet-randomize-button-label
      x: 410
      y: 306
      w: 108
      h: 24
    - type: button
      id: planet-reset-button
      sprite: planet-reset-button-label
      x: 522
      y: 306
      w: 108
      h: 24
    # ── Preset selector (compact dropdown) ───────────────────────────────────
    - type: dropdown
      id: planet-preset-dropdown
      sprite: preset-trigger-box
      x: 408
      y: 334
      w: 224
      h: 24
      selected: 0
      label-sprite: preset-current-label
      popup-sprite: preset-popup
      popup-above: true
      options:
        - { value: earth,       label: EARTH }
        - { value: mars,        label: MARS }
        - { value: ocean,       label: OCEAN }
        - { value: desert,      label: DESERT }
        - { value: ice,         label: ICE }
        - { value: volcanic,    label: VOLCANIC }
        - { value: archipelago, label: ARCHIPELAGO }
    # ── 8 multiplexed sliders — content/mapping changes per active tab in Rhai.
    # Coords: track starts at x=421, width=180. Handle base at same x=421.
    # hit-padding=6 gives ~20px tall click zone around each 8px handle.
    - type: slider
      id: param-0
      sprite: param-track-0
      handle: param-handle-0
      x: 421
      y: 87
      w: 170
      h: 8
      hit-padding: 6
      min: 0
      max: 1
      value: 0
    - type: slider
      id: param-1
      sprite: param-track-1
      handle: param-handle-1
      x: 421
      y: 113
      w: 170
      h: 8
      hit-padding: 6
      min: 0
      max: 1
      value: 0
    - type: slider
      id: param-2
      sprite: param-track-2
      handle: param-handle-2
      x: 421
      y: 139
      w: 170
      h: 8
      hit-padding: 6
      min: 0
      max: 1
      value: 0
    - type: slider
      id: param-3
      sprite: param-track-3
      handle: param-handle-3
      x: 421
      y: 165
      w: 170
      h: 8
      hit-padding: 6
      min: 0
      max: 1
      value: 0
    - type: slider
      id: param-4
      sprite: param-track-4
      handle: param-handle-4
      x: 421
      y: 191
      w: 170
      h: 8
      hit-padding: 6
      min: 0
      max: 1
      value: 0
    - type: slider
      id: param-5
      sprite: param-track-5
      handle: param-handle-5
      x: 421
      y: 217
      w: 170
      h: 8
      hit-padding: 6
      min: 0
      max: 1
      value: 0
    - type: slider
      id: param-6
      sprite: param-track-6
      handle: param-handle-6
      x: 421
      y: 243
      w: 170
      h: 8
      hit-padding: 6
      min: 0
      max: 1
      value: 0
    - type: slider
      id: param-7
      sprite: param-track-7
      handle: param-handle-7
      x: 421
      y: 269
      w: 170
      h: 8
      hit-padding: 6
      min: 0
      max: 1
      value: 0
stages:
  on_enter:
    steps:
      - { effects: [{ name: fade-in, duration: 400 }] }
  on_idle:
    looping: true
    steps:
      - pause: 60ms

