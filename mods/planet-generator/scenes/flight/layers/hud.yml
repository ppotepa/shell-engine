# yaml-language-server: $schema=../../../schemas/layers.yaml
- name: flight-hud
  z_index: 20
  ui: true
  space: screen
  sprites:
    - type: panel
      id: flight-hud-box
      align-x: left
      align-y: top
      x: 16
      y: 16
      width: 408
      height: 66
      padding: 6
      border-width: 1
      corner-radius: 6
      fg: "#1f4d2e"
      bg: "#050d16"
      border-colour: "#284d74"
      shadow-x: 4
      shadow-y: 4
      shadow-colour: "#000000"
    - type: text
      id: flight-mode
      x: 26
      y: 22
      content: "VIEW: COCKPIT [F]"
      font: "generic:2"
      fg: "#8ef0b3"
    - type: text
      id: flight-status
      x: 26
      y: 38
      content: "ALT 0.0km  SPD 0.00km/s"
      font: "generic:1"
      fg: "#b8c8de"
    - type: text
      id: flight-controls-1
      x: 26
      y: 52
      content: "W/S thrust  A/D yaw  Q/E strafe  SPACE lift"
      font: "generic:1"
      fg: "#8aa4c4"
    - type: text
      id: flight-controls-2
      x: 26
      y: 64
      content: "F free flight toggle  mouse look in free mode"
      font: "generic:1"
      fg: "#6f8dab"
