# yaml-language-server: $schema=../../../schemas/layers.yaml
- name: flight-player-layer
  z_index: -10
  ui: true
  space: 3d
  sprites:
    - type: obj
      id: flight-player
      source: /assets/3d/cube.obj
      x: 0
      y: 0
      scale: 0.0000004
      ambient: 0.05
      surface-mode: material
      prerender: false
      rotate-y-deg-per-sec: 0
      camera-source: scene
      fov-degrees: 50
      near-clip: 0.000001
      light-direction-x: -0.42
      light-direction-y: 0.72
      light-direction-z: -0.54
      cel-levels: 4
      shadow-colour: "#090f18"
      midtone-colour: "#4f7de2"
      highlight-colour: "#fff6cc"
      tone-mix: 0.35
      fg_colour: "#ffd991"
      visible: false
    - type: obj
      id: flight-cockpit
      source: /assets/3d/cockpit.obj
      x: 0
      y: 0
      scale: 0.0000002
      ambient: 0.14
      surface-mode: material
      prerender: false
      rotate-y-deg-per-sec: 0
      fov-degrees: 50
      near-clip: 0.00000005
      light-direction-x: -0.36
      light-direction-y: 0.74
      light-direction-z: -0.57
      cel-levels: 4
      shadow-colour: "#060a12"
      midtone-colour: "#41556d"
      highlight-colour: "#b7d2f5"
      tone-mix: 0.38
      fg_colour: "#d8e4f7"
      visible: true
