prefabs:
  ship:
    kind: ship
    sprite_template: ship
    default_tags: [ship]
    components:
      physics:
        vx: 0.0
        vy: 0.0
        drag: 0.0
        max_speed: 0.0
        mass: 8.0
        restitution: 0.2
        gravity_scale: 1.0
        gravity_mode: point
        gravity_body: generated-planet
        atmosphere_body: generated-planet
        atmosphere_drag_scale: 1.0
        atmosphere_heat_scale: 1.0
        atmosphere_cooling: 0.14
      collider:
        shape: circle
        radius: 10.0
        layer: 1
        mask: 0
      lifecycle: Persistent
      wrappable: false
      extra_data:
        role: player

  # Prefab merge canary: exercises nested component override merging in a celestial mod.
  canary-probe-base:
    kind: probe
    sprite_template: probe-template
    components:
      extra_data:
        profile:
          family: celestial
          revision: 1
          nested:
            label: base

  canary-probe-nested:
    ref: canary-probe-base
    components:
      extra_data:
        profile:
          revision: 2
          nested:
            label: nested
            note: deep-override
