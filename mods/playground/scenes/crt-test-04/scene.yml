# yaml-language-server: $schema=../../schemas/scenes.yaml
id: playground-crt-test-04
title: CRT-TEST 04
virtual-size-override: 640x360
bg: black
prerender: true
effect-presets-ref: /effects/mrmo-crt-basic.yml
postfx:
  - { use: fx.mrmo.burn }
  - { use: fx.mrmo.tube, overrides: { params: { intensity: 0.92, speed: 0.66 } } }
  - { use: fx.mrmo.phosphor, overrides: { params: { intensity: 1.55, alpha: 0.36, brightness: 1.22 } } }
  - { use: fx.mrmo.curve, overrides: { params: { intensity: 0.36, brightness: 1.08 } } }
  - { use: fx.mrmo.sync, overrides: { params: { intensity: 0.34, brightness: 1.16, speed: 1.02 } } }
  - { use: fx.mrmo.tone, overrides: { params: { intensity: 0.16, speed: 0.62 } } }
layers:
  - ref: crt-test-04/layers/main.yml
stages:
  on_enter:
    steps:
      - { duration: 1 }
  on_idle:
    trigger: any-key
    looping: true
    steps:
      - pause: 1200ms
  on_leave:
    steps:
      - { duration: 1 }
menu-options:
  - { key: "1", label: "ENTER / NEXT SCREEN", to: playground-crt-test-05 }
  - { key: "0", label: BACK TO MENU, to: playground-menu }
