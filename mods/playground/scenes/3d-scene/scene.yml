# yaml-language-server: $schema=../../schemas/scenes.yaml
id: playground-3d-scene
title: BASE-02 3D Scene (OBJ Wireframe Test)
virtual-size-override: 640x360
bg: black
render-space: 3d
world-model: euclidean-3d
controller-defaults:
  camera-preset: obj-viewer
camera-rig:
  preset: obj-viewer
  obj-viewer:
    sprite_id: helsinki-uni-wireframe
layers:
  - ref: main
stages-ref: /stages/anykey-fade-300-250.yml
objects:
  - {
      ref: suzan,
      as: obj-demo,
      with:
        {
          id: helsinki-uni-wireframe,
          source: /scenes/3d/helsinki-university/city_scene_horizontal_front_yup.obj,
          scale: 1.1,
          rotation_y: 180,
          pitch_deg: -10,
          rotate_y_deg_per_sec: 14,
          camera_distance: 3.2,
          fov_degrees: 56,
          near_clip: 0.0005,
          fg: white,
        },
    }
next: playground-menu
