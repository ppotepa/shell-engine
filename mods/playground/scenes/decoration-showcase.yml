# yaml-language-server: $schema=../../../schemas/scene.schema.yaml
id: playground-decoration-showcase
title: Decoration Showcase (Placeholder)
bg_colour: black
stages:
  on_enter:
    steps:
      - effects:
          - name: fade-in
            duration: 350
  on_idle:
    trigger: any-key
    steps:
      - duration: 1
        effects: []
  on_leave:
    steps:
      - effects:
          - name: fade-out
            duration: 250
layers:
  - name: placeholder
    z_index: 0
    sprites:
      - type: text
        content: "PLACEHOLDER TEXT"
        align_x: center
        align_y: center
        y: 0
        font: "generic:1"
        fg_colour: white
next: playground-menu
