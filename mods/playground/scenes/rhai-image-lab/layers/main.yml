# yaml-language-server: $schema=../../../schemas/layers.yaml
- name: rhai-image-lab
  z_index: 0
  sprites:
    - type: grid
      id: image-lab-root
      at: cc
      columns: ["1fr"]
      rows: ["auto", "auto", "auto", "auto", "auto"]
      gap-y: 1
      children:
        - { type: text, content: "RHAI IMAGE LAB", grid-col: 1, grid-row: 1, at: cc, font: "generic:half", fg: white }
        - { type: image, id: tux-image, source: "/assets/images/tux.png", grid-col: 1, grid-row: 2, at: cc, size: 3 }
        - { type: text, content: "Mutated: visible, position.x, position.y", grid-col: 1, grid-row: 3, at: cc, font: "generic:half", fg: gray }
        - { type: text, id: image-status, content: "tux x=0 y=0 visible=true", grid-col: 1, grid-row: 4, at: cc, font: "generic:half", fg: yellow }
    - { type: text, content: "0: return to Rhai Lab", at: cb, y: -1, font: "generic:half", fg: gray, hide_on_leave: true }
