# yaml-language-server: $schema=../../../schemas/layers.yaml
- name: menu
  z_index: 0
  objects:
    - ref: centered-endless-menu
  sprites:
    - {
        type: text,
        content: "PLAYGROUND",
        at: ct,
        y: -10,
        font: "generic:2",
        fg: white,
      }
    - {
        type: text,
        content: "CONTRACT LADDER",
        at: ct,
        y: -4,
        font: "generic:2",
        fg: gray,
      }
    - {
        type: text,
        content: "BASE-01 / BASE-02 / CAN-01 / CAN-02 / CAN-03 / SCN-04",
        at: ct,
        y: 0,
        font: "generic:2",
        fg: gray,
      }
    - {
        type: text,
        content: "Arrows: navigate, Enter: select, [0]-[9]: shortcut",
        at: cb,
        y: -1,
        font: "generic:2",
        fg: gray,
        hide_on_leave: true,
        behaviors:
          [{ name: blink, params: { visible_ms: 700, hidden_ms: 700 } }],
      }
