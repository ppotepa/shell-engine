# yaml-language-server: $schema=../../schemas/scenes.yaml
id: playground-menu
title: BASE-01 Playground Menu
virtual-size-override: 640x360
bg: black
render-space: 2d
world-model: planar-2d
controller-defaults:
  ui-preset: playground-menu
layers:
  - ref: main
stages:
  on_enter:
    steps:
      - { effects: [{ name: fade-in, duration: 400 }] }
  on_idle:
    trigger: any-key
    looping: true
    steps:
      - pause: 1200ms
  on_leave:
    steps:
      - { effects: [{ name: fade-out, duration: 300 }] }
next: playground-3d-scene
menu-options:
  - { key: "1", label: BASE-02 3D SCENE, to: playground-3d-scene }
  - { key: "2", label: STOP ANIMATION, to: playground-stop-animation }
  - { key: "3", label: DECORATION SHOWCASE, to: playground-decoration-showcase }
  - {
      key: "4",
      label: FPS CAP SHOWCASE 2D+3D,
      to: playground-fps-showcase-2d-30,
    }
  - { key: "5", label: FONT MODE SHOWCASE, to: playground-font-showcase }
  - { key: "6", label: LAYOUT LAB, to: playground-layout-lab }
  - { key: "shift+6", label: CRT-TEST, to: playground-crt-test }
  - { key: "7", label: RHAI LAB, to: playground-rhai-lab }
  - { key: "8", label: CAN-01 PLANAR 2D, to: playground-world-model-planar }
  - {
      key: "9",
      label: CAN-02 EUCLIDEAN 3D,
      to: playground-world-model-euclidean,
    }
  - {
      key: "shift+8",
      label: CAN-03 CELESTIAL 3D,
      to: playground-world-model-celestial,
    }
  - {
      key: "shift+9",
      label: SCN-04 CONTRACT MAP,
      to: playground-world-model-contracts,
    }
  - { key: "shift+7", label: AUDIO DEMO, to: playground-audio-demo }
  - { key: "0", label: EXIT, to: playground-exit }
