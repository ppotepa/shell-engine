# yaml-language-server: $schema=../../schemas/scenes.yaml
# Font showcase: renders "THIS IS A TEXT" in every generic font mode side by side.
id: playground-font-showcase
title: Font Mode Showcase
bg: black
stages:
  on_enter:
    steps:
      - effects:
          - name: fade-in
            duration: 250
  on_idle:
    trigger: any-key
    steps:
      - pause: 1ms
  on_leave:
    steps:
      - effects:
          - name: fade-out
            duration: 200
next: playground-menu
