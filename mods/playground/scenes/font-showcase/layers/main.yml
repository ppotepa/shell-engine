            - { type: text, content: "abcdefghijkl;", grid-col: 2, grid-row: 2, at: lc, font: "generic:2", fg: yellow }
            - { type: text, content: "MNOPQRSTUVWX", grid-col: 1, grid-row: 3, at: lc, font: "generic:2", fg: yellow }
            - { type: text, content: "mnopqrstuvwxyz", grid-col: 2, grid-row: 3, at: lc, font: "generic:2", fg: yellow }
            - { type: text, content: "YZ0123456789", grid-col: 1, grid-row: 4, at: lc, font: "generic:2", fg: yellow }
