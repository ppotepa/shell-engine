            - { type: text, content: "YZ0123456789", grid-col: 1, grid-row: 4, at: lc, font: "generic:2", fg: cyan }
            - { type: text, content: "!@#!@ $%^&*", grid-col: 2, grid-row: 4, at: lc, font: "generic:2", fg: cyan }
            - { type: text, content: "[]{}<>/\\|", grid-col: 1, grid-row: 5, at: lc, font: "generic:2", fg: cyan }
