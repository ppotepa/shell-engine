# yaml-language-server: $schema=../../../schemas/layers.yaml
- name: font-showcase
  sprites:
    - { type: text, content: "FONT MODE SHOWCASE", font: "generic:1", fg: white, at: tc, y: 1 }

    - type: flex
      direction: column
      gap: 1
      at: cc
      y: 1
      children:
        - type: grid
          width: 64
          columns: ["1fr"]
          rows: ["auto", "auto", "auto", "auto", "auto"]
          gap-y: 0
          children:
            - { type: text, content: "generic:tiny", grid-col: 1, grid-row: 1, at: lc, font: "generic:1", fg: gray }
            - { type: text, content: "ABCDEFGHIJKLM", grid-col: 1, grid-row: 2, at: lc, font: "generic:tiny", fg: cyan }
            - { type: text, content: "NOPQRSTUVWXYZ0123456789", grid-col: 1, grid-row: 3, at: lc, font: "generic:tiny", fg: cyan }
            - { type: text, content: "abcdefghijklm", grid-col: 1, grid-row: 4, at: lc, font: "generic:tiny", fg: cyan }
            - { type: text, content: "nopqrstuvwxyz", grid-col: 1, grid-row: 5, at: lc, font: "generic:tiny", fg: cyan }
        - type: grid
          width: 64
          columns: ["1fr"]
          rows: ["auto", "auto", "auto", "auto", "auto"]
          gap-y: 0
          children:
            - { type: text, content: "generic:1", grid-col: 1, grid-row: 1, at: lc, font: "generic:1", fg: gray }
            - { type: text, content: "ABCDEFGHIJKLM", grid-col: 1, grid-row: 2, at: lc, font: "generic:1", fg: cyan }
            - { type: text, content: "NOPQRSTUVWXYZ0123456789", grid-col: 1, grid-row: 3, at: lc, font: "generic:1", fg: cyan }
            - { type: text, content: "abcdefghijklm", grid-col: 1, grid-row: 4, at: lc, font: "generic:1", fg: cyan }
            - { type: text, content: "nopqrstuvwxyz", grid-col: 1, grid-row: 5, at: lc, font: "generic:1", fg: cyan }
        - type: grid
          width: 64
          columns: ["1fr"]
          rows: ["auto", "auto", "auto", "auto", "auto"]
          gap-y: 0
          children:
            - { type: text, content: "generic:2", grid-col: 1, grid-row: 1, at: lc, font: "generic:1", fg: gray }
            - { type: text, content: "ABCDEFGHIJKLM", grid-col: 1, grid-row: 2, at: lc, font: "generic:2", fg: cyan }
            - { type: text, content: "NOPQRSTUVWXYZ0123456789", grid-col: 1, grid-row: 3, at: lc, font: "generic:2", fg: cyan }
            - { type: text, content: "abcdefghijklm", grid-col: 1, grid-row: 4, at: lc, font: "generic:2", fg: cyan }
            - { type: text, content: "nopqrstuvwxyz", grid-col: 1, grid-row: 5, at: lc, font: "generic:2", fg: cyan }
        - type: grid
          width: 64
          columns: ["1fr"]
          rows: ["auto", "auto", "auto", "auto", "auto"]
          gap-y: 0
          children:
            - { type: text, content: "generic:half", grid-col: 1, grid-row: 1, at: lc, font: "generic:1", fg: gray }
            - { type: text, content: "ABCDEFGHIJKLM", grid-col: 1, grid-row: 2, at: lc, font: "generic:half", fg: yellow }
            - { type: text, content: "NOPQRSTUVWXYZ0123456789", grid-col: 1, grid-row: 3, at: lc, font: "generic:half", fg: yellow }
            - { type: text, content: "abcdefghijklm", grid-col: 1, grid-row: 4, at: lc, font: "generic:half", fg: yellow }
            - { type: text, content: "nopqrstuvwxyz", grid-col: 1, grid-row: 5, at: lc, font: "generic:half", fg: yellow }
