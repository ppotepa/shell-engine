            - { type: text, content: "[]{}<>/\\|", grid-col: 1, grid-row: 5, at: lc, font: "generic:3", fg: yellow }
            - { type: text, content: "_+-=;:,.?/", grid-col: 2, grid-row: 5, at: lc, font: "generic:3", fg: yellow }

        - type: grid
