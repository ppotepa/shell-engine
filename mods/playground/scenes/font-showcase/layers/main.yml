            - { type: text, content: "NOPQRSTUVWXYZ0123456789", grid-col: 1, grid-row: 3, at: lc, font: "generic:braille", fg: magenta }
            - { type: text, content: "abcdefghijklm", grid-col: 1, grid-row: 4, at: lc, font: "generic:braille", fg: magenta }
            - { type: text, content: "nopqrstuvwxyz", grid-col: 1, grid-row: 5, at: lc, font: "generic:braille", fg: magenta }

    - { type: text, content: "Press any key to return", font: "generic:1", fg: gray, at: bc, y: -1 }
