# yaml-language-server: $schema=../../../../../schemas/generated/playground.layers-file.schema.yaml
# Vertical grid of all generic font modes rendering the same string.
# Each row: label on the left, rendered text on the right.

# ── Header ────────────────────────────────────────────────────────────────
- name: header
  sprites:
    - type: text
      content: "FONT MODE SHOWCASE  ---  THIS IS A TEXT"
      font: "generic:1"
      fg: white
      at: tc
      y: 1

# ── generic:tiny — smallest, 4 cols x 5 rows per char ─────────────────────
- name: row-tiny-label
  sprites:
    - type: text
      content: "generic:tiny"
      font: "generic:1"
      fg: gray
      x: 2
      y: 4

- name: row-tiny-text
  sprites:
    - type: text
      content: "THIS IS A TEXT"
      font: "generic:tiny"
      fg: cyan
      x: 20
      y: 4

# ── generic:1 (Standard) — 6 cols x 7 rows per char ──────────────────────
- name: row-standard-label
  sprites:
