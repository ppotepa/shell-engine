            - { type: text, content: "NOPQRSTUVWXYZ0123456789", grid-col: 1, grid-row: 3, at: lc, font: "generic:quad", fg: yellow }
            - { type: text, content: "abcdefghijklm", grid-col: 1, grid-row: 4, at: lc, font: "generic:quad", fg: yellow }
            - { type: text, content: "nopqrstuvwxyz", grid-col: 1, grid-row: 5, at: lc, font: "generic:quad", fg: yellow }
        - type: grid
          width: 64
          columns: ["1fr"]
          rows: ["auto", "auto", "auto", "auto", "auto"]
          gap-y: 0
