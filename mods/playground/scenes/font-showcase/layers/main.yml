            - { type: text, content: "generic:3", grid-col: 1, grid-row: 1, col-span: 2, at: lc, font: "generic:1", fg: gray }
            - { type: text, content: "ABCDEFGHIJKL", grid-col: 1, grid-row: 2, at: lc, font: "generic:3", fg: yellow }
            - { type: text, content: "abcdefghijkl;", grid-col: 2, grid-row: 2, at: lc, font: "generic:3", fg: yellow }
