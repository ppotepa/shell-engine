            - { type: text, content: "abcdefghijkl;", grid-col: 2, grid-row: 2, at: lc, font: "generic:3", fg: magenta }
            - { type: text, content: "MNOPQRSTUVWX", grid-col: 1, grid-row: 3, at: lc, font: "generic:3", fg: magenta }
            - { type: text, content: "mnopqrstuvwxyz", grid-col: 2, grid-row: 3, at: lc, font: "generic:3", fg: magenta }
            - { type: text, content: "YZ0123456789", grid-col: 1, grid-row: 4, at: lc, font: "generic:3", fg: magenta }
            - { type: text, content: "!@#!@ $%^&*", grid-col: 2, grid-row: 4, at: lc, font: "generic:3", fg: magenta }
            - { type: text, content: "[]{}<>/\\|", grid-col: 1, grid-row: 5, at: lc, font: "generic:3", fg: magenta }
            - { type: text, content: "_+-=;:,.?/", grid-col: 2, grid-row: 5, at: lc, font: "generic:3", fg: magenta }

    - { type: text, content: "Press any key to return", font: "generic:1", fg: gray, at: bc, y: -1 }
