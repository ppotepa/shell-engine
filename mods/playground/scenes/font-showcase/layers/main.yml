# yaml-language-server: $schema=../../../schemas/layers.yaml
- name: font-showcase
  sprites:
    - { type: text, content: "FONT MODE SHOWCASE", font: "generic:1", fg: white, at: tc, y: 1 }

    - type: flex
      direction: column
      gap: 1
      at: tc
      y: 3
      width: 360
      height: 220
      children:
        - type: grid
          width: 360
          columns: ["1fr", "1fr"]
          rows: ["auto", "auto", "auto", "auto", "auto"]
          gap-x: 4
          gap-y: 0
          children:
            - { type: text, content: "generic:tiny", grid-col: 1, grid-row: 1, col-span: 2, at: lc, font: "generic:1", fg: gray }
            - { type: text, content: "ABCDEFGHIJKL", grid-col: 1, grid-row: 2, at: lc, font: "generic:tiny", fg: cyan }
            - { type: text, content: "abcdefghijkl;", grid-col: 2, grid-row: 2, at: lc, font: "generic:tiny", fg: cyan }
            - { type: text, content: "MNOPQRSTUVWX", grid-col: 1, grid-row: 3, at: lc, font: "generic:tiny", fg: cyan }
            - { type: text, content: "mnopqrstuvwxyz", grid-col: 2, grid-row: 3, at: lc, font: "generic:tiny", fg: cyan }
            - { type: text, content: "YZ0123456789", grid-col: 1, grid-row: 4, at: lc, font: "generic:tiny", fg: cyan }
            - { type: text, content: "!@#!@ $%^&*", grid-col: 2, grid-row: 4, at: lc, font: "generic:tiny", fg: cyan }
            - { type: text, content: "[]{}<>/\\|", grid-col: 1, grid-row: 5, at: lc, font: "generic:tiny", fg: cyan }
            - { type: text, content: "_+-=;:,.?/", grid-col: 2, grid-row: 5, at: lc, font: "generic:tiny", fg: cyan }

        - type: grid
          width: 360
          columns: ["1fr", "1fr"]
          rows: ["auto", "auto", "auto", "auto", "auto"]
          gap-x: 4
          gap-y: 0
          children:
            - { type: text, content: "generic:1", grid-col: 1, grid-row: 1, col-span: 2, at: lc, font: "generic:1", fg: gray }
            - { type: text, content: "ABCDEFGHIJKL", grid-col: 1, grid-row: 2, at: lc, font: "generic:1", fg: cyan }
            - { type: text, content: "abcdefghijkl;", grid-col: 2, grid-row: 2, at: lc, font: "generic:1", fg: cyan }
            - { type: text, content: "MNOPQRSTUVWX", grid-col: 1, grid-row: 3, at: lc, font: "generic:1", fg: cyan }
            - { type: text, content: "mnopqrstuvwxyz", grid-col: 2, grid-row: 3, at: lc, font: "generic:1", fg: cyan }
            - { type: text, content: "YZ0123456789", grid-col: 1, grid-row: 4, at: lc, font: "generic:1", fg: cyan }
            - { type: text, content: "!@#!@ $%^&*", grid-col: 2, grid-row: 4, at: lc, font: "generic:1", fg: cyan }
            - { type: text, content: "[]{}<>/\\|", grid-col: 1, grid-row: 5, at: lc, font: "generic:1", fg: cyan }
            - { type: text, content: "_+-=;:,.?/", grid-col: 2, grid-row: 5, at: lc, font: "generic:1", fg: cyan }

        - type: grid
