# yaml-language-server: $schema=../../../schemas/layers.yaml
- name: rhai-focus
  z_index: 0
  sprites:
    - type: grid
      id: focus-root
      at: cc
      columns: ["1fr", "1fr", "1fr"]
      rows: ["auto", "auto", "auto", "auto", "auto", "auto"]
      gap-x: 2
      gap-y: 1
      children:
        - { type: text, content: "RHAI FOCUS", grid-col: 1, grid-row: 1, col-span: 3, at: cc, font: "generic:1", fg: white }
        - { type: text, content: "AUTO FOCUS CYCLE USING GRID + VISIBILITY", grid-col: 1, grid-row: 2, col-span: 3, at: cc, font: "generic:1", fg: gray }
        - { type: text, content: "Observe active tag and cursor marker", grid-col: 1, grid-row: 3, col-span: 3, at: cc, font: "generic:1", fg: silver }

        - { type: text, id: focus-cursor-a, content: "^", grid-col: 1, grid-row: 4, at: cc, font: "generic:1", fg: white }
        - { type: text, id: focus-cursor-b, content: "^", grid-col: 2, grid-row: 4, at: cc, font: "generic:1", fg: white }
        - { type: text, id: focus-cursor-c, content: "^", grid-col: 3, grid-row: 4, at: cc, font: "generic:1", fg: white }

        - { type: text, id: focus-tag-a, content: "< focus >", grid-col: 1, grid-row: 5, at: cc, font: "generic:1", fg: yellow }
        - { type: text, id: focus-tag-b, content: "< focus >", grid-col: 2, grid-row: 5, at: cc, font: "generic:1", fg: yellow }
        - { type: text, id: focus-tag-c, content: "< focus >", grid-col: 3, grid-row: 5, at: cc, font: "generic:1", fg: yellow }

        - { type: text, id: focus-card-a, content: "[ ALPHA ]  steady", grid-col: 1, grid-row: 6, at: cc, font: "generic:1", fg: cyan }
        - { type: text, id: focus-card-b, content: "[ BETA ]   locked", grid-col: 2, grid-row: 6, at: cc, font: "generic:1", fg: magenta }
        - { type: text, id: focus-card-c, content: "[ GAMMA ]  tracked", grid-col: 3, grid-row: 6, at: cc, font: "generic:1", fg: green }

    - { type: text, content: "0: return to Rhai Lab", at: cb, y: -1, font: "generic:1", fg: gray, hide_on_leave: true }
