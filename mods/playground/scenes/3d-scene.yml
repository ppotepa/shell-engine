# yaml-language-server: $schema=../../../schemas/scene.schema.yaml
id: playground-3d-scene
title: 3D Scene (OBJ Wireframe Test)
bg_colour: black
stages:
  on_enter:
    steps:
      - effects:
          - name: fade-in
            duration: 300
  on_idle:
    trigger: any-key
    steps:
      - duration: 1
        effects: []
  on_leave:
    steps:
      - effects:
          - name: fade-out
            duration: 250
layers:
  - name: obj-demo
    z_index: 0
    sprites:
      - type: obj
        id: helsinki-uni-wireframe
        source: "/scenes/3d/helsinki-university/city_scene_horizontal_front_yup.obj"
        align_x: center
        align_y: center
        y: -2
        width: 86
        height: 28
        scale: 1.1
        yaw-deg: 10
        pitch-deg: -10
        rotate-y-deg-per-sec: 14
        camera-distance: 3.2
        fov-degrees: 56
        draw-char: "#"
        fg_colour: white
      - type: text
        content: "OBJ wireframe test: Helsinki Uni. Press any key to return."
        align_x: center
        align_y: bottom
        y: -1
        font: "generic:1"
        fg_colour: gray
        hide_on_leave: true
next: playground-menu
