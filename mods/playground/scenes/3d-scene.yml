# yaml-language-server: $schema=../../../schemas/scene.schema.yaml
id: playground-3d-scene
title: 3D Scene (OBJ Wireframe Test)
bg_colour: black
rendered-mode: quadblock
stages:
  on_enter:
    steps:
      - effects:
          - name: fade-in
            duration: 300
  on_idle:
    trigger: any-key
    steps:
      - duration: 1
        effects: []
  on_leave:
    steps:
      - effects:
          - name: fade-out
            duration: 250
layers:
  - name: obj-demo
    z_index: 0
    sprites:
      - type: obj
        id: helsinki-uni-wireframe
        source: "/scenes/3d/helsinki-university/city_scene_horizontal_front_yup.obj"
        align_x: center
        align_y: center
        y: 0
        scale: 1.1
        surface-mode: material
        rotation-y: 180
        yaw-deg: 0
        pitch-deg: -10
        rotate-y-deg-per-sec: 14
        camera-distance: 3.2
        fov-degrees: 56
        near-clip: 0.0005
        draw-char: "#"
        fg_colour: white
      - type: text
        content: "A/Z zoom, O orbit on/off (arrows+mouse look when off), 1-4 renderer, 5 wireframe, ENTER back"
        align_x: center
        align_y: bottom
        y: -1
        font: "generic:1"
        fg_colour: gray
        hide_on_leave: true
next: playground-menu
