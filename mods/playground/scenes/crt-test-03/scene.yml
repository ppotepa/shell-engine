# yaml-language-server: $schema=../../schemas/scenes.yaml
id: playground-crt-test-03
title: CRT-TEST 03
bg: black
prerender: true
effect-presets-ref: /effects/mrmo-crt-basic.yml
postfx:
  - { use: fx.mrmo.tube, overrides: { params: { intensity: 0.88, transparency: 0.22 } } }
  - { use: fx.mrmo.phosphor, overrides: { params: { intensity: 1.42, transparency: 0.66 } } }
  - { use: fx.mrmo.curve, overrides: { params: { intensity: 0.40, distortion: 0.22, sphericality: 0.30 } } }
  - { use: fx.mrmo.sync, overrides: { params: { intensity: 0.26, transparency: 0.24 } } }
  - { use: fx.mrmo.tone, overrides: { params: { intensity: 0.12 } } }
  - { use: fx.mrmo.burn }
layers:
  - ref: crt-test-03/layers/main.yml
stages:
  on_enter:
    steps:
      - { effects: [{ name: fade-in, duration: 400 }] }
  on_idle:
    trigger: any-key
    looping: true
    steps:
      - pause: 1200ms
  on_leave:
    steps:
      - { effects: [{ name: fade-out, duration: 180 }] }
menu-options:
  - { key: "1", label: "ENTER / NEXT SCREEN", to: playground-crt-test-04 }
  - { key: "0", label: BACK TO MENU, to: playground-menu }
