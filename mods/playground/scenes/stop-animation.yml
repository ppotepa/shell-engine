# yaml-language-server: $schema=../../../schemas/scene.schema.yaml
id: playground-stop-animation
title: Stop Animation (Boilerplate)
bg_colour: black
stages:
  on_enter:
    steps:
      - effects:
          - name: fade-in
            duration: 300
  on_idle:
    trigger: any-key
    steps:
      - duration: 1
        effects: []
  on_leave:
    steps:
      - effects:
          - name: fade-out
            duration: 250
layers:
  - name: placeholder
    z_index: 0
    sprites:
      - type: text
        content: "STOP ANIMATION"
        align_x: center
        align_y: center
        y: -1
        font: "generic:1"
        fg_colour: white
      - type: text
        content: "Boilerplate scene. Press any key to return."
        align_x: center
        align_y: center
        y: 1
        font: "generic:1"
        fg_colour: gray
        hide_on_leave: true
next: playground-menu
