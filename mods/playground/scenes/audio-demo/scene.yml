# yaml-language-server: $schema=../../schemas/scenes.yaml
id: playground-audio-demo
title: Audio Demo
virtual-size-override: 640x360
bg: black
layers:
  - ref: main
    sprites:
      - { type: text, id: title, content: "♪ AUDIO DEMO — DAISY BELL (1961) ♪", at: cc, y: 4, fg: "#55ff55" }
      - { type: text, id: info, content: "IBM 7094 — first computer to sing", at: cc, y: 8, fg: "#888888" }
      - { type: text, id: hint, content: "[press any key to return]", at: cc, y: 14, fg: "#555555" }
stages:
  on_enter:
    steps:
      - { effects: [{ name: fade-in, duration: 400 }] }
  on_idle:
    trigger: any-key
    looping: false
    steps:
      - pause: 100ms
  on_leave:
    steps:
      - { effects: [{ name: fade-out, duration: 300 }] }
audio:
  on_enter:
    - { cue: daisy-bell, at_ms: 0, volume: 0.9 }
next: playground-menu
