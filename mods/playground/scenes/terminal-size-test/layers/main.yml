# yaml-language-server: $schema=../../../schemas/layers.yaml
- name: terminal-size-test
  z_index: 0
  sprite-defaults:
    type: text
    font: "generic:1"
  sprites:
    - { content: "TERMINAL SIZE TEST", at: ct, y: 2, fg: white }
    - { content: "Press 1..4 to force terminal size live", at: cc, y: -1, fg: yellow }
    - { content: "1: 80x24  |  2: 100x30  |  3: 120x36  |  4: 160x48", at: cc, y: 1, fg: silver }
    - { content: "ENTER: back to menu", at: cb, y: -1, fg: gray, hide_on_leave: true }
