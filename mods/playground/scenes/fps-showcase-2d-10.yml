# yaml-language-server: $schema=../../../schemas/scene.schema.yaml
# Authored YAML v2 example: prefer `bg`, `fg`, `at`, and `pause` shorthands where the current compiler supports them.
id: playground-fps-showcase-2d-10
title: FPS Showcase 2D 10
cutscene: true
target-fps: 10
bg: black
rendered-mode: halfblock
stages:
  on_idle:
    trigger: timeout
    steps:
      - pause: 5000ms
layers:
  - name: fps-showcase-2d
    z_index: 0
    sprites:
      - type: image
        id: tux-10
        source: "/assets/images/tux.png"
        at: cc
        y: 1
        size: 3
        animations:
          - name: float
            looping: true
            params:
              axis: x
              amplitude: 14
              period_ms: 1800
      - type: text
        content: "FPS CAP SHOWCASE  2D"
        at: ct
        y: 1
        font: "generic:1"
        fg: white
      - type: text
        content: "SCENE 3/6  PENGUIN  TARGET 10 FPS  5s"
        at: cb
        y: -1
        font: "generic:1"
        fg: gray
next: playground-fps-showcase-30
