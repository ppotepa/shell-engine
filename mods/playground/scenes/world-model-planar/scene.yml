# yaml-language-server: $schema=../../schemas/scenes.yaml
id: playground-world-model-planar
title: CAN-01 Planar 2D World Model
virtual-size-override: 640x360
bg: "#05070b"
render-space: 2d
world-model: planar-2d
controller-defaults:
  ui-preset: menu-hud
layers:
  - ref: main
stages:
  on_enter:
    steps:
      - { effects: [{ name: fade-in, duration: 250 }] }
  on_idle:
    trigger: any-key
    looping: true
    steps:
      - pause: 1200ms
next: playground-menu
