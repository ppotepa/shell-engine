# yaml-language-server: $schema=../../../schemas/generated/playground.scene.schema.yaml
# Authored YAML v2 example: prefer `bg`, `fg`, `at`, and `pause` shorthands where the current compiler supports them.
id: playground-terminal-size-test
title: Terminal Size Test
bg: black
input:
  # This block demonstrates scene-level input helpers without changing the rest of the scene format.
  terminal-size-tester:
    presets:
      - "80x24"
      - "100x30"
      - "120x36"
      - "160x48"
stages:
  on_enter:
    steps:
      - effects:
          - name: fade-in
            duration: 250
  on_idle:
    trigger: any-key
    steps:
      - pause: 1ms
  on_leave:
    steps:
      - effects:
          - name: fade-out
            duration: 200
layers:
  - name: terminal-size-test
    z_index: 0
    sprites:
      - type: text
        content: "TERMINAL SIZE TEST"
        at: ct
        y: 2
        font: "generic:1"
        fg: white
      - type: text
        content: "Press 1..4 to force terminal size live"
        at: cc
        y: -1
        font: "generic:1"
        fg: yellow
      - type: text
        content: "1: 80x24  |  2: 100x30  |  3: 120x36  |  4: 160x48"
        at: cc
        y: 1
        font: "generic:1"
        fg: silver
      - type: text
        content: "ENTER: back to menu"
        at: cb
        y: -1
        font: "generic:1"
        fg: gray
        hide_on_leave: true
next: playground-menu
