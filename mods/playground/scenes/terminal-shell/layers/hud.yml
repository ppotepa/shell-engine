# yaml-language-server: $schema=../../../schemas/layers.yaml
- name: terminal-shell-hud
  z_index: 3
  ui: true
  sprite-defaults:
    type: text
    font: "generic:half"
  sprites:
    - type: text
      id: ui-shell-status
      at: ct
      y: 10
      content: "WAITING FOR OPERATOR INPUT"
      fg: "#7B7B7B"
    - type: text
      id: ui-shell-status-cursor
      at: ct
      y: 11
      content: "*"
      fg: "#F39C12"
      behaviors:
        - name: blink
          params:
            visible_ms: 420
            hidden_ms: 420
    - type: text
      at: cb
      y: -1
      content: "ESC ON EMPTY PROMPT: BACK TO MENU"
      fg: "#8A8A8A"
      hide_on_leave: true
