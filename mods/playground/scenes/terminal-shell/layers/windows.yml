# yaml-language-server: $schema=../../../schemas/layers.yaml
- name: terminal-shell-windows
  z_index: 2
  ui: true
  sprites:
    - type: terminal-input
      id: ui-terminal-input-window
      at: cb
      width-percent: 95
      prompt-id: ui-terminal-prompt
      border-fg: "#3A3A3A"
      border-bg: "#1C1C1C"
      panel-bg: "#5E5E5E"
      title-fg: "#F1F1F1"
      body-fg: "#D0D0D0"
      footer-fg: "#DADADA"
      corner-radius: 1
      shadow-x: 1
      shadow-y: 1
    - type: window
      id: ui-terminal-help-tooltip
      at: rt
      x: -2
      y: 1
      title-bar: "HINTS"
      padding: 1
      body-content: |
        TYPE LS
        TYPE STATUS
        TYPE LOGS
      border-fg: "#3B3B3B"
      border-bg: "#181818"
      panel-bg: "#4A4A4A"
      title-fg: "#F0F0F0"
      body-fg: "#DCDCDC"
      footer-fg: "#CFCFCF"
      corner-radius: 1
      shadow-x: 1
      shadow-y: 1
