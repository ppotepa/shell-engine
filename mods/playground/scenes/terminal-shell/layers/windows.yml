# yaml-language-server: $schema=../../../schemas/layers.yaml
- name: terminal-shell-windows
  z_index: 2
  ui: true
  sprites:
    - type: window
      id: ui-terminal-input-shadow
      at: cb
      x: 1
      y: -2
      width-percent: 95
      height: 5
      title: ""
      title-id: ui-terminal-shadow-title
      body-id: ui-terminal-shadow-body
      footer-id: ui-terminal-shadow-footer
      body-content: ""
      footer-content: ""
      border-fg: "#2B2B2B"
      border-bg: "#151515"
      panel-bg: "#2F2F2F"
      title-fg: "#2F2F2F"
      body-fg: "#2F2F2F"
      footer-fg: "#2F2F2F"
      corner-radius: 1
      shadow-x: 1
      shadow-y: 1
      font: "generic:half"
    - type: window
      id: ui-terminal-input-window
      at: cb
      x: 0
      y: -3
      width-percent: 95
      height: 5
      title: ""
      title-id: ui-terminal-input-title
      body-id: ui-terminal-input-body
      footer-id: ui-terminal-prompt
      body-content: "type: help, ls, status, mission, logs"
      footer-content: ""
      border-fg: "#3A3A3A"
      border-bg: "#1C1C1C"
      panel-bg: "#5E5E5E"
      title-fg: "#F1F1F1"
      body-fg: "#E4E4E4"
      footer-fg: "#DADADA"
      corner-radius: 1
      shadow-x: 1
      shadow-y: 1
      font: "generic:half"
    - type: window
      id: ui-terminal-help-tooltip
      at: rt
      x: -2
      y: 1
      width: 38
      height: 5
      title: "HELP"
      body-content: "help | ls | status | mission | logs"
      footer-content: "Esc on empty prompt -> menu"
      border-fg: "#3B3B3B"
      border-bg: "#181818"
      panel-bg: "#4A4A4A"
      title-fg: "#F0F0F0"
      body-fg: "#DCDCDC"
      footer-fg: "#CFCFCF"
      corner-radius: 1
      shadow-x: 1
      shadow-y: 1
      font: "generic:half"
