# yaml-language-server: $schema=../../../schemas/layers.yaml
- name: terminal-shell-windows
  z_index: 2
  ui: true
  sprites:
    - type: window
      id: ui-terminal-input-window
      at: cb
      x: 0
      y: -2
      width-percent: 95
      height: 5
      title: "OPERATOR INPUT"
      title-id: ui-terminal-input-title
      body-id: ui-terminal-input-body
      footer-id: ui-terminal-prompt
      body-content: ""
      footer-content: ""
      border-fg: "#3A3A3A"
      border-bg: "#1C1C1C"
      panel-bg: "#5E5E5E"
      title-fg: "#F1F1F1"
      body-fg: "#D0D0D0"
      footer-fg: "#DADADA"
      corner-radius: 1
      shadow-x: 1
      shadow-y: 1
      font: "generic:half"
    - type: window
      id: ui-terminal-help-tooltip
      at: rt
      x: -2
      y: 1
      width: 44
      height: 5
      title: "COMMANDS"
      body-content: "HELP  LS  STATUS  MISSION  LOGS"
      footer-content: "ESC ON EMPTY PROMPT -> MENU"
      border-fg: "#3B3B3B"
      border-bg: "#181818"
      panel-bg: "#4A4A4A"
      title-fg: "#F0F0F0"
      body-fg: "#DCDCDC"
      footer-fg: "#CFCFCF"
      corner-radius: 1
      shadow-x: 1
      shadow-y: 1
      font: "generic:half"
