# yaml-language-server: $schema=../../../schemas/layers.yaml
- name: terminal-shell-bg
  z_index: 0
  sprite-defaults:
    type: text
    font: "generic:half"
    fg: "#B0B0B0"
  sprites:
    - type: text
      id: ui-shell-header
      at: lt
      x: 2
      y: 0
      content: "TERMINAL OUTPUT"
      fg: "#707070"
    - type: text
      id: ui-terminal-output
      at: lt
      x: 2
      y: 2
      content: ""
