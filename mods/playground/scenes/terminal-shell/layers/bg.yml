# yaml-language-server: $schema=../../../schemas/layers.yaml
- name: terminal-shell-bg
  z_index: 0
  sprite-defaults:
    type: text
    font: "generic:half"
    fg: "#B0B0B0"
  sprites:
    - type: text
      id: ui-shell-header
      at: ct
      y: -10
      content: "PLAYGROUND // TERMINAL SHELL PROJECT"
      fg: "#8C8C8C"
    - type: text
      id: ui-shell-subheader
      at: ct
      y: -8
      content: "background output stream"
      fg: "#6D6D6D"
    - type: text
      id: ui-terminal-output
      at: lt
      x: 2
      y: 2
      content: ""
