# yaml-language-server: $schema=../../schemas/scenes.yaml
id: playground-terminal-shell
title: Playground Terminal Shell
bg: "#151515"
ui:
  enabled: true
  persist: scene
  focus-order:
    - ui-terminal-prompt
layers:
  - ref: bg
  - ref: hud
input:
  terminal-shell:
    prompt_sprite_id: ui-terminal-prompt
    output_sprite_id: ui-terminal-output
    prompt_prefix: ">"
    max_lines: 200
    commands:
      - name: status
        description: Show system status
        output:
          - "power: online"
          - "hull: 92%"
          - "signal: stable"
      - name: mission
        description: Show current mission objective
        output:
          - "Objective: inspect the derelict relay station"
      - name: logs
        description: Tail recent system logs
        output:
          - "21:14:02 boot sequence complete"
          - "21:14:09 link established"
          - "21:14:12 awaiting operator command"
    unknown_message: "command not recognized"
stages-ref: /stages/anykey-loop-1200-fade-250-180.yml
next: playground-menu
