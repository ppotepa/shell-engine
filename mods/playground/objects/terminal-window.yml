# yaml-language-server: $schema=../schemas/object.yaml
kind: object
name: terminal-window
exports:
  frame_id: terminal-window-frame
  title_id: terminal-window-title
  body_id: terminal-window-body
  footer_id: terminal-window-footer
  title: TERMINAL WINDOW
  width: 90
  x: 0
  y: 8
  border_fg: gray
  title_fg: white
  body_fg: silver
  footer_fg: gray
  font: "generic:half"
sprites:
  - type: window
    id: "$frame_id"
    at: ct
    x: "$x"
    y: "$y"
    width: "$width"
    title: "$title"
    title-id: "$title_id"
    body-id: "$body_id"
    footer-id: "$footer_id"
    body-content: ""
    footer-content: ""
    border-fg: "$border_fg"
    title-fg: "$title_fg"
    body-fg: "$body_fg"
    footer-fg: "$footer_fg"
    font: "$font"
