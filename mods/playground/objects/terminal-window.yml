# yaml-language-server: $schema=../schemas/object.yaml
kind: object
name: terminal-window
exports:
  frame_id: terminal-window-frame
  title_id: terminal-window-title
  output_id: terminal-window-output
  prompt_id: terminal-window-prompt
  title: TERMINAL WINDOW
  width: 66
  height: 15
  x: 0
  y: 4
sprites:
  - type: window
    id: "$frame_id"
    at: cc
    x: "$x"
    y: "$y"
    width: "$width"
    height: "$height"
    title: "$title"
    title-id: "$title_id"
    body-id: "$output_id"
    footer-id: "$prompt_id"
    body-content: ""
    footer-content: ""
    border-fg: gray
    title-fg: white
    body-fg: silver
    footer-fg: green
    font: "generic:1"
