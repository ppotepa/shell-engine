# yaml-language-server: $schema=../schemas/object.yaml
kind: object
name: centered-endless-menu
exports:
  grid_id: menu-grid
  item_prefix: menu-item-
  window: 6
  step_y: 2
  endless: true
sprites:
  - type: grid
    id: "$grid_id"
    at: cc
    width: 40
    height: 23
    columns: ["1fr"]
    rows: ["auto", "auto", "auto", "auto", "auto", "auto", "auto", "auto", "auto", "auto", "auto", "auto"]
    gap-y: 1
    children:
      - { type: text, id: menu-item-0, content: "[1] 3D SCENE", grid-col: 1, grid-row: 1, at: cc, font: "generic:1", fg: white }
      - { type: text, id: menu-item-1, content: "[2] STOP ANIMATION", grid-col: 1, grid-row: 2, at: cc, font: "generic:1", fg: silver }
      - { type: text, id: menu-item-2, content: "[3] DECORATION SHOWCASE", grid-col: 1, grid-row: 3, at: cc, font: "generic:1", fg: gray }
      - { type: text, id: menu-item-3, content: "[4] TERMINAL SIZE TEST", grid-col: 1, grid-row: 4, at: cc, font: "generic:1", fg: silver }
      - { type: text, id: menu-item-4, content: "[5] FPS CAP SHOWCASE 2D+3D", grid-col: 1, grid-row: 5, at: cc, font: "generic:1", fg: gray }
      - { type: text, id: menu-item-5, content: "[6] FONT MODE SHOWCASE", grid-col: 1, grid-row: 6, at: cc, font: "generic:1", fg: silver }
      - { type: text, id: menu-item-6, content: "[7] TERMINAL SHELL DEMO", grid-col: 1, grid-row: 7, at: cc, font: "generic:1", fg: gray }
      - { type: text, id: menu-item-7, content: "[S+7] TERMINAL SHELL (SCRIPTED)", grid-col: 1, grid-row: 8, at: cc, font: "generic:1", fg: silver }
      - { type: text, id: menu-item-8, content: "[8] LAYOUT LAB", grid-col: 1, grid-row: 9, at: cc, font: "generic:1", fg: gray }
      - { type: text, id: menu-item-9, content: "[S+8] CRT-TEST", grid-col: 1, grid-row: 10, at: cc, font: "generic:1", fg: silver }
      - { type: text, id: menu-item-10, content: "[9] RHAI LAB", grid-col: 1, grid-row: 11, at: cc, font: "generic:1", fg: gray }
      - { type: text, id: menu-item-11, content: "[0] EXIT", grid-col: 1, grid-row: 12, at: cc, font: "generic:1", fg: silver }

  - { type: text, id: sel0-left, content: ">", at: cc, font: "generic:1", fg: yellow, behaviors: [{ name: selected-arrows, params: { target: menu-item-0, index: 0, side: left, padding: 1, amplitude_x: 1, period_ms: 900, autoscale_height: true } }] }
  - { type: text, id: sel0-right, content: "<", at: cc, font: "generic:1", fg: yellow, behaviors: [{ name: selected-arrows, params: { target: menu-item-0, index: 0, side: right, padding: 1, amplitude_x: 1, period_ms: 900, autoscale_height: true } }] }
  - { type: text, id: sel1-left, content: ">", at: cc, font: "generic:1", fg: yellow, behaviors: [{ name: selected-arrows, params: { target: menu-item-1, index: 1, side: left, padding: 1, amplitude_x: 1, period_ms: 900, autoscale_height: true } }] }
  - { type: text, id: sel1-right, content: "<", at: cc, font: "generic:1", fg: yellow, behaviors: [{ name: selected-arrows, params: { target: menu-item-1, index: 1, side: right, padding: 1, amplitude_x: 1, period_ms: 900, autoscale_height: true } }] }
