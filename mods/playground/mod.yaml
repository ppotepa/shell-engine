# yaml-language-server: $schema=./schemas/mod.yaml
name: Playground
version: 0.1.0
entrypoint: /scenes/menu/scene.yml
display:
  min_colours: 256
  min_width: 379
  min_height: 109
  default_font: "generic:2"
  # Compatibility exception: playground keeps output-tracking so resize-sensitive
  # lab scenes can still exercise the live output path intentionally.
  world_render_size: match-output
  presentation_policy: fit
