# yaml-language-server: $schema=../../../schemas/layers.yaml
# ── Settings Panel ───────────────────────────────────────────────────────────
# All 12 terrain generation parameters. Toggle with [S].
- name: settings-panel
  z_index: 20
  ui: true
  space: screen
  sprites:
    - type: panel
      id: settings-panel-box
      align-x: right
      align-y: top
      x: -8
      y: 8
      width: 220
      height: 335
      padding: 8
      border-width: 1
      corner-radius: 2
      fg: "#44cc88"
      bg: "#080f14"
      border-colour: "#2a6e55"
      shadow-x: 2
      shadow-y: 2
      shadow-colour: "#000000"
      visible: false
      children:
        - type: grid
          columns: ["1fr"]
          rows: ["auto","auto","auto","auto","auto","auto","auto","auto","auto","auto","auto","auto","auto","auto","auto","auto","auto","auto","auto","auto","auto","auto","auto","auto","auto","auto"]
          gap-y: 3
          children:
            # Row 1 — header
            - { type: text, content: "TERRAIN PARAMS", grid-col: 1, grid-row: 1, at: cc, font: "generic:2", fg: "#44cc88" }

            # Rows 2-3 — amplitude
            - { type: text, id: amp-label, content: "  AMPLITUDE  1.0", grid-col: 1, grid-row: 2, at: cl, x: 4, font: "generic:2", fg: "#aaccaa" }
            - { type: vector, id: amp-track,   grid-col: 1, grid-row: 3, points: [[4, 4], [184, 4]], stroke-width: 3, fg: "#2a6e55" }
            - { type: vector, id: amp-handle,  grid-col: 1, grid-row: 3, points: [[4, 0], [4, 8]],   stroke-width: 2, fg: "#44cc88" }

            # Rows 4-5 — frequency
            - { type: text, id: freq-label, content: "  FREQUENCY  1.0", grid-col: 1, grid-row: 4, at: cl, x: 4, font: "generic:2", fg: "#aaccaa" }
            - { type: vector, id: freq-track,  grid-col: 1, grid-row: 5, points: [[4, 4], [184, 4]], stroke-width: 3, fg: "#2a6e55" }
            - { type: vector, id: freq-handle, grid-col: 1, grid-row: 5, points: [[4, 0], [4, 8]],   stroke-width: 2, fg: "#44cc88" }

            # Rows 6-7 — octaves
            - { type: text, id: oct-label, content: "  OCTAVES    3", grid-col: 1, grid-row: 6, at: cl, x: 4, font: "generic:2", fg: "#aaccaa" }
            - { type: vector, id: oct-track,  grid-col: 1, grid-row: 7, points: [[4, 4], [184, 4]], stroke-width: 3, fg: "#2a6e55" }
            - { type: vector, id: oct-handle, grid-col: 1, grid-row: 7, points: [[4, 0], [4, 8]],   stroke-width: 2, fg: "#44cc88" }

            # Rows 8-9 — roughness
            - { type: text, id: rough-label, content: "  ROUGHNESS  100%", grid-col: 1, grid-row: 8, at: cl, x: 4, font: "generic:2", fg: "#aaccaa" }
            - { type: vector, id: rough-track,  grid-col: 1, grid-row: 9, points: [[4, 4], [184, 4]], stroke-width: 3, fg: "#2a6e55" }
            - { type: vector, id: rough-handle, grid-col: 1, grid-row: 9, points: [[4, 0], [4, 8]],   stroke-width: 2, fg: "#44cc88" }

            # Rows 10-11 — lacunarity
            - { type: text, id: lac-label, content: "  LACUNARITY 2.0", grid-col: 1, grid-row: 10, at: cl, x: 4, font: "generic:2", fg: "#aaccaa" }
            - { type: vector, id: lac-track,  grid-col: 1, grid-row: 11, points: [[4, 4], [184, 4]], stroke-width: 3, fg: "#2a6e55" }
            - { type: vector, id: lac-handle, grid-col: 1, grid-row: 11, points: [[4, 0], [4, 8]],   stroke-width: 2, fg: "#44cc88" }

            # Rows 12-13 — seed X
            - { type: text, id: seedx-label, content: "  SEED X     0.0", grid-col: 1, grid-row: 12, at: cl, x: 4, font: "generic:2", fg: "#aaccaa" }
            - { type: vector, id: seedx-track,  grid-col: 1, grid-row: 13, points: [[4, 4], [184, 4]], stroke-width: 3, fg: "#2a6e55" }
            - { type: vector, id: seedx-handle, grid-col: 1, grid-row: 13, points: [[4, 0], [4, 8]],   stroke-width: 2, fg: "#44cc88" }

            # Rows 14-15 — seed Z
            - { type: text, id: seedz-label, content: "  SEED Z     0.0", grid-col: 1, grid-row: 14, at: cl, x: 4, font: "generic:2", fg: "#aaccaa" }
            - { type: vector, id: seedz-track,  grid-col: 1, grid-row: 15, points: [[4, 4], [184, 4]], stroke-width: 3, fg: "#2a6e55" }
            - { type: vector, id: seedz-handle, grid-col: 1, grid-row: 15, points: [[4, 0], [4, 8]],   stroke-width: 2, fg: "#44cc88" }

            # Rows 16-17 — plateau
            - { type: text, id: plat-label, content: "  PLATEAU    0%", grid-col: 1, grid-row: 16, at: cl, x: 4, font: "generic:2", fg: "#aaccaa" }
            - { type: vector, id: plat-track,  grid-col: 1, grid-row: 17, points: [[4, 4], [184, 4]], stroke-width: 3, fg: "#2a6e55" }
            - { type: vector, id: plat-handle, grid-col: 1, grid-row: 17, points: [[4, 0], [4, 8]],   stroke-width: 2, fg: "#44cc88" }

            # Rows 18-19 — sea level
            - { type: text, id: sea-label, content: "  SEA LEVEL  0%", grid-col: 1, grid-row: 18, at: cl, x: 4, font: "generic:2", fg: "#aaccaa" }
            - { type: vector, id: sea-track,  grid-col: 1, grid-row: 19, points: [[4, 4], [184, 4]], stroke-width: 3, fg: "#2a6e55" }
            - { type: vector, id: sea-handle, grid-col: 1, grid-row: 19, points: [[4, 0], [4, 8]],   stroke-width: 2, fg: "#44cc88" }

            # Rows 20-21 — scale X
            - { type: text, id: scx-label, content: "  SCALE X    1.0", grid-col: 1, grid-row: 20, at: cl, x: 4, font: "generic:2", fg: "#aaccaa" }
            - { type: vector, id: scx-track,  grid-col: 1, grid-row: 21, points: [[4, 4], [184, 4]], stroke-width: 3, fg: "#2a6e55" }
            - { type: vector, id: scx-handle, grid-col: 1, grid-row: 21, points: [[4, 0], [4, 8]],   stroke-width: 2, fg: "#44cc88" }

            # Rows 22-23 — scale Z
            - { type: text, id: scz-label, content: "  SCALE Z    1.0", grid-col: 1, grid-row: 22, at: cl, x: 4, font: "generic:2", fg: "#aaccaa" }
            - { type: vector, id: scz-track,  grid-col: 1, grid-row: 23, points: [[4, 4], [184, 4]], stroke-width: 3, fg: "#2a6e55" }
            - { type: vector, id: scz-handle, grid-col: 1, grid-row: 23, points: [[4, 0], [4, 8]],   stroke-width: 2, fg: "#44cc88" }

            # Rows 24-25 — ridge mode
            - { type: text, id: ridge-label, content: "  RIDGE MODE [OFF]", grid-col: 1, grid-row: 24, at: cl, x: 4, font: "generic:2", fg: "#aaccaa" }
            - { type: vector, id: ridge-track,  grid-col: 1, grid-row: 25, points: [[4, 4], [184, 4]], stroke-width: 3, fg: "#2a6e55" }
            - { type: vector, id: ridge-handle, grid-col: 1, grid-row: 25, points: [[4, 0], [4, 8]],   stroke-width: 2, fg: "#44cc88" }

            # Row 26 — footer hint
            - { type: text, content: "↑↓ sel  ←→ adj  S close", grid-col: 1, grid-row: 26, at: cc, font: "generic:2", fg: "#2a6e55" }
