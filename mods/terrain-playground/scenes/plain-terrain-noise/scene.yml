# yaml-language-server: $schema=../../schemas/scenes.yaml
id: terrain-plain-noise
title: Plain Terrain (Noise)
bg: "#040810"
layers:
  - ref: main
  - ref: settings
logic:
  kind: script
  behavior: rhai-script
  src: ./terrain.rhai
input:
  orbit-camera:
    target: terrain-mesh
    yaw: 20.0
    pitch: -38.0
    distance: 2.4
    pitch-min: -85.0
    pitch-max: 0.0
    distance-min: 1.0
    distance-max: 8.0
    distance-step: 0.2
    drag-sensitivity: 0.3
postfx:
  - name: crt-scan-glitch
    params:
      intensity: 0.02
      transparency: 0.04
      brightness: 1.05
      speed: 0.15
stages:
  on_enter:
    steps:
      - { effects: [{ name: fade-in, duration: 400 }] }
  on_idle:
    looping: true
    steps:
      - pause: 60ms
  on_leave:
    steps:
      - { effects: [{ name: fade-out, duration: 250 }] }
