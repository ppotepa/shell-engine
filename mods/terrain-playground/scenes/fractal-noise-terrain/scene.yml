# yaml-language-server: $schema=../../schemas/scenes.yaml
id: terrain-fractal-noise
title: Fractal Noise Terrain
bg: "#08080c"
render-space: 3d
world-model: euclidean-3d
controller-defaults:
  camera-preset: orbit-camera
camera-rig:
  preset: orbit-camera
  orbit-camera:
    target: terrain-mesh
    yaw: 30.0
    pitch: -42.0
    distance: 2.6
    pitch-min: -85.0
    pitch-max: 0.0
    distance-min: 1.0
    distance-max: 8.0
    distance-step: 0.2
    drag-sensitivity: 0.3
layers:
  - ref: main
  - ref: settings
logic:
  kind: script
  behavior: rhai-script
  src: ./terrain.rhai
postfx:
  - name: crt-scan-glitch
    params:
      intensity: 0.02
      transparency: 0.04
      brightness: 1.05
      speed: 0.15
stages:
  on_enter:
    steps:
      - { effects: [{ name: fade-in, duration: 400 }] }
  on_idle:
    looping: true
    steps:
      - pause: 60ms
  on_leave:
    steps:
      - { effects: [{ name: fade-out, duration: 250 }] }
