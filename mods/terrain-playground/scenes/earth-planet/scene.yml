id: terrain-earth-planet
title: Earth-Like Planet
bg: "#020810"
render-space: 3d
world-model: euclidean-3d
controller-defaults:
  camera-preset: orbit-camera
camera-rig:
  preset: orbit-camera
  orbit-camera:
    target: earth-mesh
    yaw: 30.0
    pitch: 20.0
    distance: 2.5
    pitch-min: -85.0
    pitch-max: 85.0
    distance-min: 1.5
    distance-max: 6.0
    distance-step: 0.2
    drag-sensitivity: 0.3
  free-look-camera: {}
layers:
  - ref: main
  - ref: settings
logic:
  kind: script
  behavior: rhai-script
  src: ./earth.rhai
postfx:
  - name: crt-scan-glitch
    params:
      intensity: 0.015
      transparency: 0.03
      brightness: 1.08
      speed: 0.12
stages:
  on_enter:
    steps:
      - { effects: [{ name: fade-in, duration: 400 }] }
  on_idle:
    looping: true
    steps:
      - pause: 60ms
  on_leave:
    steps:
      - { effects: [{ name: fade-out, duration: 250 }] }
