# yaml-language-server: $schema=../../../schemas/layers.yaml
# ── Earth Planet Settings Panel ───────────────────────────────────────────────
# 12 terrain generation parameters matching terrain-sphere. Toggle with [S].
- name: earth-settings-panel
  z_index: 20
  ui: true
  space: screen
  sprites:
    - type: panel
      id: earth-settings-box
      align-x: right
      align-y: top
      x: -8
      y: 8
      width: 220
      height: 335
      padding: 8
      border-width: 1
      corner-radius: 2
      fg: "#2a9440"
      bg: "#020810"
      border-colour: "#1a5c28"
      shadow-x: 2
      shadow-y: 2
      shadow-colour: "#000000"
      visible: false
      children:
        - type: grid
          columns: ["1fr"]
          rows: ["auto","auto","auto","auto","auto","auto","auto","auto","auto","auto","auto","auto","auto","auto","auto","auto","auto","auto","auto","auto","auto","auto","auto","auto","auto","auto"]
          gap-y: 3
          children:
            # Row 1 — header
            - { type: text, content: "PLANET TERRAIN PARAMS", grid-col: 1, grid-row: 1, at: cc, font: "generic:1", fg: "#2a9440" }

            # Rows 2-3 — amplitude
            - { type: text, id: ep-amp-label, content: "  AMPLITUDE  1.0", grid-col: 1, grid-row: 2, at: cl, x: 4, font: "generic:1", fg: "#88bbaa" }
            - { type: vector, id: ep-amp-track,   grid-col: 1, grid-row: 3, points: [[4, 4], [184, 4]], stroke-width: 3, fg: "#1a5c28" }
            - { type: vector, id: ep-amp-handle,  grid-col: 1, grid-row: 3, points: [[4, 0], [4, 8]],   stroke-width: 2, fg: "#2a9440" }

            # Rows 4-5 — frequency
            - { type: text, id: ep-freq-label, content: "  FREQUENCY  1.0", grid-col: 1, grid-row: 4, at: cl, x: 4, font: "generic:1", fg: "#88bbaa" }
            - { type: vector, id: ep-freq-track,  grid-col: 1, grid-row: 5, points: [[4, 4], [184, 4]], stroke-width: 3, fg: "#1a5c28" }
            - { type: vector, id: ep-freq-handle, grid-col: 1, grid-row: 5, points: [[4, 0], [4, 8]],   stroke-width: 2, fg: "#2a9440" }

            # Rows 6-7 — octaves
            - { type: text, id: ep-oct-label, content: "  OCTAVES    3", grid-col: 1, grid-row: 6, at: cl, x: 4, font: "generic:1", fg: "#88bbaa" }
            - { type: vector, id: ep-oct-track,  grid-col: 1, grid-row: 7, points: [[4, 4], [184, 4]], stroke-width: 3, fg: "#1a5c28" }
            - { type: vector, id: ep-oct-handle, grid-col: 1, grid-row: 7, points: [[4, 0], [4, 8]],   stroke-width: 2, fg: "#2a9440" }

            # Rows 8-9 — roughness
            - { type: text, id: ep-rough-label, content: "  ROUGHNESS  100%", grid-col: 1, grid-row: 8, at: cl, x: 4, font: "generic:1", fg: "#88bbaa" }
            - { type: vector, id: ep-rough-track,  grid-col: 1, grid-row: 9, points: [[4, 4], [184, 4]], stroke-width: 3, fg: "#1a5c28" }
            - { type: vector, id: ep-rough-handle, grid-col: 1, grid-row: 9, points: [[4, 0], [4, 8]],   stroke-width: 2, fg: "#2a9440" }

            # Rows 10-11 — lacunarity
            - { type: text, id: ep-lac-label, content: "  LACUNARITY 2.0", grid-col: 1, grid-row: 10, at: cl, x: 4, font: "generic:1", fg: "#88bbaa" }
            - { type: vector, id: ep-lac-track,  grid-col: 1, grid-row: 11, points: [[4, 4], [184, 4]], stroke-width: 3, fg: "#1a5c28" }
            - { type: vector, id: ep-lac-handle, grid-col: 1, grid-row: 11, points: [[4, 0], [4, 8]],   stroke-width: 2, fg: "#2a9440" }

            # Rows 12-13 — seed X
            - { type: text, id: ep-seedx-label, content: "  SEED X     0.0", grid-col: 1, grid-row: 12, at: cl, x: 4, font: "generic:1", fg: "#88bbaa" }
            - { type: vector, id: ep-seedx-track,  grid-col: 1, grid-row: 13, points: [[4, 4], [184, 4]], stroke-width: 3, fg: "#1a5c28" }
            - { type: vector, id: ep-seedx-handle, grid-col: 1, grid-row: 13, points: [[4, 0], [4, 8]],   stroke-width: 2, fg: "#2a9440" }

            # Rows 14-15 — seed Z
            - { type: text, id: ep-seedz-label, content: "  SEED Z     0.0", grid-col: 1, grid-row: 14, at: cl, x: 4, font: "generic:1", fg: "#88bbaa" }
            - { type: vector, id: ep-seedz-track,  grid-col: 1, grid-row: 15, points: [[4, 4], [184, 4]], stroke-width: 3, fg: "#1a5c28" }
            - { type: vector, id: ep-seedz-handle, grid-col: 1, grid-row: 15, points: [[4, 0], [4, 8]],   stroke-width: 2, fg: "#2a9440" }

            # Rows 16-17 — plateau
            - { type: text, id: ep-plat-label, content: "  PLATEAU    0%", grid-col: 1, grid-row: 16, at: cl, x: 4, font: "generic:1", fg: "#88bbaa" }
            - { type: vector, id: ep-plat-track,  grid-col: 1, grid-row: 17, points: [[4, 4], [184, 4]], stroke-width: 3, fg: "#1a5c28" }
            - { type: vector, id: ep-plat-handle, grid-col: 1, grid-row: 17, points: [[4, 0], [4, 8]],   stroke-width: 2, fg: "#2a9440" }

            # Rows 18-19 — sea level
            - { type: text, id: ep-sea-label, content: "  SEA LEVEL  0%", grid-col: 1, grid-row: 18, at: cl, x: 4, font: "generic:1", fg: "#88bbaa" }
            - { type: vector, id: ep-sea-track,  grid-col: 1, grid-row: 19, points: [[4, 4], [184, 4]], stroke-width: 3, fg: "#1a5c28" }
            - { type: vector, id: ep-sea-handle, grid-col: 1, grid-row: 19, points: [[4, 0], [4, 8]],   stroke-width: 2, fg: "#2a9440" }

            # Rows 20-21 — scale X
            - { type: text, id: ep-scx-label, content: "  SCALE X    1.0", grid-col: 1, grid-row: 20, at: cl, x: 4, font: "generic:1", fg: "#88bbaa" }
            - { type: vector, id: ep-scx-track,  grid-col: 1, grid-row: 21, points: [[4, 4], [184, 4]], stroke-width: 3, fg: "#1a5c28" }
            - { type: vector, id: ep-scx-handle, grid-col: 1, grid-row: 21, points: [[4, 0], [4, 8]],   stroke-width: 2, fg: "#2a9440" }

            # Rows 22-23 — scale Z
            - { type: text, id: ep-scz-label, content: "  SCALE Z    1.0", grid-col: 1, grid-row: 22, at: cl, x: 4, font: "generic:1", fg: "#88bbaa" }
            - { type: vector, id: ep-scz-track,  grid-col: 1, grid-row: 23, points: [[4, 4], [184, 4]], stroke-width: 3, fg: "#1a5c28" }
            - { type: vector, id: ep-scz-handle, grid-col: 1, grid-row: 23, points: [[4, 0], [4, 8]],   stroke-width: 2, fg: "#2a9440" }

            # Rows 24-25 — ridge mode
            - { type: text, id: ep-ridge-label, content: "  RIDGE MODE [OFF]", grid-col: 1, grid-row: 24, at: cl, x: 4, font: "generic:1", fg: "#88bbaa" }
            - { type: vector, id: ep-ridge-track,  grid-col: 1, grid-row: 25, points: [[4, 4], [184, 4]], stroke-width: 3, fg: "#1a5c28" }
            - { type: vector, id: ep-ridge-handle, grid-col: 1, grid-row: 25, points: [[4, 0], [4, 8]],   stroke-width: 2, fg: "#2a9440" }

            # Row 26 — footer hint
            - { type: text, content: "↑↓ sel  ←→ adj  S close", grid-col: 1, grid-row: 26, at: cc, font: "generic:1", fg: "#1a5c28" }
