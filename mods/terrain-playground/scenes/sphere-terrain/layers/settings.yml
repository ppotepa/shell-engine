# yaml-language-server: $schema=../../../schemas/layers.yaml
# ── Sphere Terrain Settings Panel ────────────────────────────────────────────
# 12 terrain generation parameters (same as terrain plane). Toggle with [S].
- name: sphere-settings-panel
  z_index: 20
  ui: true
  space: screen
  sprites:
    - type: panel
      id: sphere-settings-box
      align-x: right
      align-y: top
      x: -8
      y: 8
      width: 220
      height: 335
      padding: 8
      border-width: 1
      corner-radius: 2
      fg: "#4488cc"
      bg: "#040c18"
      border-colour: "#2a4e88"
      shadow-x: 2
      shadow-y: 2
      shadow-colour: "#000000"
      visible: false
      children:
        - type: grid
          columns: ["1fr"]
          rows: ["auto","auto","auto","auto","auto","auto","auto","auto","auto","auto","auto","auto","auto","auto","auto","auto","auto","auto","auto","auto","auto","auto","auto","auto","auto","auto"]
          gap-y: 3
          children:
            # Row 1 — header
            - { type: text, content: "SPHERE TERRAIN PARAMS", grid-col: 1, grid-row: 1, at: cc, font: "generic:2", fg: "#4488cc" }

            # Rows 2-3 — amplitude
            - { type: text, id: sp-amp-label, content: "  AMPLITUDE  1.0", grid-col: 1, grid-row: 2, at: cl, x: 4, font: "generic:2", fg: "#aabbdd" }
            - { type: vector, id: sp-amp-track,   grid-col: 1, grid-row: 3, points: [[4, 4], [184, 4]], stroke-width: 3, fg: "#2a4e88" }
            - { type: vector, id: sp-amp-handle,  grid-col: 1, grid-row: 3, points: [[4, 0], [4, 8]],   stroke-width: 2, fg: "#4488cc" }

            # Rows 4-5 — frequency
            - { type: text, id: sp-freq-label, content: "  FREQUENCY  1.0", grid-col: 1, grid-row: 4, at: cl, x: 4, font: "generic:2", fg: "#aabbdd" }
            - { type: vector, id: sp-freq-track,  grid-col: 1, grid-row: 5, points: [[4, 4], [184, 4]], stroke-width: 3, fg: "#2a4e88" }
            - { type: vector, id: sp-freq-handle, grid-col: 1, grid-row: 5, points: [[4, 0], [4, 8]],   stroke-width: 2, fg: "#4488cc" }

            # Rows 6-7 — octaves
            - { type: text, id: sp-oct-label, content: "  OCTAVES    3", grid-col: 1, grid-row: 6, at: cl, x: 4, font: "generic:2", fg: "#aabbdd" }
            - { type: vector, id: sp-oct-track,  grid-col: 1, grid-row: 7, points: [[4, 4], [184, 4]], stroke-width: 3, fg: "#2a4e88" }
            - { type: vector, id: sp-oct-handle, grid-col: 1, grid-row: 7, points: [[4, 0], [4, 8]],   stroke-width: 2, fg: "#4488cc" }

            # Rows 8-9 — roughness
            - { type: text, id: sp-rough-label, content: "  ROUGHNESS  100%", grid-col: 1, grid-row: 8, at: cl, x: 4, font: "generic:2", fg: "#aabbdd" }
            - { type: vector, id: sp-rough-track,  grid-col: 1, grid-row: 9, points: [[4, 4], [184, 4]], stroke-width: 3, fg: "#2a4e88" }
            - { type: vector, id: sp-rough-handle, grid-col: 1, grid-row: 9, points: [[4, 0], [4, 8]],   stroke-width: 2, fg: "#4488cc" }

            # Rows 10-11 — lacunarity
            - { type: text, id: sp-lac-label, content: "  LACUNARITY 2.0", grid-col: 1, grid-row: 10, at: cl, x: 4, font: "generic:2", fg: "#aabbdd" }
            - { type: vector, id: sp-lac-track,  grid-col: 1, grid-row: 11, points: [[4, 4], [184, 4]], stroke-width: 3, fg: "#2a4e88" }
            - { type: vector, id: sp-lac-handle, grid-col: 1, grid-row: 11, points: [[4, 0], [4, 8]],   stroke-width: 2, fg: "#4488cc" }

            # Rows 12-13 — seed X
            - { type: text, id: sp-seedx-label, content: "  SEED X     0.0", grid-col: 1, grid-row: 12, at: cl, x: 4, font: "generic:2", fg: "#aabbdd" }
            - { type: vector, id: sp-seedx-track,  grid-col: 1, grid-row: 13, points: [[4, 4], [184, 4]], stroke-width: 3, fg: "#2a4e88" }
            - { type: vector, id: sp-seedx-handle, grid-col: 1, grid-row: 13, points: [[4, 0], [4, 8]],   stroke-width: 2, fg: "#4488cc" }

            # Rows 14-15 — seed Z
            - { type: text, id: sp-seedz-label, content: "  SEED Z     0.0", grid-col: 1, grid-row: 14, at: cl, x: 4, font: "generic:2", fg: "#aabbdd" }
            - { type: vector, id: sp-seedz-track,  grid-col: 1, grid-row: 15, points: [[4, 4], [184, 4]], stroke-width: 3, fg: "#2a4e88" }
            - { type: vector, id: sp-seedz-handle, grid-col: 1, grid-row: 15, points: [[4, 0], [4, 8]],   stroke-width: 2, fg: "#4488cc" }

            # Rows 16-17 — plateau
            - { type: text, id: sp-plat-label, content: "  PLATEAU    0%", grid-col: 1, grid-row: 16, at: cl, x: 4, font: "generic:2", fg: "#aabbdd" }
            - { type: vector, id: sp-plat-track,  grid-col: 1, grid-row: 17, points: [[4, 4], [184, 4]], stroke-width: 3, fg: "#2a4e88" }
            - { type: vector, id: sp-plat-handle, grid-col: 1, grid-row: 17, points: [[4, 0], [4, 8]],   stroke-width: 2, fg: "#4488cc" }

            # Rows 18-19 — sea level
            - { type: text, id: sp-sea-label, content: "  SEA LEVEL  0%", grid-col: 1, grid-row: 18, at: cl, x: 4, font: "generic:2", fg: "#aabbdd" }
            - { type: vector, id: sp-sea-track,  grid-col: 1, grid-row: 19, points: [[4, 4], [184, 4]], stroke-width: 3, fg: "#2a4e88" }
            - { type: vector, id: sp-sea-handle, grid-col: 1, grid-row: 19, points: [[4, 0], [4, 8]],   stroke-width: 2, fg: "#4488cc" }

            # Rows 20-21 — scale X
            - { type: text, id: sp-scx-label, content: "  SCALE X    1.0", grid-col: 1, grid-row: 20, at: cl, x: 4, font: "generic:2", fg: "#aabbdd" }
            - { type: vector, id: sp-scx-track,  grid-col: 1, grid-row: 21, points: [[4, 4], [184, 4]], stroke-width: 3, fg: "#2a4e88" }
            - { type: vector, id: sp-scx-handle, grid-col: 1, grid-row: 21, points: [[4, 0], [4, 8]],   stroke-width: 2, fg: "#4488cc" }

            # Rows 22-23 — scale Z
            - { type: text, id: sp-scz-label, content: "  SCALE Z    1.0", grid-col: 1, grid-row: 22, at: cl, x: 4, font: "generic:2", fg: "#aabbdd" }
            - { type: vector, id: sp-scz-track,  grid-col: 1, grid-row: 23, points: [[4, 4], [184, 4]], stroke-width: 3, fg: "#2a4e88" }
            - { type: vector, id: sp-scz-handle, grid-col: 1, grid-row: 23, points: [[4, 0], [4, 8]],   stroke-width: 2, fg: "#4488cc" }

            # Rows 24-25 — ridge mode
            - { type: text, id: sp-ridge-label, content: "  RIDGE MODE [OFF]", grid-col: 1, grid-row: 24, at: cl, x: 4, font: "generic:2", fg: "#aabbdd" }
            - { type: vector, id: sp-ridge-track,  grid-col: 1, grid-row: 25, points: [[4, 4], [184, 4]], stroke-width: 3, fg: "#2a4e88" }
            - { type: vector, id: sp-ridge-handle, grid-col: 1, grid-row: 25, points: [[4, 0], [4, 8]],   stroke-width: 2, fg: "#4488cc" }

            # Row 26 — footer hint
            - { type: text, content: "↑↓ sel  ←→ adj  S close", grid-col: 1, grid-row: 26, at: cc, font: "generic:2", fg: "#2a4e88" }
