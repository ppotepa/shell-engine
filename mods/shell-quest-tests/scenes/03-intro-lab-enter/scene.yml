# Test variant - same as original (uses timeout)
id: 03.intro.lab-enter
title: 03 Intro Lab Enter (Test)
cutscene: true
bg: black
layers:
  - ref: main
stages:
  on_enter:
    steps:
      - { effects: [{ name: fade-in, duration: 220, params: { easing: ease-out } }] }
      - { pause: 1600ms }
      - { effects: [{ name: fade-out, duration: 260, params: { easing: ease-in } }] }
  on_idle:
    trigger: timeout
    timeout: 1000ms
    steps: [{ pause: 1ms }]
  on_leave:
    steps: [{ pause: 80ms }]
