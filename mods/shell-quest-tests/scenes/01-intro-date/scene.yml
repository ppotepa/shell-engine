# Test variant — compressed for benchmarking
# Original: ~9780ms, compressed: ~2000ms
id: 01.intro.date
title: 01 Intro Date (Test)
cutscene: true
bg: black
layers:
  - ref: main
stages:
  on_enter:
    steps:
      - { duration: 1400, effects: [{ name: scanlines, duration: 1400 }] }
  on_idle:
    trigger: timeout
    timeout: 400ms
    steps:
      - { duration: 1, effects: [{ name: clear-to-colour, duration: 1, params: { colour: black } }] }
  on_leave:
    steps:
      - { duration: 100, effects: [{ name: clear-to-colour, duration: 100, params: { colour: black } }] }
