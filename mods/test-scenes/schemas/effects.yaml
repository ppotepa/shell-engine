$schema: https://json-schema.org/draft/2020-12/schema
$id: https://shell-quest.local/mods/test-scenes/schemas/effects.yaml
title: schema test-scenes effects
type: array
items:
  oneOf:
  - type: object
    properties:
      use:
        type: string
        minLength: 1
      preset:
        type: string
        minLength: 1
      ref:
        type: string
        minLength: 1
      overrides:
        type: object
        default: {}
        additionalProperties: true
    additionalProperties: true
    anyOf:
    - required:
      - use
    - required:
      - preset
    - required:
      - ref
    title: effect preset alias
