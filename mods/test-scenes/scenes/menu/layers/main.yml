# yaml-language-server: $schema=../../../schemas/layers.yaml
- name: menu
  z_index: 0
  sprites:
    - { type: text, content: "TEST SCENES", at: ct, y: 2, font: "generic:1", fg: white }
    - { type: text, content: "CUTSCENE COMPARISON", at: ct, y: 4, font: "generic:1", fg: gray }
    - type: grid
      id: menu-grid
      at: cc
      width: 52
      height: 9
      columns: ["1fr"]
      rows: ["auto", "auto", "auto"]
      gap-y: 1
      children:
        - { type: text, id: menu-item-0, content: "[1] LAB OPEN GIF 320x180", grid-col: 1, grid-row: 1, at: cc, font: "generic:1", fg: white, behaviors: [{ name: menu-carousel, params: { target: menu-grid, index: 0, window: 3, step_y: 2, endless: true } }] }
        - { type: text, id: menu-item-1, content: "[2] LAB OPEN GIF 640x360", grid-col: 1, grid-row: 2, at: cc, font: "generic:1", fg: silver, behaviors: [{ name: menu-carousel, params: { target: menu-grid, index: 1, window: 3, step_y: 2, endless: true } }] }
        - { type: text, id: menu-item-2, content: "[3] LAB OPEN PNG 640x360 (direct)", grid-col: 1, grid-row: 3, at: cc, font: "generic:1", fg: gray, behaviors: [{ name: menu-carousel, params: { target: menu-grid, index: 2, window: 3, step_y: 2, endless: true } }] }

    - { type: text, id: sel0-left, content: ">", at: cc, font: "generic:1", fg: yellow, behaviors: [{ name: selected-arrows, params: { target: menu-item-0, index: 0, side: left, padding: 1, amplitude_x: 1, period_ms: 900, autoscale_height: true } }] }
    - { type: text, id: sel0-right, content: "<", at: cc, font: "generic:1", fg: yellow, behaviors: [{ name: selected-arrows, params: { target: menu-item-0, index: 0, side: right, padding: 1, amplitude_x: 1, period_ms: 900, autoscale_height: true } }] }
    - { type: text, id: sel1-left, content: ">", at: cc, font: "generic:1", fg: yellow, behaviors: [{ name: selected-arrows, params: { target: menu-item-1, index: 1, side: left, padding: 1, amplitude_x: 1, period_ms: 900, autoscale_height: true } }] }
    - { type: text, id: sel1-right, content: "<", at: cc, font: "generic:1", fg: yellow, behaviors: [{ name: selected-arrows, params: { target: menu-item-1, index: 1, side: right, padding: 1, amplitude_x: 1, period_ms: 900, autoscale_height: true } }] }
    - { type: text, id: sel2-left, content: ">", at: cc, font: "generic:1", fg: yellow, behaviors: [{ name: selected-arrows, params: { target: menu-item-2, index: 2, side: left, padding: 1, amplitude_x: 1, period_ms: 900, autoscale_height: true } }] }
    - { type: text, id: sel2-right, content: "<", at: cc, font: "generic:1", fg: yellow, behaviors: [{ name: selected-arrows, params: { target: menu-item-2, index: 2, side: right, padding: 1, amplitude_x: 1, period_ms: 900, autoscale_height: true } }] }

    - { type: text, content: "Arrows: navigate, Enter: select, [1]-[3]: shortcut", at: cb, y: -1, font: "generic:1", fg: gray, hide_on_leave: true, behaviors: [{ name: blink, params: { visible_ms: 700, hidden_ms: 700 } }] }
