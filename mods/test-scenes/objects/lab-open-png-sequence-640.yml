# yaml-language-server: $schema=../schemas/object.yaml
kind: object
name: lab-open-png-sequence-640
sprites:
  - type: frame-sequence
    id-prefix: door-png-
    source-pattern: /assets/lab-open-640/{i}.png
    from: 1
    to: 8
    delay-ms: 250
    last-delay-ms: 450
    sprite-defaults:
      at: cc
      stretch-to-area: true
      force-renderer-mode: cell
