# yaml-language-server: $schema=../../schemas/scenes.yaml
id: asteroids.mainmenu
title: Asteroids Main Menu
bg: black
layers:
  - name: menu
    z_index: 0
    objects:
      - ref: centered-endless-menu
    sprites:
      - { type: text, id: title, content: "ASTEROIDS", at: ct, y: -9, font: "generic:2", fg: white }
      - { type: text, id: subtitle, content: "Normal difficulty", at: ct, y: -6, font: "generic:1", fg: "#7bd1ff" }
      - { type: text, id: hint, content: "A/D rotate | W thrust | SPACE fire | R reset", at: cb, y: -2, font: "generic:1", fg: gray }
      - { type: text, id: prompt, content: "Arrows navigate, Enter select", at: cb, y: -1, font: "generic:1", fg: white, behaviors: [{ name: blink, params: { visible_ms: 700, hidden_ms: 700 } }] }
menu-options:
  - { key: "1", label: START GAME, to: asteroids.game }
  - { key: "0", label: QUIT, to: asteroids.exit }
stages:
  on_enter:
    steps:
      - { effects: [{ name: fade-in, duration: 250 }] }
  on_idle:
    trigger: any-key
    looping: true
    steps:
      - pause: 1000ms
  on_leave:
    steps:
      - { effects: [{ name: fade-out, duration: 180 }] }
