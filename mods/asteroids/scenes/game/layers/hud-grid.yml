# HUD Layer — Taffy Grid Layout
#
# Outer frame grid provides uniform margins (24px H, 16px V) matching other scenes.
# Inner 3×3 corner grid: auto corners, 1fr flexible center.
# Corner panels are pure layout containers — no border, bg, or shadow.
#
- name: hud
  z_index: 10
  ui: true
  space: screen
  sprites:
    - type: grid
      id: hud-frame
      at: tl
      columns: ["24", "1fr", "24"]
      rows: ["16", "1fr", "16"]
      children:
        - type: grid
          id: hud-grid
          grid-col: 2
          grid-row: 2
          columns: ["auto", "1fr", "auto"]
          rows: ["auto", "1fr", "auto"]
          gap-x: 8
          gap-y: 4
          children:
            # ── Bottom-centre: Orbital telemetry ─────────────────────────────
            - type: panel
              id: hud-orbital-panel
              grid-col: 2
              grid-row: 3
              at: bc
              padding: 6
              children:
                - type: grid
                  columns: ["auto", "1fr", "auto"]
                  rows: ["auto", "auto"]
                  gap-x: 14
                  gap-y: 2
                  children:
                    - { type: text, id: hud-orbital-alt,    content: "ALT  ---", grid-col: 1, grid-row: 1, at: bc, font: "generic:2", fg: "@palette.hud_label" }
                    - { type: text, id: hud-orbital-status, content: "ORBIT",    grid-col: 2, grid-row: 1, at: bc, font: "generic:2", fg: "@palette.hud_value" }
                    - { type: text, id: hud-orbital-tspd,   content: "TSPD ---", grid-col: 3, grid-row: 1, at: bc, font: "generic:2", fg: "@palette.hud_label" }
                    - { type: text, id: hud-orbital-rspd,   content: "RSPD ---", grid-col: 1, grid-row: 2, at: bc, font: "generic:2", fg: "@palette.hud_label" }
                    - { type: text, id: hud-orbital-heat,   content: "HEAT ---", grid-col: 2, grid-row: 2, at: bc, font: "generic:2", fg: "@palette.hud_value" }
                    - { type: text, id: hud-orbital-vxy,    content: "REF  ---", grid-col: 3, grid-row: 2, at: bc, font: "generic:2", fg: "@palette.hud_label" }

            # ── Bottom-right: Hint ────────────────────────────────────────────
            - type: panel
              id: hud-hint-panel
              grid-col: 3
              grid-row: 3
              at: br
              padding: 8
              children:
                - { type: text, id: hud-hint, content: "ESC  MENU", at: br, font: "generic:2", fg: "@palette.hud_label", opacity: 0.7 }

