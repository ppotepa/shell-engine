# Asteroid Generator Layer
#
# Pre-defined pool of 28 OBJ sprite slots (8 large, 8 medium, 12 small).
# game-loop.rhai assigns physics entities to slots each frame via scene.set().
#
# All slots use camera-source: scene so they share the 3D chase camera.
# Scale is tuned against the prefab collider ratios (10 / 6 / 3) and the
# shared scene-camera framing so large asteroids do not dwarf the ship.
#
# Unused slots are hidden each frame by the generator loop (visible=false).
# Active slots get obj.world.x/y/z set to the entity's 3D scene position.
#
# z_index: -20 — above planet (-50) and stars (-55), below HUD and particles.

# ── LARGE slots (8) ─────────────────────────────────────────────────────────
- name: ast-gen
  z_index: -20
  ui: true
  space: 3d
  sprites:
    - type: obj
      id: ast-slot-L-0
      source: /assets/3d/rock.obj
      x: 0
      y: 0
      scale: 0.09
      surface-mode: material
      prerender: false
      rotation-y: 0
      pitch-deg: 0
      camera-source: scene
      fov-degrees: 65
      near-clip: 0.01
      smooth-shading: true
      ambient: 0.07
      light-direction-x: 0.72
      light-direction-y: -0.56
      light-direction-z: 0.40
      fg_colour: "#807870"
      shadow-colour: "#1a1612"
      midtone-colour: "#504840"
      highlight-colour: "#b0a898"

