# Planets Layer — z_index: 1
#
# Large background planetary bodies. Pure visual decoration — no collision,
# no gameplay role. Drawn above the star field and below the game plane.
#
# Each planet is a spinning 3D OBJ sphere rendered by engine-3d.
# rotate-y-deg-per-sec drives the spin declaratively — no Rhai needed.
# Light direction is shared: sun is upper-left, casting shadows right/down.
#
# Palette keys used:
#   planet_lit    — sunlit face colour
#   planet_shadow — dark-side fill colour

- name: planets
  z_index: -35
  ui: true
  sprites:
    # ── Large planet (right-centre, partially off right edge) ──────────────
    - type: obj
      id: planet-large
      source: /assets/3d/sphere.obj
      x: 460
      y: 220
      width: 140
      height: 70
      scale: 1.0
      surface-mode: material
      rotate-y-deg-per-sec: 7
      rotation-y: 30
      pitch-deg: -12
      camera-distance: 2.6
      fov-degrees: 45
      near-clip: 0.01
      fg: "@palette.planet_lit"
      light-direction-x: 0.6
      light-direction-y: -0.7
      light-direction-z: 0.4

    # ── Small planet (upper-left quadrant) ─────────────────────────────────
    - type: obj
      id: planet-small
      source: /assets/3d/sphere.obj
      x: 80
      y: 48
      width: 60
      height: 30
      scale: 1.0
      surface-mode: material
      rotate-y-deg-per-sec: -11
      rotation-y: 120
      pitch-deg: 8
      camera-distance: 2.6
      fov-degrees: 45
      near-clip: 0.01
      fg: "@palette.planet_lit"
      light-direction-x: 0.6
      light-direction-y: -0.7
      light-direction-z: 0.4

    # ── Moon (companion to large planet) ───────────────────────────────────
    - type: obj
      id: planet-moon
      source: /assets/3d/sphere.obj
      x: 556
      y: 198
      width: 26
      height: 13
      scale: 1.0
      surface-mode: material
      rotate-y-deg-per-sec: 18
      rotation-y: 200
      pitch-deg: 5
      camera-distance: 2.6
      fov-degrees: 45
      near-clip: 0.01
      fg: "@palette.planet_lit"
      light-direction-x: 0.6
      light-direction-y: -0.7
      light-direction-z: 0.4
