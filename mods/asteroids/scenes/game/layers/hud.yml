- name: hud
  z_index: 10
  sprites:
    - type: text
      id: hud-label-score
      content: "SCORE"
      at: tl
      x: 2
      y: 2
      font: "Orbitron:ascii"
      fg: "@palette.hud_label"

    - type: text
      id: hud-score
      content: "0"
      at: tl
      x: 2
      y: 12
      font: "Orbitron:ascii"
      fg: "@palette.hud_value"

    - type: text
      id: hud-label-lives
      content: "LIVES"
      at: tl
      x: 2
      y: 24
      font: "Orbitron:ascii"
      fg: "@palette.hud_label"

    - type: text
      id: hud-lives
      content: "3"
      at: tl
      x: 2
      y: 34
      font: "Orbitron:ascii"
      fg: "@palette.hud_value"

    - type: text
      id: hud-label-wave
      content: "WAVE"
      at: tl
      x: 2
      y: 46
      font: "Orbitron:ascii"
      fg: "@palette.hud_label"

    - type: text
      id: hud-wave
      content: "1"
      at: tl
      x: 2
      y: 56
      font: "Orbitron:ascii"
      fg: "@palette.hud_value"

    - type: text
      id: hud-gameover
      content: "GAME OVER"
      at: cc
      y: -10
      font: "Orbitron:ascii"
      fg: "@palette.gameover"
      visible: false

    - type: text
      id: hud-gameover-sub
      content: "PRESS SPACE TO RESTART"
      at: cc
      y: 8
      font: "generic:1"
      fg: "@palette.gameover_sub"
      visible: false
