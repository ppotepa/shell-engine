- name: hud
  z_index: 10
  sprites:
    - type: text
      content: "SCORE"
      at: tl
      x: 2
      y: 2
      font: "Space Mono:ascii"
      fg: "#4a7a4a"

    - type: text
      id: hud-score
      content: "0"
      at: tl
      x: 2
      y: 14
      font: "Space Mono:ascii"
      fg: "#6fc54a"

    - type: text
      content: "LIVES"
      at: tl
      x: 2
      y: 30
      font: "Space Mono:ascii"
      fg: "#4a7a4a"

    - type: text
      id: hud-lives
      content: "3"
      at: tl
      x: 2
      y: 42
      font: "Space Mono:ascii"
      fg: white

    - type: text
      content: "WAVE"
      at: tl
      x: 2
      y: 58
      font: "Space Mono:ascii"
      fg: "#4a7a4a"

    - type: text
      id: hud-wave
      content: "1"
      at: tl
      x: 2
      y: 70
      font: "Space Mono:ascii"
      fg: white

    - type: text
      id: hud-gameover
      content: "GAME OVER"
      at: cc
      y: -10
      font: "Space Mono:ascii"
      fg: yellow
      visible: false

    - type: text
      id: hud-gameover-sub
      content: "PRESS SPACE TO RESTART"
      at: cc
      y: 6
      font: "generic:1"
      fg: "#aaaa44"
      visible: false
