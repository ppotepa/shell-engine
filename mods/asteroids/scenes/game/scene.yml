# yaml-language-server: $schema=../../schemas/scenes.yaml
id: asteroids.game
title: Asteroids Game
virtual-size-override: 640x480
bg: black
layers:
  - name: gameplay
    z_index: 0
    sprites:
      - { type: text, id: hud-title, content: "ASTEROIDS", at: lt, x: 2, y: 1, font: "generic:1", fg: white }
      - { type: text, id: hud-score, content: "SCORE: 0", at: lt, x: 2, y: 3, font: "generic:1", fg: "#9de36f" }
      - { type: text, id: hud-lives, content: "LIVES: 3", at: lt, x: 2, y: 5, font: "generic:1", fg: "#7bd1ff" }
      - { type: text, id: hud-wave, content: "WAVE: 1", at: lt, x: 2, y: 7, font: "generic:1", fg: "#d0d0d0" }
      - { type: text, id: hud-help, content: "A/D rotate | W thrust | SPACE fire | ESC menu | R reset | F5/F6/F7 mode", at: rt, x: -2, y: 1, font: "generic:1", fg: gray }


      - { type: text, id: game-message, content: "", at: cb, y: -1, font: "generic:1", fg: "#ffb86c" }
objects:
  - { ref: ship-vector, as: ship, with: { id: ship, x: 0, y: 0 } }
  - { ref: bullet-vector, as: bullet-template, with: { id: bullet-template, x: 0, y: 0 } }
  - { ref: smoke-vector, as: smoke-template, with: { id: smoke-template, x: 0, y: 0, visible: false } }
  - { ref: asteroid-vector, as: asteroid-template, with: { id: asteroid-template, x: 0, y: 0, visible: false } }
behaviors:
  - name: asteroids-game-loop
  - name: asteroids-render-sync
stages:
  on_enter:
    steps:
      - { effects: [{ name: fade-in, duration: 120 }] }
  on_idle:
    trigger: none
    looping: true
    steps:
      - pause: 1000ms
  on_leave:
    steps:
      - { effects: [{ name: fade-out, duration: 120 }] }
