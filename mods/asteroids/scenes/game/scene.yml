id: asteroids-game
title: Surface Launch Sim
bg: "#000000"
celestial:
  scope: local
  region: asteroids-sector
  system: asteroids-sim
  focus-body: main-planet
  focus-site: main-orbit
  frame: focus-relative
  clock-source: scene
objects:
  - { ref: ship }
layers:
  - ref: game/layers/stars-layer-1.yml
  - ref: game/layers/planet-bg-layer.yml
  - ref: game/layers/ship-scene-layer.yml
  - ref: game/layers/hud-grid.yml
input:
  free-look-camera: {}
logic:
  kind: script
  behavior: rhai-script
  src: ./game-loop.rhai
stages:
  on_enter:
    steps:
      - { duration: 1 }
  on_idle:
    looping: true
    steps:
      - pause: 16ms
