id: asteroids-title
title: Asteroids
bg: "#060620"
layers:
  - ref: title/layers/main.yml
logic:
  kind: script
  behavior: rhai-script
  src: ./title.rhai
postfx:
  - name: crt-scan-glitch
    params:
      intensity: 0.08
      transparency: 0.12
      brightness: 1.0
      speed: 0.4
stages:
  on_enter:
    steps:
      - { effects: [{ name: fade-in, duration: 600 }] }
  on_idle:
    trigger: any-key
    looping: true
    steps:
      - pause: 80ms
  on_leave:
    steps:
      - { effects: [{ name: fade-out, duration: 250 }] }
next: asteroids-game
menu-options:
  - { key: "space", label: START GAME, to: asteroids-game }
  - { key: "escape", label: EXIT, to: asteroids-title }
