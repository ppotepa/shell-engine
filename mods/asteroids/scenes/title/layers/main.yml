- name: title
  z_index: 1
  sprites:
    - type: text
      id: title-asteroids
      content: "ASTEROIDS"
      at: cc
      y: -90
      font: "Orbitron:ascii"
      fg: "#5bc0be"
      stages:
        on_enter:
          steps:
            - { effects: [{ name: fade-in, duration: 900, params: { easing: ease-out } }] }

- name: ship-art
  z_index: 2
  sprites:
    - type: vector
      points: [[0,-14],[7,14],[-7,14]]
      closed: true
      draw-char: "*"
      at: cc
      y: -28
      fg_colour: "#5bc0be"

- name: menu
  z_index: 3
  sprites:
    # Menu items — fg colour and offset.x updated by title.rhai
    - type: text
      id: menu-item-0
      content: "START GAME"
      at: cc
      y: 40
      font: "Orbitron:ascii"
      fg: "#f6ae2d"

    - type: text
      id: menu-item-1
      content: "EXIT"
      at: cc
      y: 56
      font: "Orbitron:ascii"
      fg: "#2e5eaa"

    # Navigation hint
    - type: text
      id: menu-hint
      content: "ARROWS  NAVIGATE     ENTER  SELECT"
      at: cb
      y: -2
      font: "generic:1"
      fg: "#172e55"

    - type: text
      id: menu-credit
      content: "SHELL QUEST ENGINE"
      at: br
      x: -2
      y: -1
      font: "generic:1"
      fg: "#172e55"
