# High Scores — Taffy Grid Layout
#
# Outer frame grid provides uniform margins (24px H, 20px V) matching other scenes.
# Inner content grid: title (1fr top), header, score table, hint (1fr bottom).
#
- name: main
  z_index: 0
  sprites:
    - type: grid
      id: highscores-frame
      at: tl
      columns: ["24", "1fr", "24"]
      rows: ["20", "1fr", "20"]
      children:
        - type: grid
          id: highscores-content
          grid-col: 2
          grid-row: 2
          columns: ["1fr"]
          rows: ["1fr", "auto", "auto", "1fr"]
          gap-y: 10
          children:
            # ── Title ─────────────────────────────────────────────────────────
            - type: text
              id: title-text
              content: "HIGH SCORES"
              grid-col: 1
              grid-row: 1
              at: cb
              font: "Orbitron:ascii"
              fg: "#5bc0be"

            # ── Table Header ──────────────────────────────────────────────────
            - { type: text, id: header, content: "RANK  SCORE   NAME  WAVE", grid-col: 1, grid-row: 2, at: cc, font: "generic:1", fg: "#f6ae2d" }

            # ── Score Rows ────────────────────────────────────────────────────
            - type: grid
              id: scores-table
              grid-col: 1
              grid-row: 3
              at: cc
              width: 400
              columns: ["1fr"]
              rows: ["auto", "auto", "auto", "auto", "auto", "auto", "auto", "auto", "auto", "auto"]
              gap-y: 4
              children:
                - { type: text, id: row-0, content: "", grid-col: 1, grid-row: 1, at: cc, font: "generic:1", fg: "#ffffff" }
                - { type: text, id: row-1, content: "", grid-col: 1, grid-row: 2, at: cc, font: "generic:1", fg: "#dddddd" }
                - { type: text, id: row-2, content: "", grid-col: 1, grid-row: 3, at: cc, font: "generic:1", fg: "#dddddd" }
                - { type: text, id: row-3, content: "", grid-col: 1, grid-row: 4, at: cc, font: "generic:1", fg: "#cccccc" }
                - { type: text, id: row-4, content: "", grid-col: 1, grid-row: 5, at: cc, font: "generic:1", fg: "#cccccc" }
                - { type: text, id: row-5, content: "", grid-col: 1, grid-row: 6, at: cc, font: "generic:1", fg: "#bbbbbb" }
                - { type: text, id: row-6, content: "", grid-col: 1, grid-row: 7, at: cc, font: "generic:1", fg: "#bbbbbb" }
                - { type: text, id: row-7, content: "", grid-col: 1, grid-row: 8, at: cc, font: "generic:1", fg: "#aaaaaa" }
                - { type: text, id: row-8, content: "", grid-col: 1, grid-row: 9, at: cc, font: "generic:1", fg: "#aaaaaa" }
                - { type: text, id: row-9, content: "", grid-col: 1, grid-row: 10, at: cc, font: "generic:1", fg: "#999999" }

            # ── Footer Hint ───────────────────────────────────────────────────
            - { type: text, id: hint, content: "ESC  RETURN TO MENU", grid-col: 1, grid-row: 4, at: ct, font: "generic:1", fg: "#172e55" }
