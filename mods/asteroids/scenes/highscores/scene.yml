# yaml-language-server: $schema=../../schemas/scenes.yaml
id: asteroids.highscores
title: Asteroids High Scores
bg: black
layers:
  - name: highscores
    z_index: 0
    sprites:
      - { type: text, id: scores-title, content: "HIGH SCORES", at: ct, y: -10, font: "generic:2", fg: white }
      - { type: text, id: scores-subtitle, content: "Persistent via engine-persistence", at: ct, y: -7, font: "generic:1", fg: gray }
      - { type: text, id: scores-lines, content: "No scores yet", at: cc, y: 0, font: "generic:1", fg: "#9de36f" }
      - { type: text, id: scores-help, content: "[ENTER] Menu   [R] Replay", at: cb, y: -1, font: "generic:1", fg: "#8b8b8b" }
logic:
  kind: script
  behavior: rhai-script
  src: ./scene.rhai
stages:
  on_enter:
    steps:
      - { effects: [{ name: fade-in, duration: 180 }] }
  on_idle:
    trigger: none
    looping: true
    steps:
      - pause: 1000ms
  on_leave:
    steps:
      - { effects: [{ name: fade-out, duration: 120 }] }
