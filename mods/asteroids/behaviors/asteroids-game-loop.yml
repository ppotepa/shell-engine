kind: behavior
name: asteroids-game-loop
script: |
  fn wrap(v, min_v, max_v) {
      if v < min_v { return max_v; }
      if v > max_v { return min_v; }
      v
  }
  
  fn wrap_fp(v, min_v, max_v, scale) {
      let min_fp = min_v * scale;
      let max_fp = max_v * scale;
      if v < min_fp { return max_fp; }
      if v > max_fp { return min_fp; }
      v
  }
  
  fn abs_i(v) {
      if v < 0 { -v } else { v }
  }
  
  fn sign_i(v, fallback) {
      if v < 0 { return -1; }
      if v > 0 { return 1; }
      fallback
  }
  
  fn clamp_i(v, min_v, max_v) {
      if v < min_v { return min_v; }
      if v > max_v { return max_v; }
      v
  }

  fn level_i(level_api, path, fallback) {
      if level_api.has(path) {
          let value = level_api.get(path);
          if value.type_of() == "i64" {
              return value;
          }
      }
      fallback
  }
  
  fn next_seed(seed) {
      ((seed * 1103515245) + 12345) % 2147483647
  }
  
  fn base_sin(step) {
      if step == 0 { return 0; }
      if step == 1 { return 200; }
      if step == 2 { return 392; }
      if step == 3 { return 569; }
      if step == 4 { return 724; }
      if step == 5 { return 851; }
      if step == 6 { return 946; }
      if step == 7 { return 1004; }
      1024
  }
  
  fn sin32(idx) {
      let i = idx % 32;
      if i < 0 { i = i + 32; }
      let q = i / 8;
      let o = i % 8;
      if q == 0 { return base_sin(o); }
      if q == 1 { return base_sin(8 - o); }
      if q == 2 { return -base_sin(o); }
      -base_sin(8 - o)
  }
  
  fn ship_points(h) {
      let fx = sin32(h);
      let fy = -sin32(h + 8);
      let rx = -fy;
      let ry = fx;
  
      let nose_x = (fx * 7) / 1024;
      let nose_y = (fy * 7) / 1024;
      let left_x = ((-fx * 3) - (rx * 3)) / 1024;
      let left_y = ((-fy * 3) - (ry * 3)) / 1024;
      let tail_x = (-fx * 1) / 1024;
      let tail_y = (-fy * 1) / 1024;
      let right_x = ((-fx * 3) + (rx * 3)) / 1024;
      let right_y = ((-fy * 3) + (ry * 3)) / 1024;
  
      let out = [];
      out.push([nose_x, nose_y]);
      out.push([left_x, left_y]);
      out.push([tail_x, tail_y]);
      out.push([right_x, right_y]);
      out
  }
  
  fn asteroid_shape(shape) {
      let out = [];
      if shape == 0 {
          out.push([0, -10]);
          out.push([8, -6]);
          out.push([10, 1]);
          out.push([4, 9]);
          out.push([-4, 9]);
          out.push([-10, 2]);
          out.push([-8, -7]);
          return out;
      }
      if shape == 1 {
          out.push([-2, -10]);
          out.push([6, -10]);
          out.push([11, -5]);
          out.push([10, 1]);
          out.push([11, 8]);
          out.push([2, 10]);
          out.push([-7, 9]);
          out.push([-11, 2]);
          out.push([-8, -6]);
          return out;
      }
      if shape == 2 {
          out.push([0, -11]);
          out.push([7, -8]);
          out.push([11, -1]);
          out.push([8, 8]);
          out.push([1, 11]);
          out.push([-7, 9]);
          out.push([-11, 2]);
          out.push([-9, -6]);
          return out;
      }
      out.push([0, -9]);
      out.push([10, -8]);
      out.push([8, -1]);
      out.push([11, 6]);
      out.push([3, 11]);
      out.push([-6, 9]);
      out.push([-11, 1]);
      out.push([-8, -8]);
      out
  }
  
  fn asteroid_scale(size) {
      if size <= 0 { return 1; }
      if size == 1 { return 2; }
      if size == 2 { return 3; }
      4
  }
  
  fn asteroid_points(shape, size) {
      let base = asteroid_shape(shape);
      let scale = asteroid_scale(size);
      let out = [];
      for p in base {
          out.push([(p[0] * scale) / 2, (p[1] * scale) / 2]);
      }
      out
  }
  
  fn asteroid_radius(size) {
      if size <= 0 { return 4; }
      if size == 1 { return 7; }
      if size == 2 { return 11; }
      15
  }
  
  fn asteroid_score(size) {
      if size <= 0 { return 35; }
      if size == 1 { return 25; }
      if size == 2 { return 15; }
      10
  }
  
  fn flash_fill_hex(flash_ms, flash_total_ms) {
      if flash_ms <= 0 { return "black"; }
      if flash_total_ms <= 0 { flash_total_ms = 1; }
      let elapsed = flash_total_ms - flash_ms;
      let progress = (elapsed * 100) / flash_total_ms;
      if progress < 17 { return "#101010"; }
      if progress < 34 { return "#222222"; }
      if progress < 51 { return "#3a3a3a"; }
      if progress < 68 { return "#525252"; }
      if progress < 85 { return "#6b6b6b"; }
      "#848484"
  }
  
  fn speed_for_seed(seed) {
      let v = (seed % 3) + 1;
      if ((seed / 7) % 2) == 0 { v } else { -v }
  }
  
  fn respawn_x(seed, min_x, max_x, ship_x) {
      let x = if (seed % 2) == 0 { min_x + 10 } else { max_x - 10 };
      if abs_i(x - ship_x) < 90 {
          x = if x < 0 { max_x - 10 } else { min_x + 10 };
      }
      x
  }
  
  fn respawn_y(seed, min_y, max_y, ship_y) {
      let span = (max_y - min_y) - 20;
      let y = min_y + 10 + (seed % span);
      if abs_i(y - ship_y) < 70 {
          y = y + 76;
          if y > max_y - 10 {
              y = min_y + 10;
          }
      }
      y
  }
  
  fn make_asteroid(active, x, y, dx, dy, shape, size) {
      #{
          active: active,
          x: x,
          y: y,
          dx: dx,
          dy: dy,
          shape: shape,
          size: size,
          flash_ms: 0,
          split_pending: false,
          collide_cd_ms: 0
      }
  }
  
  fn initial_asteroids(total_slots) {
      let out = [];
      out.push(make_asteroid(true, -220, -120, 2, 1, 0, 2));
      out.push(make_asteroid(true, 180, -90, -2, 1, 1, 3));
      out.push(make_asteroid(true, 220, 120, -2, -1, 2, 2));
      out.push(make_asteroid(true, -180, 140, 2, -1, 3, 1));
      out.push(make_asteroid(true, -260, -30, 1, 2, 0, 2));
      out.push(make_asteroid(true, -110, -170, 2, 1, 1, 1));
      out.push(make_asteroid(true, 40, -150, -1, 2, 2, 2));
      out.push(make_asteroid(true, 275, -10, -2, -1, 3, 3));
      out.push(make_asteroid(true, 130, 175, -1, -2, 1, 2));
      out.push(make_asteroid(true, -70, 190, 1, -2, 0, 1));
      while out.len() < total_slots {
          out.push(make_asteroid(false, 0, 0, 0, 0, 0, 0));
      }
      out
  }
  
  fn find_free_slot(asteroids) {
      for idx in 0..asteroids.len() {
          if asteroids[idx]["active"] == false {
              return idx;
          }
      }
      -1
  }
  
  fn active_asteroid_count(asteroids) {
      let total = 0;
      for ast in asteroids {
          if ast["active"] {
              total += 1;
          }
      }
      total
  }

  fn make_bullet(active, x_fp, y_fp, dx_fp, dy_fp, ttl_ms) {
      #{
          active: active,
          x_fp: x_fp,
          y_fp: y_fp,
          dx_fp: dx_fp,
          dy_fp: dy_fp,
          ttl_ms: ttl_ms
      }
  }

  fn initial_bullets(total_slots) {
      let out = [];
      while out.len() < total_slots {
          out.push(make_bullet(false, 0, 0, 0, 0, 0));
      }
      out
  }

  fn find_free_bullet_slot(bullets) {
      for idx in 0..bullets.len() {
          if bullets[idx]["active"] == false {
              return idx;
          }
      }
      -1
  }

  fn active_bullet_count(bullets) {
      let total = 0;
      for bullet in bullets {
          if bullet["active"] {
              total += 1;
          }
      }
      total
  }
  
  if local.contains("init") == false {
      let init_now = if time.contains("scene_elapsed_ms") { time.scene_elapsed_ms } else { 0 };
      local["last_ms"] = init_now;
      local["rng"] = next_seed(1337 + init_now + 101);
      local["msg_ttl_ms"] = 0;
      local["sim_accum"] = 0;
      local["score"] = 0;
      local["base_lives"] = level_i(level, "/player/lives", 3);
      local["shot_cooldown_ms"] = clamp_i(level_i(level, "/player/shot_cooldown_ms", 200), 80, 1000);
      local["ship_thrust_fp"] = clamp_i(level_i(level, "/player/thrust_fp", 170), 60, 600);
      local["ship_max_speed_fp"] = clamp_i(level_i(level, "/player/max_speed_fp", 4608), 1024, 14000);
      local["lives"] = local["base_lives"];
      local["wave"] = 1;
      local["wave_base_spawn_count"] = clamp_i(level_i(level, "/waves/base_spawn_count", 4), 1, 20);
      local["wave_min_spawn_count"] = clamp_i(level_i(level, "/waves/min_spawn_count", 5), 1, 30);
      local["wave_max_spawn_count"] = clamp_i(level_i(level, "/waves/max_spawn_count", 10), 1, 40);
      if local["wave_min_spawn_count"] > local["wave_max_spawn_count"] {
          local["wave_min_spawn_count"] = local["wave_max_spawn_count"];
      }
      local["bullet_ttl_ms"] = clamp_i(level_i(level, "/combat/bullet_ttl_ms", 900), 100, 6000);
      local["bullet_speed_fp"] = clamp_i(level_i(level, "/combat/bullet_speed_fp", 4200), 1000, 18000);
      local["hit_flash_ms"] = clamp_i(level_i(level, "/combat/hit_flash_ms", 150), 40, 800);
      local["ship_h"] = 0;
      local["ship_x_fp"] = 0;
      local["ship_y_fp"] = 0;
      local["vx_fp"] = 0;
      local["vy_fp"] = 0;
      local["ship_invuln_ms"] = 900;
      local["bullets"] = initial_bullets(8);
      local["shot_cd_ms"] = 0;
      local["last_diag_ms"] = init_now;
      local["asteroids"] = initial_asteroids(24);
      local["init"] = true;
      diag.info("asteroids session init asteroid_slots=24 bullet_slots=8");
  }
  
  let now = if time.contains("scene_elapsed_ms") { time.scene_elapsed_ms } else { 0 };
  let last_ms =
      if local.contains("last_ms") && local["last_ms"].type_of() == "i64" {
          local["last_ms"]
      } else {
          now
      };
  let dt_raw = now - last_ms;
  let dt = if dt_raw < 0 { 0 } else if dt_raw > 220 { 220 } else { dt_raw };
  local["last_ms"] = now;
  
  let scale = 1024;
  let min_x = -300;
  let max_x = 300;
  let min_y = -220;
  let max_y = 220;
  let max_speed_fp = if local.contains("ship_max_speed_fp") { local["ship_max_speed_fp"] } else { 4608 };
  let ship_thrust_fp = if local.contains("ship_thrust_fp") { local["ship_thrust_fp"] } else { 170 };
  let bullet_ttl_ms = if local.contains("bullet_ttl_ms") { local["bullet_ttl_ms"] } else { 900 };
  let bullet_speed_fp = if local.contains("bullet_speed_fp") { local["bullet_speed_fp"] } else { 4200 };
  let hit_flash_ms = if local.contains("hit_flash_ms") { local["hit_flash_ms"] } else { 150 };
  
  if key.pressed == true {
      let code = if key.code.type_of() == "string" { key.code } else { "" };
  
      if code == "Esc" {
          game.jump("asteroids.mainmenu");
          return ();
      }
  
      let reset_requested = false;
      let reset_label = "RESET";

      if code == "r" || code == "R" {
          reset_requested = true;
      } else if code == "F5" {
          if level.select("asteroids.easy") {
              reset_requested = true;
              reset_label = "EASY";
              diag.info("level selected asteroids.easy");
          } else {
              diag.warn("level select failed asteroids.easy");
          }
      } else if code == "F6" {
          if level.select("asteroids.default") {
              reset_requested = true;
              reset_label = "DEFAULT";
              diag.info("level selected asteroids.default");
          } else {
              diag.warn("level select failed asteroids.default");
          }
      } else if code == "F7" {
          if level.select("asteroids.hard") {
              reset_requested = true;
              reset_label = "HARD";
              diag.info("level selected asteroids.hard");
          } else {
              diag.warn("level select failed asteroids.hard");
          }
      }

      if reset_requested {
          let current_rng =
              if local.contains("rng") && local["rng"].type_of() == "i64" {
                  local["rng"]
              } else {
                  1337
              };
          local["base_lives"] = level_i(level, "/player/lives", 3);
          local["shot_cooldown_ms"] = clamp_i(level_i(level, "/player/shot_cooldown_ms", 200), 80, 1000);
          local["ship_thrust_fp"] = clamp_i(level_i(level, "/player/thrust_fp", 170), 60, 600);
          local["ship_max_speed_fp"] = clamp_i(level_i(level, "/player/max_speed_fp", 4608), 1024, 14000);
          local["wave_base_spawn_count"] = clamp_i(level_i(level, "/waves/base_spawn_count", 4), 1, 20);
          local["wave_min_spawn_count"] = clamp_i(level_i(level, "/waves/min_spawn_count", 5), 1, 30);
          local["wave_max_spawn_count"] = clamp_i(level_i(level, "/waves/max_spawn_count", 10), 1, 40);
          if local["wave_min_spawn_count"] > local["wave_max_spawn_count"] {
              local["wave_min_spawn_count"] = local["wave_max_spawn_count"];
          }
          local["bullet_ttl_ms"] = clamp_i(level_i(level, "/combat/bullet_ttl_ms", 900), 100, 6000);
          local["bullet_speed_fp"] = clamp_i(level_i(level, "/combat/bullet_speed_fp", 4200), 1000, 18000);
          local["hit_flash_ms"] = clamp_i(level_i(level, "/combat/hit_flash_ms", 150), 40, 800);
          local["sim_accum"] = 0;
          local["rng"] = next_seed(current_rng + now + 101);
          local["score"] = 0;
          local["lives"] = local["base_lives"];
          local["wave"] = 1;
          local["ship_h"] = 0;
          local["ship_x_fp"] = 0;
          local["ship_y_fp"] = 0;
          local["vx_fp"] = 0;
          local["vy_fp"] = 0;
          local["ship_invuln_ms"] = 900;
          local["bullets"] = initial_bullets(8);
          local["shot_cd_ms"] = 0;
          local["last_diag_ms"] = now;
          local["asteroids"] = initial_asteroids(24);
          local["msg_ttl_ms"] = 500;
          scene.set("game-message", "text.content", reset_label);
          diag.warn(`reset requested mode=${reset_label}`);
      }
  }
  
  let step_ms = 16;
  let sim_accum =
      if local.contains("sim_accum") && local["sim_accum"].type_of() == "i64" {
          local["sim_accum"]
      } else {
          0
      };
  let accum = sim_accum + dt;
  let steps = accum / step_ms;
  if steps > 8 {
      steps = 8;
      accum = steps * step_ms;
  }
  local["sim_accum"] = accum - (steps * step_ms);
  
  let asteroids = local["asteroids"];
  let bullets =
      if local.contains("bullets") {
          local["bullets"]
      } else {
          initial_bullets(8)
      };
  while bullets.len() < 8 {
      bullets.push(make_bullet(false, 0, 0, 0, 0, 0));
  }
  let left_down = input.down("Left") || input.down("a");
  let right_down = input.down("Right") || input.down("d");
  let thrust_down = input.down("Up") || input.down("w");
  let fire_down = input.down(" ") || input.down("f");
  
  for _s in 0..steps {
      if left_down && !right_down {
          local["ship_h"] = (local["ship_h"] + 31) % 32;
      } else if right_down && !left_down {
          local["ship_h"] = (local["ship_h"] + 1) % 32;
      }
  
      if thrust_down {
          let fx = sin32(local["ship_h"]);
          let fy = -sin32(local["ship_h"] + 8);
          local["vx_fp"] = clamp_i(local["vx_fp"] + ((fx * ship_thrust_fp) / 1024), -max_speed_fp, max_speed_fp);
          local["vy_fp"] = clamp_i(local["vy_fp"] + ((fy * ship_thrust_fp) / 1024), -max_speed_fp, max_speed_fp);
      }
  
      if fire_down && (local["shot_cd_ms"] <= 0) {
          let fx = sin32(local["ship_h"]);
          let fy = -sin32(local["ship_h"] + 8);
          let free_bullet = find_free_bullet_slot(bullets);
          if free_bullet >= 0 {
              bullets[free_bullet] = make_bullet(
                  true,
                  local["ship_x_fp"] + ((fx * 9) / 1024) * scale,
                  local["ship_y_fp"] + ((fy * 9) / 1024) * scale,
                  local["vx_fp"] + ((fx * bullet_speed_fp) / 1024),
                  local["vy_fp"] + ((fy * bullet_speed_fp) / 1024),
                  bullet_ttl_ms
              );
              local["shot_cd_ms"] = local["shot_cooldown_ms"];
          }
      }
  
      local["ship_x_fp"] = wrap_fp(local["ship_x_fp"] + local["vx_fp"], min_x, max_x, scale);
      local["ship_y_fp"] = wrap_fp(local["ship_y_fp"] + local["vy_fp"], min_y, max_y, scale);
      let ship_x = local["ship_x_fp"] / scale;
      let ship_y = local["ship_y_fp"] / scale;
  
      for idx in 0..asteroids.len() {
          let ast = asteroids[idx];
          if ast["active"] == false {
              continue;
          }

          if ast["collide_cd_ms"] > 0 {
              ast["collide_cd_ms"] = ast["collide_cd_ms"] - step_ms;
              if ast["collide_cd_ms"] < 0 {
                  ast["collide_cd_ms"] = 0;
              }
          }

          if ast["flash_ms"] > 0 {
              ast["flash_ms"] = ast["flash_ms"] - step_ms;
              if ast["flash_ms"] <= 0 {
                  ast["flash_ms"] = 0;
                  if ast["split_pending"] {
                      ast["split_pending"] = false;
                      if ast["size"] <= 0 {
                          ast["active"] = false;
                          diag.info(`asteroid removed idx=${idx}`);
                      } else {
                          let next_size = ast["size"] - 1;
                          local["rng"] = next_seed(local["rng"] + now + (idx * 41) + ast["x"] + ast["y"]);
                          let seed = local["rng"];
                          let base_dir_x = sign_i(speed_for_seed(seed + 3), if (idx % 2) == 0 { -1 } else { 1 });
                          let base_dir_y = sign_i(speed_for_seed(seed + 7), if (idx % 2) == 0 { 1 } else { -1 });
                          ast["size"] = next_size;
                          ast["shape"] = (seed / 11) % 4;
                          ast["dx"] = clamp_i(ast["dx"] + (base_dir_x * (next_size + 1)), -4, 4);
                          ast["dy"] = clamp_i(ast["dy"] - (base_dir_y * (next_size + 1)), -4, 4);
                          ast["x"] = wrap(ast["x"] + (base_dir_x * 4), min_x, max_x);
                          ast["y"] = wrap(ast["y"] - (base_dir_y * 4), min_y, max_y);
  
                          let free_idx = find_free_slot(asteroids);
                          if free_idx >= 0 {
                              let child = make_asteroid(
                                  true,
                                  wrap(ast["x"] - (base_dir_x * 8), min_x, max_x),
                                  wrap(ast["y"] + (base_dir_y * 8), min_y, max_y),
                                  clamp_i(-ast["dx"] + base_dir_y, -4, 4),
                                  clamp_i(-ast["dy"] - base_dir_x, -4, 4),
                                  (seed / 17) % 4,
                                  next_size
                              );
                              asteroids[free_idx] = child;
                              diag.info(`asteroid split idx=${idx} child=${free_idx} size=${next_size}`);
                          } else {
                              diag.warn(`split dropped no-free-slot idx=${idx} size=${next_size}`);
                          }
                      }
                  }
              }
          } else {
              ast["x"] = wrap(ast["x"] + ast["dx"], min_x, max_x);
              ast["y"] = wrap(ast["y"] + ast["dy"], min_y, max_y);
          }
          asteroids[idx] = ast;
      }
  
      for a_idx in 0..asteroids.len() {
          let a = asteroids[a_idx];
          if a["active"] == false || a["flash_ms"] > 0 || a["collide_cd_ms"] > 0 {
              continue;
          }
          for b_idx in 0..asteroids.len() {
              if b_idx <= a_idx {
                  continue;
              }
              let b = asteroids[b_idx];
              if b["active"] == false || b["flash_ms"] > 0 || b["collide_cd_ms"] > 0 {
                  continue;
              }
              if poly_hit(
                  asteroid_points(a["shape"], a["size"]),
                  a["x"],
                  a["y"],
                  asteroid_points(b["shape"], b["size"]),
                  b["x"],
                  b["y"]
              ) {
                  let sep_x = sign_i(a["x"] - b["x"], if ((a_idx + b_idx) % 2) == 0 { -1 } else { 1 });
                  let sep_y = sign_i(a["y"] - b["y"], if ((a_idx + b_idx) % 2) == 0 { 1 } else { -1 });
                  let avx = a["dx"];
                  let avy = a["dy"];
                  a["dx"] = clamp_i(b["dx"] + sep_x, -4, 4);
                  a["dy"] = clamp_i(b["dy"] + sep_y, -4, 4);
                  b["dx"] = clamp_i(avx - sep_x, -4, 4);
                  b["dy"] = clamp_i(avy - sep_y, -4, 4);
                  a["x"] = wrap(a["x"] + sep_x * 2, min_x, max_x);
                  a["y"] = wrap(a["y"] + sep_y * 2, min_y, max_y);
                  b["x"] = wrap(b["x"] - sep_x * 2, min_x, max_x);
                  b["y"] = wrap(b["y"] - sep_y * 2, min_y, max_y);
                  a["collide_cd_ms"] = 96;
                  b["collide_cd_ms"] = 96;
                  asteroids[a_idx] = a;
                  asteroids[b_idx] = b;
              }
          }
      }

      for bullet_idx in 0..bullets.len() {
          let bullet = bullets[bullet_idx];
          if bullet["active"] == false {
              continue;
          }

          let bullet_prev_x = bullet["x_fp"] / scale;
          let bullet_prev_y = bullet["y_fp"] / scale;
          bullet["x_fp"] = wrap_fp(bullet["x_fp"] + bullet["dx_fp"], min_x, max_x, scale);
          bullet["y_fp"] = wrap_fp(bullet["y_fp"] + bullet["dy_fp"], min_y, max_y, scale);
          let bullet_x = bullet["x_fp"] / scale;
          let bullet_y = bullet["y_fp"] / scale;
          let wrapped_this_step = abs_i(bullet_x - bullet_prev_x) > 200 || abs_i(bullet_y - bullet_prev_y) > 160;
          bullet["ttl_ms"] = bullet["ttl_ms"] - step_ms;
          if bullet["ttl_ms"] <= 0 {
              bullet["active"] = false;
              bullet["ttl_ms"] = 0;
              bullets[bullet_idx] = bullet;
              continue;
          }

          for idx in 0..asteroids.len() {
              if bullet["active"] == false {
                  break;
              }
              let ast = asteroids[idx];
              if ast["active"] == false || ast["flash_ms"] > 0 {
                  continue;
              }
              let shape = asteroid_points(ast["shape"], ast["size"]);
              let direct_hit = point_in_poly(bullet_x, bullet_y, shape, ast["x"], ast["y"]);
              let swept_hit =
                  if wrapped_this_step {
                      false
                  } else {
                      segment_poly_hit(bullet_prev_x, bullet_prev_y, bullet_x, bullet_y, shape, ast["x"], ast["y"])
                  };
              if direct_hit || swept_hit {
                  local["score"] = local["score"] + asteroid_score(ast["size"]);
                  bullet["active"] = false;
                  bullet["ttl_ms"] = 0;
                  ast["flash_ms"] = hit_flash_ms;
                  ast["split_pending"] = true;
                  asteroids[idx] = ast;
                  local["msg_ttl_ms"] = 250;
                  scene.set("game-message", "text.content", "HIT");
                  diag.info(`hit asteroid=${idx} size=${ast["size"]} score=${local["score"]}`);
              }
          }
          bullets[bullet_idx] = bullet;
      }
  
      if local["shot_cd_ms"] > 0 {
          local["shot_cd_ms"] = local["shot_cd_ms"] - step_ms;
      }
      if local["ship_invuln_ms"] > 0 {
          local["ship_invuln_ms"] = local["ship_invuln_ms"] - step_ms;
      }
  
      if local["ship_invuln_ms"] <= 0 {
          let ship_hit = false;
          for idx in 0..asteroids.len() {
              let ast = asteroids[idx];
              if ast["active"] == false || ast["flash_ms"] > 0 {
                  continue;
              }
              if poly_hit(
                  ship_points(local["ship_h"]),
                  ship_x,
                  ship_y,
                  asteroid_points(ast["shape"], ast["size"]),
                  ast["x"],
                  ast["y"]
              ) {
                  ship_hit = true;
                  break;
              }
          }
  
          if ship_hit {
              local["lives"] = local["lives"] - 1;
              local["ship_x_fp"] = 0;
              local["ship_y_fp"] = 0;
              local["vx_fp"] = 0;
              local["vy_fp"] = 0;
              local["ship_invuln_ms"] = 1100;
              local["msg_ttl_ms"] = 450;
              scene.set("game-message", "text.content", "HIT!");
          }
      }
  }
  
  if local["msg_ttl_ms"] > 0 {
      local["msg_ttl_ms"] = local["msg_ttl_ms"] - dt;
      if local["msg_ttl_ms"] <= 0 {
          scene.set("game-message", "text.content", "");
      }
  }
  
  let active_count = active_asteroid_count(asteroids);
  let last_diag_ms =
      if local.contains("last_diag_ms") && local["last_diag_ms"].type_of() == "i64" {
          local["last_diag_ms"]
      } else {
          0
      };
  if now - last_diag_ms >= 1000 {
      local["last_diag_ms"] = now;
      diag.info(
          `stats lives=${local["lives"]} wave=${local["wave"]} score=${local["score"]} active=${active_count} bullets=${active_bullet_count(bullets)} ship=(${local["ship_x_fp"] / scale},${local["ship_y_fp"] / scale}) vel=(${local["vx_fp"]},${local["vy_fp"]})`
      );
  }
  if active_count <= 0 {
      local["wave"] = local["wave"] + 1;
      local["msg_ttl_ms"] = 650;
      scene.set("game-message", "text.content", `WAVE ${local["wave"]}`);
      diag.info(`wave start wave=${local["wave"]}`);
      let wave_base = if local.contains("wave_base_spawn_count") { local["wave_base_spawn_count"] } else { 4 };
      let wave_min = if local.contains("wave_min_spawn_count") { local["wave_min_spawn_count"] } else { 5 };
      let wave_max = if local.contains("wave_max_spawn_count") { local["wave_max_spawn_count"] } else { 10 };
      let spawn_count = clamp_i(wave_base + local["wave"], wave_min, wave_max);
      for idx in 0..spawn_count {
          let slot = find_free_slot(asteroids);
          if slot < 0 {
              break;
          }
          local["rng"] = next_seed(local["rng"] + now + idx * 53 + local["wave"]);
          let seed = local["rng"];
          asteroids[slot] = make_asteroid(
              true,
              respawn_x(seed, min_x, max_x, local["ship_x_fp"] / scale),
              respawn_y(seed / 3, min_y, max_y, local["ship_y_fp"] / scale),
              speed_for_seed(seed + 5),
              speed_for_seed(seed + 13),
              (seed / 11) % 4,
              if idx < 2 { 3 } else if idx < 5 { 2 } else { 1 }
          );
      }
  }
  
  if local["lives"] <= 0 {
      let entry = #{
          score: local["score"],
          wave: local["wave"],
          at_ms: now
      };
      diag.warn(`game over score=${local["score"]} wave=${local["wave"]}`);
      persist.push("/asteroids/highscores", entry);
      game.jump("asteroids.highscores");
      return ();
  }
  
  local["asteroids"] = asteroids;
  local["bullets"] = bullets;
  
  let ship_x = local["ship_x_fp"] / scale;
  let ship_y = local["ship_y_fp"] / scale;
  scene.set("ship", "position.x", ship_x);
  scene.set("ship", "position.y", ship_y);
  scene.set("ship", "vector.points", ship_points(local["ship_h"]));
  
  for render_idx in 0..24 {
      let ast = asteroids[render_idx];
      let asteroid_id = `asteroid-${render_idx}`;
      scene.set(asteroid_id, "visible", ast["active"]);
      if ast["active"] {
          scene.set(asteroid_id, "position.x", ast["x"]);
          scene.set(asteroid_id, "position.y", ast["y"]);
          scene.set(asteroid_id, "vector.points", asteroid_points(ast["shape"], ast["size"]));
          scene.set(asteroid_id, "vector.bg", flash_fill_hex(ast["flash_ms"], hit_flash_ms));
      } else {
          scene.set(asteroid_id, "vector.bg", "black");
      }
  }
  
  for bullet_render_idx in 0..8 {
      let bullet = bullets[bullet_render_idx];
      let bullet_id = `bullet-${bullet_render_idx}`;
      scene.set(bullet_id, "visible", bullet["active"]);
      if bullet["active"] {
          scene.set(bullet_id, "position.x", bullet["x_fp"] / scale);
          scene.set(bullet_id, "position.y", bullet["y_fp"] / scale);
      }
  }
  
  scene.set("hud-score", "text.content", `SCORE: ${local["score"]}`);
  scene.set("hud-lives", "text.content", `LIVES: ${local["lives"]}`);
  scene.set("hud-wave", "text.content", `WAVE: ${local["wave"]}`);
