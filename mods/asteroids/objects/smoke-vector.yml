# yaml-language-server: $schema=../schemas/object.yaml
kind: object
name: smoke-vector
exports:
  id: smoke
  x: 0
  y: 0
  fg: "#6f6f6f"
  visible: false
sprites:
  - type: vector
    id: "$id"
    at: cc
    x: "$x"
    y: "$y"
    points: [[0, -2], [2, 0], [0, 2], [-2, 0]]
    closed: true
    fg: "$fg"
    bg: black
    visible: "$visible"
