kind: object
name: ship
sprites:
  # Main hull - classic triangle
  - type: vector
    id: hull
    points: [[0,-10], [7,10], [-7,10]]
    closed: true
    draw-char: "*"
    x: 0
    y: 0
    fg_colour: white
    
  # Cockpit window
  - type: vector
    id: cockpit
    points: [[0,-8], [2,-4], [-2,-4]]
    closed: true
    draw-char: "*"
    x: 0
    y: 0
    fg_colour: cyan
    
  # Left panel line detail
  - type: vector
    id: left-panel
    points: [[-1,-6], [-4,6]]
    closed: false
    draw-char: "-"
    x: 0
    y: 0
    fg_colour: gray
    
  # Right panel line detail
  - type: vector
    id: right-panel
    points: [[1,-6], [4,6]]
    closed: false
    draw-char: "-"
    x: 0
    y: 0
    fg_colour: gray
    
  # Engine glow - left
  - type: vector
    id: engine-left
    points: [[-3,10], [-3,11]]
    closed: false
    draw-char: "*"
    x: 0
    y: 0
    fg_colour: yellow
    
  # Engine glow - right
  - type: vector
    id: engine-right
    points: [[3,10], [3,11]]
    closed: false
    draw-char: "*"
    x: 0
    y: 0
    fg_colour: yellow
    
  # Wing stripes - left
  - type: vector
    id: wing-stripe-left
    points: [[-7,8], [-5,9]]
    closed: false
    draw-char: "-"
    x: 0
    y: 0
    fg_colour: cyan
    
  # Wing stripes - right
  - type: vector
    id: wing-stripe-right
    points: [[7,8], [5,9]]
    closed: false
    draw-char: "-"
    x: 0
    y: 0
    fg_colour: cyan
