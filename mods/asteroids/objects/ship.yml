kind: object
name: ship
sprites:
  # Main hull - 6-vertex kite with thruster vertices
  - type: vector
    id: hull
    points: [[0,-10], [3,-4], [7,10], [0,4], [-7,10], [-3,-4]]
    closed: true
    draw-char: "*"
    x: 0
    y: 0
    fg_colour: white
    
  # Cockpit window
  - type: vector
    id: cockpit
    points: [[0,-8], [2,-4], [-2,-4]]
    closed: true
    draw-char: "*"
    x: 0
    y: 0
    fg_colour: cyan
    
  # Left panel line
  - type: vector
    id: left-panel
    points: [[-1,-6], [-5,6]]
    closed: false
    draw-char: "-"
    x: 0
    y: 0
    fg_colour: gray
    
  # Right panel line
  - type: vector
    id: right-panel
    points: [[1,-6], [5,6]]
    closed: false
    draw-char: "-"
    x: 0
    y: 0
    fg_colour: gray
    
  # Main engine glow at notch
  - type: vector
    id: engine-main
    points: [[-1,4], [1,4]]
    closed: false
    draw-char: "*"
    x: 0
    y: 0
    fg_colour: yellow

  # Lateral thruster - left at vertex (-3,-4)
  - type: vector
    id: thruster-left
    points: [[-3,-4], [-4,-4]]
    closed: false
    draw-char: "*"
    x: 0
    y: 0
    fg_colour: red

  # Lateral thruster - right at vertex (3,-4)
  - type: vector
    id: thruster-right
    points: [[3,-4], [4,-4]]
    closed: false
    draw-char: "*"
    x: 0
    y: 0
    fg_colour: red

  # Nose retro thruster at vertex (0,-10)
  - type: vector
    id: thruster-nose
    points: [[0,-10], [0,-11]]
    closed: false
    draw-char: "*"
    x: 0
    y: 0
    fg_colour: red
