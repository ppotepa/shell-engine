kind: object
name: ship
sprites:
  # Main hull - kite/chevron with rear notch
  - type: vector
    id: hull
    points: [[0,-10], [7,10], [0,4], [-7,10]]
    closed: true
    draw-char: "*"
    x: 0
    y: 0
    fg_colour: white
    
  # Cockpit window
  - type: vector
    id: cockpit
    points: [[0,-8], [2,-4], [-2,-4]]
    closed: true
    draw-char: "*"
    x: 0
    y: 0
    fg_colour: cyan
    
  # Left panel line
  - type: vector
    id: left-panel
    points: [[-1,-6], [-5,6]]
    closed: false
    draw-char: "-"
    x: 0
    y: 0
    fg_colour: gray
    
  # Right panel line
  - type: vector
    id: right-panel
    points: [[1,-6], [5,6]]
    closed: false
    draw-char: "-"
    x: 0
    y: 0
    fg_colour: gray
    
  # Main engine glow - center notch
  - type: vector
    id: engine-main
    points: [[0,4], [0,5]]
    closed: false
    draw-char: "*"
    x: 0
    y: 0
    fg_colour: yellow

  # Lateral thruster - left (on left edge midpoint)
  - type: vector
    id: thruster-left
    points: [[-2,-4], [-3,-4]]
    closed: false
    draw-char: "*"
    x: 0
    y: 0
    fg_colour: red

  # Lateral thruster - right (on right edge midpoint)
  - type: vector
    id: thruster-right
    points: [[2,-4], [3,-4]]
    closed: false
    draw-char: "*"
    x: 0
    y: 0
    fg_colour: red

  # Nose retro thruster
  - type: vector
    id: thruster-nose
    points: [[0,-10], [0,-11]]
    closed: false
    draw-char: "*"
    x: 0
    y: 0
    fg_colour: red
