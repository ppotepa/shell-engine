$schema: https://json-schema.org/draft/2020-12/schema
$id: https://shell-quest.local/mods/asteroids/schemas/effects.yaml
title: schema asteroids effects
type: array
items:
  oneOf:
  - type: object
    properties:
      use:
        type: string
        minLength: 1
      preset:
        type: string
        minLength: 1
      ref:
        type: string
        minLength: 1
      overrides:
        type: object
        default: {}
        additionalProperties: true
    additionalProperties: true
    anyOf:
    - required:
      - use
    - required:
      - preset
    - required:
      - ref
    title: effect preset alias
  - allOf:
    - $ref: ../../../schemas/effect-file.schema.yaml#/items
    - properties:
        name:
          const: fade-in
        params:
          type: object
          additionalProperties: false
          properties:
            easing:
              type: string
              enum:
              - linear
              - ease-in
              - ease-out
              - ease-in-out
              default: linear
              description: Progress curve applied to the effect.
      title: fade-in effect variant
    - description: fade-in overlay from asteroids generated metadata
  - allOf:
    - $ref: ../../../schemas/effect-file.schema.yaml#/items
    - properties:
        name:
          const: fade-out
        params:
          type: object
          additionalProperties: false
          properties:
            easing:
              type: string
              enum:
              - linear
              - ease-in
              - ease-out
              - ease-in-out
              default: linear
              description: Progress curve applied to the effect.
      title: fade-out effect variant
    - description: fade-out overlay from asteroids generated metadata
  - allOf:
    - $ref: ../../../schemas/effect-file.schema.yaml#/items
    - properties:
        name:
          const: lens-blur
        params:
          type: object
          additionalProperties: false
          properties:
            radius:
              type: number
              minimum: 0.5
              maximum: 6.0
              multipleOf: 1.5
              description: Gaussian standard deviation in cells. Higher = wider, softer blur.
            intensity:
              type: number
              minimum: 0.0
              maximum: 1.0
              multipleOf: 1.0
              description: Blend between original (0) and fully blurred (1).
            passes:
              type: number
              minimum: 1.0
              maximum: 3.0
              multipleOf: 1.0
              description: Convolution passes. Each pass doubles the effective spread. 1–3 recommended.
            easing:
              type: string
              enum:
              - linear
              - ease-in
              - ease-out
              - ease-in-out
              default: linear
              description: Progress curve applied to the effect.
      title: lens-blur effect variant
    - description: lens-blur overlay from asteroids generated metadata
