$schema: https://json-schema.org/draft/2020-12/schema
$id: https://shell-engine.local/mods/asteroids/schemas/effects.yaml
title: schema asteroids effects
type: array
items:
  oneOf:
  - type: object
    properties:
      use:
        type: string
        minLength: 1
      preset:
        type: string
        minLength: 1
      ref:
        type: string
        minLength: 1
      overrides:
        type: object
        default: {}
        additionalProperties: true
    additionalProperties: true
    anyOf:
    - required:
      - use
    - required:
      - preset
    - required:
      - ref
    title: effect preset alias
  - allOf:
    - $ref: ../../../schemas/effect-file.schema.yaml#/items
    - properties:
        name:
          const: fade-in
        params:
          type: object
          additionalProperties: false
          properties:
            easing:
              type: string
              enum:
              - linear
              - ease-in
              - ease-out
              - ease-in-out
              default: linear
              description: Progress curve applied to the effect.
      title: fade-in effect variant
    - description: fade-in overlay from asteroids generated metadata
  - allOf:
    - $ref: ../../../schemas/effect-file.schema.yaml#/items
    - properties:
        name:
          const: fade-out
        params:
          type: object
          additionalProperties: false
          properties:
            easing:
              type: string
              enum:
              - linear
              - ease-in
              - ease-out
              - ease-in-out
              default: linear
              description: Progress curve applied to the effect.
      title: fade-out effect variant
    - description: fade-out overlay from asteroids generated metadata
