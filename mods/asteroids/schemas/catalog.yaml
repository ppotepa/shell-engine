$schema: https://json-schema.org/draft/2020-12/schema
$id: https://shell-engine.local/mods/asteroids/schemas/catalog.yaml
title: schema asteroids catalog
$defs:
  scene_ids:
    type: string
    enum:
    - asteroids-bench-cloud
    - asteroids-game
    - asteroids-mainmenu
  scene_paths:
    type: string
    enum:
    - /scenes/bench-cloud/scene.yml
    - /scenes/game/scene.yml
    - /scenes/mainmenu/scene.yml
  scene_refs:
    type: string
    enum:
    - /scenes/bench-cloud/scene.yml
    - /scenes/game/scene.yml
    - /scenes/mainmenu/scene.yml
    - asteroids-bench-cloud
    - asteroids-game
    - asteroids-mainmenu
  object_names:
    type: string
    enum:
    - ship
  effect_names:
    type: string
    enum:
    - fade-in
    - fade-out
  layer_refs:
    type: string
    enum:
    - bench-cloud/layers/planet-bench-layer.yml
    - game/layers/hud-grid.yml
    - game/layers/planet-bg-layer.yml
    - game/layers/ship-scene-layer.yml
    - game/layers/stars-layer-1.yml
    - mainmenu/layers/main-grid.yml
  sprite_refs:
    type: string
    enum: []
  template_refs:
    type: string
    enum: []
  object_refs:
    type: string
    enum:
    - /objects/ship.yml
    - ship
  effect_refs:
    type: string
    enum: []
  font_names:
    type: string
    enum:
    - Orbitron
    - Space Mono
  font_specs:
    type: string
    enum:
    - Orbitron
    - Orbitron:ascii
    - Orbitron:raster
    - Space Mono
    - Space Mono:ascii
    - Space Mono:raster
    - default
    - generic
    - generic:1
    - generic:2
    - generic:3
    - generic:large
    - generic:standard
    - generic:tiny
  image_paths:
    type: string
    enum: []
  model_paths:
    type: string
    enum: []
  scene3d_paths:
    type: string
    enum: []
  cutscene_refs:
    type: string
    enum: []
  sprite_ids:
    type: string
    enum:
    - hint
    - hud-frame
    - hud-grid
    - hud-hint
    - hud-hint-panel
    - hud-orbital-alt
    - hud-orbital-heat
    - hud-orbital-panel
    - hud-orbital-rspd
    - hud-orbital-status
    - hud-orbital-tspd
    - hud-orbital-vxy
    - item-0
    - item-1
    - item-2
    - main-planet-bench
    - main-planet-view
    - menu-content
    - menu-frame
    - menu-items
    - ship-scene-slot
    - title-text
  template_names:
    type: string
    enum: []
