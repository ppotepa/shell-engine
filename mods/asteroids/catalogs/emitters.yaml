emitters:
  # === SHIP THRUSTER EMITTERS ===
  # All ship emitters use orbital gravity (centripetal toward planet center).
  # gravity_center_x/y are passed at emit-time from PLANET_X/PLANET_Y in Rhai.
  # gravity_constant tuned for slower 5-minute orbital pacing.
  
  # Main engine - heavy particles that arc with the orbital curvature
  ship.main:
    max_count: 220
    cooldown_name: ship-main
    cooldown_ms: 0
    min_cooldown_ms: 0
    ramp_ms: 0
    local_x: 0.0
    local_y: 2.7
    emission_local_x: 0.0
    emission_local_y: 1.0
    emission_angle: 0.0
    backward_speed: 0.0
    ttl_ms: 420
    radius: 2
    velocity_scale: 1.0
    lifecycle: TtlOwnerBound
    thread_mode: "physics"
    gravity_mode: "orbital"
    gravity_constant: 0.0
    gravity_scale: 0.0
    palette_ramp: "thruster"
    radius_max: 2
    radius_min: 0

  # Bow thruster - quick RCS bursts, curve toward planet
  ship.bow:
    max_count: 140
    cooldown_name: ship-bow
    cooldown_ms: 0
    min_cooldown_ms: 0
    ramp_ms: 0
    local_x: 0.0
    local_y: -6.9
    emission_local_x: 0.0
    emission_local_y: -1.0
    emission_angle: 0.0
    backward_speed: 0.0
    ttl_ms: 280
    radius: 1
    velocity_scale: 1.0
    lifecycle: TtlOwnerBound
    thread_mode: "light"
    gravity_mode: "orbital"
    gravity_constant: 2000000.0
    palette_ramp: "thruster"
    radius_max: 1
    radius_min: 0

