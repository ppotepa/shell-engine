emitters:
  # === LEGACY EMITTERS (unused, kept for reference) ===
  asteroids.main_engine:
    max_count: 120
    cooldown_name: "main-engine"
    cooldown_ms: 25
    min_cooldown_ms: 0
    ramp_ms: 500
    lifecycle: "Ttl"
    spawn_offset: 4.0
    side_offset: 0.0
    backward_speed: 0.3
    ttl_ms: 280
    radius: 6
    velocity_scale: 1.0

  asteroids.nose_retro:
    max_count: 50
    cooldown_name: "nose-retro"
    cooldown_ms: 0
    spawn_offset: -10.0
    side_offset: 0.0
    backward_speed: 0.0
    ttl_ms: 140
    radius: 3
    velocity_scale: 1.0

  asteroids.lateral_left:
    max_count: 40
    cooldown_name: "lateral-left"
    cooldown_ms: 0
    spawn_offset: -4.0
    side_offset: 3.0
    backward_speed: 0.0
    ttl_ms: 200
    radius: 4
    velocity_scale: 1.0

  asteroids.lateral_right:
    max_count: 40
    cooldown_name: "lateral-right"
    cooldown_ms: 0
    spawn_offset: -4.0
    side_offset: -3.0
    backward_speed: 0.0
    ttl_ms: 200
    radius: 4
    velocity_scale: 1.0

  # === SHIP THRUSTER EMITTERS ===
  
  # Main engine - heavy particles with slight gravity (exhaust falls slightly)
  ship.main:
    max_count: 220
    cooldown_name: ship-main
    cooldown_ms: 0
    min_cooldown_ms: 0
    ramp_ms: 0
    local_x: 0.0
    local_y: 1.0
    emission_local_x: 0.0
    emission_local_y: 1.0
    emission_angle: 0.0
    backward_speed: 0.0
    ttl_ms: 520
    radius: 2
    velocity_scale: 1.0
    lifecycle: TtlOwnerBound
    # Physics: exhaust particles drift slightly with micro-gravity
    thread_mode: "physics"
    gravity_scale: 0.05
    # Default ramp: cold thrust (orange). Hot thrust overrides via emit args.
    color_ramp: ["#FFEECC","#FFCC88","#FF9944","#CC6622","#662211","#221108"]
    radius_max: 2
    radius_min: 0

  # Bow thruster - quick RCS bursts, light particles
  ship.bow:
    max_count: 140
    cooldown_name: ship-bow
    cooldown_ms: 0
    min_cooldown_ms: 0
    ramp_ms: 0
    local_x: 0.0
    local_y: -17.0
    emission_local_x: 0.0
    emission_local_y: -1.0
    emission_angle: 0.0
    backward_speed: 0.0
    ttl_ms: 240
    radius: 1
    velocity_scale: 1.0
    lifecycle: TtlOwnerBound
    thread_mode: "light"
    color_ramp: ["#FFEECC","#FFCC88","#FF9944","#CC6622","#662211","#221108"]
    radius_max: 1
    radius_min: 0

  # Port thruster - lateral RCS
  ship.port:
    max_count: 160
    cooldown_name: ship-port
    cooldown_ms: 0
    min_cooldown_ms: 0
    ramp_ms: 0
    local_x: -14.0
    local_y: 9.0
    emission_local_x: -1.0
    emission_local_y: 0.0
    emission_angle: 0.0
    backward_speed: 0.0
    ttl_ms: 240
    radius: 1
    velocity_scale: 1.0
    lifecycle: TtlOwnerBound
    thread_mode: "light"
    color_ramp: ["#FFEECC","#FFCC88","#FF9944","#CC6622","#662211","#221108"]
    radius_max: 1
    radius_min: 0

  # Starboard thruster - lateral RCS
  ship.starboard:
    max_count: 160
    cooldown_name: ship-starboard
    cooldown_ms: 0
    min_cooldown_ms: 0
    ramp_ms: 0
    local_x: 14.0
    local_y: 9.0
    emission_local_x: 1.0
    emission_local_y: 0.0
    emission_angle: 0.0
    backward_speed: 0.0
    ttl_ms: 240
    radius: 1
    velocity_scale: 1.0
    lifecycle: TtlOwnerBound
    thread_mode: "light"
    color_ramp: ["#FFEECC","#FFCC88","#FF9944","#CC6622","#662211","#221108"]
    radius_max: 1
    radius_min: 0

  # === IMPACT & DEBRIS EMITTERS ===

  # Impact sparks - bounce off surfaces
  asteroids.impact_sparks:
    max_count: 96
    cooldown_name: "impact-sparks"
    cooldown_ms: 0
    spawn_offset: 0.0
    backward_speed: 0.0
    ttl_ms: 420
    radius: 1
    velocity_scale: 1.0
    lifecycle: Ttl
    thread_mode: "physics"
    gravity_scale: 0.15
    collision: true
    collision_mask: ["asteroid"]
    bounce: 0.7
    mass: 0.1

  # Debris - heavy chunks with full gravity and collision
  asteroid.debris:
    max_count: 64
    cooldown_name: asteroid-debris
    cooldown_ms: 0
    spawn_offset: 0.0
    backward_speed: 0.0
    ttl_ms: 2000
    radius: 2
    velocity_scale: 1.0
    lifecycle: Ttl
    thread_mode: "gravity"
    gravity_scale: 0.3
    collision: true
    collision_mask: ["ship", "asteroid"]
    bounce: 0.6
    mass: 0.5

  # Ship explosion debris - can damage asteroids
  ship.explosion_debris:
    max_count: 48
    cooldown_name: ship-explosion
    cooldown_ms: 0
    spawn_offset: 0.0
    backward_speed: 0.0
    ttl_ms: 1500
    radius: 3
    velocity_scale: 1.2
    lifecycle: Ttl
    thread_mode: "physics"
    gravity_scale: 0.2
    collision: true
    collision_mask: ["asteroid"]
    bounce: 0.4
    mass: 1.0
