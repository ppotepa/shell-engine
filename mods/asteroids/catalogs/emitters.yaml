emitters:
  # === SHIP THRUSTER EMITTERS ===
  
  # Main engine - heavy particles with slight gravity (exhaust falls slightly)
  ship.main:
    max_count: 220
    cooldown_name: ship-main
    cooldown_ms: 0
    min_cooldown_ms: 0
    ramp_ms: 0
    local_x: 0.0
    local_y: 1.0
    emission_local_x: 0.0
    emission_local_y: 1.0
    emission_angle: 0.0
    backward_speed: 0.0
    ttl_ms: 520
    radius: 2
    velocity_scale: 1.0
    lifecycle: TtlOwnerBound
    # Physics: exhaust particles drift slightly with micro-gravity
    thread_mode: "physics"
    gravity_scale: 0.05
    # Default ramp: resolved from active palette "thruster" entry.
    # Hot thrust overrides with active palette "hot_engine" entry via emit args.
    palette_ramp: "thruster"
    radius_max: 2
    radius_min: 0

  # Bow thruster - quick RCS bursts, light particles
  ship.bow:
    max_count: 140
    cooldown_name: ship-bow
    cooldown_ms: 0
    min_cooldown_ms: 0
    ramp_ms: 0
    local_x: 0.0
    local_y: -17.0
    emission_local_x: 0.0
    emission_local_y: -1.0
    emission_angle: 0.0
    backward_speed: 0.0
    ttl_ms: 240
    radius: 1
    velocity_scale: 1.0
    lifecycle: TtlOwnerBound
    thread_mode: "light"
    palette_ramp: "thruster"
    radius_max: 1
    radius_min: 0

  # Port thruster - lateral RCS
  ship.port:
    max_count: 160
    cooldown_name: ship-port
    cooldown_ms: 0
    min_cooldown_ms: 0
    ramp_ms: 0
    local_x: -14.0
    local_y: 9.0
    emission_local_x: -1.0
    emission_local_y: 0.0
    emission_angle: 0.0
    backward_speed: 0.0
    ttl_ms: 240
    radius: 1
    velocity_scale: 1.0
    lifecycle: TtlOwnerBound
    thread_mode: "light"
    palette_ramp: "thruster"
    radius_max: 1
    radius_min: 0

  # Starboard thruster - lateral RCS
  ship.starboard:
    max_count: 160
    cooldown_name: ship-starboard
    cooldown_ms: 0
    min_cooldown_ms: 0
    ramp_ms: 0
    local_x: 14.0
    local_y: 9.0
    emission_local_x: 1.0
    emission_local_y: 0.0
    emission_angle: 0.0
    backward_speed: 0.0
    ttl_ms: 240
    radius: 1
    velocity_scale: 1.0
    lifecycle: TtlOwnerBound
    thread_mode: "light"
    palette_ramp: "thruster"
    radius_max: 1
    radius_min: 0

  # === IMPACT & DEBRIS EMITTERS ===

  # Impact sparks - bounce off surfaces
  asteroids.impact_sparks:
    max_count: 96
    cooldown_name: "impact-sparks"
    cooldown_ms: 0
    spawn_offset: 0.0
    backward_speed: 0.0
    ttl_ms: 420
    radius: 1
    velocity_scale: 1.0
    lifecycle: Ttl
    thread_mode: "physics"
    gravity_scale: 0.15
    collision: true
    collision_mask: ["asteroid"]
    bounce: 0.7
    mass: 0.1

  # Debris - heavy chunks with full gravity and collision
  asteroid.debris:
    max_count: 64
    cooldown_name: asteroid-debris
    cooldown_ms: 0
    spawn_offset: 0.0
    backward_speed: 0.0
    ttl_ms: 2000
    radius: 2
    velocity_scale: 1.0
    lifecycle: Ttl
    thread_mode: "gravity"
    gravity_scale: 0.3
    collision: true
    collision_mask: ["ship", "asteroid"]
    bounce: 0.6
    mass: 0.5

  # Impact fragments - large visible pieces that fade to background color over 2s
  asteroid.impact_fragments:
    max_count: 30
    cooldown_name: asteroid-fragments
    cooldown_ms: 0
    spawn_offset: 0.0
    backward_speed: 0.0
    ttl_ms: 2000
    radius: 3
    radius_max: 4
    radius_min: 2
    velocity_scale: 1.0
    lifecycle: Ttl
    thread_mode: "physics"
    gravity_scale: 0.0
    palette_ramp: "fragment"

  # === BULLET TRAIL ===

  # Luminous glow trail — owner-bound, tiny particles streaming behind bullet
  bullet.trail:
    max_count: 80
    cooldown_name: "bullet-trail"
    cooldown_ms: 0
    min_cooldown_ms: 0
    ramp_ms: 0
    local_x: 0.0
    local_y: 0.0
    emission_local_x: 0.0
    emission_local_y: 1.0      # backward in local space
    emission_angle: 0.0
    backward_speed: 40.0       # drift away from bullet heading
    ttl_ms: 130
    radius: 1
    radius_max: 1
    radius_min: 0
    velocity_scale: 0.12       # only 12% of bullet velocity — trail lags behind
    lifecycle: TtlOwnerBound
    thread_mode: "light"
    palette_ramp: "bullet_trail"
    spread: 0.35               # slight fan spread for glow width

  ship.explosion_debris:
    max_count: 48
    cooldown_name: ship-explosion
    cooldown_ms: 0
    spawn_offset: 0.0
    backward_speed: 0.0
    ttl_ms: 1500
    radius: 3
    velocity_scale: 1.2
    lifecycle: Ttl
    thread_mode: "physics"
    gravity_scale: 0.2
    collision: true
    collision_mask: ["asteroid"]
    bounce: 0.4
    mass: 1.0
