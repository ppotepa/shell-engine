emitters:
  # === SHIP THRUSTER EMITTERS ===
  # All ship emitters use orbital gravity (centripetal toward planet center at 1600,900).
  # gravity_constant tuned for slower 5-minute orbital pacing.
  
  # Main engine - heavy particles that arc with the orbital curvature
  ship.main:
    max_count: 220
    cooldown_name: ship-main
    cooldown_ms: 0
    min_cooldown_ms: 0
    ramp_ms: 0
    local_x: 0.0
    local_y: 2.7
    emission_local_x: 0.0
    emission_local_y: 1.0
    emission_angle: 0.0
    backward_speed: 0.0
    ttl_ms: 420
    radius: 2
    velocity_scale: 1.0
    lifecycle: TtlOwnerBound
    thread_mode: "physics"
    gravity_mode: "orbital"
    gravity_center_x: 1600.0
    gravity_center_y: 900.0
    gravity_constant: 0.0
    gravity_scale: 0.0
    palette_ramp: "thruster"
    radius_max: 2
    radius_min: 0

  # Bow thruster - quick RCS bursts, curve toward planet
  ship.bow:
    max_count: 140
    cooldown_name: ship-bow
    cooldown_ms: 0
    min_cooldown_ms: 0
    ramp_ms: 0
    local_x: 0.0
    local_y: -6.9
    emission_local_x: 0.0
    emission_local_y: -1.0
    emission_angle: 0.0
    backward_speed: 0.0
    ttl_ms: 280
    radius: 1
    velocity_scale: 1.0
    lifecycle: TtlOwnerBound
    thread_mode: "light"
    gravity_mode: "orbital"
    gravity_center_x: 1600.0
    gravity_center_y: 900.0
    gravity_constant: 2000000.0
    palette_ramp: "thruster"
    radius_max: 1
    radius_min: 0

  # Port thruster - lateral RCS, orbital curvature
  ship.port:
    max_count: 160
    cooldown_name: ship-port
    cooldown_ms: 0
    min_cooldown_ms: 0
    ramp_ms: 0
    local_x: -7.4
    local_y: 6.9
    emission_local_x: -1.0
    emission_local_y: 0.0
    emission_angle: 0.0
    backward_speed: 0.0
    ttl_ms: 280
    radius: 1
    velocity_scale: 1.0
    lifecycle: TtlOwnerBound
    thread_mode: "light"
    gravity_mode: "orbital"
    gravity_center_x: 1600.0
    gravity_center_y: 900.0
    gravity_constant: 2000000.0
    palette_ramp: "thruster"
    radius_max: 1
    radius_min: 0

  # Starboard thruster - lateral RCS, orbital curvature
  ship.starboard:
    max_count: 160
    cooldown_name: ship-starboard
    cooldown_ms: 0
    min_cooldown_ms: 0
    ramp_ms: 0
    local_x: 7.4
    local_y: 6.9
    emission_local_x: 1.0
    emission_local_y: 0.0
    emission_angle: 0.0
    backward_speed: 0.0
    ttl_ms: 280
    radius: 1
    velocity_scale: 1.0
    lifecycle: TtlOwnerBound
    thread_mode: "light"
    gravity_mode: "orbital"
    gravity_center_x: 1600.0
    gravity_center_y: 900.0
    gravity_constant: 2000000.0
    palette_ramp: "thruster"
    radius_max: 1
    radius_min: 0

  # Rotational pair: front-left microthruster
  ship.bow_left:
    max_count: 120
    cooldown_name: ship-bow-left
    cooldown_ms: 0
    min_cooldown_ms: 0
    ramp_ms: 0
    local_x: -6.0
    local_y: -5.2
    emission_local_x: -1.0
    emission_local_y: 0.0
    emission_angle: 0.0
    backward_speed: 0.0
    ttl_ms: 220
    radius: 1
    velocity_scale: 1.0
    lifecycle: TtlOwnerBound
    thread_mode: "light"
    gravity_mode: "orbital"
    gravity_center_x: 1600.0
    gravity_center_y: 900.0
    gravity_constant: 2000000.0
    palette_ramp: "thruster"
    radius_max: 1
    radius_min: 0

  # Rotational pair: front-right microthruster
  ship.bow_right:
    max_count: 120
    cooldown_name: ship-bow-right
    cooldown_ms: 0
    min_cooldown_ms: 0
    ramp_ms: 0
    local_x: 6.0
    local_y: -5.2
    emission_local_x: 1.0
    emission_local_y: 0.0
    emission_angle: 0.0
    backward_speed: 0.0
    ttl_ms: 220
    radius: 1
    velocity_scale: 1.0
    lifecycle: TtlOwnerBound
    thread_mode: "light"
    gravity_mode: "orbital"
    gravity_center_x: 1600.0
    gravity_center_y: 900.0
    gravity_constant: 2000000.0
    palette_ramp: "thruster"
    radius_max: 1
    radius_min: 0

  # Rotational pair: aft-left microthruster
  ship.aft_left:
    max_count: 120
    cooldown_name: ship-aft-left
    cooldown_ms: 0
    min_cooldown_ms: 0
    ramp_ms: 0
    local_x: -6.0
    local_y: 5.2
    emission_local_x: -1.0
    emission_local_y: 0.0
    emission_angle: 0.0
    backward_speed: 0.0
    ttl_ms: 220
    radius: 1
    velocity_scale: 1.0
    lifecycle: TtlOwnerBound
    thread_mode: "light"
    gravity_mode: "orbital"
    gravity_center_x: 1600.0
    gravity_center_y: 900.0
    gravity_constant: 2000000.0
    palette_ramp: "thruster"
    radius_max: 1
    radius_min: 0

  # Rotational pair: aft-right microthruster
  ship.aft_right:
    max_count: 120
    cooldown_name: ship-aft-right
    cooldown_ms: 0
    min_cooldown_ms: 0
    ramp_ms: 0
    local_x: 6.0
    local_y: 5.2
    emission_local_x: 1.0
    emission_local_y: 0.0
    emission_angle: 0.0
    backward_speed: 0.0
    ttl_ms: 220
    radius: 1
    velocity_scale: 1.0
    lifecycle: TtlOwnerBound
    thread_mode: "light"
    gravity_mode: "orbital"
    gravity_center_x: 1600.0
    gravity_center_y: 900.0
    gravity_constant: 2000000.0
    palette_ramp: "thruster"
    radius_max: 1
    radius_min: 0

  # === IMPACT & DEBRIS EMITTERS ===

  # Impact sparks - bounce off surfaces
  asteroids.impact_sparks:
    max_count: 96
    cooldown_name: "impact-sparks"
    cooldown_ms: 0
    spawn_offset: 0.0
    backward_speed: 0.0
    ttl_ms: 420
    radius: 1
    velocity_scale: 1.0
    lifecycle: Ttl
    thread_mode: "physics"
    gravity_scale: 0.15
    collision: true
    collision_mask: ["asteroid"]
    bounce: 0.7
    mass: 0.1

  # Debris - heavy chunks with full gravity and collision
  asteroid.debris:
    max_count: 64
    cooldown_name: asteroid-debris
    cooldown_ms: 0
    spawn_offset: 0.0
    backward_speed: 0.0
    ttl_ms: 2000
    radius: 2
    velocity_scale: 1.0
    lifecycle: Ttl
    thread_mode: "gravity"
    gravity_scale: 0.3
    collision: true
    collision_mask: ["ship", "asteroid"]
    bounce: 0.6
    mass: 0.5

  # Impact fragments - large visible pieces that fade to background color over 2s
  asteroid.impact_fragments:
    max_count: 30
    cooldown_name: asteroid-fragments
    cooldown_ms: 0
    spawn_offset: 0.0
    backward_speed: 0.0
    ttl_ms: 2000
    radius: 3
    radius_max: 4
    radius_min: 2
    velocity_scale: 1.0
    lifecycle: Ttl
    thread_mode: "physics"
    gravity_scale: 0.0
    palette_ramp: "fragment"

  # === BULLET TRAIL ===

  # Luminous glow trail — owner-bound, tiny particles curving with orbital gravity
  bullet.trail:
    max_count: 80
    cooldown_name: "bullet-trail"
    cooldown_ms: 0
    min_cooldown_ms: 0
    ramp_ms: 0
    local_x: 0.0
    local_y: 0.0
    emission_local_x: 0.0
    emission_local_y: 1.0      # backward in local space
    emission_angle: 0.0
    backward_speed: 40.0       # drift away from bullet heading
    ttl_ms: 180
    radius: 1
    radius_max: 1
    radius_min: 0
    velocity_scale: 0.12       # only 12% of bullet velocity — trail lags behind
    lifecycle: TtlOwnerBound
    thread_mode: "light"
    gravity_mode: "orbital"
    gravity_center_x: 1600.0
    gravity_center_y: 900.0
    gravity_constant: 2000000.0
    palette_ramp: "bullet_trail"
    spread: 0.35               # slight fan spread for glow width

  # === LASER SIGHT ===

  # Zero-speed dot spawned at a local_y body-frame offset each frame to draw
  # a dim dotted aiming line showing the bullet trajectory.
  laser.dot:
    max_count: 100
    cooldown_name: "laser-dot"
    cooldown_ms: 0
    min_cooldown_ms: 0
    ramp_ms: 0
    local_x: 0.0
    local_y: 0.0
    emission_local_x: 0.0
    emission_local_y: 0.0
    emission_angle: 0.0
    backward_speed: 0.0
    ttl_ms: 48
    radius: 1
    velocity_scale: 0.0
    lifecycle: Ttl
    thread_mode: "light"

  # === SHIP DESTRUCTION & RESPAWN ===

  # Hull pieces — many tiny physics shards flying in all directions.
  ship.hull_pieces:
    max_count: 80
    cooldown_name: ship-hull-pieces
    cooldown_ms: 0
    spawn_offset: 0.0
    backward_speed: 0.0
    ttl_ms: 2500
    radius: 1
    radius_max: 2
    radius_min: 0
    velocity_scale: 1.0
    lifecycle: Ttl
    thread_mode: "physics"
    gravity_scale: 0.0
    collision: true
    collision_mask: ["asteroid"]
    bounce: 0.4
    mass: 0.2

  # Shockwave ring — fast expanding ring of bright sparks at the point of death.
  ship.shockwave:
    max_count: 32
    cooldown_name: ship-shockwave
    cooldown_ms: 0
    spawn_offset: 0.0
    backward_speed: 0.0
    ttl_ms: 700
    radius: 2
    radius_max: 3
    radius_min: 1
    velocity_scale: 0.0
    lifecycle: Ttl
    thread_mode: "light"
    gravity_scale: 0.0
    palette_ramp: "hot_engine"

  # Warp-in ring — expanding ring of particles when the ship materialises on respawn.
  ship.warp_in:
    max_count: 64
    cooldown_name: ship-warp-in
    cooldown_ms: 0
    spawn_offset: 0.0
    backward_speed: 0.0
    ttl_ms: 900
    radius: 2
    radius_max: 3
    radius_min: 1
    velocity_scale: 0.0
    lifecycle: Ttl
    thread_mode: "light"
    gravity_scale: 0.0
    palette_ramp: "thruster"

  ship.explosion_debris:
    max_count: 48
    cooldown_name: ship-explosion
    cooldown_ms: 0
    spawn_offset: 0.0
    backward_speed: 0.0
    ttl_ms: 1500
    radius: 3
    velocity_scale: 1.2
    lifecycle: Ttl
    thread_mode: "physics"
    gravity_scale: 0.2
    collision: true
    collision_mask: ["asteroid"]
    bounce: 0.4
    mass: 1.0
