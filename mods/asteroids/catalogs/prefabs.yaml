prefabs:
  ship:
    kind: ship
    sprite_template: ship
    fg_colour: "@palette.ship"
    default_tags: [ship]
    components:
      physics:
        vx: 0.0
        vy: 0.0
        drag: 0.008          # Near-zero: true space inertia, must brake manually
        max_speed: 280.0
      collider:
        shape: circle
        radius: 10.0
        layer: 1
        mask: 6
      controller:
        controller_type: ArcadeController
        config:
          turn_step_ms: 16   # Faster turn response
          thrust_power: 180.0
          max_speed: 280.0
          heading_bits: 64   # Smoother heading resolution
      lifecycle: Persistent
      wrappable: true
      extra_data:
        role: player

  bullet:
    kind: bullet
    sprite_template: bullet
    fg_colour: "@palette.bullet"
    default_tags: [bullet, player-bullet]
    components:
      physics:
        vx: 0.0
        vy: 0.0
        drag: 0.0
        max_speed: 0.0
      collider:
        shape: circle
        radius: 2.0
        layer: 4
        mask: 2
      lifecycle: Ttl
      wrappable: true

  asteroid-large:
    kind: asteroid
    sprite_template: asteroid-large
    fg_colour: "@palette.asteroid"
    default_tags: [asteroid, asteroid-large]
    components:
      physics:
        vx: 0.0
        vy: 0.0
        drag: 0.0
        max_speed: 0.0
      collider:
        shape: circle
        radius: 22.0
        layer: 2
        mask: 5
      lifecycle: Persistent
      wrappable: true
      extra_data:
        size: 3
        score: 20

  asteroid-medium:
