prefabs:
  ship:
    kind: ship
    sprite_template: ship
    fg_colour: "@palette.ship"
    default_tags: [ship]
    components:
      physics:
        vx: 0.0
        vy: 0.0
        drag: 0.008          # Near-zero: true space inertia, must brake manually
        max_speed: 280.0
        mass: 8.0            # Light but not trivial — shrapnel/bullets will nudge it
        restitution: 0.2     # Ship absorbs most impact (damaged, not bouncy)
      collider:
        shape: circle
        radius: 10.0
        layer: 1
        mask: 6
      controller:
        controller_type: ArcadeController
        config:
          turn_step_ms: 16   # Faster turn response
          thrust_power: 180.0
          max_speed: 280.0
          heading_bits: 64   # Smoother heading resolution
      lifecycle: Persistent
      wrappable: true
      extra_data:
        role: player

  bullet:
    kind: bullet
    sprite_template: bullet
    fg_colour: "@palette.bullet"
    default_tags: [bullet, player-bullet]
    components:
      physics:
        vx: 0.0
        vy: 0.0
        drag: 0.0
        max_speed: 0.0
        mass: 0.5            # Very light — high speed, low mass
        restitution: 0.65    # Ricochet off asteroid surface at an angle
      collider:
        shape: circle
        radius: 3.0
        layer: 4
        mask: 2
      lifecycle: Ttl
      wrappable: true

  asteroid-large:
    kind: asteroid
    sprite_template: asteroid-large
    fg_colour: "@palette.asteroid"
    default_tags: [asteroid, asteroid-large]
    components:
      physics:
        vx: 0.0
        vy: 0.0
        drag: 0.0
        max_speed: 0.0
        mass: 40.0           # Heavy — proportional to visual size
        restitution: 0.85    # Rock bounces fairly elastically in vacuum
      collider:
        shape: circle
        radius: 10.0         # Matches actual projected visual radius (~9px + small margin)
        layer: 2
        mask: 5
      lifecycle: Persistent
      wrappable: true
      extra_data:
        size: 3
        score: 20

  asteroid-medium:
    kind: asteroid
    sprite_template: asteroid-medium
    fg_colour: "@palette.asteroid"
    default_tags: [asteroid, asteroid-medium]
    components:
      physics:
        vx: 0.0
        vy: 0.0
        drag: 0.0
        max_speed: 0.0
        mass: 12.0           # Medium mass — proportional to visual size
        restitution: 0.85
      collider:
        shape: circle
        radius: 6.0          # Matches actual projected visual radius (~5px + small margin)
        layer: 2
        mask: 5
      lifecycle: Persistent
      wrappable: true
      extra_data:
        size: 2
        score: 50

  asteroid-small:
    kind: asteroid
    sprite_template: asteroid-small
    fg_colour: "@palette.asteroid"
    default_tags: [asteroid, asteroid-small]
    components:
      physics:
        vx: 0.0
        vy: 0.0
        drag: 0.0
        max_speed: 0.0
        mass: 3.0            # Light — proportional to visual size
        restitution: 0.85
      collider:
        shape: circle
        radius: 3.0          # Matches actual projected visual radius (~3px)
        layer: 2
        mask: 5
      lifecycle: Persistent
      wrappable: true
      extra_data:
        size: 1
        score: 100

  shrapnel:
    kind: shrapnel
    sprite_template: shrapnel
    fg_colour: "@palette.asteroid"
    default_tags: [shrapnel]
    components:
      physics:
        vx: 0.0
        vy: 0.0
        drag: 0.0
        max_speed: 0.0
        mass: 0.3            # Tiny fragment — very light, ricochet effect
        restitution: 0.6     # Partial bounce off hard surfaces
      collider:
        shape: circle
        radius: 2.0
        layer: 4    # same group as bullets — already in ship.mask(6) and asteroid.mask(5)
        mask: 3     # hits ship(layer=1) and asteroids(layer=2)
      lifecycle: Ttl
      wrappable: true

  debris:
    sprite_template: debris
    components:
      physics:
        vx: 0.0
        vy: 0.0
        drag: 0.85
        max_speed: 0.0
        mass: 0.2
        restitution: 0.3
      collider:
        shape: circle
        radius: 1.5
        layer: 8
        mask: 3
      lifecycle: Ttl

