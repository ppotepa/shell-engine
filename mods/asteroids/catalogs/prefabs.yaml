prefabs:
  ship:
    kind: ship
    sprite_template: ship
    fg_colour: "@palette.ship"
    default_tags: [ship]
    components:
      physics:
        vx: 0.0
        vy: 0.0
        drag: 0.0
        max_speed: 0.0
        mass: 8.0
        restitution: 0.2
        gravity_scale: 1.0
        gravity_mode: point
        gravity_body: main-planet
        atmosphere_body: main-planet
        atmosphere_drag_scale: 0.0
        atmosphere_heat_scale: 1.0
        atmosphere_cooling: 0.14
      collider:
        shape: circle
        radius: 10.0
        layer: 1
        mask: 0
      lifecycle: Persistent
      wrappable: false
      extra_data:
        role: player

