# Orbital bodies catalog.
# Each entry defines a specific planet, moon, or station in the scene.
# planet_type references a preset from planets.yaml.
# center_x/y is in world space (WORLD_W * 0.5 = 1600, WORLD_H * 0.5 = 900 for asteroids mod).

bodies:
  main-planet:
    planet_type: earth_like
    # Fixed at world center — not orbiting anything
    center_x: 1600.0
    center_y: 900.0
    orbit_radius: 0.0
    orbit_period_sec: 0.0
    orbit_phase_deg: 0.0
    # Visual/collision dimensions (px)
    radius_px: 115.0
    surface_radius: 90.0
    # Gravitational mu for orbital mechanics (px³/s²)
    # Tuned so ORBIT_R=450px, ORBIT_V0≈9.42px/s gives stable circular orbit.
    gravity_mu: 565000.0
    # Scene sprite ids driven by game-loop.rhai
    sprite_surface: planet-bg-sphere
    sprite_clouds: planet-clouds
    sprite_clouds_2: planet-clouds-2
