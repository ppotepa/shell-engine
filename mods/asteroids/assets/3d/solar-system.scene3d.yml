# yaml-language-server: $schema=../../../schemas/scene3d.schema.yaml
id: asteroids-planetary-clean

viewport:
  width: 640
  height: 360
  rendered_mode: halfblock

camera:
  distance: 62.0
  fov_degrees: 46.0
  near_clip: 0.01
  position: [0.0, 10.0, 62.0]
  look_at: [8.0, 3.0, -20.0]

lights:
  - id: key
    type: directional
    direction: [-0.58, 0.34, -0.74]
    intensity: 1.0
  - id: sky-ambient
    type: ambient
    intensity: 0.05
  - id: warm_fill
    type: point
    position: [-20.0, 14.0, -38.0]
    intensity: 0.9
    colour: "#f2c97a"
    snap_hz: 0.0
    falloff_constant: 0.001
  - id: cool_rim
    type: point
    position: [42.0, 6.0, -18.0]
    intensity: 0.18
    colour: "#8ea9de"
    snap_hz: 0.0
    falloff_constant: 0.001

materials:
  bg_nebula:
    surface_mode: unlit
    fg_colour: "#15123f"
    opacity: 0.24
    backface_cull: false
  bg_stars:
    surface_mode: unlit
    fg_colour: "#becbff"
    opacity: 0.12
    backface_cull: false
  planet_body:
    surface_mode: material
    fg_colour: "#cf944a"
    cel_levels: 5
    tone_mix: 0.78
    shadow_colour: "#4f3118"
    midtone_colour: "#a96e34"
    highlight_colour: "#f2cd8f"
    backface_cull: true
  atmosphere_haze:
    surface_mode: material
    fg_colour: "#d08030"
    cel_levels: 2
    tone_mix: 0.12
    shadow_colour: "#3d1800"
    midtone_colour: "#904820"
    highlight_colour: "#f0a050"
    opacity: 0.22
    backface_cull: false
  # ── C ring (Crepe) – τ≈0.15, Beer-Lambert T≈0.81 ─────────────────────────
  ring_c_back:
    surface_mode: material
    fg_colour: "#b8b0a0"
    cel_levels: 3
    tone_mix: 0.55
    shadow_colour: "#2a2620"
    midtone_colour: "#8a8475"
    highlight_colour: "#d2cabb"
    opacity: 0.28
    backface_cull: false
  ring_c_front:
    surface_mode: material
    fg_colour: "#b8b0a0"
    cel_levels: 3
    tone_mix: 0.55
    shadow_colour: "#2a2620"
    midtone_colour: "#8a8475"
    highlight_colour: "#d2cabb"
    opacity: 0.35
    backface_cull: false
  # ── B ring (dense) – τ≈1.5, Beer-Lambert T≈0.10 ──────────────────────────
  ring_b_back:
    surface_mode: material
    fg_colour: "#d8ceb0"
    cel_levels: 5
    tone_mix: 0.70
    shadow_colour: "#4a4338"
    midtone_colour: "#aaa08a"
    highlight_colour: "#f0e4c8"
    opacity: 0.82
    backface_cull: false
  ring_b_front:
    surface_mode: material
    fg_colour: "#e0d4ba"
    cel_levels: 5
    tone_mix: 0.70
    shadow_colour: "#504840"
    midtone_colour: "#b8aa90"
    highlight_colour: "#fff5e0"
    opacity: 0.90
    backface_cull: false
  # ── Cassini Division – τ≈0.1, Beer-Lambert T≈0.87 ────────────────────────
  ring_cassini_back:
    surface_mode: unlit
    fg_colour: "#08070a"
    opacity: 0.20
    backface_cull: false
  ring_cassini_front:
    surface_mode: unlit
    fg_colour: "#08070a"
    opacity: 0.20
    backface_cull: false
  # ── A ring – τ≈0.7, Beer-Lambert T≈0.37 ──────────────────────────────────
  ring_a_back:
    surface_mode: material
    fg_colour: "#c8bc9a"
    cel_levels: 4
    tone_mix: 0.66
    shadow_colour: "#403828"
    midtone_colour: "#9a907a"
    highlight_colour: "#e0d4b8"
    opacity: 0.62
    backface_cull: false
  ring_a_front:
    surface_mode: material
    fg_colour: "#ccc094"
    cel_levels: 4
    tone_mix: 0.66
    shadow_colour: "#483c2c"
    midtone_colour: "#a4988a"
    highlight_colour: "#eedec8"
    opacity: 0.72
    backface_cull: false
  ring_shadow:
    surface_mode: unlit
    fg_colour: "#060310"
    opacity: 0.55
    backface_cull: false
  cassini_gap:
    surface_mode: unlit
    fg_colour: "#050408"
    opacity: 0.30
    backface_cull: false
  moon_warm:
    surface_mode: material
    fg_colour: "#c8bea8"
    cel_levels: 4
    tone_mix: 0.72
    shadow_colour: "#40382d"
    midtone_colour: "#9a917d"
    highlight_colour: "#ede6d7"
    backface_cull: true
  moon_cool:
