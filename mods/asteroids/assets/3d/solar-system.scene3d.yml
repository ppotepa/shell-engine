        - { object: belt-shadow, property: yaw_offset, from: 0.0, to: 18.0, easing: linear }

        - { object: moon-a, property: yaw_offset, from: 0.0, to: 760.0, easing: linear }
        - { object: moon-a, property: translation_x, from: 35.0, to: 33.3, easing: linear }
        - { object: moon-a, property: translation_z, from: -19.2, to: -17.9, easing: linear }
