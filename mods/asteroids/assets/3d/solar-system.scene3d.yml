# yaml-language-server: $schema=../../../schemas/scene3d.schema.yaml
id: asteroids-solar-system

viewport:
  width: 640
  height: 360
  rendered_mode: halfblock

camera:
  distance: 58.0
  fov_degrees: 50.0
  near_clip: 0.01
  position: [0.0, 10.0, 58.0]
  look_at: [8.0, 2.0, -18.0]

lights:
