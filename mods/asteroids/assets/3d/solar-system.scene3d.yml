      keyframes: 96
      tweens:
        - { object: sun-glow, property: yaw_offset, from: 0.0, to: 420.0, easing: linear }
        - { object: sun-core, property: yaw_offset, from: 0.0, to: 860.0, easing: linear }
        - { object: saturn-planet, property: yaw_offset, from: 0.0, to: 240.0, easing: linear }
