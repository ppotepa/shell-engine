    type: point
    position: [-18.0, 8.0, -30.0]
    intensity: 1.15
    colour: "#f6c85c"
    snap_hz: 0.0
  - id: cold_rim
    type: point
    position: [38.0, 6.0, -24.0]
    intensity: 0.24
    colour: "#7aa6d8"
    snap_hz: 0.0

