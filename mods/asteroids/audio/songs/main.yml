id: asteroids.menu-loop
tempo_bpm: 96
time_signature: [4, 4]
loop_region:
  start_beat: 0
  end_beat: 32
tracks:
  - id: pulse
    gain: 0.32
    clips:
      - { at_beat: 0, pattern: pulse.a }
      - { at_beat: 8, pattern: pulse.a }
      - { at_beat: 16, pattern: pulse.b }
      - { at_beat: 24, pattern: pulse.b }
patterns:
  pulse.a:
    steps:
      - { at_beat: 0.0, event: music.menu.pulse }
      - { at_beat: 2.0, event: music.menu.pulse }
  pulse.b:
    steps:
      - { at_beat: 0.0, event: music.menu.pulse }
      - { at_beat: 1.0, event: music.menu.pulse }
      - { at_beat: 3.0, event: music.menu.pulse }
