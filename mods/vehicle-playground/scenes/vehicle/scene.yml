id: vehicle-playground-vehicle
title: Vehicle Playground
bg: "#000010"
render-size: 640x360
space: 3d
spatial:
  meters-per-world-unit: 1000.0
celestial:
  scope: local
  region: vehicle-playground-local
  system: vehicle-playground-system
  focus-body: generated-planet
  frame: focus-relative
  clock-source: scene
layers:
  - ref: vehicle/layers/planet.yml
  - ref: vehicle/layers/vehicle-scene-layer.yml
  - ref: vehicle/layers/hud.yml
logic:
  kind: script
  behavior: rhai-script
  src: ./main.rhai
ui:
  scale: 1.0
  font-scale: 1.12
stages:
  on_enter:
    steps:
      - effects:
          - name: fade-in
            duration: 360
  on_idle:
    looping: true
    steps:
      - pause: 16ms
