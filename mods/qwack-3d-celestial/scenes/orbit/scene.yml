# yaml-language-server: $schema=../../../schemas/scene.yaml
id: qwack-3d-celestial-orbit
title: Qwack 3D Celestial Orbit Contract
bg: black
render-size: 640x360
render-space: 3d
world-model: celestial-3d
controller-defaults:
  camera-preset: qwack-celestial-orbit
  player-preset: qwack-celestial-flight
  ui-preset: qwack-celestial-hud
camera-rig:
  preset: qwack-celestial-orbit
celestial:
  scope: local
  region: qwack-celestial-local
  system: qwack-celestial-system
  focus-body: qwack-celestial-demo-world
  focus-site: qwack-celestial-demo-orbit
  frame: focus-relative
  clock-source: scene
layers:
  - ref: orbit/layers/main.yml
stages:
  on_enter:
    steps:
      - { effects: [{ name: fade-in, duration: 250 }] }
  on_idle:
    trigger: any-key
    looping: true
    steps:
      - pause: 1200ms
next: qwack-3d-celestial-systems
