# yaml-language-server: $schema=../../../schemas/scene.yaml
id: qwack-3d-celestial-main
title: Qwack 3D Celestial
bg: black
render-size: 640x360
render-space: 3d
world-model: celestial-3d
controller-defaults:
  camera-preset: qwack-celestial-fps
  player-preset: qwack-celestial-walker
  ui-preset: qwack-celestial-hud
camera-rig:
  preset: qwack-celestial-fps
celestial:
  scope: local
  region: qwack-celestial-local
  system: qwack-celestial-system
  focus-body: qwack-celestial-demo-world
  frame: focus-relative
  clock-source: scene
layers:
  - ref: main/layers/main.yml
stages:
  on_enter:
    steps:
      - { effects: [{ name: fade-in, duration: 250 }] }
  on_idle:
    trigger: any-key
    looping: true
    steps:
      - pause: 1200ms
next: qwack-3d-celestial-hooks
