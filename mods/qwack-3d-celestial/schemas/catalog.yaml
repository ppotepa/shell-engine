$schema: https://json-schema.org/draft/2020-12/schema
$id: https://shell-engine.local/mods/qwack-3d-celestial/schemas/catalog.yaml
title: schema qwack-3d-celestial catalog
$defs:
  scene_ids:
    type: string
    enum:
    - qwack-3d-celestial-hooks
    - qwack-3d-celestial-main
    - qwack-3d-celestial-orbit
    - qwack-3d-celestial-systems
  scene_paths:
    type: string
    enum:
    - /scenes/hooks/scene.yml
    - /scenes/main/scene.yml
    - /scenes/orbit/scene.yml
    - /scenes/systems/scene.yml
  scene_refs:
    type: string
    enum:
    - /scenes/hooks/scene.yml
    - /scenes/main/scene.yml
    - /scenes/orbit/scene.yml
    - /scenes/systems/scene.yml
    - qwack-3d-celestial-hooks
    - qwack-3d-celestial-main
    - qwack-3d-celestial-orbit
    - qwack-3d-celestial-systems
  object_names:
    type: string
    enum: []
  effect_names:
    type: string
    enum:
    - fade-in
  layer_refs:
    type: string
    enum:
    - hooks/layers/main.yml
    - main/layers/main.yml
    - orbit/layers/main.yml
    - systems/layers/main.yml
  sprite_refs:
    type: string
    enum: []
  template_refs:
    type: string
    enum: []
  object_refs:
    type: string
    enum: []
  effect_refs:
    type: string
    enum: []
  font_names:
    type: string
    enum: []
  font_specs:
    type: string
    enum:
    - default
    - generic
    - generic:1
    - generic:2
    - generic:3
    - generic:large
    - generic:standard
    - generic:tiny
  image_paths:
    type: string
    enum: []
  model_paths:
    type: string
    enum: []
  scene3d_paths:
    type: string
    enum: []
  cutscene_refs:
    type: string
    enum: []
  sprite_ids:
    type: string
    enum: []
  template_names:
    type: string
    enum: []
