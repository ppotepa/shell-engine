# Cargo workspace configuration.
#
# Build performance settings:
#   - incremental compilation enabled for fast dev rebuilds
#   - rust-lld linker (bundled with Rust) replaces slow MSVC link.exe
#
# SDL2 on Windows
# ---------------
# The SDL2 backend (--features sdl2) requires SDL2 development libraries.
# Download from: https://github.com/libsdl-org/SDL/releases (SDL2-devel-*-VC.zip)
# Then set these environment variables before building:
#
#   SDL2_LIB_DIR     = <path>\lib\x64
#   SDL2_INCLUDE_DIR = <path>\include
#
# Or run: scripts\setup-windows.ps1   (downloads and configures SDL2 automatically)
#
# Uncomment and adjust the section below if you want to hard-code the paths:
#
# Uncomment and adjust if you want to hard-code the paths for your machine.
# Replace <YourUser> with your Windows username.
#
# [env]
# SDL2_LIB_DIR     = "C:/Users/<YourUser>/SDL2/SDL2-2.30.12/lib/x64"
# SDL2_INCLUDE_DIR = "C:/Users/<YourUser>/SDL2/SDL2-2.30.12/include"

[profile.dev]
# Incremental compilation: greatly speeds up dev rebuilds by only recompiling
# changed code. Re-enabled — the old Windows NTFS hard-link warning is
# resolved in modern Rust (1.71+). If you see "hard linking files in the
# incremental compilation cache failed", set CARGO_INCREMENTAL=0 temporarily.
incremental = true

# Use the bundled rust-lld linker (LLD, MSVC-compatible) instead of link.exe.
# Significantly faster linking — 2–4× speedup on large workspaces.
# rust-lld.exe ships with every Rust toolchain; no extra install required.
[target.x86_64-pc-windows-msvc]
linker = "rust-lld"
# target-cpu=native: enables AVX2/AVX512 auto-vectorisation for the software rasteriser.
# Binaries are not portable (only run on this CPU family) — do not check this line in for CI.
rustflags = ["-C", "linker-flavor=lld-link", "-C", "target-cpu=native"]

