<h2 class="sr-only">Animated Saturn-analogue planetary system: rotating rings, five orbiting moons, and a surrounding asteroid belt rendered on an HTML canvas.</h2>
<canvas id="c" style="width:100%;height:auto;display:block;background:#04020F"></canvas>
<script>
const cv = document.getElementById('c');
const ctx = cv.getContext('2d');
const W = cv.width = 680, H = cv.height = 382;
const PX = 322, PY = 190;
const PR = 68;
const VP = 0.29;

const rng = (() => { let s = 42; return () => { s ^= s<<13; s ^= s>>17; s ^= s<<5; return (s>>>0)/0x100000000; }; })();

const BELT = Array.from({length:370}, () => ({
  a: rng()*Math.PI*2, r: 194+rng()*108, dy:(rng()-.5)*14,
  sz:.5+rng()*1.9, br:.22+rng()*.58, da:(rng()-.5)*.00038
}));

const STARS = Array.from({length:118}, () => ({
  x:rng()*W, y:rng()*H, r:.3+rng()*1.2, o:.15+rng()*.70, warm:rng()>.88
}));

const MOONS = [
  {or:178, sz:13, P:18,  ph:.22, vp:.30, col:'#C8BEA8', shad:true},
  {or:242, sz:8,  P:28,  ph:1.18,vp:.31, col:'#B0B8C4', shad:true},
  {or:302, sz:5,  P:12,  ph:2.35,vp:.25, col:'#C0BAB4', shad:false},
  {or:124, sz:4,  P:8,   ph:.85, vp:.27, col:'#D0C4A4', shad:false},
  {or:368, sz:3,  P:44,  ph:3.55,vp:.19, col:'#A8B0B8', shad:false},
];

const RINGS=[
  {r0:80, r1:103,col:'#D8CEB0',op:.82},
  {r0:108,r1:136,col:'#C8B898',op:.60},
  {r0:141,r1:163,col:'#B8A888',op:.42},
];

function annulus(r0,r1,front){
  ctx.save();
  ctx.beginPath();
  ctx.rect(0,front?PY:0,W,front?H:PY);
  ctx.clip();
  ctx.beginPath();
  ctx.ellipse(PX,PY,r1,r1*VP,0,0,Math.PI*2);
  ctx.ellipse(PX,PY,r0,r0*VP,0,0,Math.PI*2,true);
  ctx.fill('evenodd');
  ctx.restore();
}

function drawRings(front){
  RINGS.forEach(r=>{
    ctx.save();
    ctx.globalAlpha=r.op;
    ctx.fillStyle=r.col;
    annulus(r.r0,r.r1,front);
    ctx.restore();
  });
}

function drawBelt(t,front){
  BELT.forEach(a=>{
    const ang=a.a+t*.00065+a.da*t;
    if((Math.sin(ang)>0)!==front)return;
    const x=PX+a.r*Math.cos(ang);
    const y=PY+a.r*VP*Math.sin(ang)+a.dy;
    const op=a.br*(front?1:.58);
    ctx.beginPath();
    ctx.arc(x,y,a.sz,0,Math.PI*2);
    ctx.fillStyle=`rgba(172,160,140,${op})`;
    ctx.fill();
  });
}

function drawPlanet(){
  const atm=ctx.createRadialGradient(PX,PY,PR*.90,PX,PY,PR*1.15);
  atm.addColorStop(0,'rgba(208,128,48,0)');
  atm.addColorStop(.5,'rgba(208,128,48,.21)');
  atm.addColorStop(1,'rgba(208,128,48,0)');
  ctx.beginPath();
  ctx.arc(PX,PY,PR*1.15,0,Math.PI*2);
  ctx.fillStyle=atm;
  ctx.fill();

  const body=ctx.createRadialGradient(PX-18,PY-22,5,PX+10,PY+10,PR*1.05);
  body.addColorStop(0,'#F5DF8C');
  body.addColorStop(.18,'#E8C062');
  body.addColorStop(.44,'#D09840');
  body.addColorStop(.70,'#AC7030');
  body.addColorStop(.90,'#7C4C22');
  body.addColorStop(1,'#4C2E14');
  ctx.beginPath();
  ctx.arc(PX,PY,PR,0,Math.PI*2);
  ctx.fillStyle=body;
  ctx.fill();

  ctx.save();
  ctx.beginPath();
  ctx.arc(PX,PY,PR,0,Math.PI*2);
  ctx.clip();
  [[-0.60,.09,'rgba(220,175,95,.28)'],[-.33,.12,'rgba(168,105,42,.30)'],
   [-.05,.16,'rgba(230,158,82,.26)'],[.29,.11,'rgba(180,118,50,.24)'],
   [.60,.08,'rgba(212,160,75,.20)']].forEach(([yf,wf,c])=>{
    ctx.fillStyle=c;
    ctx.fillRect(PX-PR,PY+yf*PR-wf*PR,PR*2,wf*PR*2);
  });
  const rs=ctx.createLinearGradient(PX,PY-PR*.08,PX,PY+PR*.38);
  rs.addColorStop(0,'rgba(4,2,18,0)');
  rs.addColorStop(.28,'rgba(4,2,18,.50)');
  rs.addColorStop(.74,'rgba(4,2,18,.42)');
  rs.addColorStop(1,'rgba(4,2,18,0)');
  ctx.fillStyle=rs;
  ctx.fillRect(PX-PR,PY-PR*.08,PR*2,PR*.46);
  ctx.restore();
}

function drawMoon(m,t,front){
  const a=m.ph+(t/m.P)*Math.PI*2;
  if((Math.sin(a)>0)!==front)return;
  const mx=PX+m.or*Math.cos(a);
  const my=PY+m.or*m.vp*Math.sin(a);
  const d=Math.hypot(mx-PX,(my-PY)/m.vp);
  if(d<PR+m.sz)return;

  if(m.shad&&front){
    const sa=Math.sin(a);
    if(sa>.22){
      ctx.save();
      ctx.globalAlpha=.30*sa;
      ctx.beginPath();
      ctx.ellipse(mx+3,PY+m.or*VP*sa*.90,m.sz*1.9,m.sz*.68,.12,0,Math.PI*2);
      ctx.fillStyle='#030110';
      ctx.fill();
      ctx.restore();
    }
  }

  const gw=ctx.createRadialGradient(mx,my,0,mx,my,m.sz*3.2);
  gw.addColorStop(0,'rgba(200,194,182,.13)');
  gw.addColorStop(1,'rgba(200,194,182,0)');
  ctx.beginPath();
  ctx.arc(mx,my,m.sz*3.2,0,Math.PI*2);
  ctx.fillStyle=gw;
  ctx.fill();

  const mg=ctx.createRadialGradient(mx-m.sz*.30,my-m.sz*.30,0,mx,my,m.sz);
  mg.addColorStop(0,'#EAE2D2');
  mg.addColorStop(.52,m.col);
  mg.addColorStop(1,'#201810');
  ctx.beginPath();
  ctx.arc(mx,my,m.sz,0,Math.PI*2);
  ctx.fillStyle=mg;
  ctx.fill();

  ctx.save();
  ctx.beginPath();
  ctx.arc(mx,my,m.sz,0,Math.PI*2);
  ctx.clip();
  const ns=ctx.createRadialGradient(mx+m.sz*.58,my,0,mx+m.sz*.36,my,m.sz*1.1);
  ns.addColorStop(0,'rgba(0,0,0,0)');
  ns.addColorStop(.43,'rgba(0,0,0,.43)');
  ns.addColorStop(1,'rgba(0,0,0,.80)');
  ctx.fillStyle=ns;
  ctx.fillRect(mx-m.sz,my-m.sz,m.sz*2,m.sz*2);
  ctx.restore();
}

function drawBg(){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#04020F');
  g.addColorStop(1,'#080418');
  ctx.fillStyle=g;
  ctx.fillRect(0,0,W,H);
  const neb=ctx.createRadialGradient(PX-30,PY-55,90,PX,PY,325);
  neb.addColorStop(0,'rgba(22,16,72,.26)');
  neb.addColorStop(.55,'rgba(15,10,55,.10)');
  neb.addColorStop(1,'rgba(4,2,15,0)');
  ctx.fillStyle=neb;
  ctx.fillRect(0,0,W,H);
}

function drawStars(){
  STARS.forEach(s=>{
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=s.warm?`rgba(255,228,175,${s.o})`:`rgba(178,190,255,${s.o})`;
    ctx.fill();
  });
}

function drawOrbits(){
  ctx.setLineDash([3,9]);
  ctx.lineWidth=.4;
  MOONS.forEach(m=>{
    ctx.beginPath();
    ctx.ellipse(PX,PY,m.or,m.or*m.vp,0,0,Math.PI*2);
    ctx.strokeStyle='rgba(82,98,148,.11)';
    ctx.stroke();
  });
  ctx.setLineDash([]);
}

function drawBeltDust(){
  ctx.save();
  ctx.globalAlpha=.07;
  ctx.beginPath();
  ctx.ellipse(PX,PY,302,302*VP,0,0,Math.PI*2);
  ctx.ellipse(PX,PY,190,190*VP,0,0,Math.PI*2,true);
  ctx.fillStyle='#A09480';
  ctx.fill('evenodd');
  ctx.restore();
}

let t=0;
(function frame(){
  drawBg();
  drawStars();
  drawBeltDust();
  drawOrbits();
  drawBelt(t,false);
  drawRings(false);
  MOONS.forEach(m=>drawMoon(m,t,false));
  drawPlanet();
  drawRings(true);
  MOONS.forEach(m=>drawMoon(m,t,true));
  drawBelt(t,true);
  t+=.024;
  requestAnimationFrame(frame);
})();
</script>
