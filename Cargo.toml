[workspace]
members = ["app", "engine", "engine-core", "engine-authoring", "editor", "tools/schema-gen", "tools/devtool", "tools/sound-server", "engine-io", "rust-os"]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["Paweł Potępa <pawel.potepa@hotmail.com>"]
license = "MIT"

[workspace.dependencies]
anyhow = "1.0"
clap = { version = "4.5", features = ["derive"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
