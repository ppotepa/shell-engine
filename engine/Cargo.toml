[package]
name = "engine"
version = "0.1.0"
edition = "2021"

[dependencies]
engine-core = { path = "../engine-core" }
crossterm = "0.29"
image = { version = "0.25", default-features = false, features = ["png"] }
serde = { version = "1", features = ["derive"] }
serde_yaml = "0.9"
thiserror = "2.0"
zip = { version = "2.2", default-features = false, features = ["deflate"] }

[dev-dependencies]
tempfile = "3.13"
